function edgeColor(t){
  return t==='love' ? '#ff5c8a' : t==='family' ? '#ffd84f'
       : t==='friend' ? '#7ed0ff' : t==='hostile' ? '#ff3b3b' : '#ff2b4c';
}
function drawWeb(){
  const g = web.glow||0, top = cameraY;
  ctx.save();
  // a warm-ink relationship wash — deep with a rose-web glow
  const bg = ctx.createLinearGradient(0, top, 0, top+H);
  bg.addColorStop(0, `rgba(14,8,14,${0.52*g})`);
  bg.addColorStop(1, `rgba(8,6,12,${0.50*g})`);
  ctx.fillStyle = bg; ctx.fillRect(0, top, W, H);
  ctx.globalAlpha = g;

  const px = W*0.04, pw = W*0.92, py = top + H*0.085, panelH = H*0.83;
  ctx.fillStyle = `rgba(16,12,20,${0.80*g})`;
  ctx.strokeStyle = `rgba(255,138,176,${0.5*g})`; ctx.lineWidth=1.5;
  ctx.fillRect(px, py, pw, panelH);
  ctx.strokeRect(px, py, pw, panelH);
  // title bar
  ctx.textAlign='left'; ctx.fillStyle = `rgba(255,208,226,${0.95*g})`;
  ctx.font='800 12px ui-monospace,monospace';
  ctx.fillText('SCF RELATION WEB — BONDS, HUNT-LINES & THE 3 XS', px+12, py+18);
  ctx.textAlign='right'; ctx.fillStyle = `rgba(255,138,176,${0.6*g})`; ctx.font='700 8px ui-monospace,monospace';
  ctx.fillText('Lore 29 cont. · Toby, June 20', px+pw-12, py+18);
  ctx.textAlign='left';
  ctx.strokeStyle = `rgba(255,138,176,${0.25*g})`; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(px+8, py+26); ctx.lineTo(px+pw-8, py+26); ctx.stroke();

  // node graph body
  const bx = px+10, by = py+34, bw = pw-20, bh = panelH-86;
  const NP = function(n){ const o = WEB_NODES[n]; return { x: bx + o.x*bw, y: by + o.y*bh, c:o.c }; };

  // ---- edges (drawn first, under the nodes); each traces in as web.scan passes its index ----
  WEB_EDGES.forEach(function(e, i){
    const appear = Math.max(0, Math.min(1, (web.scan||0) - i));
    if(appear<=0) return;
    const A = NP(e.a), B = NP(e.b), col = edgeColor(e.t);
    const a = g*appear;
    if(e.t==='hunt'){
      // active hunt-line: a pulsing, directed arrow from hunter to Black
      const pulse = 0.55 + 0.45*Math.sin((web.pulse||0)*4 - i);
      ctx.globalAlpha = a*pulse; ctx.strokeStyle = col; ctx.lineWidth = 2.4;
      ctx.setLineDash([7,5]); ctx.lineDashOffset = -(web.pulse||0)*22;
      ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();
      ctx.setLineDash([]);
      // arrowhead near Black
      const ang = Math.atan2(B.y-A.y, B.x-A.x), hx = B.x - Math.cos(ang)*16, hy = B.y - Math.sin(ang)*16;
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(hx + Math.cos(ang)*9, hy + Math.sin(ang)*9);
      ctx.lineTo(hx + Math.cos(ang+2.5)*7, hy + Math.sin(ang+2.5)*7);
      ctx.lineTo(hx + Math.cos(ang-2.5)*7, hy + Math.sin(ang-2.5)*7);
      ctx.closePath(); ctx.fill();
    } else if(e.t==='hostile'){
      ctx.globalAlpha = a*0.9; ctx.strokeStyle = col; ctx.lineWidth = 1.6;
      ctx.setLineDash([3,4]);
      ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();
      ctx.setLineDash([]);
    } else {
      ctx.globalAlpha = a*(e.t==='love'?0.95:0.8); ctx.strokeStyle = col;
      ctx.lineWidth = e.t==='love' ? 2.2 : 1.6;
      if(e.t==='family'){ ctx.setLineDash([2,3]); }
      ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();
      ctx.setLineDash([]);
    }
  });
  ctx.globalAlpha = g;

  // ---- THE 3 XS faction triad (Lore 29 cont., June 20): a crimson triangle binding Simon + Oren + Pinki,
  //      drawn under the nodes so the members still sit on top ----
  const xg = g*(web.xsGlow||0);
  if(xg > 0.02){
    const S = NP('Simon'), O = NP('Oren'), Pk = NP('Pinki');
    const pulse = 0.6 + 0.4*Math.sin((web.pulse||0)*3);

    ctx.globalAlpha = xg*0.14;
    ctx.fillStyle = '#ff2b4c';
    ctx.beginPath(); ctx.moveTo(S.x,S.y); ctx.lineTo(O.x,O.y); ctx.lineTo(Pk.x,Pk.y); ctx.closePath(); ctx.fill();
    // pulsing crimson outline
    ctx.globalAlpha = xg*pulse;
    ctx.strokeStyle = '#ff2b4c'; ctx.lineWidth = 2;
    ctx.setLineDash([6,4]); ctx.lineDashOffset = -(web.pulse||0)*18;
    ctx.beginPath(); ctx.moveTo(S.x,S.y); ctx.lineTo(O.x,O.y); ctx.lineTo(Pk.x,Pk.y); ctx.closePath(); ctx.stroke();
    ctx.setLineDash([]);
    // faction label at the centroid
    const cxx=(S.x+O.x+Pk.x)/3, cyy=(S.y+O.y+Pk.y)/3;
    ctx.globalAlpha = xg; ctx.textAlign='center';
    ctx.fillStyle = '#ff7a93'; ctx.font='800 10px ui-monospace,monospace';
    ctx.fillText('THE 3 XS', cxx, cyy+3);
    ctx.textAlign='left';
  }
  ctx.globalAlpha = g;

  // ---- nodes (drawn on top), each appears as the web scans past its first edge ----
  const shown = {};

  // ---- THE 3 XS overlay on the nodes: rank badges, the spare/no-mercy split, and Simon's switching arrow ----
  if(xg > 0.02){

    XS_MEMBERS.forEach(function(m){
      if(!shown[m]) return; const P = NP(m);

    // each node so it does not fight the rank badge above.

    XS_MEMBERS.forEach(function(m){
      if(!shown[m]) return; const P = NP(m);

    ctx.font='800 7px ui-monospace,monospace';
    // the moral split: Pinki + Oren SPARED Sumona; Simon spares NO ONE
    if(shown['Sumona']){ const Su = NP('Sumona');

    if(shown['Simon']){ const Si = NP('Simon');

    // Simon's redirect arrow — it switches targets, because protecting one makes him move to the next

      const T = WEB_NODES[tgtName] ? NP(tgtName) : null;
      if(T){
        const fade = Math.min(1, web.xsT/0.25) * Math.min(1, (1.5-web.xsT)/0.25);  // ease in/out per switch
        ctx.globalAlpha = xg * Math.max(0.25, fade);
        ctx.strokeStyle = '#ff7b00'; ctx.lineWidth = 1.8;
        ctx.setLineDash([4,4]); ctx.lineDashOffset = -(web.pulse||0)*26;
        ctx.beginPath(); ctx.moveTo(Si.x, Si.y); ctx.lineTo(T.x, T.y); ctx.stroke();
        ctx.setLineDash([]);
        const ang = Math.atan2(T.y-Si.y, T.x-Si.x), hx=T.x-Math.cos(ang)*14, hy=T.y-Math.sin(ang)*14;
        ctx.fillStyle = '#ff7b00'; ctx.beginPath();
        ctx.moveTo(hx+Math.cos(ang)*8, hy+Math.sin(ang)*8);
        ctx.lineTo(hx+Math.cos(ang+2.5)*6, hy+Math.sin(ang+2.5)*6);
        ctx.lineTo(hx+Math.cos(ang-2.5)*6, hy+Math.sin(ang-2.5)*6);
        ctx.closePath(); ctx.fill();
        ctx.globalAlpha = xg;
      }
    }
    ctx.textAlign='left';
  }
  ctx.globalAlpha = g;

  // ---- THE 3 XS hunt sequence (Lore 29 cont., June 20): the order is the real lore — comms fail, then what
  //      the target loves is broken, then the world warps, then they are isolated, then they fall. The active
  //      step travels left to right so the hunt reads as a repeatable pattern, not a single brawl. ----
  if(xg > 0.02){
    const hbY = py + panelH - 44, hbX = px + 14, hbW = pw - 28;
    ctx.textAlign='left'; ctx.font='800 7px ui-monospace,monospace';
    ctx.fillStyle = `rgba(255,123,0,${0.92*xg})`;

    XS_HUNT.forEach(function(s, i){
      const sx = hbX + i*stepW;
      const on = step===i, past = i < step;
      ctx.fillStyle = on   ? `rgba(255,214,84,${xg})`

      ctx.font = on ? '800 7px ui-monospace,monospace' : '700 7px ui-monospace,monospace';
      ctx.fillText((i+1)+' '+s, sx, hbY);
      if(i < XS_HUNT.length-1){
        ctx.fillStyle = `rgba(255,123,0,${0.5*xg})`; ctx.font='700 7px ui-monospace,monospace';

  // ---- legend strip ----

   Lore 29 cont. (June 20) — THE ETERNAL BATTLE (CLARA)
   Toby: "Clara (the ancient being from a corrupted Classics X Undertale mod)

const CLARA_NOTES = [

  'Clara is canonically stronger than Simon. Neither can defeat the other.',
  'Simon is the king. Clara is the queen. In chess the queen overwhelms.',

  'If Clara never gives up, the battle goes on forever.',
  'Clara owns her Judgement Hall. She rules the territory itself.',
  'Each cycle Clara rebirths stronger. The fight only escalates.',
  'Clara is glitchier than all of Classics combined.',
  'Clara is both Undertale and Classics at once.',
  'Clara is not a sprite. Her design is complex: saturation and contrast.',
  'A green cloak, a tanish body, an aura of colors not made yet.',
];
const CLARA_EVENTS = ['THE ETERNAL BATTLE','KING vs QUEEN','NEITHER CAN LOSE','DRAWS DO NOT EXIST',
  'CLARA — CANONICALLY STRONGER','THE MERCY BUTTON IS BROKEN','SIMON DODGES FOREVER','CLARA ATTACKS FOREVER',
  'CLARA REBIRTHS STRONGER','HER JUDGEMENT HALL','GLITCHIER THAN ALL OF CLASSICS','BOTH UNDERTALE AND CLASSICS',
  'AN AURA OF SO MANY COLORS','THE BATTLE GOES ON FOREVER'];
// impossible colors for Clara's aura — saturated, high-contrast, shifting
const CLARA_AURA = ['#39e0a8','#7a8c4a','#caa97a','#ff3bd0','#3bf0ff','#b9ff3b','#ff7b00','#9a3bff'];

function updateClara(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  clara.anim = (clara.anim||0) + dt;
  clara.glitchT = (clara.glitchT||0) + dt;
  // Simon (the king) endlessly dodges — a smooth side-to-side weave that never lands anywhere
  clara.dodge = (clara.dodge||0) + dt;
  // the Mercy button is broken: it stays shattered, flickering as if it can't redraw
  clara.mercy = Math.min(1, (clara.mercy||0) + dt*0.6);
  // Clara fires attacks on a cadence; each one arcs toward the king and is dodged (never resolves)
  clara.attackT = (clara.attackT||0) + dt;
  if(clara.attackT >= 0.9){
    clara.attackT = 0;
    clara.attacks.push({ t:0, lane: (clara.attacks.length%2)? -1 : 1, hue: clara.attacks.length % CLARA_AURA.length });
    AUDIO.zap && AUDIO.zap();
  }
  clara.attacks.forEach(function(a){ a.t += dt; });
  clara.attacks = clara.attacks.filter(function(a){ return a.t < 1.4; });
  // each full cycle, Clara rebirths stronger — the aura intensifies and the counter climbs (eternal escalation)
  clara.rebirthT = (clara.rebirthT||0) + dt;
  if(clara.rebirthT >= 3.0){ clara.rebirthT = 0; clara.rebirth = (clara.rebirth||0) + 1; shake = Math.max(shake,5); }
  clara.noteT -= dt;
  if(clara.noteT <= 0){ clara.noteT = 2.6; clara.note = ((clara.note||0)+1) % CLARA_NOTES.length; }
  clara.eventT -= dt;
  if(clara.eventT <= 0){ clara.eventT = rnd(2.2,3.6);
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(CLARA_EVENTS), col:pick(['#39e0a8','#3bf0ff','#ff3bd0']) });
  }
  // THE ETERNAL BATTLE meter — climb with purpose to ENDURE the exchange (it can never be won, only held)
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  claraM = Math.max(0, Math.min(1, claraM + (moving ? dt*0.05 : -dt*0.03)));
  if(claraM >= 1 && !clara.held){
    clara.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('You endured the eternal battle. It never ends, but you held the king on his feet.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ ENDURED — THE BATTLE GOES ON FOREVER ★', col:'#caffe6' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(CLARA_AURA)));
    AUDIO.zap();
  }
}
// a single chess piece silhouette (used for the plain KING). cx,cy = base center; s = scale
function chessPiece(cx, cy, s, kind, fill){
  ctx.fillStyle = fill;
  ctx.beginPath();
  // base
  ctx.ellipse(cx, cy, s*0.9, s*0.28, 0, 0, Math.PI*2); ctx.fill();
  // body
  ctx.beginPath();
  ctx.moveTo(cx - s*0.55, cy);
  ctx.quadraticCurveTo(cx - s*0.30, cy - s*1.5, cx - s*0.32, cy - s*2.0);
  ctx.lineTo(cx + s*0.32, cy - s*2.0);
  ctx.quadraticCurveTo(cx + s*0.30, cy - s*1.5, cx + s*0.55, cy);
  ctx.closePath(); ctx.fill();
  // head
  ctx.beginPath(); ctx.arc(cx, cy - s*2.2, s*0.42, 0, Math.PI*2); ctx.fill();
  if(kind==='king'){
    // a cross crown on top
    ctx.fillRect(cx - s*0.08, cy - s*3.1, s*0.16, s*0.6);
    ctx.fillRect(cx - s*0.28, cy - s*2.9, s*0.56, s*0.16);
  }
}

  // EXPOSED (Lore 27) — the MIND meter. Fills when blurry thoughts touch you;
  // overload and Simon seals it with lightning. Look closely (stand still) to clear.
  if(isExposed() && exposed.glow>0.05){

  // ATOMIX WAR (Lore 27) — the BOARD tug-of-war: red = Simon owns it, blue = the

  if(isAtomix() && !isResidual() && atomix.glow>0.05){

  // RESIDUAL WAR (Lore 27) — the SOUND SPINE meter. Finish the half-formed remnants to

  if(isResidual() && !isSounds() && residual.glow>0.05){

    ctx.fillStyle='#0a160e'; ctx.fillRect(bx, by, bw, 7);
    const pg = ctx.createLinearGradient(bx,0,bx+bw,0);
    pg.addColorStop(0,'#2a3328'); pg.addColorStop(0.5,'#7bdc6a'); pg.addColorStop(1, winFlash>0?'#bfffd8':'#9affc8');
    ctx.fillStyle = pg; ctx.fillRect(bx, by, bw*em, 7);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*em-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(plague.held){ ctx.fillStyle='#bfffd8'; ctx.fillText('★ PROTOCOL HELD — NO DIRECT CONTACT ★', W/2, by-6); }
    else { ctx.fillStyle='#bfffd8'; ctx.fillText('THE PLAGUE-KING PROTOCOL — KEEP CLEAR OF THE TOUCH', W/2, by-6); }
  }
  // THE DANGER INDEX (Lore 29 cont.) — the INDEX meter. Climb with purpose to log the whole ranking
  // (catalog every danger level) before the Invisible Man closes in; standing still drains it.
  if(isDanger() && !isCodex() && danger.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, im=Math.max(0,Math.min(1,dangerM));
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    ctx.fillStyle='#1a1206'; ctx.fillRect(bx, by, bw, 7);
    const ig = ctx.createLinearGradient(bx,0,bx+bw,0);
    ig.addColorStop(0,'#ff5c8a'); ig.addColorStop(0.5,'#b98cff'); ig.addColorStop(1, winFlash>0?'#fff2b0':'#ffe24a');
    ctx.fillStyle = ig; ctx.fillRect(bx, by, bw*im, 7);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*im-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(danger.held){ ctx.fillStyle='#fff2b0'; ctx.fillText('★ INDEX LOGGED — RANKING CATALOGUED ★', W/2, by-6); }
    else { ctx.fillStyle='#ffe24a'; ctx.fillText('THE DANGER INDEX — LOG THE WHOLE RANKING', W/2, by-6); }
  }
  // THE STATUS CODEX (Lore 29 cont.) — the CODEX meter. Climb with purpose to seal every fate.
  if(isCodex() && !isWeb() && codex.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, im=Math.max(0,Math.min(1,codexM));
    ctx.fillStyle='#0a0e16'; ctx.fillRect(bx, by, bw, 7);
    const ig = ctx.createLinearGradient(bx,0,bx+bw,0);
    ig.addColorStop(0,'#7ed0ff'); ig.addColorStop(0.5,'#9affc8'); ig.addColorStop(1, winFlash>0?'#dff0ff':'#cfe0ff');
    ctx.fillStyle = ig; ctx.fillRect(bx, by, bw*im, 7);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*im-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(codex.held){ ctx.fillStyle='#dff0ff'; ctx.fillText('★ CODEX SEALED — EVERY FATE FILED ★', W/2, by-6); }
    else { ctx.fillStyle='#cfe0ff'; ctx.fillText('THE STATUS CODEX — SEAL EVERY FATE', W/2, by-6); }
  }
  // THE RELATION WEB (Lore 29 cont.) — the WEB meter. Climb with purpose to trace every bond.
  if(isWeb() && !isClara() && web.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, im=Math.max(0,Math.min(1,webM));
    ctx.fillStyle='#140c14'; ctx.fillRect(bx, by, bw, 7);
    const ig = ctx.createLinearGradient(bx,0,bx+bw,0);
    ig.addColorStop(0,'#ff5c8a'); ig.addColorStop(0.5,'#7ed0ff'); ig.addColorStop(1, winFlash>0?'#ffd0e2':'#ffd84f');
    ctx.fillStyle = ig; ctx.fillRect(bx, by, bw*im, 7);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*im-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(web.held){ ctx.fillStyle='#ffd0e2'; ctx.fillText('★ WEB TRACED — EVERY BOND MAPPED ★', W/2, by-6); }
    else { ctx.fillStyle='#ff8ab0'; ctx.fillText('THE RELATION WEB — TRACE EVERY BOND', W/2, by-6); }
  }
  // THE ETERNAL BATTLE (Lore 29 cont.) — the ENDURE meter. The fight can never be won, only held.
  if(isClara() && clara.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, im=Math.max(0,Math.min(1,claraM));
    ctx.fillStyle='#0a1410'; ctx.fillRect(bx, by, bw, 7);
    const ig = ctx.createLinearGradient(bx,0,bx+bw,0);
    ig.addColorStop(0,'#39e0a8'); ig.addColorStop(0.5,'#3bf0ff'); ig.addColorStop(1, winFlash>0?'#caffe6':'#ff3bd0');
    ctx.fillStyle = ig; ctx.fillRect(bx, by, bw*im, 7);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*im-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(clara.held){ ctx.fillStyle='#caffe6'; ctx.fillText('★ ENDURED — THE BATTLE GOES ON FOREVER ★', W/2, by-6); }
    else { ctx.fillStyle='#39e0a8'; ctx.fillText('THE ETERNAL BATTLE — ENDURE EVERY EXCHANGE', W/2, by-6); }
  }
  // active lever tag
  if(lever && lever.state!=='idle'){
    ctx.textAlign='center';
    const blink=(Math.sin(time*10)>0)?1:0.55; ctx.globalAlpha=blink;
    ctx.fillStyle='#ffd84f'; ctx.font='800 11px ui-monospace,monospace';
    ctx.fillText('⚙ LEVER: '+lever.name, W/2, 64);
    ctx.globalAlpha=1;
  }
  // Phase 2 tag — the .EXE virus is loose and locked on
  if(corrupted()){
    ctx.textAlign='center';
    const blink=(Math.sin(time*12)>0)?1:0.5; ctx.globalAlpha=blink;
    ctx.fillStyle = isClara()? '#39e0a8' : (isWeb()? '#ff8ab0' : (isCodex()? '#cfe0ff' : (isDanger()? '#ffe24a' : (isPlague()? '#9affc8' : (isHallu()? '#ffe24a' : (isSmooth()? '#ffe24a' : (isWall()? '#ffe24a' : (isAlien()? '#aef34a' : (isFirey()? '#ff8a3b' : (isTreads()? '#3ee6ff' : (isScf404()? '#b98cff' : (isScf()? '#ffe98a' : (isTriad()? '#dff0ff' : (isJudge()? '#bfe0ff' : (isVoid()? '#b98cff' : (isSounds()? '#ffd84f' : (isResidual()? '#9affc8' : (isAtomix()? '#ff2b4c' : (isExecutioner()? '#3ee6ff' : (isExposed()? '#b98cff' : '#ff3b5c')))))))))))))))))))) ;
    ctx.font='800 11px ui-monospace,monospace';
    ctx.fillText(isClara()? '▓ THE ETERNAL BATTLE — CLARA, KING vs QUEEN ▓'
               : (isWeb()? '▓ THE RELATION WEB — HUNT-LINES & BONDS ▓'
               : (isCodex()? '▓ THE STATUS CODEX — EVERY FATE FILED ▓'
               : (isDanger()? '▓ THE DANGER INDEX — SCF FINAL RANKING ▓'
               : (isPlague()? '▓ THE PLAGUE CYCLE — THE PLAGUE-KING PROTOCOL ▓'
               : (isHallu()? '▓ THE HALLUCINATION ERA — THE YELLOW EYE PROTOCOL ▓'
               : (isSmooth()? '▓ THE SMOOTH AGE — THE ARROW CHAMBER ▓'
               : (isWall()? '▓ THE WALL ERA — THE NIL STATE ▓'
               : (isAlien()? '▓ THE ALIEN AGE — FASTER THAN PREDICTION ▓'
               : (isFirey()? '▓ FIREY DELIGHT — THE MELTING TUBE ▓'
               : (isTreads()? '▓ THE TREADMILL WEAKNESS — PATTERN CONTROL ▓'
               : (isScf404()? '▓ SCF 404 — THE ENDLESS CONTAINMENT-UNIVERSE ▓'
               : (isScf()? '▓ THE CONTAINMENT FACILITY — SIMON IS CODE ▓'
               : (isTriad()? '❄ THREE-WAY FIELD — CONTROL · ORIGIN · CONTAINMENT ❄'
               : (isJudge()? '❄ WINTER SIMON — THE JUDGMENT FIELD ❄'
               : (isVoid()? '▓ THE LORE OF THE VOID — TORQE ▓'
               : (isSounds()? '▓ THE 17 SOUND BATTLES ▓'
               : (isResidual()? '▓ THE RESIDUAL WAR ▓'
               : (isAtomix()? '▓ THE ATOMIX WAR ▓'
               : (isExecutioner()? '▓ THE SILENT EXECUTIONER ▓'
               : (isExposed()? '▓ EXPOSED — THE BLURRY MIND ▓' : '▓ .EXE VIRUS — PHASE 2 ▓')))))))))))))))))))), W/2, 64);
    ctx.globalAlpha=1;
  }
}

/* ---------- title ---------- */
function drawTitle(){
  ctx.textAlign='center';
  // title
  ctx.save();
  ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=24;
  ctx.fillStyle='#ffd84f'; ctx.font='800 40px ui-monospace,monospace';
  ctx.fillText('THE ENDLESS', W/2, 150);
  ctx.fillText('STAIRCASE', W/2, 196);
  ctx.restore();
  ctx.fillStyle='#8a82a8'; ctx.font='12px ui-monospace,monospace';
  ctx.fillText('CLASSIC RL · THE FINAL LEVEL · Lore 29 · The Eternal Battle', W/2, 226);

  // lore blurb
  ctx.fillStyle='#cfc6ea'; ctx.font='13px ui-monospace,monospace';
  const lines=[
    'Endless living staircases fill the Endless Room.',
    'Simon forces everyone up, and he never stops.',
    'He is ALL POWERFUL: his levers make the staircase',
    'FALL, REARRANGE, become a BRIDGE, SPIN, or SLIDE.',
    'Climb far and Simon steps back: a calm Incredibox',
    'and Sound Battles... until PHASE 2 breaks it.',
    'PHASE 2: red + cyan cells mix into lightning.',
    'RUN = fuel; HIDE (stand still) = safe. EXPOSED: he',
    'plants BLURRY THOUGHTS; stand still to clear it.',
    'SILENT EXECUTIONER: he MARKS you; MOVE off the mark.',
    'ATOMIX WAR: he divides the board. RESIDUAL WAR:',
    'FINISH the unfinished. Then 17 SOUND BATTLES decide.',
    'VOID + TORQE; WINTER SIMON judges (the GOLD CARD); a',
    'THREE-WAY FIELD; the SCF: he becomes CODE, then SCF 404.',
    'WEAKNESS: the TREADMILL. FIREY DELIGHT melts the tube.',
    'THE ALIEN AGE: he reads 400 moves ahead, picks MOVE 401.',
    'THE WALL ERA: walled in, the NIL STATE subtracts the room.',
    'THE SMOOTH AGE: FNF arrows read him; then he LIES.',
    'THE HALLUCINATION ERA: HP near 0; the YELLOW EYE melts',
    'what it sees; he sees zombies/chocolate. BLACK rules now.',
    'THE PLAGUE CYCLE: Simon crowns himself the PLAGUE KING.',
    'One cold touch = 404D / ZOMBIE / DEAD. Keep the PROTOCOL.',
    'THE DANGER INDEX: SIMON 1004.04 (the .04 hides 404), CRAZY;',
    'OREN 1004, BLACK 1000, PINKI 997, JEVIN 990.5, SUMONA 950.',
    'THE STATUS CODEX files every fate: CRAZY/DEMONED/.EXE/ALIVE/DEAD.',
    'THE RELATION WEB: bonds, not a chart. PINKI + OREN hunt BLACK;',
    'SUMONA is their child; SIMON is OREN\'s brother; Simon redirects',
    'the battles toward the dead. TRACE every bond before a line snaps.',
    'THE ETERNAL BATTLE: CLARA attacks. SIMON is the KING, CLARA the',
    'QUEEN; neither can lose, draws do not exist, so it goes on forever.'
  ];
  ctx.font='11px ui-monospace,monospace';
  lines.forEach((l,i)=> ctx.fillText(l, W/2, 224 + i*13));

  // controls
  ctx.fillStyle='#8a82a8'; ctx.font='12px ui-monospace,monospace';
  ctx.fillText('◀ ▶ move    ▲ / SPACE jump    M mute', W/2, 526);
  if(best>0){ ctx.fillStyle='#39e08a'; ctx.fillText('BEST CLIMB: '+best+' m', W/2, 550); }

  // prompt
  const blink = (Math.sin(time*4)>0)?1:0.3;
  ctx.globalAlpha=blink; ctx.fillStyle='#ffd84f'; ctx.font='800 20px ui-monospace,monospace';
  ctx.fillText('PRESS SPACE / TAP TO CLIMB', W/2, 590);
  ctx.globalAlpha=1;

  // a tiny Simon grin at the bottom
  ctx.fillStyle='#ffd84f'; ctx.beginPath(); ctx.arc(W/2-30,690,9,0,6.28); ctx.arc(W/2+30,690,9,0,6.28); ctx.fill();
  ctx.fillStyle='#ff0022'; ctx.beginPath(); ctx.arc(W/2-30,690,4,0,6.28); ctx.arc(W/2+30,690,4,0,6.28); ctx.fill();
}

/* ---------- death ---------- */
function drawDeath(){
  ctx.fillStyle='rgba(6,2,12,0.78)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ff3b5c'; ctx.font='800 30px ui-monospace,monospace';
  ctx.shadowColor='#ff0033'; ctx.shadowBlur=16;
  ctx.fillText(deathReason, W/2, H*0.34);
  ctx.shadowBlur=0;
  const m=Math.floor(height/PX_PER_M);
  ctx.fillStyle='#e9e0ff'; ctx.font='800 46px ui-monospace,monospace';
  ctx.fillText(m+' m', W/2, H*0.46);
  ctx.fillStyle='#39e08a'; ctx.font='700 18px ui-monospace,monospace';
  ctx.fillText('◆ '+emer+' emeralds', W/2, H*0.52);
  if(newBest){ ctx.fillStyle='#ffd84f'; ctx.font='800 18px ui-monospace,monospace';
    ctx.fillText('★ NEW BEST CLIMB ★', W/2, H*0.57); }
  else { ctx.fillStyle='#8a82a8'; ctx.font='13px ui-monospace,monospace';
    ctx.fillText('best '+best+' m', W/2, H*0.57); }
  // lore sting
  ctx.fillStyle='#8a82a8'; ctx.font='12px ui-monospace,monospace';
  if(isClara()){
    ctx.fillText('"Clara is canonically stronger, and she broke the Mercy button. I am the king, she is the', W/2, H*0.64);
    ctx.fillText(' queen. Neither can lose, draws do not exist, so we fight forever." — The Eternal Battle', W/2, H*0.67);
  } else if(isWeb()){
    ctx.fillText('"It is a web now, not a chart. Pinki and Oren are together and they hunt Black. Sumona', W/2, H*0.64);
    ctx.fillText(' is their daughter. I did not want the battles, so I send them to the dead." — The Relation Web', W/2, H*0.67);
  } else if(isCodex()){
    ctx.fillText('"Every fate is filed now. Mr. Sun is a BLACKHOLE, Gray is .EXE, Mervin gave his life', W/2, H*0.64);
    ctx.fillText(' for Mindy, Star Steed runs, the Throne is gone." — The Status Codex', W/2, H*0.67);
  } else if(isDanger()){
    ctx.fillText('"Simon is 1004.04, and the .04 hides 404. Whatever he sees melts. Only he and Sumona', W/2, H*0.64);
    ctx.fillText(' are CRAZY. The Invisible Man said It is ok., then the mask lifted." — The Danger Index', W/2, H*0.67);
  } else if(isPlague()){
    ctx.fillText('"Almost everyone is dead, so I became the cure. One touch and you are a 404D, a', W/2, H*0.64);
    ctx.fillText(' zombie, or the dead, which I call living. Give me a sacrifice." — The Plague Cycle', W/2, H*0.67);
  } else if(isFirey()){
    ctx.fillText('"I got tired of every game, so I stopped playing and just spun. Firey Delight, I', W/2, H*0.64);
    ctx.fillText(' said. Friction took the tube, it melted, and I escaped again." — Firey Delight', W/2, H*0.67);
  } else if(isTreads()){
    ctx.fillText('"They found my one weakness, the treadmill. I charged the belt, drained, and was', W/2, H*0.64);
    ctx.fillText(' thrown off. I got up, but they made me move in patterns I did not choose." — The Treadmill Weakness', W/2, H*0.67);
  } else if(isScf404()){
    ctx.fillText('"Simon is now SCF 404. The containment grew bigger than the world, and he', W/2, H*0.64);
    ctx.fillText(' still became the most dangerous thing in it. Survival: 0%." — SCF 404', W/2, H*0.67);
  } else if(isScf()){
    ctx.fillText('"They contained his body, but by then Simon had already become', W/2, H*0.64);
    ctx.fillText(' the code of the containment itself." — The Containment Facility', W/2, H*0.67);
  } else if(isTriad()){
    ctx.fillText('"Alex became a god of control, Lica claims everything flows from her, and I', W/2, H*0.64);
    ctx.fillText(' freeze it all to hold it. Control, origin, containment." — The Three-Way Field', W/2, H*0.67);
  } else if(isJudge()){
    ctx.fillText('"I hated all these repeated wars, so I tore January off the calendar and', W/2, H*0.64);
    ctx.fillText(' became Winter Simon. You both ruined the board again." — The Judgment Field', W/2, H*0.67);
  } else if(isVoid()){
    ctx.fillText('"I created the void, a totally dense space, and fused it with my Domain.', W/2, H*0.64);
    ctx.fillText(' My eyes turned red, I said Torqe, and I jumped." — The Lore of the Void', W/2, H*0.67);
  } else if(isSounds()){
    ctx.fillText('"With the board destroyed, only Sound Battle law makes sense. Everything', W/2, H*0.64);
    ctx.fillText(' is decided through sound now, and Simon controls Simon." — The 17 Sound Battles', W/2, H*0.67);
  } else if(isResidual()){
    ctx.fillText('"I stopped answering the world, and the gap let Residual in. It is not', W/2, H*0.64);
    ctx.fillText(' fought, only finished, then forced to converge." — The Residual War', W/2, H*0.67);
  } else if(isAtomix()){
    ctx.fillText('"I stopped conquering like a fighter. I conquer like a system.', W/2, H*0.64);
    ctx.fillText(' I do not take the land. I take the outcomes." — The Atomix War', W/2, H*0.67);
  } else if(isExecutioner()){
    ctx.fillText('"I do not need to overpower the room. I only break', W/2, H*0.64);
    ctx.fillText(' the right thing first. One clean move." — The Silent Executioner', W/2, H*0.67);
  } else if(isExposed()){
    ctx.fillText('"Too much in the mind. I sealed it with lightning.', W/2, H*0.64);
    ctx.fillText(' You did not look closely enough. meow 😿" — Phase 2 Simon, found out', W/2, H*0.67);
  } else if(phase2 && (phase2.active || phase2.done)){
    ctx.fillText('"Those who run become fuel. Those who hide are', W/2, H*0.64);
    ctx.fillText(' safe. !CLaSsIcs can\'T b3 SAV3b!" — Phase 2 Simon', W/2, H*0.67);
  } else if(peace && peace.done){
    ctx.fillText('"The chaos happened. The lore remains.', W/2, H*0.64);
    ctx.fillText(' It was all normal again." — Simon', W/2, H*0.67);
  } else if(restore && restore.done){
    ctx.fillText('"There are no villains. I was the corruption.', W/2, H*0.64);
    ctx.fillText(' The rest is only perspective." — Simon', W/2, H*0.67);
  } else {
    ctx.fillText('"Simon promised a cure at the top.', W/2, H*0.64);
    ctx.fillText(' There is no cure. There is no top."', W/2, H*0.67);
  }
  const blink=(Math.sin(time*4)>0)?1:0.35;
  ctx.globalAlpha=blink; ctx.fillStyle='#ffd84f'; ctx.font='800 20px ui-monospace,monospace';
  ctx.fillText('PRESS SPACE / TAP TO TRY AGAIN', W/2, H*0.78);
  ctx.globalAlpha=1;
}

/* ---------- helpers ---------- */
function roundRect(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function roundRectC(cx,cy,w,h,r){ roundRect(cx-w/2,cy-h/2,w,h,r); }
function heart(x,y,s){ ctx.beginPath();
  ctx.moveTo(x,y+s*0.6);
  ctx.bezierCurveTo(x,y, x-s,y, x-s,y-s*0.5);
  ctx.bezierCurveTo(x-s,y-s*1.2, x,y-s*1.1, x,y-s*0.4);
  ctx.bezierCurveTo(x,y-s*1.1, x+s,y-s*1.2, x+s,y-s*0.5);
  ctx.bezierCurveTo(x+s,y, x,y, x,y+s*0.6); ctx.fill(); }

/* ---------- confirm (start / restart) ---------- */
function handleConfirm(){
  AUDIO.ensure();
  if(state==='title'){ reset(); state='play'; }
  else if(state==='dead'){ reset(); state='play'; }
}

/* =========================================================================
   MAIN LOOP — fixed timestep for stable physics
   ========================================================================= */
let last=performance.now(), acc=0; const STEP=1/60;
function frame(now){
  let dt=(now-last)/1000; last=now; if(dt>0.1) dt=0.1; acc+=dt;
  while(acc>=STEP){ update(STEP); clearPress(); acc-=STEP; }
  draw();
  requestAnimationFrame(frame);
}
function clearPress(){ for(const k in press) delete press[k]; }
reset(); state='title';
requestAnimationFrame(frame);
</script>
