<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>The Endless Staircase — Classic RL</title>
<style>
  :root{
    --bg:#05030a; --ink:#e9e0ff; --dim:#8a82a8; --err404:#3ec6ff; --err666:#ff3b5c;
    --gold:#ffd84f; --simon:#ffd84f; --emerald:#39e08a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#05030a;color:var(--ink);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;overflow:hidden;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 80% at 50% -10%, #1a0c2e 0%, #0a0614 45%, #05030a 100%);}
  canvas{display:block;height:100%;max-height:100vh;background:#070411;
    box-shadow:0 0 60px rgba(120,40,200,.35), 0 0 0 1px rgba(180,120,255,.12) inset;
    image-rendering:auto;touch-action:none;}
  #hint{position:fixed;bottom:8px;left:0;right:0;text-align:center;color:#5a5278;
    font-size:11px;letter-spacing:.5px;pointer-events:none;}
  @media (max-width:560px){ #hint{font-size:10px} }
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="540" height="760"></canvas></div>
<div id="hint">◀ ▶ / A D move &nbsp;·&nbsp; ▲ / W / SPACE jump &nbsp;·&nbsp; M mute &nbsp;·&nbsp; tap left/right halves on mobile</div>
<script>
"use strict";
/* =========================================================================
   THE ENDLESS STAIRCASE  (Classic RL / Secret of Simon's Lore — Lore 24)
   "everyone is forced by Simon to walk endlessly up the endless spiral
    staircase ... The stairs are a monstrosity, it is living!"
   Single file. Vanilla Canvas + WebAudio. No external libraries.
   ========================================================================= */

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

/* ---------- responsive scale (keep portrait aspect, fit height) ---------- */
function fit(){
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  cv.style.width  = Math.floor(W * s) + 'px';
  cv.style.height = Math.floor(H * s) + 'px';
}
window.addEventListener('resize', fit); fit();

/* ---------- input ---------- */
const keys = {};
const press = {};            // edge-triggered this frame
function setKey(code, down){
  if(down && !keys[code]) press[code] = true;
  keys[code] = down;
}
window.addEventListener('keydown', e=>{
  const c = e.code;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','KeyA','KeyD','KeyW'].includes(c)) e.preventDefault();
  if(c==='KeyM'){ AUDIO.toggle(); }
  if(c==='Enter' || c==='Space'){ handleConfirm(); }
  setKey(c, true);
}, {passive:false});
window.addEventListener('keyup', e=> setKey(e.code,false));

/* touch: left half = move left, right half = move right, swipe-up / tap-top = jump */
let touchLeft=false, touchRight=false;
function touchHandler(e){
  e.preventDefault();
  touchLeft=false; touchRight=false;
  let jump=false;
  const r = cv.getBoundingClientRect();
  for(const t of e.touches){
    const x = (t.clientX - r.left)/r.width;
    const y = (t.clientY - r.top)/r.height;
    if(y < 0.25) jump = true;
    else if(x < 0.5) touchLeft=true; else touchRight=true;
  }
  if(jump) press['Space']=true;
  if(e.type==='touchstart'){ handleConfirm(); }
}
cv.addEventListener('touchstart', touchHandler, {passive:false});
cv.addEventListener('touchmove',  touchHandler, {passive:false});
cv.addEventListener('touchend', e=>{ e.preventDefault(); touchLeft=false; touchRight=false; }, {passive:false});

function leftHeld(){ return keys['ArrowLeft']||keys['KeyA']||touchLeft; }
function rightHeld(){ return keys['ArrowRight']||keys['KeyD']||touchRight; }
function jumpEdge(){ return press['ArrowUp']||press['KeyW']||press['Space']; }

/* =========================================================================
   AUDIO — synthesized, no files. A tense climbing pulse + heartbeat that
   quickens as Simon nears, plus jump/hit/coin SFX and a Phase-2 horror drone.
   ========================================================================= */
const AUDIO = (()=>{
  let ac=null, master=null, musicGain=null, on=true, started=false;
  let lp=null, drone=null, droneGain=null;
  let step=0, nextNoteTime=0, bpm=132, timer=null, intensity=0;
  const scale=[0,3,5,7,10,12,15];        // minor pentatonic-ish, eerie
  const bassRoot=55;                       // A1
  function init(){
    if(ac) return;
    try{
      ac = new (window.AudioContext||window.webkitAudioContext)();
      master = ac.createGain(); master.gain.value = 0.0; master.connect(ac.destination);
      lp = ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=18000; lp.connect(master);
      musicGain = ac.createGain(); musicGain.gain.value=0.5; musicGain.connect(lp);
      // horror drone (kicks in as Simon closes)
      drone = ac.createOscillator(); drone.type='sawtooth'; drone.frequency.value=41.2;
      droneGain = ac.createGain(); droneGain.gain.value=0.0; drone.connect(droneGain); droneGain.connect(lp);
      drone.start();
    }catch(e){ ac=null; }
  }
  function blip(freq,t,dur,type,gain,pan){
    if(!ac) return;
    const o=ac.createOscillator(); o.type=type||'triangle'; o.frequency.value=freq;
    const g=ac.createGain(); g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(gain,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
    let node=g;
    if(pan!==undefined && ac.createStereoPanner){ const p=ac.createStereoPanner(); p.pan.value=pan; g.connect(p); node=p; }
    o.connect(g); node.connect(musicGain); o.start(t); o.stop(t+dur+0.02);
  }
  function scheduler(){
    if(!ac) return;
    while(nextNoteTime < ac.currentTime + 0.12){
      const t=nextNoteTime;
      const spb=60/bpm;
      // bass on every beat
      if(step%2===0){
        blip(bassRoot*(step%8===0?1:1.5), t, spb*0.9, 'sawtooth', 0.10+0.05*intensity, 0);
      }
      // arpeggio melody quickens / rises with intensity
      const deg = scale[(step + (step>>2)) % scale.length];
      const oct = 1 + (intensity>0.6?1:0);
      blip(220*Math.pow(2,(deg+12*oct)/12), t, spb*0.45, intensity>0.6?'square':'triangle', 0.045+0.05*intensity, ((step%4)-1.5)/3);
      // tension tick high up
      if(intensity>0.35 && step%4===2) blip(1320, t, 0.05,'square',0.02*intensity, 0.6);
      step++; nextNoteTime += spb/2; // 8th notes
    }
  }
  return {
    ensure(){ if(!started){ init(); started=true;
        if(ac){ if(ac.state==='suspended') ac.resume(); nextNoteTime=ac.currentTime+0.05;
          timer=setInterval(scheduler,25);
          master.gain.linearRampToValueAtTime(on?0.9:0.0, ac.currentTime+0.4);
        } } },
    toggle(){ on=!on; if(ac){ master.gain.cancelScheduledValues(ac.currentTime);
        master.gain.linearRampToValueAtTime(on?0.9:0.0, ac.currentTime+0.15);} return on; },
    isOn(){ return on; },
    /* p = proximity 0..1 (0 far, 1 Simon at your heels); h=height factor */
    setTension(p, h){
      intensity = Math.max(0, Math.min(1, p*0.7 + h*0.5));
      bpm = 120 + h*70 + p*40;
      if(ac){
        droneGain.gain.setTargetAtTime(0.02 + p*0.22, ac.currentTime, 0.3);
        drone.frequency.setTargetAtTime(40 + p*18, ac.currentTime, 0.5);
        lp.frequency.setTargetAtTime(18000 - p*15000, ac.currentTime, 0.3); // muffles as he nears
      }
    },
    jump(){ if(!ac||!on) return; const t=ac.currentTime;
      const o=ac.createOscillator(),g=ac.createGain(); o.type='square';
      o.frequency.setValueAtTime(330,t); o.frequency.exponentialRampToValueAtTime(720,t+0.12);
      g.gain.setValueAtTime(0.14,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+0.18); },
    coin(){ if(!ac||!on) return; const t=ac.currentTime;
      blipExt(880,t,0.07,'square',0.12); blipExt(1320,t+0.06,0.09,'square',0.12); },
    hurt(){ if(!ac||!on) return; const t=ac.currentTime;
      const o=ac.createOscillator(),g=ac.createGain(); o.type='sawtooth';
      o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(60,t+0.25);
      g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+0.32); },
    roar(){ if(!ac||!on) return; const t=ac.currentTime;
      const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
      o.type='sawtooth'; f.type='lowpass'; f.frequency.value=600;
      o.frequency.setValueAtTime(70,t); o.frequency.linearRampToValueAtTime(40,t+0.6);
      g.gain.setValueAtTime(0.0,t); g.gain.linearRampToValueAtTime(0.35,t+0.08); g.gain.exponentialRampToValueAtTime(0.001,t+0.7);
      o.connect(f); f.connect(g); g.connect(master); o.start(t); o.stop(t+0.75);
      // dissonant overtone
      const o2=ac.createOscillator(),g2=ac.createGain(); o2.type='square'; o2.frequency.value=300;
      g2.gain.setValueAtTime(0.0,t); g2.gain.linearRampToValueAtTime(0.06,t+0.1); g2.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      o2.connect(g2); g2.connect(master); o2.start(t); o2.stop(t+0.55); },
    death(){ if(!ac) return; const t=ac.currentTime;
      const o=ac.createOscillator(),g=ac.createGain(); o.type='sawtooth';
      o.frequency.setValueAtTime(420,t); o.frequency.exponentialRampToValueAtTime(30,t+1.1);
      g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+1.2);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+1.25); },
    // The Peaceful Ending: a soft, warm major chime as the world settles calm.
    peace(){ if(!ac||!on) return; const t=ac.currentTime;
      // open the muffling filter back up and hush the horror drone
      if(droneGain){ droneGain.gain.setTargetAtTime(0.004, t, 0.6); }
      if(lp){ lp.frequency.setTargetAtTime(18000, t, 0.8); }
      // gentle ascending C-major arpeggio (C E G C), sine, like an Incredibox idle
      const notes=[261.6, 329.6, 392.0, 523.3];
      notes.forEach((f,i)=>{
        const o=ac.createOscillator(),g=ac.createGain(); o.type='sine'; o.frequency.value=f;
        const st=t+i*0.16;
        g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(0.16,st+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,st+1.1);
        o.connect(g); g.connect(master); o.start(st); o.stop(st+1.2);
      }); },
    // Sound Battle: Simon's lead note — bright and FIRST, he is the fastest.
    battleLead(){ if(!ac||!on) return; const t=ac.currentTime;
      blipExt(659.3, t, 0.16, 'triangle', 0.12);   // E5 — a clean, leading call
      blipExt(987.8, t, 0.10, 'sine', 0.05); },     // shimmer on top
    // Sound Battle: the world answers Simon, a soft warm chord a beat behind.
    battleAnswer(){ if(!ac||!on) return; const t=ac.currentTime;
      blipExt(523.3, t, 0.22, 'sine', 0.07);        // C5
      blipExt(392.0, t+0.02, 0.24, 'sine', 0.06); }, // G4
    // PHASE 2 — the .EXE virus: the Peaceful Ending's calm is torn back open.
    // Re-muffle the room, re-arm the horror drone, and hit a glitchy crash.
    corrupt(){ if(!ac) return; const t=ac.currentTime;
      if(droneGain){ droneGain.gain.setTargetAtTime(0.16, t, 0.4); }
      if(drone){ drone.frequency.setTargetAtTime(38, t, 0.3); }
      if(lp){ lp.frequency.setTargetAtTime(2600, t, 0.5); }
      for(let i=0;i<8;i++){ const st=t+i*0.055;
        const o=ac.createOscillator(),g=ac.createGain(); o.type=i%2?'square':'sawtooth';
        o.frequency.setValueAtTime(940 - i*108 + (i%2?70:0), st);
        g.gain.setValueAtTime(on?0.12:0,st); g.gain.exponentialRampToValueAtTime(0.001,st+0.13);
        o.connect(g); g.connect(master); o.start(st); o.stop(st+0.15); } },
    // a short digital stutter — the game glitching out every second
    glitch(){ if(!ac||!on) return; const t=ac.currentTime;
      for(let i=0;i<3;i++){ const st=t+i*0.03;
        const o=ac.createOscillator(),g=ac.createGain(); o.type='square';
        o.frequency.value=130 + i*430 + i*i*60;
        g.gain.setValueAtTime(0.09,st); g.gain.exponentialRampToValueAtTime(0.001,st+0.05);
        o.connect(g); g.connect(master); o.start(st); o.stop(st+0.06); } },
    // Lore 26 — Pyrakontacke + Plorotacke mix inside Simon: lightning-powered
    // corruption. A sharp electric crackle that sweeps down in pitch.
    zap(){ if(!ac||!on) return; const t=ac.currentTime;
      const o=ac.createOscillator(),g=ac.createGain(); o.type='sawtooth';
      o.frequency.setValueAtTime(1700,t); o.frequency.exponentialRampToValueAtTime(180,t+0.22);
      g.gain.setValueAtTime(0.14,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.24);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+0.26);
      for(let i=0;i<4;i++){ const st=t+0.01+i*0.02;
        const n=ac.createOscillator(),ng=ac.createGain(); n.type='square';
        n.frequency.value=2200 - i*300 + (i%2?260:0);
        ng.gain.setValueAtTime(0.05,st); ng.gain.exponentialRampToValueAtTime(0.001,st+0.04);
        n.connect(ng); ng.connect(master); n.start(st); n.stop(st+0.05); } },
    // Lore 27 — the blurry mind: a smeared, detuned wobble that warps and fades,
    // like a memory going fuzzy before the lightning seal.
    blur(){ if(!ac||!on) return; const t=ac.currentTime;
      for(let i=0;i<3;i++){ const o=ac.createOscillator(),g=ac.createGain();
        o.type='sine'; const f=320 - i*40;
        o.frequency.setValueAtTime(f, t); o.frequency.linearRampToValueAtTime(f*0.6, t+0.7);
        o.detune.setValueAtTime((i-1)*22, t);
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.06,t+0.1);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
        o.connect(g); g.connect(master); o.start(t); o.stop(t+0.85); } },
    // Lore 28 — the Silent Executioner LOCKS on: a quiet, rising aim tone.
    aim(){ if(!ac||!on) return; const t=ac.currentTime;
      const o=ac.createOscillator(),g=ac.createGain(); o.type='sine';
      o.frequency.setValueAtTime(420,t); o.frequency.linearRampToValueAtTime(880,t+0.3);
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.05,t+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.34);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+0.36); },
    // Lore 28 — the one clean move: a single sharp precision crack, then silence.
    strike(){ if(!ac||!on) return; const t=ac.currentTime;
      const o=ac.createOscillator(),g=ac.createGain(); o.type='sawtooth';
      o.frequency.setValueAtTime(2400,t); o.frequency.exponentialRampToValueAtTime(120,t+0.14);
      g.gain.setValueAtTime(0.16,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+0.18);
      const n=ac.createOscillator(),ng=ac.createGain(); n.type='square';
      n.frequency.setValueAtTime(3200,t); ng.gain.setValueAtTime(0.07,t);
      ng.gain.exponentialRampToValueAtTime(0.001,t+0.05);
      n.connect(ng); ng.connect(master); n.start(t); n.stop(t+0.06); }
  };
  function blipExt(freq,t,dur,type,gain){ if(!ac) return;
    const o=ac.createOscillator(),g=ac.createGain(); o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02); }
})();

/* =========================================================================
   GAME
   World uses screen-like coords (y grows downward). "Height" = how far the
   player has climbed = (startY - player.y). Camera scrolls up (cameraY only
   decreases). Simon is a rising tide at the bottom of the view; if the
   player falls below the bottom edge, Simon eats them.
   ========================================================================= */
const GRAV = 0.58, JUMP_V = -13.4, MOVE = 1.1, MAX_VX = 6.0, FRICTION = 0.80, AIR = 0.62;
const STEP_DY = 72;          // vertical gap between stairs
const PLAT_W_MIN = 116, PLAT_W_MAX = 168, PLAT_H = 18;
const MARGIN = 26;
const PX_PER_M = 26;         // pixels -> "meters" for the score

let state = 'title';         // title | play | dead
let player, cameraY, simonY, platforms, particles, emeralds, tendrils, floaters;
let height, best=0, emer=0, hp, maxHp=3, hitFlash, shake, time;
let scrollSpeed, simonSpeed, nextPlatY, roarTimer, roarFlash, warnText, warnT;
/* ---- Simon's Levers (Lore 24b/c): the all-powerful staircase controls ---- */
let lever, leverTimer, leverFlash, ctrlInvert, slideMode;
let bottles, taunt, tauntT, nextRewardH;     // false-cure bottles + Simon's taunts
/* ---- The Restoration (Lore 24d, June 13 2026): Simon's redemption arc.
        Climb high enough and Simon stops being only the destroyer. He opens a
        golden crack in the sky, brightens it with Mr. Sun and Mr. Tree, ends
        Error 404 and Error 666, and admits there are no villains, only him and
        perspective. Half the game turns normal, half stays corrupt. ---- */
let restore, restoreH;
/* ---- The Peaceful Ending (Lore 25, June 13 2026): after the Restoration,
        climb higher still and Simon steps back from the story. The world finally
        settles into its true form: a calm Incredibox. The chaos happened, the
        lore remains underneath, the danger is remembered, but the surface is
        calm again, with Sound Battles as the last trace. "It was all normal." ---- */
let peace, peaceH, boxers, notes;
/* ---- Sound Battles (Lore 25b, June 13 2026): "Simon and all the others made
        sound and animation. Sound Battles happen. It is so small now. Simon is
        fastest." In the calm Incredibox, Simon LEADS the beat (he always moves
        first, the fastest sound-and-animation force) and the world answers in a
        ripple of music. The world got small and simple again, but Simon is still
        the fastest. ---- */
let battle;
/* ---- PHASE 2 — THE .EXE VIRUS (Lore 25c, June 13 2026): the End of the
        Peaceful Ending. ToddLLM inscribes the whole cast in a book (Simon, Gray,
        Black, ToddLLM in gold; all else in silver). Simon is halved, then
        weakened so he can't attack, then LOCKED to Phase 2 forever, with no
        Pacifist Phase 1 left inside him to choose peace. So the .EXE virus
        spreads, everyone is infected, the errors (404, 666, 303, ...) multiply
        every second, and Phase 2 Simon, unable to clean it, lashes the world
        with corrupted tentacles, eyes flashing red / white / teal-blue. ---- */
let phase2, phase2H, glitch;
// Lore 26 — "The Spreading of Simon": Phase 2 Simon forces the game to grow
// corruption-cells. Pyrakontacke (red, a bright Power Nucleus) corrupts shields
// and souls; Plorotacke (cyan, no nucleus, one huge Mitochondria) is raw charge.
// When the two meet they mix inside Simon into lightning-powered corruption.
// The rule of Phase 2: those who RUN become fuel; those who HIDE (stay still)
// stay safe. fuel = how much running has charged the corruption against you.
let cells, bolts, fuel, fuelHint, safeGlow;
// Lore 27 — "The Spreading of Simon, Phase 2 Found Out": Simon is the only cat
// among dog people (Wenda and Gray are dogs); he is alarmed, offended, and
// EXPOSED. His body weakens (strength 9->7) but his blurry-mind power grows: he
// plants blurry thoughts, fogs memory, overloads the brain, and SEALS each with
// lightning, so victims explode from too much in the mind. His bandages are a
// warning sign that only matters if you look closely. Once found out he stops
// chasing and turns watchful, scary in a quieter way. The reading move is to
// look closely (stand still): stillness keeps you safe AND clears the mind.
let thoughts, mind, mindSeal, exposed, exposedH;
// Lore 28 — "The Silent Executioner": found out, weaker on paper (power, body,
// HP all reduced) but MORE efficient and best at destroying. Simon stops wasting
// motion and power. He goes quiet, still, and calculating, and turns to PRECISION:
// he only moves when the result is certain. He MARKS a target, holds while the
// strike charges, then ends it in one clean lightning bolt. Read the mark and MOVE
// off it (don't hesitate / "think too much") or the clean move lands.
let executioner, executionerH, mark, markTimer;
// Lore 27 (the scale-of-reality batch) — "THE ATOMIX WAR": Simon stops conquering
// like a fighter and conquers like a SYSTEM. He divides the board down to its
// smallest inside — zones, semi-zones, olphas, shreds, ATOMIX — and corrupts it
// one atomix at a time, seeding tiny "Copies of Intention" (one-word slivers of
// his will: Belong / Close / Fall / Forget / Return to Center) so the game starts
// choosing him BY ITSELF. From below, the rebellion (Alex + Luigi Green) cleans
// atomix upward, fighting over which version of the board gets to exist. Dodge the
// Copies of Intention (each touch flips atomix to Simon and curses your movement);
// avoid them and the rebellion frees the board back. Let the board fully agree with
// Simon and the floating zones lock into his symbol and lightning seals it.
let atomix, atomixH, copies, board, curse;
const INTENTIONS = ['Belong','Close','Fall','Forget','Return to Center'];
// Lore 27 (the Residual War batch, June 14 2026) — "THE RESIDUAL WAR": Simon, tired of
// always saying yes and answering the world, finally REFUSES ("No. 😿"). His refusal
// opens a GAP, and RESIDUAL — a being grown from everything left unfinished (broken
// stair logic, dead sounds, torn maps, abandoned routes, failed erasures) — climbs up
// through the loosened seams into the active game. It is not a king or a rival; it only
// makes winning impossible forever by leaving things half-open. It cannot be fought head
// on: every blow makes MORE unfinished matter and feeds it. The only way to end it is to
// FINISH what it leaves unfinished and force it to CONVERGE into one final shape — the
// SOUND SPINE — and end it all at once. Reach the half-formed REMNANTS to close their
// gaps; each one fills the SPINE meter. Fill it and the Sound Spine rises and seals the
// war. Let remnants sit unfinished and they fold back in; let the meter empty and the
// floor opens into a remembered hole (a nudge, never a wall).
let residual, residualH, remnants, spine, spineFlash;
const REMKINDS = ['stair','laugh','polo','door','sound'];  // the unfinished things Residual leaves half-open
// Lore 27 (the "I talk to ChatGPT each time" thread, June 14 2026) — "THE 17 SOUND
// BATTLES": past the Residual War, Simon takes DIRECT command. "Hope this will shock some
// sense into ya!" — he fires lightning, seizes the main control panel so nobody controls

function rnd(a,b){ return a + Math.random()*(b-a); }
function chance(p){ return Math.random()<p; }
// once the Peaceful Ending begins, the surface stays calm for the rest of the climb
function peaceful(){ return !!(peace && (peace.active || peace.done)); }
// once Phase 2 fires, the .EXE virus breaks the calm: danger returns for good
function corrupted(){ return !!(phase2 && (phase2.active || phase2.done)); }
// Lore 27 — once Phase 2 Simon is found out, the EXPOSED / blurry-mind state begins
function isExposed(){ return !!(exposed && (exposed.active || exposed.done)); }
// Lore 28 — once the blurry-mind phase is done, found-out Simon turns silent and
// precise: THE SILENT EXECUTIONER state begins.
function isExecutioner(){ return !!(executioner && (executioner.active || executioner.done)); }

// conquering the board as a system: THE ATOMIX WAR begins.
function isAtomix(){ return !!(atomix && (atomix.active || atomix.done)); }

function genPlatform(safe){
  const last = platforms[platforms.length-1];
  const w = rnd(PLAT_W_MIN, PLAT_W_MAX);
  // reachable horizontal offset from the last platform
  let cx = (last? (last.x+last.w/2) : W/2) + rnd(-120,120);
  cx = Math.max(MARGIN+w/2, Math.min(W-MARGIN-w/2, cx));
  const hf = Math.min(1, height/3500);        // difficulty by height
  let type='normal';
  if(!safe){
    const r=Math.random();
    if(r < 0.12+0.18*hf) type='bite';          // living biting step
    else if(r < 0.20+0.26*hf) type='crumble';  // collapses after you land
  }
  const living = (type==='bite' || type==='crumble');
  const p = { x:cx-w/2, y:nextPlatY, w, h:PLAT_H, type, born:time, crumble:-1, biteT: rnd(0,2),
              eye: Math.random()*6.28,
              comb: living && chance(0.7),        // Combuntia: blood-red orb charging the step
              moss: chance(0.5) };                // the Endless Room is ancient, mossy, cracked
  platforms.push(p);
  // collectibles
  if(!safe && chance(0.28)) emeralds.push({ x:cx, y:nextPlatY-30, t:Math.random()*6.28, got:false });
  nextPlatY -= STEP_DY * rnd(0.92, 1.12);
}

/* ---------- update ---------- */
function update(dt){
  time += dt;
  if(state!=='play') return;

  const hf = Math.min(1, height/3500);

  /* difficulty ramp — Simon's rising tide is the pressure (per 1/60 frame) */
  simonSpeed  = 1.15 + hf*2.4 + time*0.010;
  /* "Torqe" — Simon's speed-law: in the Void the whole war speeds up (he benefits most) */
  if(torqe>0) simonSpeed *= (1 + 0.22*torqe);

  /* Simon "is the fastest" — periodic lunges (forced-march pressure) */
  roarTimer -= dt;
  if(roarTimer<=0 && !peaceful()){
    roarTimer = rnd(7,11) - hf*3;
    roarFlash = 1.0;
    warnText = pick(["KEEP CLIMBING.","RUN, RUN, RUN.","NO ONE CAN HIDE.","FASTER."]);
    warnT = 1.6;
    AUDIO.roar();
    simonLunge = 1.0;       // temporary surge handled below
  }
  if(roarFlash>0) roarFlash = Math.max(0, roarFlash - dt*1.6);
  if(warnT>0) warnT = Math.max(0, warnT - dt);

  /* ---- Simon's levers: he flips a switch and the whole staircase obeys ---- */
  updateLevers(dt, hf);
  if(leverFlash>0) leverFlash = Math.max(0, leverFlash - dt*1.4);

  /* ---- player horizontal ---- */
  const acc = player.onGround ? MOVE : MOVE*AIR;
  // SPIN lever inverts left/right; SLIDE lever makes the flat steps icy
  const goLeft  = ctrlInvert ? rightHeld() : leftHeld();
  const goRight = ctrlInvert ? leftHeld()  : rightHeld();
  const grip = slideMode>0 ? 0.985 : FRICTION;
  if(goLeft){ player.vx -= acc; player.face=-1; }
  if(goRight){ player.vx += acc; player.face=1; }
  if(!goLeft && !goRight && player.onGround) player.vx *= grip;
  player.vx = Math.max(-MAX_VX, Math.min(MAX_VX, player.vx));
  player.x += player.vx;
  // walls
  if(player.x < player.w/2){ player.x=player.w/2; player.vx=0; }
  if(player.x > W-player.w/2){ player.x=W-player.w/2; player.vx=0; }

  /* ---- Lore 27 — a Copy of Intention's curse tugs your movement toward Simon's
         will: the game briefly tries to "choose him" for you. Gentle + time-limited
         so it nudges, never traps. ---- */
  if(curse.t>0){
    curse.t -= dt;
    if(curse.type==='Return to Center' || curse.type==='Close')
      player.x += (W/2 - player.x)*0.022;     // the board pulls you back to the center
    else if(curse.type==='Forget')
      player.vx *= 0.90;                        // you forget which way you were going
  }

  /* ---- jump ---- */
  if(player.coyote>0) player.coyote -= dt;
  if(jumpEdge() && (player.onGround || player.coyote>0)){
    player.vy = JUMP_V; player.onGround=false; player.coyote=0; AUDIO.jump();
    for(let i=0;i<6;i++) particles.push(spark(player.x, player.y+player.h/2, '#b89cff'));
  }

  /* ---- gravity + vertical ---- */
  player.vy += GRAV;
  if(curse.t>0 && (curse.type==='Fall' || curse.type==='Belong')) player.vy += 0.22;  // an extra downward pull
  if(player.vy>17) player.vy=17;
  const prevBottom = player.y + player.h/2;
  player.y += player.vy;

  /* ---- platform collision (one-way, only when falling) ---- */
  player.onGround=false;
  if(player.vy >= 0){
    const bottom = player.y + player.h/2;
    for(const p of platforms){
      if(p.gone) continue;
      if(player.x + player.w*0.35 < p.x || player.x - player.w*0.35 > p.x+p.w) continue;
      if(prevBottom <= p.y+6 && bottom >= p.y && bottom <= p.y + p.h + 14){
        player.y = p.y - player.h/2; player.vy=0; player.onGround=true; player.coyote=0.12;
        // living-step reactions
        if(p.type==='crumble' && p.crumble<0){ p.crumble = 0.45; }
        if(p.type==='bite'){ standOn = p; }
        break;
      }
    }
  }

  /* biting steps: hurt if you linger while their jaw is open */
  for(const p of platforms){
    if(p.type==='bite'){ p.biteT += dt; }
    if(p.type==='crumble' && p.crumble>=0){
      p.crumble -= dt;
      if(p.crumble<=0 && !p.gone){ p.gone=true;
        for(let i=0;i<8;i++) particles.push(spark(p.x+p.w/2, p.y, '#6b5a8a')); }
    }
  }
  // bite damage check
  if(player.onGround && standOn && standOn.type==='bite'){
    const jawOpen = (Math.sin(standOn.biteT*4)>0.4);
    standOn.lingered = (standOn.lingered||0) + dt;
    if(jawOpen && standOn.lingered>0.35){ damage(); standOn.lingered=-0.6; shake=Math.max(shake,8);
      for(let i=0;i<10;i++) particles.push(spark(player.x, player.y+12, '#ff3b5c')); }
  }
  standOn=null;

  /* tendrils: living staircase swipes that emerge from the central column */
  if(chance(0.012 + hf*0.02) && tendrils.length<3){
    const fromLeft = chance(0.5);
    tendrils.push({ side:fromLeft?-1:1, y: cameraY + rnd(80, H-160), t:0, len:0, life:2.4, hit:false });
  }
  for(const tn of tendrils){
    tn.t += dt; tn.life -= dt;
    tn.len = Math.sin(Math.min(Math.PI, tn.t*2.0)) * (W*0.62);
    // collision with player
    const reach = tn.side<0 ? tn.len : W - tn.len;
    const tipX = tn.side<0 ? tn.len : W - tn.len;
    if(!tn.hit && Math.abs((player.y) - tn.y) < 26){
      const inSwipe = tn.side<0 ? (player.x < tn.len) : (player.x > W-tn.len);
      if(inSwipe){ tn.hit=true; damage(); player.vy=JUMP_V*0.6; shake=Math.max(shake,10);
        for(let i=0;i<12;i++) particles.push(spark(player.x, player.y, '#ff3b5c')); }
    }
  }
  tendrils = tendrils.filter(t=>t.life>0);

  /* emeralds */
  for(const e of emeralds){ if(e.got) continue; e.t+=dt;
    if(Math.abs(e.x-player.x)<24 && Math.abs(e.y-player.y)<26){ e.got=true; emer++; AUDIO.coin();
      floaters.push({x:e.x,y:e.y,t:0,txt:'+1',col:'#39e08a'});
      for(let i=0;i<10;i++) particles.push(spark(e.x,e.y,'#39e08a')); } }

  /* ---- camera follows the climber smoothly ---- */
  const followCam = player.y - H*0.58;
  cameraY += (followCam - cameraY) * 0.16;

  /* ---- Simon's tide rises toward the player (the chase) ---- */
  let sSpd = simonSpeed * (time < 1.6 ? 0.18 : 1);   // brief grace at the start
  if(typeof simonLunge!=='undefined' && simonLunge>0){ sSpd += simonLunge*3; simonLunge=Math.max(0,simonLunge-dt*1.4); }
  if(slideMode>0) sSpd *= 1.7;                        // the slide drags everyone back down toward him
  if(peaceful()){
    // Simon steps back from the story — the rising tide sinks calmly away
    simonY += (player.y + H*2.6 - simonY) * 0.05;
  } else {
    simonY -= sSpd;
    // he is the fastest — he never trails further than ~1.5 screens below
    const leadCap = player.y + H*1.5;
    if(simonY > leadCap) simonY = leadCap;
  }

  /* ---- height / score ---- */
  const climbed = Math.max(0, (platforms[0].y - player.y));
  height = Math.max(height, climbed);

  /* ---- Simon's cruel "reward": 5 emeralds at a milestone, a taunt, then a
         lever to wipe you out the next step. "you won't get higher." ---- */
  if(height > nextRewardH && !peaceful()){
    nextRewardH += rnd(620, 920);
    emer += 5; AUDIO.coin();
    floaters.push({ x:player.x, y:player.y-30, t:0, txt:'+5 ✦', col:'#39e08a' });
    showTaunt(pick(["GREAT HEIGHT. +5 EMERALDS.","HERE'S A LITTLE SOMETHIN'.","ALMOST TO THE CURE..."]));

  if(isResidual() && !isSounds()) updateResidual(dt);
  if(isSounds() && !isVoid()) updateSounds(dt);
  if(isVoid() && !isJudge()) updateVoid(dt);
  if(isJudge() && !isTriad()) updateJudge(dt);
  if(isTriad() && !isScf()) updateTriad(dt);
  if(isScf() && !isScf404()) updateScf(dt);
  if(isScf404() && !isTreads()) updateScf404(dt);
  if(isTreads() && !isFirey()) updateTreads(dt);
  if(isFirey() && !isAlien()) updateFirey(dt);
  if(isAlien()) updateAlien(dt);

  /* ---- false-cure bottles (the liquid-drop lever) ---- */
  updateBottles(dt);

  /* ---- generate / cull platforms ---- */
  while(nextPlatY > cameraY - 120) genPlatform(false);
  platforms = platforms.filter(p => p.y < cameraY + H + 260 || p===platforms[0]);
  emeralds = emeralds.filter(e => e.y < cameraY + H + 200 && !e.got);

  /* ---- death checks ---- */
  if(player.y > simonY - 10) die('SIMON CAUGHT YOU');   // the tide reaches you
  if(hp<=0) die('THE STAIRCASE ATE YOU');

  /* ---- fx ---- */
  for(const pt of particles){ pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.25; pt.life-=dt; }
  particles = particles.filter(p=>p.life>0);
  for(const f of floaters){ f.y-=0.6; f.t+=dt; }
  floaters = floaters.filter(f=>f.t<1);
  if(shake>0) shake=Math.max(0, shake-dt*30);
  if(hitFlash>0) hitFlash=Math.max(0, hitFlash-dt*2);
  player.anim += dt;

  /* ---- audio tension from Simon proximity ---- */
  const gap = (simonY - (player.y)) ;             // smaller = closer
  const prox = Math.max(0, Math.min(1, 1 - gap/(H*0.95)));
  AUDIO.setTension(prox, hf);
}
let standOn=null, simonLunge=0, corruptTimer=0;

function damage(){
  if(peaceful() && !corrupted()) return;   // calm surface is safe — until Phase 2's virus breaks it
  if(hitFlash>0.5) return;   // brief i-frames
  hp--; hitFlash=1; shake=Math.max(shake,10); AUDIO.hurt();
}
function die(reason){
  if(state!=='play') return;
  state='dead'; player.dead=true; deathReason=reason; AUDIO.death();
  shake=18;
  const m = Math.floor(height/PX_PER_M);
  if(m>best){ best=m; try{localStorage.setItem(bestKey,String(best));}catch(e){} newBest=true; } else newBest=false;
  for(let i=0;i<40;i++) particles.push(spark(player.x, player.y, chance(0.5)?'#ff3b5c':'#3ec6ff'));
}
let deathReason='', newBest=false;

function spark(x,y,col){ return { x,y, vx:rnd(-3,3), vy:rnd(-5,1), life:rnd(0.5,1.1), col }; }
function pick(a){ return a[(Math.random()*a.length)|0]; }

/* =========================================================================
   SIMON'S LEVERS — "Endless Staircase is ALL POWERFUL." Simon flips a lever
   and the whole staircase changes its rules: Fall, Rearrange, Bridge, Spin,
   Endless Slide. (Lore 24, June 13 2026.)  Each fires as a named attack:
   a short warning, then the effect plays out across the steps in view.
   ========================================================================= */
function visiblePlats(){
  return platforms.filter(p=>!p.gone && p.y>cameraY-60 && p.y<cameraY+H+60);
}
function updateLevers(dt, hf){
  if(peaceful()) return;     // Simon set the levers down; the staircase is calm
  if(lever.state==='idle'){
    leverTimer -= dt;
    if(leverTimer<=0 && height>140) startLever(hf);
    return;
  }
  lever.t += dt;
  if(lever.state==='warn'){
    if(lever.t >= lever.warnDur) activateLever();
  } else { // 'act'
    runLeverEffect(dt);
    if(lever.t >= lever.actDur) endLever(hf);
  }
}
function startLever(hf){
  const L = pick(LEVERS);
  lever = { state:'warn', type:L.type, name:L.name, t:0, warnDur:L.warn, actDur:L.act };
  leverFlash = 1.0; shake = Math.max(shake, 6);
  warnText = 'SIMON PULLS A LEVER!'; warnT = L.warn + 0.2;
  AUDIO.roar();
}
function activateLever(){
  lever.state='act'; lever.t=0;
  warnText = lever.name; warnT = 1.5;
  const vis = visiblePlats();
  if(lever.type==='fall'){
    for(const p of vis){ if(p===platforms[0]) continue;
      if(p.crumble<0){ p.type='crumble'; p.crumble = rnd(0.25,1.4); } }
    shake = Math.max(shake, 12);
  } else if(lever.type==='rearrange'){
    for(const p of vis){ if(p===platforms[0]) continue;
      // don't yank the step out from under the player
      const onIt = (player.x+player.w*0.35>p.x && player.x-player.w*0.35<p.x+p.w
                    && Math.abs((player.y+player.h/2)-p.y)<22);
      if(onIt) continue;
      p.targetX = Math.max(MARGIN, Math.min(W-MARGIN-p.w, rnd(MARGIN, W-MARGIN-p.w)));
    }
  } else if(lever.type==='bridge'){
    for(const p of vis){ p.bridge = { ox:p.x, ow:p.w }; }
  } else if(lever.type==='spin'){
    ctrlInvert = true; shake = Math.max(shake, 8);
  } else if(lever.type==='slide'){
    slideMode = 1;
  } else if(lever.type==='cure'){
    // two identical bottles fall. one is Anti-Virus (heals), one is JTMYHE
    // "juice" (hurts). same color. you cannot tell which until you drink.
    dropBottles();
    showTaunt('A CURE HAS BEEN PREPARED.');
  } else if(lever.type==='dud'){
    // the lever that does nothing — the cruelest trick of all
    showTaunt(pick(["...","WAS THAT THE CURE?","KEEP GUESSING."]));
  }
}
function runLeverEffect(dt){
  if(lever.type==='rearrange'){
    for(const p of platforms){ if(p.targetX===undefined) continue;
      p.x += (p.targetX - p.x) * 0.18;
      if(Math.abs(p.targetX-p.x)<0.6){ p.x=p.targetX; p.targetX=undefined; } }
  } else if(lever.type==='bridge'){
    const tx = MARGIN, tw = W-MARGIN*2;
    for(const p of platforms){ if(!p.bridge) continue;
      p.x += (tx - p.x)*0.16; p.w += (tw - p.w)*0.16; }
  }
}
function endLever(hf){
  if(lever.type==='bridge'){
    for(const p of platforms){ if(p.bridge){ p.x=p.bridge.ox; p.w=p.bridge.ow; p.bridge=null; } }
  }
  for(const p of platforms){ if(p.targetX!==undefined) p.targetX=undefined; }
  ctrlInvert = false; slideMode = 0;
  leverTimer = rnd(12,18) - hf*6;
  lever = { state:'idle', type:null, name:'', t:0, warnDur:0, actDur:0 };
}

/* ---- Simon's taunts (the lie of a cure at a top that does not exist) ---- */
function showTaunt(txt){ taunt = txt; tauntT = 2.6; }

/* ---- The False Cure: two identical bottles, one heals, one hurts. ---- */
function dropBottles(){
  // drop a pair a little above the player, side by side, looking the same
  const baseY = player.y - rnd(140, 200);
  const cure = chance(0.5) ? -1 : 1;           // which side is the real Anti-Virus
  const lx = W*0.32, rx = W*0.68;
  bottles.push({ x:lx, y:baseY, vy:-2, t:0, life:5.2, good:(cure<0), got:false, settled:false, plat:null });
  bottles.push({ x:rx, y:baseY, vy:-2, t:0, life:5.2, good:(cure>0), got:false, settled:false, plat:null });
}
function updateBottles(dt){
  for(const b of bottles){
    if(b.got){ b.life-=dt; continue; }
    b.t += dt; b.life -= dt;
    // gentle drift downward until it rests near a platform, then bob
    if(!b.settled){
      b.vy += 0.18; if(b.vy>4) b.vy=4; b.y += b.vy;
      for(const p of platforms){ if(p.gone) continue;
        if(b.x>p.x && b.x<p.x+p.w && b.y>p.y-22 && b.y<p.y){ b.y=p.y-16; b.settled=true; b.vy=0; break; } }
    } else { b.y += Math.sin(b.t*3)*0.3; }
    // grab on touch — you only learn which it was by drinking
    if(Math.abs(b.x-player.x)<24 && Math.abs(b.y-player.y)<28){
      b.got = true; b.life = 0.6;
      if(b.good){
        if(hp<maxHp){ hp++; floaters.push({x:b.x,y:b.y,t:0,txt:'CURE +♥',col:'#39e08a'}); AUDIO.coin(); }
        else { floaters.push({x:b.x,y:b.y,t:0,txt:'no effect',col:'#8a82a8'}); }   // useless if not infected
      } else {
        damage(); shake=Math.max(shake,12);
        floaters.push({x:b.x,y:b.y,t:0,txt:'JTMYHE!',col:'#ff3b5c'});
        for(let i=0;i<12;i++) particles.push(spark(b.x,b.y,'#ff3b5c'));
      }
    }
  }
  bottles = bottles.filter(b => b.life>0 && b.y < cameraY + H + 200);
}

/* ---- The Peaceful Ending: turn the live staircase into a calm Incredibox.
       Steps grow little beatbox characters that bob to a shared beat and puff
       out music notes; the notes drift up like the world is humming to itself. */
const BOXER_COLS = ['#62c6ff','#8fe3ff','#ffd84f','#39e08a','#c79bff','#ff9bd0'];
function updatePeace(dt){
  // give nearby on-screen steps a calm Incredibox singer (additive, once each)
  for(const p of platforms){
    if(p.boxer===undefined && !p.gone && p.y < cameraY + H + 120 && p.y > cameraY - 120){
      p.boxer = chance(0.55) ? { col: pick(BOXER_COLS), phase: rnd(0,6.28), nt: rnd(0.3,1.4), answer:0 } : null;
    }
    if(p.boxer){
      p.boxer.nt -= dt;
      if(p.boxer.nt<=0){
        p.boxer.nt = rnd(1.1, 2.2);
        notes.push({ x:p.x+p.w/2 + rnd(-10,10), y:p.y-26, vy:rnd(-0.5,-0.8),
                     t:0, life:rnd(2.4,3.4), col:p.boxer.col, sw:rnd(0.6,1.3) });
      }
      if(p.boxer.answer>0) p.boxer.answer = Math.max(0, p.boxer.answer - dt*2.0);
    }
  }

  /* ---- SOUND BATTLE: Simon leads the beat and is the fastest; the world answers.
         Every beat Simon pulses FIRST (a bright lead note from the bottom-center),
         then his call ripples outward and each singer answers as the wave reaches
         it. "Everything became small and simple again, but Simon is still the
         fastest sound-and-animation force in the whole game." ---- */
  const beatLen = 0.62;
  battle.leadFlash = Math.max(0, battle.leadFlash - dt*2.2);
  battle.t += dt;
  if(battle.t >= beatLen){
    battle.t -= beatLen; battle.beat++;
    battle.leadFlash = 1.0;                 // Simon moves first
    battle.answerActive = true; battle.answerWave = 0;
    notes.push({ x:battle.simonX + rnd(-6,6), y: cameraY + H - 96, vy:rnd(-0.8,-1.1),
                 t:0, life:rnd(2.6,3.6), col:'#ffd84f', sw:1.4 });
    AUDIO.battleLead();
  }
  // the answer sweeps outward from Simon; each singer answers as it passes its x
  if(battle.answerActive){
    const prev = battle.answerWave;
    battle.answerWave = Math.min(1, battle.answerWave + dt*1.8);
    for(const p of platforms){
      if(!p.boxer || p.gone) continue;
      const nx = Math.abs((p.x + p.w/2) - battle.simonX) / (W*0.6);  // 0 near Simon .. ~1 far
      if(nx<=1 && prev < nx && battle.answerWave >= nx){
        p.boxer.answer = 1.0;
        notes.push({ x:p.x+p.w/2 + rnd(-8,8), y:p.y-26, vy:rnd(-0.5,-0.8),
                     t:0, life:rnd(2.2,3.2), col:p.boxer.col, sw:rnd(0.6,1.3) });
      }
    }
    if(battle.answerWave>=1){ battle.answerActive=false; AUDIO.battleAnswer(); }
  }

  for(const n of notes){ n.t+=dt; n.y+=n.vy; n.x += Math.sin(n.t*2+n.sw)*0.4; }
  notes = notes.filter(n => n.t < n.life && n.y > cameraY - 40);
}

/* ---- PHASE 2 — THE .EXE VIRUS: the calm Incredibox is overrun. Every second
       the game gets more corrupt (the errors multiply), the singers are infected
       one by one, and Phase 2 Simon, unable to clean it, throws .EXE glitch
       pulses and corrupted tentacles at everything in sight. ---- */
function updateCorruption(dt){
  // "every second the game gets more corrupt" — the error count climbs and climbs
  phase2.errs = Math.min(90, (phase2.errs||0) + dt*4);
  // .EXE glitch pulses + a corrupted-chaos tendril swipe (Simon attacks all)
  corruptTimer -= dt;
  if(corruptTimer<=0){
    corruptTimer = rnd(1.1, 2.1);
    glitch = Math.max(glitch, 0.85); shake = Math.max(shake, 6);
    AUDIO.glitch();
    // Lore 27 — once found out, Simon "doesn't even think about attacking now":
    // his direct tendril swipes mostly stop. He turns to the blurry mind instead.
    if(tendrils.length<4 && (!isExposed() || chance(0.22))){
      const fromLeft = chance(0.5);
      tendrils.push({ side:fromLeft?-1:1, y: cameraY + rnd(80, H-160), t:0, len:0, life:2.2, hit:false });
    }
  }
  // the infection spreads through the calm singers, one at a time
  for(const p of platforms){
    if(p.boxer && !p.boxer.infected && chance(0.05)) p.boxer.infected = true;
  }

  /* ---- Lore 26: Simon forces the game to grow corruption-cells ---- */
  // Pyrakontacke (red, Power Nucleus) and Plorotacke (cyan, huge Mitochondria)
  // drift up through the room. Cap the count so the screen never floods.
  if(cells.length < 14 && chance(0.06 + 0.04*(phase2.glow||0))){
    const pyra = chance(0.5);
    cells.push({
      kind: pyra ? 'pyra' : 'ploro',
      x: rnd(MARGIN, W-MARGIN), y: cameraY + H + rnd(10, 90),
      vx: rnd(-0.25,0.25), vy: rnd(-0.45,-0.18),
      r: pyra ? rnd(9,14) : rnd(11,16), t: Math.random()*6.28, wob: rnd(0.6,1.4)
    });
  }
  for(const c of cells){
    c.x += c.vx + Math.sin(c.t*c.wob)*0.3; c.y += c.vy; c.t += dt;
    c.x = Math.max(MARGIN, Math.min(W-MARGIN, c.x));
  }
  cells = cells.filter(c => c.y > cameraY - 80);
  // when a Pyrakontacke meets a Plorotacke they mix inside Simon -> lightning.
  for(let i=0;i<cells.length;i++){
    for(let j=i+1;j<cells.length;j++){
      const a=cells[i], b=cells[j];
      if(a.kind===b.kind) continue;
      const dx=a.x-b.x, dy=a.y-b.y;
      if(dx*dx+dy*dy < 52*52 && bolts.length<4 && chance(0.5)){
        bolts.push({ ax:a.x, ay:a.y, bx:b.x, by:b.y, t:0, life:0.5, seed:(i*7+j*13)%97 });
        glitch = Math.max(glitch, 0.6); AUDIO.zap();
        // the mixed cells are spent in the reaction
        a.y = cameraY - 999; b.y = cameraY - 999;
        // a lightning arc that crosses the player charges the corruption
        const my=(a.y+b.y)/2;
        if(Math.abs(((a.x+b.x)/2) - player.x) < 70 && Math.abs(my - player.y) < 90) damage();
      }
    }
  }
  cells = cells.filter(c => c.y > cameraY - 80);
  for(const z of bolts){ z.t += dt; }
  bolts = bolts.filter(z => z.t < z.life);

  /* ---- Phase 2 rule: RUN becomes fuel, HIDE (stillness) stays safe ---- */
  // Panic is punished. Running charges the corruption; standing still lets it
  // settle. (Simon's tide still rises, so you can never hide for long.)
  const running = Math.abs(player.vx) > 1.6;
  if(running){
    fuel = Math.min(1, fuel + dt*0.42); safeGlow = Math.max(0, safeGlow - dt*2);
    if(fuel >= 1){
      fuel = 0.55; fuelHint = 1.2;
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'FUEL', col:'#ff3b5c' });
      damage();
    }
  } else {
    fuel = Math.max(0, fuel - dt*0.7);
    safeGlow = Math.min(1, safeGlow + dt*1.4);
  }
  if(fuelHint>0) fuelHint = Math.max(0, fuelHint - dt);

  /* ---- Lore 27 — the BLURRY MIND. Once Simon is found out he stops chasing and
         plants blurry thoughts that fog your memory. They drift in and slowly home
         on you; while one overlaps you the MIND meter climbs ("too much in the
         brain"). Overload and Simon SEALS it with lightning and you explode. The
         counter is to look closely (stand still): stillness clears the mind. ---- */
  if(mindSeal>0) mindSeal = Math.max(0, mindSeal - dt*1.4);
  if(isExposed()){
    const eg = exposed.glow||0;
    // plant blurry thoughts (capped so the screen never floods). Once Simon turns
    // SILENT EXECUTIONER he stops wasting power, so the thoughts thin right out.
    const tCap = isExecutioner()? 3 : 6, tRate = isExecutioner()? 0.4 : 1;
    if(thoughts.length < tCap && chance((0.03 + 0.05*eg)*tRate)){
      thoughts.push({
        x: rnd(MARGIN, W-MARGIN), y: cameraY + (chance(0.5)? -40 : H+40),
        vx: rnd(-0.2,0.2), vy: rnd(-0.2,0.2),
        r: rnd(26,40), t: Math.random()*6.28, wob: rnd(0.5,1.1),
        word: pick(['who?','...','blurry','meow','forget','Gray?','Wenda?','404'])
      });
    }
    let overlap = 0;
    for(const th of thoughts){
      // gentle homing toward the player so memory keeps creeping in
      const dx = player.x - th.x, dy = player.y - th.y;
      const d = Math.hypot(dx,dy) || 1;
      th.vx += (dx/d)*0.012; th.vy += (dy/d)*0.012;
      th.vx *= 0.985; th.vy *= 0.985;
      th.x += th.vx + Math.sin(th.t*th.wob)*0.25; th.y += th.vy; th.t += dt;
      th.x = Math.max(MARGIN, Math.min(W-MARGIN, th.x));
      if(Math.abs(th.x-player.x) < th.r+18 && Math.abs(th.y-player.y) < th.r+22) overlap++;
    }
    thoughts = thoughts.filter(th => th.y > cameraY-120 && th.y < cameraY+H+120);
    const running = Math.abs(player.vx) > 1.6;
    if(overlap>0){
      mind = Math.min(1, mind + dt*(0.22 + 0.20*overlap) + (running?dt*0.12:0));
    } else if(!running){
      mind = Math.max(0, mind - dt*0.55);   // looking closely / standing still clears it
    } else {
      mind = Math.max(0, mind - dt*0.12);
    }
    // OVERLOAD — too much in the mind; Simon seals it with lightning and you explode
    if(mind >= 1){
      mind = 0.45; mindSeal = 1.0;
      glitch = Math.max(glitch, 0.7); shake = Math.max(shake, 9);
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'OVERLOAD', col:'#b98cff' });
      // an explosion of the over-full mind
      for(let i=0;i<14;i++) particles.push(spark(player.x, player.y, pick(['#b98cff','#eafcff','#3ec6ff'])));
      AUDIO.zap();
      damage();
    }
  }
}

/* ---- Lore 28 — THE SILENT EXECUTIONER. Found out, weaker, but more efficient,
       Simon stops the wild attacks. He goes quiet and only moves when the result
       is certain: he MARKS your spot, holds the strike while it locks (a red eye
       flicker), then drops one clean lightning bolt. If you stayed on the mark
       (hesitated, thought too much), the clean move lands. Read it and MOVE. ---- */
function updateExecutioner(dt){
  const xg = executioner.glow||0;
  if(!mark){
    markTimer -= dt;
    if(markTimer <= 0){
      // mark the player's current spot — the precise target he commits to
      mark = { x: player.x, y: player.y, t:0, charge: 1.35 - xg*0.15, fired:false };
      markTimer = rnd(3.0, 4.4) - xg*0.6;
      AUDIO.aim();
      showTaunt(pick(['I only move when it is certain.','Hold still. Think too much.','One clean move.']));
    }
  } else {
    mark.t += dt;
    if(!mark.fired && mark.t >= mark.charge){
      mark.fired = true;
      // a single clean precision strike straight down onto the marked point
      bolts.push({ ax: mark.x, ay: mark.y - H, bx: mark.x, by: mark.y, t:0, life:0.42,
                   seed:((mark.x*0.7)|0)%97, strike:true });
      glitch = Math.max(glitch, 0.5); shake = Math.max(shake, 9); AUDIO.strike();
      for(let i=0;i<12;i++) particles.push(spark(mark.x, mark.y, pick(['#ff2b4c','#eafcff','#3ee6ff'])));
      // if you stayed on the mark, the clean move lands; move off it and he misses
      if(Math.abs(player.x-mark.x) < 40 && Math.abs(player.y-mark.y) < 46){
        floaters.push({ x:player.x, y:player.y-30, t:0, txt:'CLEAN HIT', col:'#ff2b4c' });
        damage();
      } else {
        floaters.push({ x:mark.x, y:mark.y-30, t:0, txt:'MISSED', col:'#3ee6ff' });
      }
    }
    if(mark.t > mark.charge + 0.35) mark = null;
  }
}

/* ---- Lore 27 (scale-of-reality) — THE ATOMIX WAR. Simon conquers like a system:
       he seeds Copies of Intention (one-word slivers of his will) that drift and
       home on you. Each one that touches you flips the board toward Simon (the game
       "chooses him by itself") and curses your movement with its word. Dodge them
       and the rebellion below (Alex + Luigi Green) cleans atomix upward, freeing the
       board back. Let the board fully agree with Simon and the floating zones lock
       into his symbol and lightning seals it. ---- */
function updateAtomix(dt){
  const ag = atomix.glow||0;
  // the rebellion cleans atomix upward — a slow, steady pull back toward a free board
  board = Math.min(1, board + dt*(0.045 + 0.02*ag));
  // Simon seeds Copies of Intention (capped so the screen never floods)
  if(copies.length < 5 && chance((0.022 + 0.04*ag))){
    copies.push({
      x: rnd(MARGIN, W-MARGIN), y: cameraY + (chance(0.5)? -36 : H+36),
      vx: rnd(-0.3,0.3), vy: rnd(-0.3,0.3),
      r: 17, t: Math.random()*6.28, wob: rnd(0.5,1.1),
      word: pick(INTENTIONS)
    });
  }
  for(const c of copies){
    // gentle homing — Simon's will creeps toward you
    const dx = player.x - c.x, dy = player.y - c.y, d = Math.hypot(dx,dy)||1;
    c.vx += (dx/d)*0.018; c.vy += (dy/d)*0.018;
    c.vx *= 0.985; c.vy *= 0.985;
    c.x += c.vx + Math.sin(c.t*c.wob)*0.25; c.y += c.vy; c.t += dt;
    c.x = Math.max(MARGIN, Math.min(W-MARGIN, c.x));
    // a touch: the board flips toward Simon and your movement is cursed by its word
    if(!c.hit && Math.abs(c.x-player.x) < c.r+16 && Math.abs(c.y-player.y) < c.r+20){
      c.hit = true;
      board = Math.max(0, board - 0.11);
      curse.type = c.word; curse.t = 1.3;
      glitch = Math.max(glitch, 0.5); shake = Math.max(shake, 6);
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:c.word.toUpperCase(), col:'#ff2b4c' });
      AUDIO.glitch();
    }
  }
  copies = copies.filter(c => !c.hit && c.y > cameraY-120 && c.y < cameraY+H+120);
  // the board fully agreeing with Simon: the floating zones lock into his symbol and
  // lightning seals it (then the rebellion claws a little of the board back).
  if(board <= 0.001){
    board = 0.30;
    glitch = Math.max(glitch, 0.8); shake = Math.max(shake, 10);
    floaters.push({ x:player.x, y:player.y-30, t:0, txt:'CENTER’S MINE', col:'#ff2b4c' });
    for(let i=0;i<14;i++) particles.push(spark(player.x, player.y, pick(['#ff2b4c','#eafcff','#3ee6ff'])));
    AUDIO.zap();
    damage();
  }
}

/* ---- Lore 27 (the Residual War) — THE RESIDUAL WAR. Residual is made of everything
       left unfinished, so it climbs the game as half-formed REMNANTS: a false staircase
       that flickers in, a reversed laugh, half a polo icon, a false door, a dead sound
       prompt. Each is UNFINISHED — an open ring with a gap. You cannot beat Residual by
       fighting; every blow makes more unfinished matter. You FINISH it: reach a remnant
       to close its gap, and the SPINE meter climbs. Fill the meter and the SOUND SPINE
       rises, all remnants converge into it, and Residual is ended all at once. Let a
       remnant sit unfinished and it folds back into the world; let the meter empty and
       the floor opens into a remembered hole (a nudge, never a wall). ---- */
function updateResidual(dt){
  const rg = residual.glow||0;
  if(spineFlash>0) spineFlash = Math.max(0, spineFlash - dt*1.6);
  // Residual likes sprawl: convergence slowly slips back toward the unfinished
  spine = Math.max(0, spine - dt*(0.05 + 0.03*rg));
  // it climbs the gap as half-formed remnants (capped so the screen never floods)
  if(remnants.length < 6 && chance(0.03 + 0.04*rg)){
    remnants.push({
      x: rnd(MARGIN, W-MARGIN), y: cameraY + (chance(0.5)? -36 : H+36),
      vx: rnd(-0.3,0.3), vy: rnd(-0.25,0.25),
      r: rnd(15,22), t: Math.random()*6.28, wob: rnd(0.5,1.1),
      kind: pick(REMKINDS), life: rnd(5,8), fin:0
    });
  }
  for(const r of remnants){
    if(r.fin>0){ r.fin += dt; continue; }   // a finished remnant is sealing — leave it
    r.life -= dt;
    // it drifts and flickers, half-real
    r.x += r.vx + Math.sin(r.t*r.wob)*0.3; r.y += r.vy; r.t += dt;
    r.x = Math.max(MARGIN, Math.min(W-MARGIN, r.x));
    // FINISH it — close the gap by reaching it; the Sound Spine gains
    if(Math.abs(r.x-player.x) < r.r+16 && Math.abs(r.y-player.y) < r.r+20){
      r.fin = 0.001;
      spine = Math.min(1, spine + 0.085);
      floaters.push({ x:r.x, y:r.y-22, t:0, txt:'FINISHED', col:'#9affc8' });
      for(let i=0;i<6;i++) particles.push(spark(r.x, r.y, pick(['#9affc8','#eafff4','#ffd84f'])));
      AUDIO.battleLead();
      // the trap: finishing it makes a little more unfinished matter somewhere else
      if(remnants.length < 7 && chance(0.6)){
        remnants.push({ x: rnd(MARGIN, W-MARGIN), y: cameraY + (chance(0.5)? -36 : H+36),
          vx: rnd(-0.3,0.3), vy: rnd(-0.25,0.25), r: rnd(15,22), t:Math.random()*6.28,
          wob: rnd(0.5,1.1), kind: pick(REMKINDS), life: rnd(5,8), fin:0 });
      }
    }
  }
  // remnants left unfinished fold back into the world (Residual sprawls)
  for(const r of remnants){
    if(r.fin===0 && r.life<=0){
      spine = Math.max(0, spine - 0.04); glitch = Math.max(glitch, 0.35);
      floaters.push({ x:r.x, y:r.y-22, t:0, txt:'unfinished...', col:'#7a8a9a' });
    }
  }
  remnants = remnants.filter(r => (r.fin>0 ? r.fin<0.5 : r.life>0) && r.y>cameraY-160 && r.y<cameraY+H+160);
  // CONVERGE — the Sound Spine rises and Residual is ended all at once (a reward beat)
  if(spine >= 1){
    spine = 0.4; spineFlash = 1;
    shake = Math.max(shake, 10); glitch = Math.max(glitch, 0.5); emer += 5;
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:'CONVERGE — SOUND SPINE', col:'#ffd84f' });
    for(let i=0;i<18;i++) particles.push(spark(player.x, player.y, pick(['#9affc8','#ffd84f','#eafff4'])));
    showTaunt('Converge. The Sound Spine ends it all at once.');
    AUDIO.zap();
  }
  // let Residual sprawl completely and the floor opens into a remembered hole — the
  // shaft Simon caught himself from. A small nudge, then the rebellion claws it back.
  if(spine <= 0.001){
    spine = 0.25;
    glitch = Math.max(glitch, 0.7); shake = Math.max(shake, 9);
    floaters.push({ x:player.x, y:player.y-30, t:0, txt:'A REMEMBERED HOLE', col:'#9affc8' });
    AUDIO.glitch();
    damage();
  }
}

/* ---- Lore 27 (the "talk to ChatGPT each time" thread) — THE 17 SOUND BATTLES. Simon
       destroyed the board with the Domain Expansion, so only Sound Battle law is left:
       everything is decided through sound. Simon LEADS beats — glowing NOTES rise through
       the room; ANSWER on beat by reaching one and the BATTLE meter climbs. Fill it and
       the current foe loses its claim and the next of the 17 steps up (Black, Gray, Alex,
       Luigi Green... Battle 14 is ToddLLM, the duel of created will). The foe answers with
       a PRESSURE sweep — a band of sound across the room; let it cross you and you take a
       hit and the meter slips (a nudge, never a wall). Win all 17 and Sound Battle law
       holds across every dome — the one law that crosses them all. ---- */
function updateSounds(dt){
  const sg = sounds.glow||0;
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  const beaten = sounds.idx >= SOUND_FOES.length;   // all 17 claims decided
  // Simon leads beats — notes rise for you to answer (capped so the room never floods)
  if(!beaten && leadNotes.length < 5 && chance(0.03 + 0.05*sg)){
    leadNotes.push({ x: rnd(MARGIN, W-MARGIN), y: cameraY + H + 30,
      vy: -rnd(0.7,1.2), t: Math.random()*6.28, wob: rnd(0.6,1.1),
      r: 13, life: rnd(4,6), ans:0 });
  }
  for(const n of leadNotes){
    if(n.ans>0){ n.ans += dt; continue; }   // an answered note is flaring — leave it
    n.life -= dt; n.y += n.vy; n.x += Math.sin(n.t*n.wob)*0.4; n.t += dt;
    // ANSWER ON BEAT — reach the rising note; the battle meter climbs
    if(Math.abs(n.x-player.x) < n.r+16 && Math.abs(n.y-player.y) < n.r+20){
      n.ans = 0.001;
      battleMeter = Math.min(1, battleMeter + 0.085);
      floaters.push({ x:n.x, y:n.y-22, t:0, txt:'ON BEAT', col:'#ffd84f' });
      for(let i=0;i<6;i++) particles.push(spark(n.x, n.y, pick(['#ffd84f','#eafff4','#3ee6ff'])));
      AUDIO.battleLead();
    }
  }
  // notes missed (drift off the top) cost a little ground
  for(const n of leadNotes){
    if(n.ans===0 && (n.life<=0 || n.y < cameraY-50)) battleMeter = Math.max(0, battleMeter - 0.03);
  }
  leadNotes = leadNotes.filter(n => (n.ans>0 ? n.ans<0.5 : (n.life>0 && n.y>cameraY-60)));
  // the foe answers with a PRESSURE sweep — a band of sound crossing the room
  if(!beaten){
    if(!foePress.active && chance(0.012 + 0.01*sg)){
      foePress.active = true; foePress.t = 0; foePress.hit = false;
      foePress.x = chance(0.5) ? -40 : W+40; foePress.dir = foePress.x<0 ? 1 : -1;
    }
    if(foePress.active){
      foePress.t += dt; foePress.x += foePress.dir * dt * 220;
      // crossing the player: a hit and the meter slips (a nudge, never a wall)
      if(Math.abs(foePress.x - player.x) < 22 && !foePress.hit){
        foePress.hit = true; damage(); battleMeter = Math.max(0, battleMeter - 0.12);
        glitch = Math.max(glitch, 0.3);
      }
      if(foePress.x < -60 || foePress.x > W+60){ foePress.active = false; foePress.hit = false; }
    }
  } else { foePress.active = false; }
  // WIN the current battle — the foe loses its claim; the next of the 17 steps up
  if(!beaten && battleMeter >= 1){
    const foe = SOUND_FOES[sounds.idx];
    sounds.idx++; battleMeter = 0.2; winFlash = 1;
    shake = Math.max(shake, 7); emer += (sounds.idx % 3 === 0 ? 2 : 1);
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:foe+' LOSES THE CLAIM', col:'#ffd84f' });
    for(let i=0;i<14;i++) particles.push(spark(player.x, player.y, pick(['#ffd84f','#3ee6ff','#eafff4'])));
    AUDIO.zap();
    if(sounds.idx < SOUND_FOES.length){
      const nxt = SOUND_FOES[sounds.idx];
      showTaunt(sounds.idx===13 ? 'Sound Battle 14 — Simon vs ToddLLM. I move by my will now.'
              : 'Sound Battle '+(sounds.idx+1)+' — Simon vs '+nxt+'.');
    } else {
      emer += 5;
      showTaunt('All 17 decided. Sound Battle law holds across every dome.');
      floaters.push({ x:player.x, y:player.y-54, t:0, txt:'SOUND BATTLE LAW HOLDS', col:'#ffd84f' });
    }
  }
}

/* ---- Lore 27 (the "talk to ChatGPT each time" thread) — THE LORE OF THE VOID. Simon
       fused the Void (a totally dense space) with his Domain Expansion and said "Torqe":
       the speed-law sped the war up, and the BLACKHOLE TOWER rose at the room's center. Its
       gravity well PULLS you toward the core, and the pull keeps shifting (the core drifts —
       "gravity keeps shifting"). The remade Endless Staircase feeds into it. The War of
       Shapes: hold your OWN shape away from the dense core and keep climbing to fill the
       SHAPE meter. Caught in the core band, your shape slips and the Void nudges you. Fill
       the meter and you outlast the Torqe — you keep your shape in the Void. ---- */
function updateVoid(dt){
  const vg = voidwar.glow||0;
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  // THE BLACKHOLE TOWER — a gravity well at the room's center that pulls you in; the core
  // drifts, so the safe side keeps shifting ("gravity keeps shifting").
  const core = W/2 + Math.sin(time*0.6)*70;
  voidwar.core = core;
  const pull = (0.010 + 0.016*vg) * (0.55 + 0.5*Math.sin(time*1.7));   // pulses inward
  player.x += (core - player.x) * Math.max(0, pull);
  // caught in the dense center band: the Void presses, your shape slips
  const inCore = Math.abs(player.x - core) < 26;
  if(inCore){
    voidPress = Math.min(1, voidPress + dt*0.85);
    shapeMeter = Math.max(0, shapeMeter - dt*0.10);
    if(voidPress>=1){ voidPress=0; damage(); glitch=Math.max(glitch,0.3); }
  } else {
    voidPress = Math.max(0, voidPress - dt*0.6);
    // hold your own shape away from the core, and while you keep climbing, the meter fills
    shapeMeter = Math.min(1, shapeMeter + dt*0.05);
  }
  // WIN — you outlasted the Torqe and the Void closing; you kept your own shape
  if(shapeMeter >= 1 && !voidwar.held){
    voidwar.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('Torqe outlasted. You kept your own shape in the Void.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ YOU KEPT YOUR SHAPE ★', col:'#b98cff' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#b98cff','#eafff4','#7a4fff'])));
    AUDIO.zap();
  }
}

/* ---- Lore 27 (the "talk to ChatGPT each time" thread) — THE JUDGMENT FIELD. Winter
       Simon froze every side war: the board turns white with frozen signal-lines and only
       the main clash is left. He measures every move, so you pass judgment by CLIMBING
       WITH PURPOSE (the VERDICT meter fills while you keep moving upward; it stalls if you
       just sit still). He also runs the Gold Card game — "1 chance out of 12 thousand
       cards to find the one gold piece." Presents fall: almost all are COAL, exactly one
       is the GOLD CARD. Catch the gold for the rare reward (Alex and Gray got 5 emeralds,
       everyone else got coal). ---- */
function updateJudge(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  // the VERDICT meter: keep climbing with purpose and Winter Simon clears you. It fills
  // while you are airborne or moving (a real climb) and stalls if you just stand still.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  verdict = Math.max(0, Math.min(1, verdict + (moving ? dt*0.05 : -dt*0.012)));
  // THE GOLD CARD GAME — presents fall from above: almost all coal, exactly one gold.
  judge.dropT -= dt;
  if(judge.dropT <= 0){
    judge.dropT = rnd(0.9, 1.7);
    // the one gold piece — rare, and only until you have already caught it
    const gold = !judge.gold && chance(0.09);
    judge.presents.push({ x: rnd(MARGIN+34, W-MARGIN-34), y: cameraY - 24,
                          vy: rnd(46, 84), gold, got:false, spin: Math.random()*6.28 });
  }
  for(const p of judge.presents){
    if(p.got) continue;
    p.y += p.vy * dt; p.spin += dt*2;
    if(Math.abs(p.x - player.x) < 26 && Math.abs(p.y - player.y) < 26){
      p.got = true;
      if(p.gold){
        judge.gold = true; winFlash = 1; emer += 5; shake = Math.max(shake,6);
        showTaunt('The one gold piece, out of twelve thousand cards. You won the gold.');
        floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ THE ONE GOLD CARD — 5 EMERALDS ★', col:'#ffd84f' });
        for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ffd84f','#fff6c8','#ffae00'])));
        AUDIO.zap();
      } else {
        floaters.push({ x:player.x, y:player.y-40, t:0, txt:'COAL', col:'#9aa0b0' });
      }
    }
  }
  judge.presents = judge.presents.filter(p => !p.got && p.y < cameraY + H + 90);
  // WIN — you climbed with purpose through the judgment; Winter Simon clears you. Alex and
  // Gray were the only two who got 5 emeralds; keep your purpose and so do you.
  if(verdict >= 1 && !judge.held){
    judge.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('Winter Simon stops walking. You did not ruin the board. Judgment passed.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ JUDGMENT PASSED ★', col:'#bfe0ff' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#bfe0ff','#eafaff','#8fd0ff'])));
    AUDIO.zap();
  }
}

/* ---- Lore 27 cont. (June 15) — THE THREE-WAY FIELD. Alex became a god of CONTROL, Lica
       rose as ORIGIN ("everything flows from me"), Pupahya keeps every dimension open, and
       Winter Simon answers with CONTAINMENT: ice forms under him and spreads with every
       step. The shattered field holds all three at once. HOLD THE FIELD BALANCED — climb
       with purpose while the three claimants take turns pressing — and you keep your footing
       in the field. ---- */
function updateTriad(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  // the ice creep — Simon's freeze rises up the field and spreads with every step
  triad.ice = Math.min(1, (triad.ice||0) + dt*0.04);
  // the three claimants take turns pressing the field: Alex (control), Lica (origin),
  // Simon (containment). The claim cycles; whoever holds it sweeps a colored pressure.
  triad.claimT -= dt;
  if(triad.claimT <= 0){ triad.claim = (triad.claim+1)%3; triad.claimT = rnd(2.0, 3.2);
    floaters.push({ x:player.x, y:player.y-34, t:0,
      txt:['ALEX CLAIMS THE FIELD','LICA CLAIMS THE FIELD','SIMON FREEZES THE FIELD'][triad.claim],
      col:['#c9b8ff','#ffc8e6','#bfe0ff'][triad.claim] }); }
  // HOLD THE FIELD: keep climbing with purpose to keep your footing among all three. The
  // balance fills while you move and drains if you stand still on the freezing field.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  triadM = Math.max(0, Math.min(1, triadM + (moving ? dt*0.05 : -dt*0.02)));
  if(triadM >= 1 && !triad.held){
    triad.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('You held the field: control, origin, and containment all at once. Footing kept.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ THE FIELD HELD ★', col:'#dff0ff' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#c9b8ff','#ffc8e6','#bfe0ff'])));
    AUDIO.zap();
  }
}

/* ---- Lore 27 cont. (June 15) — THE CONTAINMENT FACILITY. Simon is thrown into the SCF,
       slashes every monster the instant he is frightened, then becomes CODE. The huge facility
       built to contain him starts becoming Simon-shaped: doors unlock at the wrong times, logs
       rewrite themselves, warning lights turn yellow, and his symbol shows where labels should
       be. HOLD CONTAINMENT — climb with purpose while the code spreads across the panels — to

function updateScf(dt){

  // the code spreads through the facility: more panels flip to Simon-yellow the longer it runs
  scf.spread = Math.min(1, (scf.spread||0) + dt*0.035);
  // intermittent facility events — doors unlock, logs rewrite, lights turn yellow, banners show
  scf.eventT -= dt;
  if(scf.eventT <= 0){ scf.eventT = rnd(2.2, 3.6);
    const ev = ['A DOOR UNLOCKS AT THE WRONG TIME','A LOG REWRITES ITSELF','WARNING LIGHTS TURN YELLOW','HIS SYMBOL REPLACES A LABEL'];
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(ev), col:'#ffe98a' });

  }
  // HOLD CONTAINMENT: keep climbing with purpose to hold the facility while the code spreads.
  // The meter fills while you move and drains while you stand still on the infected floor.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  scfM = Math.max(0, Math.min(1, scfM + (moving ? dt*0.05 : -dt*0.02)));
  if(scfM >= 1 && !scf.held){
    scf.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('They contained his body. But Simon had already become the code of the containment.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ CONTAINMENT HELD ★', col:'#ffe98a' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ffd84f','#ffe98a','#ff3b5c'])));

}

/* ---- Lore 28 (June 16) — SCF 404. The containment stopped being a room and became a cosmic
       system: SCF grew beyond Classics into an ENDLESS containment-universe (Classics absorbed,
       Separate Classics + Net X loaded inside, larger than SCP), and Simon is now SCF 404, the

function updateScf404(dt){

  scf404.expand = Math.min(1, (scf404.expand||0) + dt*0.03);
  // the lightning cat crosses the field — fast diagonal bolts; 0% survival for whoever he hunts
  scf404.boltT -= dt;
  if(scf404.boltT <= 0){ scf404.boltT = rnd(1.4, 2.6);
    scf404.bolts.push({ t:0, y: rnd(cameraY+60, cameraY+H-80), dir: chance(0.5)?1:-1 });

  if(scf404.eventT <= 0){ scf404.eventT = rnd(2.2, 3.6);
    const ev = ['CLASSICS IS NOW PART OF SCF','NET X PLATFORM LOADED','SEPARATE CLASSICS ONLINE','SCF IS LARGER THAN SCP','A HUGE PLATFORM APPEARS','SURVIVAL CHANCE: 0%'];
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(ev), col:'#b98cff' });
  }
  // the SURVIVE meter — you cannot beat SCF 404, but climbing with purpose keeps you ahead of
  // the lightning. It fills while you move and drains while you stand still on the endless field.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  scf404M = Math.max(0, Math.min(1, scf404M + (moving ? dt*0.05 : -dt*0.02)));
  if(scf404M >= 1 && !scf404.held){
    scf404.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('Survival odds were 0%. You kept climbing anyway. The endless cannot catch a moving climber.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ YOU OUTRAN THE 0% ★', col:'#c9b8ff' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#b98cff','#c9b8ff','#ffe98a'])));
    AUDIO.zap();
  }
}

/* ---- Lore 28 cont. (June 17) — THE TREADMILL WEAKNESS update. Simon's one weakness made into a
       level: SCF rings the room with treadmill belts, the lightning cat dodges along them playing,
       and climbing in rhythm (moving with purpose) herds him onto the belts and forced patterns and
       DRAINS his charge until he is thrown off. Standing still lets him charge back up. ---- */
function updateTreads(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  // SCF rings the room with more and more treadmills (the belts placed around Simon)
  treads.ring = Math.min(1, (treads.ring||0) + dt*0.04);
  treads.beltT = (treads.beltT||0) + dt;
  // the lightning cat dodges along the belts, playing — until he is herded onto one
  treads.catX = (treads.catX!=null? treads.catX : W*0.5) + (treads.catV||1)*dt*120;
  if(treads.catX < 60){ treads.catX = 60; treads.catV = Math.abs(treads.catV||1); }
  if(treads.catX > W-60){ treads.catX = W-60; treads.catV = -Math.abs(treads.catV||1); }
  treads.dodgeT -= dt;
  if(treads.dodgeT <= 0){ treads.dodgeT = rnd(0.9, 1.8); treads.catV = (chance(0.5)?1:-1)*rnd(0.7,1.5);
    if(chance(0.4)) floaters.push({ x:treads.catX, y:cameraY+H*0.3, t:0, txt:'*dodge*', col:'#9affe0' });
  }
  // intermittent events — the belts, the charge draining, the move to pattern control
  treads.eventT -= dt;
  if(treads.eventT <= 0){ treads.eventT = rnd(2.2, 3.6);
    const ev = ['SIMON CHARGES THE BELT','HIS CHARGE IS DRAINING','THROWN OFF — HE GETS UP AGAIN',
                'TREADMILL FLOORS · BRIDGES · RINGS','PATTERN CONTROL ONLINE','FORCED ROUTE · JUMP · TURN',
                'SIMON ATTACKS THE PATTERNS'];
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(ev), col:'#3ee6ff' });
  }
  // the DRAIN meter — you cannot out-fight the lightning cat, but climbing in rhythm (moving with
  // purpose) herds him onto the belts and forced patterns and drains his charge. Standing still lets
  // him recharge. Fill it and the belt throws him off.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  treadsM = Math.max(0, Math.min(1, treadsM + (moving ? dt*0.05 : -dt*0.025)));
  treads.charge = 1 - treadsM*0.85;   // his power drains as the meter fills
  if(treadsM >= 1 && !treads.held){
    treads.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8); treads.throwFlash = 1;
    showTaunt('The belt drained him and threw him off. The lightning cat could not pick the pattern.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ THROWN OFF THE BELT ★', col:'#9affe0' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#3ee6ff','#9affe0','#eafaff'])));
    AUDIO.zap();
  }
  if(treads.throwFlash>0) treads.throwFlash = Math.max(0, treads.throwFlash - dt*1.2);
}

/* ---- Lore 28 cont. (June 17) — FIREY DELIGHT update. Simon, tired of the games, spins around the
       inside of his tube; climbing with purpose (moving) spins him faster and the friction HEAT rises
       until the wall glows white, warps, drips, and melts into a molten ring and he escapes. Standing
       still lets the wall cool a little — but you cannot stop the melt, only stay ahead of it. ---- */
function updateFirey(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  // the HEAT meter — moving (climbing with purpose) spins Simon faster; friction heats the tube
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  fireyM = Math.max(0, Math.min(1, fireyM + (moving ? dt*0.05 : -dt*0.02)));
  firey.heat = fireyM;
  // his spin rate and the tube's inward warp both rise with the heat
  firey.spin = (firey.spin||0) + dt*(2.2 + fireyM*9);
  firey.warp = fireyM;
  // molten drips begin once the wall is hot
  firey.dripT -= dt;
  if(firey.dripT <= 0 && fireyM > 0.45){ firey.dripT = rnd(0.3, 0.9);
    firey.drips.push({ x: rnd(W*0.32, W*0.68), y: cameraY+H*0.32, vy: rnd(40,90), t:0 });
  }
  for(let i=firey.drips.length-1;i>=0;i--){ const d=firey.drips[i]; d.t+=dt; d.y+=d.vy*dt;
    if(d.t>1.6) firey.drips.splice(i,1); }
  // intermittent events — the dodging, the spin, "Firey Delight", the melt
  firey.eventT -= dt;
  if(firey.eventT <= 0){ firey.eventT = rnd(2.2, 3.6);
    const ev = ['SIMON STOPS PLAYING','HE DODGES EVERY TREADMILL','SPINNING FASTER AND FASTER',
                '"FIREY DELIGHT"','FRICTION TAKES OVER','THE TUBE WALL GLOWS WHITE','THE TUBE MELTS'];
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(ev), col:'#ff8a3b' });
  }
  // you cannot stop the melt — when the heat tops out, the tube melts and Simon escapes again
  if(fireyM >= 1 && !firey.melted){
    firey.melted = true; winFlash = 1; emer += 5; shake = Math.max(shake,9);
    showTaunt('"Firey Delight." The friction melted the tube into a molten ring. Simon escapes again.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ THE TUBE MELTS — HE ESCAPES ★', col:'#ffd24a' });
    for(let i=0;i<18;i++) particles.push(spark(player.x, player.y, pick(['#ff8a3b','#ffd24a','#fff0d0'])));
    AUDIO.zap();
  }
}

/* ---- Lore 29 (June 18) — THE ALIEN AGE update. A single yellow eye opens in the sky-shield and
       containment geometry (folding light-shapes) drifts in to box his possible futures while a
       prediction lattice maps where he goes next. The PREDICTION meter fills while you climb with
       purpose: Simon chooses move 401, steps off the predicted track, and escapes faster than
       prediction. Standing still lets the lattice catch up. ---- */
function updateAlien(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  // the single yellow eye / sky-shield symbol fades in
  alien.eye = Math.min(1, (alien.eye||0) + dt*0.4);
  alien.latticeT = (alien.latticeT||0) + dt;
  // the PREDICTION meter — climbing with purpose lets Simon choose move 401 and outrun the lattice
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  alienM = Math.max(0, Math.min(1, alienM + (moving ? dt*0.05 : -dt*0.025)));
  alien.predict = 1 - alienM*0.85;   // how well the lattice still predicts him; drops as he steps off-track
  // containment geometry — folding light-shapes drifting down to restrict his futures
  alien.spawnT -= dt;
  if(alien.spawnT <= 0){ alien.spawnT = rnd(0.5, 1.1);
    alien.shapes.push({ x: rnd(W*0.18, W*0.82), y: cameraY - 24, vy: rnd(48,92),
                        sides: 3 + (Math.floor(alien.t*7)%4), rot: alien.t, t:0 });
  }
  for(let i=alien.shapes.length-1;i>=0;i--){ const s=alien.shapes[i]; s.t+=dt; s.y+=s.vy*dt; s.rot+=dt*1.5;
    if(s.t>3.2) alien.shapes.splice(i,1); }
  // intermittent events — the waking, the prediction, move 401
  alien.eventT -= dt;
  if(alien.eventT <= 0){ alien.eventT = rnd(2.2, 3.6);
    const ev = ['SCF-404: AWAKE','HE WOKE ALREADY AWARE','CONTAINMENT GEOMETRY FOLDS IN',
                'PREDICTED: NEXT 400 MOVES','HE CHOOSES MOVE 401','FASTER THAN PREDICTION'];
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(ev), col:'#aef34a' });
  }
  // fill it and he escapes faster than the prediction can place him
  if(alienM >= 1 && !alien.escaped){
    alien.escaped = true; winFlash = 1; emer += 5; shake = Math.max(shake,9);
    showTaunt('"Subject escaped faster than prediction." Simon chose move 401 and was already gone.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ FASTER THAN PREDICTION — MOVE 401 ★', col:'#eaffce' });
    for(let i=0;i<18;i++) particles.push(spark(player.x, player.y, pick(['#aef34a','#ffe24a','#eaffce'])));
    AUDIO.zap();
  }
}

/* =========================================================================
   RENDER
   ========================================================================= */
function draw(){
  ctx.save();
  // screen shake
  const sx = shake? rnd(-shake,shake):0, sy = shake? rnd(-shake,shake):0;
  ctx.translate(sx,sy);
  // SPIN lever: the whole staircase tilts and turns under you
  if(lever && lever.state==='act' && lever.type==='spin'){
    const ramp = Math.min(1, lever.t*1.5) * Math.min(1, (lever.actDur-lever.t)*1.5);
    const a = Math.sin(time*2.2)*0.16*ramp;
    ctx.translate(W/2,H/2); ctx.rotate(a); ctx.translate(-W/2,-H/2);
  }

  drawBackdrop();

  if(state==='title'){ drawWorldStatic(); drawTitle(); ctx.restore(); return; }

  // world (translate by camera)
  ctx.save();
  ctx.translate(0, -cameraY);
  drawTendrils();
  drawPlatforms();
  if(peace && peace.glow>0) drawBoxers();
  drawEmeralds();
  drawBottles();
  if(peace && peace.glow>0) drawNotes();
  drawSimonTide();
  if(corrupted() && phase2.glow>0.02){ drawCells(); drawBolts(); }
  if(isExposed() && exposed.glow>0.02) drawThoughts();
  if(isExecutioner() && mark) drawMark();
  if(isAtomix() && !isResidual() && atomix.glow>0.02) drawCopies();
