// Lore 27 — Copies of Intention: tiny, logic-sized Simon traces, each carrying ONE
// instruction. Red diamond slivers with a flickering eye and the word they impose.
function drawCopies(){
  for(const c of copies){
    ctx.save(); ctx.translate(c.x, c.y);
    const pulse = 0.7+0.3*Math.sin(c.t*4);
    ctx.rotate(Math.sin(c.t*1.3)*0.3);
    // a small red diamond — a sliver of Simon's will
    ctx.shadowColor='#ff2b4c'; ctx.shadowBlur=10;
    ctx.fillStyle=`rgba(255,43,76,${0.6*pulse+0.3})`;
    ctx.beginPath();
    ctx.moveTo(0,-c.r); ctx.lineTo(c.r*0.8,0); ctx.lineTo(0,c.r); ctx.lineTo(-c.r*0.8,0);
    ctx.closePath(); ctx.fill();
    // a flickering eye (red/white/teal — Simon's gaze inside it)
    const k=(Math.floor(c.t*8))%3, ec = k===0?'#ffffff':(k===1?'#3ee6ff':'#ffd1d8');
    ctx.shadowBlur=6; ctx.fillStyle=ec;
    ctx.beginPath(); ctx.arc(0,-1,2.4,0,6.28); ctx.fill();
    ctx.shadowBlur=0; ctx.rotate(-Math.sin(c.t*1.3)*0.3);
    // its one instruction
    ctx.fillStyle='#ffe2e7'; ctx.font='700 9px ui-monospace,monospace'; ctx.textAlign='center';
    ctx.fillText(c.word, 0, c.r+11);
    ctx.restore();
  }
}

// Lore 27 (the Residual War) — half-formed REMNANTS: the unfinished things Residual
// leaves half-open. Each is an open ring with a GAP plus a glyph of what it once was
// (a broken staircase, a reversed laugh, half a polo, a false door, a dead sound).
// Reach one and it FINISHES: the ring closes and flares green.
function drawRemnants(){
  for(const r of remnants){
    ctx.save(); ctx.translate(r.x, r.y);
    const finishing = r.fin>0;
    const flick = finishing ? 1 : (0.55 + 0.45*Math.sin(r.t*5));
    const col = finishing ? '#9affc8' : `rgba(154,255,200,${0.35+0.35*flick})`;
    ctx.strokeStyle = col; ctx.fillStyle = col;
    ctx.shadowColor='#9affc8'; ctx.shadowBlur = finishing ? 16 : 8; ctx.lineWidth = 2;
    // the UNFINISHED ring: an arc with an open gap; finishing closes the whole circle
    const close = finishing ? 1 : 0.62;
    ctx.beginPath(); ctx.arc(0,0,r.r, -Math.PI/2, -Math.PI/2 + 6.28*close, false); ctx.stroke();
    // a half-formed glyph of the old thing it is a remnant of
    ctx.shadowBlur=0; const g=r.r*0.5;
    if(r.kind==='stair'){ for(let i=0;i<3;i++) ctx.strokeRect(-g+i*4, g-4-i*5, 7, 4); }
    else if(r.kind==='laugh'){ ctx.beginPath();
      for(let i=0;i<=12;i++){ const xx=-g+(2*g)*i/12, yy=Math.sin((i+r.t*6)*0.9)*4;
        if(i===0) ctx.moveTo(xx,yy); else ctx.lineTo(xx,yy); } ctx.stroke(); }
    else if(r.kind==='polo'){ ctx.beginPath(); ctx.arc(0,0,g, Math.PI*0.15, Math.PI*1.05, false); ctx.stroke(); }
    else if(r.kind==='door'){ ctx.strokeRect(-g*0.7, -g*0.2, g*1.4, g*1.5);
      ctx.beginPath(); ctx.arc(g*0.4, g*0.55, 1.4, 0, 6.28); ctx.stroke(); }
    else { ctx.beginPath(); ctx.moveTo(-g,-3); ctx.lineTo(-2,-3); ctx.lineTo(g*0.7,-g*0.7);
      ctx.lineTo(g*0.7,g*0.7); ctx.lineTo(-2,3); ctx.lineTo(-g,3); ctx.closePath(); ctx.stroke(); }
    ctx.restore();
  }
  ctx.shadowBlur=0;
}
// Lore 27 (the Residual War) — THE SOUND SPINE: the one structure in Classics that can
// force Residual into a final shape and end it at once. A bright vertebral column down
// the center that grows solid as convergence (spine) climbs, and flares gold on CONVERGE.
function drawSpine(){
  const x = W/2, top = cameraY-40, bot = cameraY+H+40;
  const lit = Math.max(spine, spineFlash);
  if(lit < 0.05) return;
  ctx.save();
  ctx.globalAlpha = 0.18 + 0.5*lit + 0.3*spineFlash;
  ctx.strokeStyle = spineFlash>0 ? '#ffd84f' : '#9affc8';
  ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 12 + 18*spineFlash;
  ctx.lineWidth = 2 + 4*lit;
  ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, bot); ctx.stroke();
  // vertebrae — the spine's segments, wider and more solid as it converges
  ctx.lineWidth = 2;
  for(let yy = top; yy < bot; yy += 26){
    const w = (10 + 26*lit) * (0.6+0.4*Math.sin((yy*0.05)+time*2));
    ctx.beginPath(); ctx.moveTo(x-w, yy); ctx.lineTo(x+w, yy); ctx.stroke();
  }
  ctx.restore(); ctx.shadowBlur=0;
}

// Lore 27 (the 17 Sound Battles) — Simon LEADS the beat: glowing notes rise through the
// room to be answered on beat, and the current foe answers with a PRESSURE sweep, a band
// of sound crossing the room. With the board destroyed, sound is the only surviving law.
function drawSounds(){
  // the foe's PRESSURE sweep — a translucent band of sound crossing the room
  if(foePress.active){
    ctx.save();
    ctx.fillStyle = 'rgba(62,230,255,0.12)';
    ctx.fillRect(foePress.x-12, cameraY, 24, H);
    ctx.strokeStyle = 'rgba(62,230,255,0.65)'; ctx.lineWidth = 2;
    ctx.shadowColor = '#3ee6ff'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.moveTo(foePress.x, cameraY); ctx.lineTo(foePress.x, cameraY+H); ctx.stroke();
    ctx.restore(); ctx.shadowBlur = 0;
  }
  // Simon's lead beats — glowing eighth-notes rising to be answered on beat
  for(const n of leadNotes){
    ctx.save(); ctx.translate(n.x, n.y);
    const answering = n.ans>0;
    const flick = answering ? 1 : (0.55 + 0.45*Math.sin(n.t*6));
    const col = answering ? '#eafff4' : `rgba(255,216,79,${0.4+0.4*flick})`;
    ctx.fillStyle = col; ctx.strokeStyle = col;
    ctx.shadowColor = '#ffd84f'; ctx.shadowBlur = answering ? 16 : 8; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(-3, 4, 6, 4.5, -0.4, 0, 6.28); ctx.fill();   // note head
    ctx.beginPath(); ctx.moveTo(3, 4); ctx.lineTo(3, -12); ctx.stroke();      // stem
    ctx.beginPath(); ctx.moveTo(3, -12); ctx.quadraticCurveTo(11, -9, 9, -2); ctx.stroke();  // flag
    ctx.restore();
  }
  ctx.shadowBlur = 0;
}

/* ---- Lore 27 — THE LORE OF THE VOID: the Blackhole Tower (a drifting gravity well) and
       the dense Void. Drawn in world space. ---- */
function drawVoid(){
  const vg = voidwar.glow||0;
  const core = voidwar.core!=null ? voidwar.core : W/2;
  const top = cameraY;
  ctx.save();
  // the dense Void — a heavy dark wash over the whole room
  ctx.fillStyle = `rgba(10,4,22,${0.30*vg})`;
  ctx.fillRect(0, top, W, H);
  // THE BLACKHOLE TOWER — a vertical column of bent light around the drifting core
  const grad = ctx.createLinearGradient(core-90, 0, core+90, 0);
  grad.addColorStop(0, 'rgba(122,79,255,0)');
  grad.addColorStop(0.5, `rgba(80,40,160,${0.32*vg})`);
  grad.addColorStop(1, 'rgba(122,79,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(core-90, top, 180, H);
  // swirling accretion rings drifting up the tower
  ctx.strokeStyle = `rgba(185,140,255,${0.5*vg})`;
  ctx.shadowColor = '#b98cff'; ctx.shadowBlur = 12;
  for(let i=0;i<7;i++){
    const yy = top + ((time*40 + i*H/7) % H);
    const rr = 30 + 26*Math.abs(Math.sin(time*1.1 + i));
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(core, yy, rr, rr*0.34, 0, 0, 6.28); ctx.stroke();
  }
  // the dense core — black void mouths with a bright red rim (Simon's eyes turned red)
  for(let yy = top + 30; yy < top + H; yy += 96){
    const cy = yy + ((time*40) % 96);
    const r = 20 + 6*Math.sin(time*3 + cy*0.05);
    const g2 = ctx.createRadialGradient(core, cy, 2, core, cy, r);
    g2.addColorStop(0, 'rgba(0,0,0,0.92)');
    g2.addColorStop(0.7, `rgba(20,4,30,${0.7*vg})`);
    g2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.arc(core, cy, r, 0, 6.28); ctx.fill();
    ctx.strokeStyle = `rgba(255,60,90,${0.55*vg})`; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(core, cy, r*0.7, 0, 6.28); ctx.stroke();
  }
  ctx.restore(); ctx.shadowBlur = 0;
}

// THE JUDGMENT FIELD — Winter Simon froze the board: a pale white wash, a locked lattice of
// frozen signal-lines with blinking measure-nodes, drifting snow, and the falling Gold Card
// game presents (dark coal boxes, one bright gold card).
function drawJudge(){
  const jg = judge.glow||0; const top = cameraY;
  ctx.save();
  // the field freezes white — a pale wash over the whole room
  ctx.fillStyle = `rgba(210,228,255,${0.20*jg})`;
  ctx.fillRect(0, top, W, H);
  // frozen signal-lines — a locked lattice (the side wars, paused mid-motion)
  ctx.strokeStyle = `rgba(180,212,255,${0.42*jg})`; ctx.lineWidth = 1;
  ctx.shadowColor = '#bfe0ff'; ctx.shadowBlur = 5;
  for(let i=0;i<7;i++){ const yy = top + (i+0.5)*H/7;
    ctx.beginPath(); ctx.moveTo(0, yy); ctx.lineTo(W, yy); ctx.stroke(); }
  for(let i=0;i<6;i++){ const xx = (i+0.5)*W/6;
    ctx.beginPath(); ctx.moveTo(xx, top); ctx.lineTo(xx, top+H); ctx.stroke(); }
  // blinking measure-nodes at the intersections (every move being measured)
  ctx.shadowBlur = 9;
  const tick = (time*2)|0;
  for(let i=0;i<7;i++) for(let j=0;j<6;j++){
    if(((i*6+j)+tick) % 5 === 0){
      const yy = top + (i+0.5)*H/7, xx = (j+0.5)*W/6;
      ctx.fillStyle = `rgba(232,246,255,${0.7*jg})`;
      ctx.beginPath(); ctx.arc(xx, yy, 2.2, 0, 6.28); ctx.fill();
    }
  }
  ctx.shadowBlur = 0;
  // drifting snow (Winter Simon)
  for(let i=0;i<46;i++){
    const sx = (i*101 + time*22) % W;
    const sy = top + ((i*57 + time*46) % H);
    ctx.fillStyle = `rgba(255,255,255,${0.5*jg})`;
    ctx.fillRect(sx, sy, 2, 2);
  }
  // the Gold Card game — falling presents: coal (common) and the one gold card
  for(const p of judge.presents){
    if(p.got) continue;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.sin(p.spin)*0.18);
    if(p.gold){
      ctx.shadowColor = '#ffd84f'; ctx.shadowBlur = 14;
      ctx.fillStyle = '#ffd84f'; roundRectC(0,0,22,30,4); ctx.fill();
      ctx.fillStyle = '#fff6c8'; ctx.fillRect(-7,-11,14,8);
      ctx.fillStyle = '#9a7500'; ctx.font = '800 9px ui-monospace,monospace'; ctx.textAlign = 'center';
      ctx.fillText('GOLD', 0, 8);
    } else {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#2a2a33'; roundRectC(0,0,18,18,3); ctx.fill();
      ctx.strokeStyle = 'rgba(90,90,104,0.9)'; ctx.lineWidth = 1.4; ctx.stroke();
    }
    ctx.restore();
  }
  ctx.restore(); ctx.shadowBlur = 0;
}

// THE THREE-WAY FIELD — the shattered dimension where CONTROL, ORIGIN, and CONTAINMENT all
// exist at once: three colored vertical zones (Lica's source-light, Simon's winter-lock,
// Alex's built structure) with shattered seams between them, plus the ice creep rising from
// below (Simon clapped twice and ice spreads). The active claimant's zone brightens.
function drawTriad(){
  const tg = triad.glow||0; const top = cameraY;
  ctx.save();
  // three vertical zones: left = LICA (origin, pink-gold), center = SIMON (containment, ice),
  // right = ALEX (control, violet-steel). Each pulses; the active claimant brightens.
  const cols = [ [255,200,230], [191,224,255], [201,184,255] ];   // Lica, Simon, Alex
  for(let z=0; z<3; z++){
    const zx = z*W/3, pulse = 0.16 + 0.10*Math.sin(time*1.6 + z*2.1);
    const lit = (triad.claim===z) ? 0.20 : 0;   // brighten the claimed zone
    const a = (pulse + lit) * tg, c = cols[z];
    const g = ctx.createLinearGradient(zx, 0, zx+W/3, 0);
    g.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},0)`);
    g.addColorStop(0.5, `rgba(${c[0]},${c[1]},${c[2]},${a})`);
    g.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
    ctx.fillStyle = g; ctx.fillRect(zx, top, W/3, H);
  }
  // the shattered seams where the three meet — jagged bright cracks
  ctx.strokeStyle = `rgba(232,246,255,${0.45*tg})`; ctx.lineWidth = 1.4;
  ctx.shadowColor = '#dff0ff'; ctx.shadowBlur = 7;
  for(const seam of [W/3, 2*W/3]){
    ctx.beginPath(); ctx.moveTo(seam, top);
    for(let y=top; y<top+H; y+=26){ ctx.lineTo(seam + Math.sin(y*0.13 + time*1.3)*9, y); }
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  // origin-light motes drifting up the left, control-grid ticks falling on the right
  for(let i=0;i<16;i++){
    const lx = (i*53) % (W/3);
    const ly = top + (((i*71 - time*30) % H) + H) % H;
    ctx.fillStyle = `rgba(255,200,230,${0.5*tg})`; ctx.fillRect(lx, ly, 2, 2);
    const rx = 2*W/3 + ((i*47) % (W/3));
    const ry = top + ((i*61 + time*24) % H);
    ctx.fillStyle = `rgba(201,184,255,${0.5*tg})`; ctx.fillRect(rx, ry, 2, 6);
  }
  // THE ICE CREEP — Simon clapped twice and ice spreads up from the bottom of the field
  const ice = triad.ice||0;
  if(ice > 0){
    const band = top + H*(1 - 0.55*ice);   // the frozen front rises as ice spreads
    const g2 = ctx.createLinearGradient(0, band, 0, top+H);
    g2.addColorStop(0, 'rgba(191,224,255,0)');
    g2.addColorStop(1, `rgba(210,236,255,${0.34*tg})`);
    ctx.fillStyle = g2; ctx.fillRect(0, band, W, top+H-band);
    // a crystalline frozen front line with little ice spikes
    ctx.strokeStyle = `rgba(234,250,255,${0.7*tg})`; ctx.lineWidth = 1.6;
    ctx.shadowColor = '#eafaff'; ctx.shadowBlur = 8;
    ctx.beginPath();
    for(let x=0; x<=W; x+=22){
      const yy = band + Math.sin(x*0.08 + time*0.8)*4;
      if(x===0) ctx.moveTo(x, yy); else ctx.lineTo(x, yy);
      ctx.lineTo(x+11, yy-7);
    }
    ctx.stroke(); ctx.shadowBlur = 0;
  }
  ctx.restore(); ctx.shadowBlur = 0;
}

// THE CONTAINMENT FACILITY — the SCF becoming Simon-shaped. Two columns of containment panels
// (a wall of security screens) line the margins; as Simon's code spreads, panels flip from a
// dim cyan label to YELLOW warning with his symbol stamped on them. Scrolling log lines rewrite
// themselves, a yellow warning haze creeps in, and his great symbol fades up over the room.
function drawScf(){
  const sg = scf.glow||0, sp = scf.spread||0, top = cameraY;
  ctx.save();
  // a creeping yellow warning haze that deepens as the code takes the facility
  const haze = ctx.createLinearGradient(0, top, 0, top+H);
  haze.addColorStop(0, `rgba(40,30,6,${0.10*sg})`);
  haze.addColorStop(1, `rgba(70,52,8,${(0.10+0.22*sp)*sg})`);
  ctx.fillStyle = haze; ctx.fillRect(0, top, W, H);
  // a tiny reusable stamp of Simon's symbol (cross + omega arc) for infected panels
  function simonMark(cx, cy, r, a){
    ctx.globalAlpha = a; ctx.strokeStyle = '#ff3b5c'; ctx.lineWidth = 1.6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(cx, cy-r); ctx.lineTo(cx, cy+r);
    ctx.moveTo(cx-r, cy); ctx.lineTo(cx+r, cy); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, r*0.66, Math.PI*0.78, Math.PI*0.22, false); ctx.stroke();
  }
  // two columns of containment panels along the margins
  const PW = 30, PH = 22, GAP = 8, rows = Math.ceil(H/(PH+GAP)) + 1;
  for(const side of [0, 1]){
    const px = side===0 ? 8 : W-8-PW;
    for(let r=0; r<rows; r++){
      const py = top + 56 + r*(PH+GAP);
      const seed = ((r*73 + side*131 + 17) % 101) / 101;        // stable per-panel phase
      const infected = seed < sp;                               // the code has reached this panel
      const flick = 0.5 + 0.5*Math.sin(time*3 + seed*9);
      // panel body
      ctx.globalAlpha = (0.5 + 0.4*sg);
      ctx.fillStyle = infected ? `rgba(60,48,8,1)` : `rgba(10,16,28,1)`;
      ctx.fillRect(px, py, PW, PH);
      ctx.globalAlpha = (0.6*sg) * (infected ? (0.6+0.4*flick) : 0.7);
      ctx.strokeStyle = infected ? '#ffd84f' : '#2a3a55'; ctx.lineWidth = 1;
      ctx.strokeRect(px+0.5, py+0.5, PW-1, PH-1);
      if(infected){
        // Simon's symbol stamped where the label should be
        simonMark(px+PW/2, py+PH/2, 6, (0.45+0.4*flick)*sg);
        // a yellow warning light, top-right of the panel
        ctx.globalAlpha = (0.7+0.3*flick)*sg; ctx.fillStyle = '#ffe98a';
        ctx.fillRect(px+PW-5, py+2, 3, 3);
      } else {
        // a dim cyan "label" tick: still a normal containment readout
        ctx.globalAlpha = 0.5*sg; ctx.fillStyle = '#3ee6ff';
        ctx.fillRect(px+4, py+PH/2-1, PW-8, 2);
        ctx.fillStyle = '#1f7d33'; ctx.fillRect(px+PW-5, py+2, 3, 3);   // green ok-light
      }
    }
  }
  // scrolling log lines down the center that rewrite themselves (yellow as the code wins)
  ctx.globalAlpha = (0.16+0.20*sp)*sg; ctx.fillStyle = '#ffe98a';
  for(let i=0;i<10;i++){
    const ly = top + (((i*73 + time*40) % H) + H) % H;
    const lw = 30 + ((i*53)%70);
    ctx.fillRect(W/2-90 + ((i*37)%150), ly, lw, 1.5);
  }
  // Simon's great symbol fading up over the whole room as he becomes the facility's code
  if(sp > 0.15){
    const a = (0.06 + 0.20*sp) * sg;
    ctx.globalAlpha = a; ctx.strokeStyle = '#ff3b5c';
    ctx.shadowColor = '#ff2b4c'; ctx.shadowBlur = 16; ctx.lineWidth = 4; ctx.lineCap='round';
    const cx=W/2, cy=top+H*0.5, R=Math.min(W,H)*0.28;
    ctx.beginPath(); ctx.moveTo(cx, cy-R); ctx.lineTo(cx, cy+R);
    ctx.moveTo(cx-R, cy); ctx.lineTo(cx+R, cy); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, R*0.66, Math.PI*0.78, Math.PI*0.22, false); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.restore(); ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

// SCF 404 — the containment grown into a cosmic system. A deep starfield, an ENDLESS field of
// floating platform-cards (CLASSICS, SEPARATE CLASSICS, NET X, SCF, and one HUGE platform, plus
// countless faint others that load as it expands), labels flickering to "404", Simon's great 404
// symbol fading up over everything, and the lightning cat streaking diagonally across the field.
function drawScf404(){
  const sg = scf404.glow||0, ex = scf404.expand||0, top = cameraY;
  ctx.save();
  // deep cosmic haze — the containment-universe, darker and wider than the facility
  const haze = ctx.createLinearGradient(0, top, 0, top+H);
  haze.addColorStop(0, `rgba(10,6,26,${0.14*sg})`);
  haze.addColorStop(1, `rgba(28,10,44,${(0.14+0.24*ex)*sg})`);
  ctx.fillStyle = haze; ctx.fillRect(0, top, W, H);
  // a faint drifting starfield — the universe SCF spread into
  for(let i=0;i<60;i++){
    const sx = ((i*97 + 13) % W), sy = top + ((((i*53) + time*8) % H) + H) % H;
    const tw = 0.4 + 0.6*Math.sin(time*2 + i);
    ctx.fillStyle = i%7===0 ? '#c9b8ff' : '#5a4a78';
    ctx.globalAlpha = (0.25 + 0.4*tw)*sg; ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  // the platform-list: named cards plus an endless field of faint ones, more loading as it expands
  const NAMED = ['CLASSICS','SEP. CLASSICS','NET X','SCF','THE HUGE PLATFORM'];
  ctx.font='9px ui-monospace,monospace'; ctx.textAlign='center';
  const cols = 3, cardW = 78, cardH = 26, rows = Math.ceil(H/56) + 1;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const seed = ((r*53 + c*131 + 7) % 101) / 101;
      if(seed > 0.2 + 0.8*ex) continue;                  // more of the universe loads as it expands
      const idx = r*cols + c;
      const cx = (W/(cols+1))*(c+1) + Math.sin(time*0.6 + r*1.3 + c)*6;
      const cy = top + 60 + r*56 + ((time*6) % 56);
      const huge = (idx % 11 === 3);                      // the HUGE platform — drawn bigger
      const w = huge ? cardW*1.5 : cardW, h = huge ? cardH*1.6 : cardH;
      const broke = (Math.sin(time*3 + seed*20) > 0.6);   // flickers to "404"
      ctx.globalAlpha = (0.30 + 0.45*sg) * (huge?1:0.8);
      ctx.fillStyle = huge ? 'rgba(40,18,60,0.9)' : 'rgba(18,12,34,0.85)';
      ctx.fillRect(cx-w/2, cy-h/2, w, h);
      ctx.globalAlpha = 0.7*sg; ctx.lineWidth = huge?1.6:1;
      ctx.strokeStyle = broke ? '#ff3b5c' : '#7a5cc0';
      ctx.strokeRect(cx-w/2+0.5, cy-h/2+0.5, w-1, h-1);
      ctx.globalAlpha = 0.85*sg;
      ctx.fillStyle = broke ? '#ff6b88' : '#c9b8ff';
      ctx.fillText(broke ? '404' : NAMED[idx % NAMED.length], cx, cy+3);
    }
  }
  // Simon's great 404 symbol (cross + omega) fading up over the whole universe
  if(ex > 0.1){
    ctx.globalAlpha = (0.06 + 0.18*ex) * sg; ctx.strokeStyle = '#b98cff';
    ctx.shadowColor = '#7a5cc0'; ctx.shadowBlur = 18; ctx.lineWidth = 4; ctx.lineCap='round';
    const cx=W/2, cy=top+H*0.5, R=Math.min(W,H)*0.30;
    ctx.beginPath(); ctx.moveTo(cx, cy-R); ctx.lineTo(cx, cy+R);
    ctx.moveTo(cx-R, cy); ctx.lineTo(cx+R, cy); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, R*0.66, Math.PI*0.78, Math.PI*0.22, false); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = (0.10+0.22*ex)*sg; ctx.fillStyle='#b98cff'; ctx.font='800 30px ui-monospace,monospace';
    ctx.fillText('404', cx, cy+R*0.66+34);
  }
  // the lightning cat — fast diagonal bolts streaking across the endless field (0% survival)
  for(const b of (scf404.bolts||[])){
    const prog = b.t/0.8;
    const x0 = b.dir>0 ? -40 + prog*(W+80) : W+40 - prog*(W+80);
    const a = (1 - Math.abs(prog-0.5)*2) * sg;            // brightest at the middle of its crossing
    ctx.globalAlpha = Math.max(0, a);
    ctx.strokeStyle = '#eafaff'; ctx.shadowColor='#9affe0'; ctx.shadowBlur=12; ctx.lineWidth=2.5;
    ctx.beginPath();
    let px = x0, py = b.y; ctx.moveTo(px, py);
    for(let s=0;s<6;s++){ px += b.dir*26; py += rnd(-14,14); ctx.lineTo(px, py); }
    ctx.stroke();
    ctx.globalAlpha = Math.max(0, a); ctx.fillStyle='#ffe98a';   // a tiny lightning-cat spark head
    ctx.beginPath(); ctx.arc(x0, b.y, 3, 0, 6.28); ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.restore(); ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

// THE TREADMILL WEAKNESS — Simon's one weakness made into a level. Treadmill belts ring the SCF
// room (rolling chevron stripes on rollers), a blindfolded lightning cat dodges along them with a
// charge bar that drains as you herd him, and faint forced-pattern arrows (route markers) flicker
// to red as Simon attacks the patterns he was forced into.
function drawTreads(){
  const g = treads.glow||0, ring = treads.ring||0, top = cameraY, bt = treads.beltT||0;
  ctx.save();
  // electric containment haze — the treadmill room
  const haze = ctx.createLinearGradient(0, top, 0, top+H);
  haze.addColorStop(0, `rgba(6,18,28,${0.16*g})`);
  haze.addColorStop(1, `rgba(8,26,40,${(0.16+0.18*ring)*g})`);
  ctx.fillStyle = haze; ctx.fillRect(0, top, W, H);
  // the treadmill belts — horizontal rolling belts placed across the room, more as the ring fills
  const belts = 3 + Math.round(ring*3);   // 3..6 belts
  for(let i=0;i<belts;i++){
    const by = top + 70 + i*(H-140)/Math.max(1,belts-1);
    const dir = (i%2===0)?1:-1;            // alternating belt directions
    const bw = W-40, bx = 20, bh = 16;
    ctx.globalAlpha = (0.5+0.4*g); ctx.fillStyle='#0c1a26';
    ctx.fillRect(bx, by-bh/2, bw, bh);
    ctx.strokeStyle='#2c6e86'; ctx.lineWidth=1; ctx.globalAlpha=0.7*g;
    ctx.strokeRect(bx+0.5, by-bh/2+0.5, bw-1, bh-1);
    // rolling chevron stripes — the running belt surface
    ctx.globalAlpha=0.8*g; ctx.strokeStyle='#3ee6ff'; ctx.lineWidth=2;
    const off = (((bt*90*dir) % 28) + 28) % 28;
    for(let x=bx-28; x<bx+bw+28; x+=28){
      const sx = x + off;
      ctx.beginPath();
      ctx.moveTo(sx, by-bh/2+2); ctx.lineTo(sx+10*dir, by); ctx.lineTo(sx, by+bh/2-2);
      ctx.stroke();
    }
    // drive rollers at each end
    ctx.globalAlpha=0.8*g; ctx.fillStyle='#1c3a48';
    ctx.beginPath(); ctx.arc(bx, by, bh/2, 0, 6.28); ctx.arc(bx+bw, by, bh/2, 0, 6.28); ctx.fill();
  }
  // faint forced-pattern arrows (route markers) — Simon's deeper weakness, flickering as he attacks them
  if(ring > 0.25){
    ctx.font='800 13px ui-monospace,monospace'; ctx.textAlign='center';
    const arrows = ['▲','▶','◀','↻'];
    for(let i=0;i<7;i++){
      const ax = (W/8)*(i+1) + Math.sin(bt*0.7+i)*5;
      const ay = top + 40 + (((i*97 + bt*14)%(H-60))+(H-60))%(H-60);
      const broke = (Math.sin(bt*3 + i*2) > 0.5);   // Simon attacking the pattern
      ctx.globalAlpha = (broke? 0.25 : 0.5) * g;
      ctx.fillStyle = broke ? '#ff3b5c' : '#3ee6ff';
      ctx.fillText(broke ? '×' : arrows[i%arrows.length], ax, ay);
    }
  }
  // the lightning cat dodging along the belts — fast, playful, blindfolded, with a draining charge bar
  const cx = treads.catX!=null? treads.catX : W*0.5, cy = top + H*0.5;
  const chg = Math.max(0, Math.min(1, treads.charge!=null? treads.charge : 1));
  ctx.globalAlpha = g;
  // body
  ctx.fillStyle = treads.throwFlash>0 ? '#eafaff' : '#1a2c38';
  ctx.strokeStyle='#3ee6ff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(cx, cy, 16, 11, 0, 0, 6.28); ctx.fill(); ctx.stroke();
  // ears
  ctx.fillStyle='#3ee6ff';
  ctx.beginPath(); ctx.moveTo(cx-10,cy-8); ctx.lineTo(cx-15,cy-20); ctx.lineTo(cx-3,cy-11); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx+10,cy-8); ctx.lineTo(cx+15,cy-20); ctx.lineTo(cx+3,cy-11); ctx.fill();
  // blindfold (he is the blindfolded cat) + a flicker spark
  ctx.fillStyle='#0c1a26'; ctx.fillRect(cx-12, cy-4, 24, 4);
  ctx.fillStyle='#ffe98a'; ctx.globalAlpha=g*(0.5+0.5*Math.sin(bt*8));
  ctx.beginPath(); ctx.arc(cx+18, cy-6, 2.5, 0, 6.28); ctx.fill();
  ctx.globalAlpha=g;
  // his charge bar — drains as the player herds him onto the belts
  const cbw=40, cbx=cx-cbw/2, cby=cy-26;
  ctx.fillStyle='rgba(8,4,18,0.7)'; ctx.fillRect(cbx-1, cby-1, cbw+2, 5);
  ctx.fillStyle = chg>0.4 ? '#ffe98a' : '#ff6b88';
  ctx.fillRect(cbx, cby, cbw*chg, 3);
  // sparks crackling off him while still charged
  if(chg > 0.3){
    ctx.strokeStyle='#eafaff'; ctx.lineWidth=1.5; ctx.globalAlpha=g*chg;
    for(let s=0;s<3;s++){ const a=bt*6+s*2.1; ctx.beginPath();
      ctx.moveTo(cx, cy); ctx.lineTo(cx+Math.cos(a)*22, cy+Math.sin(a)*16); ctx.stroke(); }
  }
  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

// Lore 28 cont. (June 17) — FIREY DELIGHT / THE MELTING TUBE. A tall containment tube stands in the
// room; Simon circles its inside wall as a fast blur of bandages and red eyes, and as the HEAT rises
// the wall glows cyan -> orange -> white, bows inward, drips molten metal, and melts into a glowing
// ring at the base. Heat shimmer rises off the whole chamber.
function drawFirey(){
  const g = firey.glow||0, heat = Math.max(0, Math.min(1, firey.heat||0)), top = cameraY;
  const sp = firey.spin||0, warp = firey.warp||0;
  ctx.save();
  // heating haze — dark teal warming to orange as the friction builds
  const haze = ctx.createLinearGradient(0, top, 0, top+H);
  haze.addColorStop(0, `rgba(${Math.round(10+40*heat)},${Math.round(16+8*heat)},22,${0.18*g})`);
  haze.addColorStop(1, `rgba(${Math.round(20+120*heat)},${Math.round(14+30*heat)},14,${(0.18+0.22*heat)*g})`);
  ctx.fillStyle = haze; ctx.fillRect(0, top, W, H);
  // wall colour: cyan -> orange -> white-hot as the heat climbs
  function wallCol(a){
    if(heat < 0.5){ const k=heat/0.5; return `rgba(${Math.round(62+193*k)},${Math.round(230-92*k)},${Math.round(255-196*k)},${a})`; }
    const k=(heat-0.5)/0.5; return `rgba(255,${Math.round(138+117*k)},${Math.round(59+196*k)},${a})`;
  }
  // the tube — a vertical cylinder, centered, bowing inward as it softens
  const tcx = W*0.5, tcw = 96 - 18*warp, tTop = top + 64, tBot = top + H - 64, tH = tBot - tTop, ry = 16;
  const midY = tTop + tH*0.5;
  ctx.globalAlpha = g;
  // back wall glow
  const wg = ctx.createLinearGradient(tcx-tcw/2,0,tcx+tcw/2,0);
  wg.addColorStop(0, wallCol(0.10+0.35*heat)); wg.addColorStop(0.5, wallCol(0.04+0.12*heat)); wg.addColorStop(1, wallCol(0.10+0.35*heat));
  ctx.fillStyle = wg; ctx.fillRect(tcx-tcw/2, tTop, tcw, tH);
  // tube side walls — bowed inward by warp
  ctx.lineWidth = 3; ctx.strokeStyle = wallCol(0.55+0.4*heat);
  ctx.shadowBlur = 14*heat; ctx.shadowColor = heat>0.5? '#ffae5a' : '#3ee6ff';
  for(const side of [-1,1]){
    const ex = tcx + side*tcw/2;
    ctx.beginPath(); ctx.moveTo(ex, tTop);
    ctx.quadraticCurveTo(ex - side*18*warp, midY, ex, tBot);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  // top + bottom rim ellipses
  ctx.strokeStyle = wallCol(0.5+0.4*heat); ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(tcx, tTop, tcw/2, ry, 0, 0, 6.28); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(tcx, tBot, tcw/2, ry, 0, 0, 6.28); ctx.stroke();
  // Simon circling the inside wall — a fast blur of bandages + red eyes, faster as heat rises.
  // Drawn back-to-front so the leading blur sits on top.
  const trail = 7;
  for(let i=trail-1;i>=0;i--){
    const a = sp - i*0.5;
    const depth = Math.sin(a);                       // -1 back wall, +1 front
    const px = tcx + Math.cos(a)*(tcw/2 - 8);
    const py = midY + depth*ry*0.7;
    const fade = (1 - i/trail) * g;
    const front = depth > -0.1;
    ctx.globalAlpha = fade * (front?1:0.45);
    ctx.fillStyle = front ? '#f3ece0' : '#7a6f64';   // bandages, dimmer on the far wall
    const rx = 9*(0.7+0.3*((depth+1)/2));
    ctx.beginPath(); ctx.ellipse(px, py, rx, 7, 0, 0, 6.28); ctx.fill();
    if(i===0 && front){                              // red eyes on the leading blur
      ctx.fillStyle = '#ff2b3a';
      ctx.beginPath(); ctx.arc(px-3, py-1, 1.6, 0, 6.28); ctx.arc(px+3, py-1, 1.6, 0, 6.28); ctx.fill();
    }
  }
  ctx.globalAlpha = g;
  // friction sparks ringing the wall where he scrapes
  if(heat > 0.2){
    ctx.strokeStyle = '#fff0d0'; ctx.lineWidth = 1.4; ctx.globalAlpha = g*heat;
    for(let s=0;s<4;s++){ const a = sp*1.3 + s*1.57;
      const px = tcx + Math.cos(a)*(tcw/2 - 4), py = midY + Math.sin(a)*ry*0.7;
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px+Math.cos(a)*9, py+Math.sin(a)*7); ctx.stroke();
    }
    ctx.globalAlpha = g;
  }
  // molten ring forming at the base once hot — the tube melting into a glowing puddle
  if(heat > 0.45){
    ctx.fillStyle = `rgba(255,${Math.round(150+80*heat)},${Math.round(40+40*heat)},${(0.5+0.4*heat)*g})`;
    ctx.shadowBlur = 18*heat; ctx.shadowColor = '#ffb347';
    ctx.beginPath(); ctx.ellipse(tcx, tBot+4, tcw/2 + 10*heat, ry*0.7, 0, 0, 6.28); ctx.fill();
    ctx.shadowBlur = 0;
  }
  // molten drips running down the wall
  for(const d of (firey.drips||[])){
    const a = Math.max(0, 1 - d.t/1.6) * g;
    ctx.fillStyle = `rgba(255,200,90,${a})`;
    ctx.beginPath(); ctx.ellipse(d.x, d.y, 2.4, 5, 0, 0, 6.28); ctx.fill();
  }
  // heat shimmer rising off the chamber
  if(heat > 0.15){
    ctx.strokeStyle = `rgba(255,180,110,${0.10*heat*g})`; ctx.lineWidth = 2;
    for(let i=0;i<5;i++){ const bx = W*(0.2+0.15*i); let firstPt=true;
      ctx.beginPath();
      for(let y=tBot; y>tTop; y-=10){ const xx = bx + Math.sin(y*0.08 + sp*0.5 + i)*6*heat;
        if(firstPt){ ctx.moveTo(xx,y); firstPt=false; } else ctx.lineTo(xx,y); }
      ctx.stroke();
    }
  }
  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

/* ---- Lore 29 — THE ALIEN AGE render. A planet-sized, alien-grown chamber: a yellow eye in the
       sky-shield, a green prediction lattice, folding light-shapes closing in, and the predicted
       path of his next moves with the yellow MOVE 401 node stepping off-track as he outruns it. ---- */
function drawAlien(){
  const g = alien.glow||0, top = cameraY, lt = alien.latticeT||0;
  const pred = Math.max(0,Math.min(1,alien.predict||0)), out = Math.max(0,Math.min(1,alienM));
  ctx.save();
  // alien-age haze — deep violet over alien green
  const haze = ctx.createLinearGradient(0, top, 0, top+H);
  haze.addColorStop(0, `rgba(18,10,30,${0.30*g})`);
  haze.addColorStop(1, `rgba(12,28,16,${0.26*g})`);
  ctx.fillStyle = haze; ctx.fillRect(0, top, W, H);
  // the prediction lattice — a faint green grid of future-position nodes; stronger while it predicts him
  ctx.globalAlpha = g;
  ctx.strokeStyle = `rgba(124,240,106,${0.08+0.20*pred})`; ctx.lineWidth = 1;
  const step = 46;
  for(let x=((lt*14)%step); x<W; x+=step){ ctx.beginPath(); ctx.moveTo(x, top+112); ctx.lineTo(x, top+H); ctx.stroke(); }
  for(let y=top+112+((lt*10)%step); y<top+H; y+=step){ ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  // the sky-shield band + the single yellow eye / symbol in the artificial clouds
  const eye = alien.eye||0, ecx = W*0.5, ecy = top + 80;
  ctx.fillStyle = `rgba(110,140,80,${0.10*g})`; ctx.fillRect(0, top+42, W, 70);
  ctx.save();
  ctx.globalAlpha = g*eye;
  ctx.shadowBlur = 22; ctx.shadowColor = '#ffe24a';
  ctx.strokeStyle = `rgba(255,226,74,${0.8*eye})`; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(ecx, ecy, 46, 22, 0, 0, 6.28); ctx.stroke();   // the eye outline
  ctx.fillStyle = `rgba(255,226,74,${0.9*eye})`;
  ctx.beginPath(); ctx.ellipse(ecx, ecy, 12, 12*(0.6+0.4*Math.abs(Math.sin(lt*1.5))), 0, 0, 6.28); ctx.fill(); // pupil
  ctx.restore();
  // folding light-shapes (containment geometry) drifting in to box his futures
  for(const s of (alien.shapes||[])){
    const a = Math.max(0, 1 - s.t/3.2) * g, R = 15 + 4*Math.sin(s.rot*1.3);
    ctx.save();
    ctx.shadowBlur = 8; ctx.shadowColor = '#aef34a';
    ctx.strokeStyle = `rgba(174,243,74,${0.8*a})`; ctx.lineWidth = 1.6;
    ctx.fillStyle = `rgba(124,240,106,${0.16*a})`;
    ctx.beginPath();
    for(let k=0;k<=s.sides;k++){ const ang = s.rot + k*6.2832/s.sides;
      const px = s.x + Math.cos(ang)*R, py = s.y + Math.sin(ang)*R;
      if(k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  // the predicted path — ghost nodes the lattice expects Simon to take, near him
  const baseX = Math.max(48, Math.min(W-48, player.x)), baseY = player.y - 22;
  for(let i=0;i<10;i++){
    const nx = baseX + (i-4.5)*16, ny = baseY - Math.sin(i*0.6 + lt)*7;
    ctx.fillStyle = `rgba(124,240,106,${(0.5*pred)*g})`;
    ctx.beginPath(); ctx.arc(nx, ny, 2.2, 0, 6.28); ctx.fill();
  }
  // MOVE 401 — the node Simon actually takes, off the predicted line, glowing yellow as he outruns it
  const f401x = baseX + 6*16, f401y = baseY - 24*out;
  ctx.save(); ctx.shadowBlur = 4 + 12*out; ctx.shadowColor = '#ffe24a';
  ctx.fillStyle = `rgba(255,226,74,${(0.4+0.6*out)*g})`;
  ctx.beginPath(); ctx.arc(f401x, f401y, 3.6, 0, 6.28); ctx.fill();
  if(out > 0.25){ ctx.strokeStyle = `rgba(255,226,74,${0.5*out*g})`; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(baseX + 4.5*16, baseY); ctx.lineTo(f401x, f401y); ctx.stroke(); }
  ctx.restore();
  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

/* ---- Lore 29 cont. — THE WALL ERA / THE NIL STATE render. The largest Containment Center: a huge layered
       wall ringing both margins (metal · alien stone · code glass · signal mesh · anti-speed), DON'T LOOK /
       NO NOISE signs, Simon standing still in the center with his hands over his hidden yellow eyes, and the
       black Nil flash subtracting nearby wall panels into 404 static as the room is converted toward him. ---- */
function drawWall(){
  const g = wall.glow||0, top = cameraY, hum = Math.max(0,Math.min(1,wall.hum||0)), fl = wall.flash||0;
  ctx.save();
  // dim Nil-haze, deep and getting darker as the subtraction spreads
  const haze = ctx.createLinearGradient(0, top, 0, top+H);
  haze.addColorStop(0, `rgba(10,9,6,${(0.30+0.25*hum)*g})`);
  haze.addColorStop(1, `rgba(6,6,5,${(0.34+0.30*hum)*g})`);
  ctx.fillStyle = haze; ctx.fillRect(0, top, W, H);
  ctx.globalAlpha = g;
  // the huge layered wall ringing both margins — bands of metal, alien stone, code glass, signal mesh, anti-speed
  const bands = [ ['#3a3d44',26], ['#2f3a30',16], ['rgba(62,230,220,0.35)',8], ['#4a4030',10], ['rgba(255,59,92,0.35)',6] ];
  for(const side of [-1,1]){
    let x = (side<0) ? 0 : W;   // outer edge
    for(const [col,w] of bands){
      const bx = (side<0) ? x : x - w;
      ctx.fillStyle = col; ctx.fillRect(bx, top, w, H);
      x += side<0 ? w : -w;
    }
  }
  const innerL = 66, innerR = W-66;   // inner face of the wall on each side
  // DON'T LOOK / NO NOISE signs bolted to the inner wall faces
  ctx.font='800 9px ui-monospace,monospace'; ctx.textAlign='center';
  const signs = ['DO NOT LOOK','NO NOISE','NO CONTACT'];
  for(let i=0;i<signs.length;i++){
    const sy = top + 150 + i*150, sx = (i%2===0)? innerL-14 : innerR+14;
    ctx.fillStyle = 'rgba(255,226,74,0.85)'; ctx.fillRect(sx-30, sy-9, 60, 16);
    ctx.fillStyle = '#1a1405'; ctx.fillText(signs[i], sx, sy+2);
  }
  // the Nil subtraction patches — wall panels blinking black / to 404 static where he has flashed
  for(const s of (wall.subs||[])){
    const a = Math.max(0, 1 - s.t/s.life) * g;
    const px = (s.side<0)? innerL-30 : innerR-30, pw = 60, ph = 34;
    ctx.fillStyle = `rgba(0,0,0,${0.7*a})`; ctx.fillRect(px, s.y, pw, ph);
    ctx.strokeStyle = `rgba(255,226,74,${0.5*a})`; ctx.lineWidth = 1; ctx.strokeRect(px, s.y, pw, ph);
    if(s.n404){ ctx.fillStyle = `rgba(255,59,92,${0.8*a})`; ctx.font='700 11px ui-monospace,monospace';
      ctx.textAlign='center'; ctx.fillText('404 404', px+pw/2, s.y+ph/2+4); }
  }
  // Simon standing still in the center — head lowered, hands over his hidden yellow eyes, antenna still,
  // bandages hanging; the black Nil State flashes through his outline
  const scx = W*0.5, sFloor = top + H - 96, bob = Math.sin((wall.t||0)*0.6)*2;
  const sy0 = sFloor - 56 + bob, blackout = fl;
  ctx.save();
  // body (a pale bandaged figure), flashing to black on the Nil pulse
  const bodyCol = `rgb(${Math.round(232*(1-blackout))},${Math.round(226*(1-blackout))},${Math.round(208*(1-blackout))})`;
  ctx.shadowBlur = 16*(0.4+0.6*hum); ctx.shadowColor = blackout>0.3? '#000' : '#ffe24a';
  ctx.fillStyle = bodyCol;
  ctx.beginPath(); ctx.ellipse(scx, sy0+30, 16, 24, 0, 0, 6.28); ctx.fill();   // torso
  ctx.beginPath(); ctx.ellipse(scx, sy0, 15, 14, 0, 0, 6.28); ctx.fill();       // head
  // antenna (still), bandage wraps
  ctx.strokeStyle = bodyCol; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(scx-6, sy0-12); ctx.lineTo(scx-9, sy0-24);
  ctx.moveTo(scx+6, sy0-12); ctx.lineTo(scx+9, sy0-24); ctx.stroke();
  // hands over the face, hiding the yellow eyes (a faint yellow glow leaks between them)
  ctx.fillStyle = `rgba(255,226,74,${(0.25+0.4*hum)*(1-blackout)})`;
  ctx.beginPath(); ctx.ellipse(scx, sy0+1, 8, 5, 0, 0, 6.28); ctx.fill();        // leaking eye-glow
  ctx.fillStyle = bodyCol;
  ctx.beginPath(); ctx.ellipse(scx-6, sy0+2, 6, 9, -0.3, 0, 6.28); ctx.fill();   // left hand
  ctx.beginPath(); ctx.ellipse(scx+6, sy0+2, 6, 9, 0.3, 0, 6.28); ctx.fill();    // right hand
  ctx.restore();
  // the global Nil flash — a brief black subtraction wash over everything, with a hum line at the base
  if(fl > 0.02){ ctx.fillStyle = `rgba(0,0,0,${0.34*fl*g})`; ctx.fillRect(0, top, W, H); }
  // the huge wall hums his rhythm — a pulsing line across the floor that grows with the meter
  ctx.strokeStyle = `rgba(255,226,74,${(0.12+0.4*hum)*g})`; ctx.lineWidth = 1.5;
  ctx.beginPath();
  for(let x=innerL;x<=innerR;x+=8){ const yy = sFloor+30 + Math.sin(x*0.06 + (wall.t||0)*3)*4*hum;
    if(x===innerL) ctx.moveTo(x,yy); else ctx.lineTo(x,yy); }
  ctx.stroke();
  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

/* ---- Lore 29 cont. — THE SMOOTH AGE / THE ARROW CHAMBER render. A clean FNF-style chamber: a smooth
       gradient and crisp scanlines, Simon standing in the center with flashing yellow eyes, and four
       FNF arrows above his head popping on the beat — YELLOW (charge/attack) or BLACK (Nil) — with a
       TRUTH / LYING tag under them, because the readout is bait. ---- */
function drawSmooth(){
  const g = smooth.glow||0, top = cameraY, an = smooth.anim||0;
  ctx.save();
  // the Smooth Age — a clean FNF gradient, deep indigo to violet
  const bg = ctx.createLinearGradient(0, top, 0, top+H);
  bg.addColorStop(0, `rgba(16,10,32,${0.34*g})`);
  bg.addColorStop(1, `rgba(28,12,40,${0.30*g})`);
  ctx.fillStyle = bg; ctx.fillRect(0, top, W, H);
  ctx.globalAlpha = g;
  // crisp scanlines — "cleaner textures, sharper glitches"
  ctx.fillStyle = `rgba(255,255,255,${0.03*g})`;
  for(let y=top+((an*40)%4); y<top+H; y+=4) ctx.fillRect(0, y, W, 1);
  // a hint of Mr Black at full potential — a clean red demon-light column at the right edge
  const mb = ctx.createLinearGradient(W-70,0,W,0);
  mb.addColorStop(0,'rgba(255,40,70,0)'); mb.addColorStop(1,`rgba(255,40,70,${0.16*g})`);
  ctx.fillStyle = mb; ctx.fillRect(W-70, top, 70, H);
  // Simon standing still in the center, eyes flashing yellow (he is in the FNF animations now)
  const scx = W*0.5, sFloor = top + H - 96, bob = Math.sin(an*0.8)*2, sy0 = sFloor - 56 + bob;
  const eyeOn = Math.abs(Math.sin(an*6)) > 0.4;
  ctx.save();
  ctx.shadowBlur = 12; ctx.shadowColor = '#ffe24a';
  ctx.fillStyle = '#ece2d0';
  ctx.beginPath(); ctx.ellipse(scx, sy0+30, 16, 24, 0, 0, 6.28); ctx.fill();   // torso
  ctx.beginPath(); ctx.ellipse(scx, sy0, 15, 14, 0, 0, 6.28); ctx.fill();       // head
  ctx.strokeStyle = '#ece2d0'; ctx.lineWidth = 2;                               // antenna
  ctx.beginPath(); ctx.moveTo(scx-6, sy0-12); ctx.lineTo(scx-9, sy0-24);
  ctx.moveTo(scx+6, sy0-12); ctx.lineTo(scx+9, sy0-24); ctx.stroke();
  ctx.shadowBlur = eyeOn? 12 : 3;                                               // flashing yellow eyes
  ctx.fillStyle = eyeOn ? '#ffe24a' : '#9a7a14';
  ctx.beginPath(); ctx.arc(scx-5, sy0, 2.4, 0, 6.28); ctx.arc(scx+5, sy0, 2.4, 0, 6.28); ctx.fill();
  ctx.restore();
  // the four FNF arrows above his head — pop on the beat, yellow (charge) or black (Nil)
  const ax0 = scx - 54, ay = sy0 - 46, gap = 36;
  const dirs = [Math.PI, Math.PI*0.5, -Math.PI*0.5, 0];   // left, down, up, right
  for(let i=0;i<smooth.arrows.length;i++){
    const a = smooth.arrows[i], cxA = ax0 + i*gap, sc = 1 + (a.p||0)*0.5;
    const yellow = a.col===0;
    ctx.save();
    ctx.translate(cxA, ay); ctx.rotate(dirs[i]); ctx.scale(sc, sc);
    ctx.shadowBlur = yellow ? 10 : 6; ctx.shadowColor = yellow ? '#ffe24a' : '#000';
    ctx.fillStyle = yellow ? `rgba(255,226,74,${(0.55+0.45*(a.p||0))})` : `rgba(20,18,24,${(0.7+0.3*(a.p||0))})`;
    ctx.strokeStyle = yellow ? '#fff2b0' : '#ffe24a'; ctx.lineWidth = 1.4;
    // a chunky FNF arrow: chevron head + stem
    ctx.beginPath();
    ctx.moveTo(8,0); ctx.lineTo(0,-9); ctx.lineTo(0,-4); ctx.lineTo(-9,-4);
    ctx.lineTo(-9,4); ctx.lineTo(0,4); ctx.lineTo(0,9); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  // the TRUTH / LYING tag beneath the arrows — the readout is bait
  ctx.textAlign = 'center'; ctx.font = '800 10px ui-monospace,monospace';
  if(smooth.lie){ ctx.fillStyle = `rgba(255,59,92,${(0.6+0.4*Math.abs(Math.sin(an*9)))*g})`;
    ctx.fillText('ARROWS: LYING', scx, ay+24); }
  else { ctx.fillStyle = `rgba(124,240,106,${0.7*g})`; ctx.fillText('ARROWS: TRUTH', scx, ay+24); }
  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

function drawHallu(){
  const g = hallu.glow||0, top = cameraY, an = hallu.anim||0;
  ctx.save();
  // a sickly hallucination haze — murky brown over a green sheen
  const bg = ctx.createLinearGradient(0, top, 0, top+H);
  bg.addColorStop(0, `rgba(22,20,8,${0.36*g})`);
  bg.addColorStop(1, `rgba(14,22,10,${0.32*g})`);
  ctx.fillStyle = bg; ctx.fillRect(0, top, W, H);
  ctx.globalAlpha = g;
  // BLACK is now the strongest — a huge dark silhouette looming behind everything
  const Bx = W*0.5, Btop = top + 18;
  ctx.fillStyle = `rgba(6,4,10,${0.5*g})`;
  ctx.beginPath();
  ctx.moveTo(Bx-120, top+H); ctx.lineTo(Bx-72, Btop+62); ctx.lineTo(Bx, Btop);
  ctx.lineTo(Bx+72, Btop+62); ctx.lineTo(Bx+120, top+H); ctx.closePath(); ctx.fill();
  ctx.fillStyle = `rgba(255,80,110,${0.55*g})`;
  ctx.beginPath(); ctx.arc(Bx-22, Btop+46, 5, 0, 6.28); ctx.arc(Bx+22, Btop+46, 5, 0, 6.28); ctx.fill();
  ctx.textAlign='center'; ctx.font='700 9px ui-monospace,monospace';
  ctx.fillStyle = `rgba(255,80,110,${0.55*g})`; ctx.fillText('BLACK — STRONGEST', Bx, Btop+30);
  // the Hullelations — drifting figures Simon misreads (zombie / alive / chocolate)
  for(const f of hallu.figs){
    const fade = Math.min(1, f.t/0.4) * Math.min(1, (f.life-f.t)/0.6);
    ctx.globalAlpha = g*0.85*fade; ctx.textAlign='center';
    if(f.kind==='zombie'){          // a living person Simon sees as a green zombie
      ctx.fillStyle = '#6f9c4e';
      ctx.beginPath(); ctx.ellipse(f.x, f.y, 8, 16, 0, 0, 6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(f.x, f.y-18, 7, 0, 6.28); ctx.fill();
      ctx.fillStyle='#1c2a10'; ctx.beginPath(); ctx.arc(f.x-3,f.y-18,1.6,0,6.28); ctx.arc(f.x+3,f.y-18,1.6,0,6.28); ctx.fill();
      ctx.fillStyle='#9fd06a'; ctx.font='700 8px ui-monospace,monospace'; ctx.fillText('ZOMBIE?', f.x, f.y+26);
    } else if(f.kind==='alive'){    // a dead / resurrected thing Simon sees as alive
      ctx.fillStyle = '#dfeaff';
      ctx.beginPath(); ctx.ellipse(f.x, f.y, 8, 16, 0, 0, 6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(f.x, f.y-18, 7, 0, 6.28); ctx.fill();
      ctx.fillStyle='#7ea0d6'; ctx.font='700 8px ui-monospace,monospace'; ctx.fillText('ALIVE?', f.x, f.y+26);
    } else {                        // a brown thing Simon sees as chocolate
      ctx.fillStyle = '#6b3f1d';
      ctx.fillRect(f.x-9, f.y-9, 18, 18);
      ctx.strokeStyle='#4a2a12'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(f.x,f.y-9); ctx.lineTo(f.x,f.y+9); ctx.moveTo(f.x-9,f.y); ctx.lineTo(f.x+9,f.y); ctx.stroke();
      ctx.fillStyle='#caa06a'; ctx.font='700 8px ui-monospace,monospace'; ctx.fillText('CHOCOLATE', f.x, f.y+24);
    }
  }
  ctx.globalAlpha = g;
  // Simon — damaged, weak, near-zero HP, one permanent Yellow Eye
  const scx = W*0.42, sFloor = top + H - 96, bob = Math.sin(an*0.8)*1.5, sy0 = sFloor - 56 + bob;
  const eye = Math.max(0, Math.min(1, hallu.eye||0)), full = hallu.eyeFull||0;
  ctx.save();
  ctx.shadowBlur = 10; ctx.shadowColor = '#ffe24a';
  ctx.fillStyle = '#cfc6b0';                                    // dimmer, damaged body
  ctx.beginPath(); ctx.ellipse(scx, sy0+30, 16, 24, 0, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(scx, sy0, 15, 14, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#8a7f63';                                    // patched holes — the fixed shots
  ctx.beginPath(); ctx.arc(scx-6, sy0+24, 2, 0, 6.28); ctx.arc(scx+5, sy0+38, 2, 0, 6.28); ctx.arc(scx+2, sy0+14, 1.6, 0, 6.28); ctx.fill();
  ctx.strokeStyle = '#cfc6b0'; ctx.lineWidth = 2;               // antennae
  ctx.beginPath(); ctx.moveTo(scx-6, sy0-12); ctx.lineTo(scx-9, sy0-24);
  ctx.moveTo(scx+6, sy0-12); ctx.lineTo(scx+9, sy0-24); ctx.stroke();
  const eo = 1 + eye*3 + full*2;                                // the Yellow Eye opens wider as it charges
  ctx.shadowBlur = 8 + eye*16 + full*16;
  ctx.fillStyle = '#9a7a14';                                    // the dim normal eye
  ctx.beginPath(); ctx.arc(scx-5, sy0, 2.2, 0, 6.28); ctx.fill();
  ctx.fillStyle = full>0.2 ? '#fff6c0' : '#ffe24a';             // the Yellow Eye
  ctx.beginPath(); ctx.ellipse(scx+5, sy0, 2.2, 2.2*eo, 0, 0, 6.28); ctx.fill();
  ctx.restore();
  // the blindfold he keeps re-applying over his eyes — it MELTS the instant the Yellow Eye opens, then grows back
  const bf = hallu.blindfold||0;
  if(bf > 0.04){
    ctx.fillStyle = `rgba(28,24,18,${0.92*bf*g})`;
    ctx.fillRect(scx-13, sy0-3.5, 26, 6.5*bf);
    ctx.strokeStyle = `rgba(64,56,42,${0.85*bf*g})`; ctx.lineWidth=1;
    ctx.strokeRect(scx-13, sy0-3.5, 26, 6.5*bf);
  } else {
    // mid-melt — dark drips run down where the blindfold just gave way
    ctx.fillStyle = `rgba(40,34,22,${0.55*g})`;
    ctx.fillRect(scx-10, sy0+1, 3, 9); ctx.fillRect(scx+7, sy0+1, 3, 7);
  }
  // melt drips where the Yellow Eye has looked
  for(const mlt of hallu.melts){
    const p = Math.min(1, mlt.t/1.6);
    ctx.globalAlpha = g*(1-p)*0.9;
    ctx.fillStyle = '#ffd84f'; ctx.fillRect(mlt.x-7, mlt.y-2, 14, 4 + p*30);
    ctx.fillStyle = '#caa050'; ctx.fillRect(mlt.x-3, mlt.y+10, 6, 6 + p*36);
  }
  ctx.globalAlpha = g;
  // Lore 29 cont. — Black's "basic, very small jail-cell." It is SEE-THROUGH, which is exactly why line of
  // sight alone is fatal: when the Yellow Eye opens toward it, Black melts and is "sent back to his containment."
  const bk = hallu.black, ccx = W*0.80, cTop = sFloor - 64, cW = 46, cH = 64;
  ctx.save(); ctx.textAlign='center';
  // SCF's redesign note — the new chamber is sensor-only: no cameras, no transparent walls (this old cell still is)
  ctx.fillStyle = `rgba(255,210,90,${0.7*g})`; ctx.font='700 7px ui-monospace,monospace';
  ctx.fillText('SENSOR-ONLY · HEAT · PRESSURE · SOUND', W*0.5, sFloor+18);
  // the see-through cell — thin walls + bars you can see straight through
  ctx.strokeStyle = `rgba(150,160,180,${0.5*g})`; ctx.lineWidth=2;
  ctx.strokeRect(ccx-cW/2, cTop, cW, cH);
  ctx.strokeStyle = `rgba(120,130,150,${0.4*g})`; ctx.lineWidth=1;
  for(let bx=1; bx<5; bx++){ const X=ccx-cW/2+bx*(cW/5); ctx.beginPath(); ctx.moveTo(X,cTop); ctx.lineTo(X,cTop+cH); ctx.stroke(); }
  // danger / warning signs at the door
  for(let s=-1;s<=1;s++){ const wx=ccx+s*16, wy=cTop-11;
    ctx.fillStyle = `rgba(255,200,40,${0.85*g})`;
    ctx.beginPath(); ctx.moveTo(wx,wy-6); ctx.lineTo(wx-6,wy+5); ctx.lineTo(wx+6,wy+5); ctx.closePath(); ctx.fill();
    ctx.fillStyle=`rgba(26,20,7,${g})`; ctx.fillText('!', wx, wy+4.5);
  }
  if(bk.alive){
    // Black, contained — a small dark figure looking out (and looking is what dooms him)
    ctx.fillStyle = `rgba(10,8,16,${0.9*g})`;
    ctx.beginPath(); ctx.ellipse(ccx, cTop+cH-20, 11, 18, 0, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(ccx, cTop+cH-38, 9, 0, 6.28); ctx.fill();
    ctx.fillStyle = `rgba(255,80,110,${0.85*g})`;
    ctx.beginPath(); ctx.arc(ccx-3, cTop+cH-40, 1.8,0,6.28); ctx.arc(ccx+3, cTop+cH-40,1.8,0,6.28); ctx.fill();
    ctx.fillStyle = `rgba(220,210,230,${0.8*g})`;
    ctx.fillText('BLACK', ccx, cTop-1);
  } else {
    // melted by being seen — a red drip, then "SENT BACK" while he respawns into the cell
    ctx.fillStyle = `rgba(255,80,110,${0.7*g*(bk.melt||0)})`;
    ctx.fillRect(ccx-6, cTop+cH-30, 12, 4 + 24*(bk.melt||0));
    ctx.fillStyle = `rgba(180,170,190,${0.8*g})`;
    ctx.fillText(bk.respawn>1.2 ? 'SENT BACK' : 'BLACK', ccx, cTop-1);
  }
  ctx.restore();
  // the screech that takes Black out the moment Simon opens his eye toward the cell
  if((hallu.screech||0) > 0.02){
    ctx.strokeStyle = `rgba(255,246,180,${0.8*hallu.screech*g})`; ctx.lineWidth=2;
    for(let r=0;r<3;r++){ ctx.beginPath(); ctx.arc(scx+5, sy0, 14+r*13 + (1-hallu.screech)*22, -0.55, 0.55); ctx.stroke(); }
  }
  // when the Yellow Eye fully opens, lightning covers the screen
  if((hallu.lightning||0) > 0.02){
    const lg = hallu.lightning;
    ctx.fillStyle = `rgba(255,246,180,${0.18*lg})`; ctx.fillRect(0, top, W, H);
    ctx.strokeStyle = `rgba(255,242,140,${0.9*lg})`; ctx.lineWidth = 2;
    for(let b=0;b<4;b++){
      let lx = (W*0.18) + b*(W*0.2), ly = top;
      ctx.beginPath(); ctx.moveTo(lx, ly);
      for(let s=0;s<8;s++){ lx += Math.sin(b*9 + s*1.7 + an*30)*22; ly += H/8; ctx.lineTo(lx, ly); }
      ctx.stroke();
    }
  }
  // the near-zero HP readout — "the smallest number right before 0," fixed every shot but HP never moved
  ctx.textAlign='center'; ctx.font='800 9px ui-monospace,monospace';
  ctx.fillStyle = `rgba(255,59,92,${(0.7+0.3*Math.abs(Math.sin(an*5)))*g})`;
  ctx.fillText('SIMON HP 0.0001 — WEAKEST, NOT HARMLESS', scx, sy0-30);
  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

/* =========================================================================
   Lore 29 — THE PLAGUE CYCLE / SCF-404: THE SLEEPING PLAGUE KING
   Simon becomes a ritual figure: call for a sacrifice, lift the mask for one
   cold touch (404D / zombie / dead), rage with a storm when an outcome "goes
   wrong" (a resurrection), then calm and tidy the body with anti-virus. The
   PLAGUE-KING PROTOCOL meter rewards keeping clear: no direct contact.
   ========================================================================= */
const PLAGUE_FATES = ['404D','ZOMBIE','DEAD'];
function updatePlague(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  plague.anim = (plague.anim||0) + dt;
  plague.eye = 0.5 + 0.5*Math.abs(Math.sin(plague.anim*0.9));     // the cold yellow eyes pulse
  plague.callFlash = Math.max(0, (plague.callFlash||0) - dt*1.6);
  // the mask grows back between touches; it only ever lifts in the 'touch' beat
  if(plague.phase!=='touch') plague.mask = Math.min(1, (plague.mask||0) + dt*2.2);

  // drifting victims he can select from — to him the living look dead, so they shuffle in slowly
  plague.victimT = (plague.victimT||0) - dt;
  if(plague.victimT <= 0){ plague.victimT = rnd(1.0, 2.0);
    if(plague.victims.length < 5){
      plague.victims.push({ x: rnd(W*0.14, W*0.86), y: cameraY + rnd(H*0.32, H*0.70),
        t:0, life: rnd(4.0, 6.0), vx: rnd(-10, 10), sel:false });
    }
  }
  for(const v of plague.victims){ v.t += dt; v.x += (v.vx||0)*dt; }
  plague.victims = plague.victims.filter(v => v.t < v.life && !v.taken);

  // converted things rise and fade with their fate label stamped on
  for(const c of plague.converts) c.t += dt;
  plague.converts = plague.converts.filter(c => c.t < 1.8);

  // the storm only burns while he is raging; otherwise it bleeds away and he calms
  plague.storm = Math.max(0, Math.min(1, (plague.storm||0) + ((plague.phase==='wrong') ? dt*1.6 : -dt*0.9)));
  plague.rage = Math.max(0, (plague.rage||0) - dt*1.1);
  // the anti-virus table cleanup runs during 'calm'
  plague.table.spray = Math.max(0, (plague.table.spray||0) - dt*0.8);
  if(plague.table.t>0) plague.table.t = Math.max(0, plague.table.t - dt*0.5);

  // ---- the cycle: CALL → RITUAL TOUCH → (CORRECTION on a wrong outcome) → CALM ----
  plague.phaseT -= dt;
  if(plague.phaseT <= 0){
    if(plague.phase==='call'){
      // GIVE ME A SACRIFICE — select the nearest drifting victim, lift the mask, deliver the cold touch
      plague.phase = 'touch'; plague.phaseT = 0.55; plague.mask = 0;
      let best=null, bd=1e9;
      for(const v of plague.victims){ const d=Math.abs(v.x-W*0.5); if(!v.taken && d<bd){ bd=d; best=v; } }
      if(best){ best.taken = true;
        const fate = pick(PLAGUE_FATES);
        plague.converts.push({ x:best.x, y:best.y, t:0, fate });
        plague.table = { t:1.0, fate, spray:0 };     // the body goes to the anti-virus table next
        AUDIO.zap(); shake = Math.max(shake, 7);
        showTaunt('The mask lifts for one cold touch. '+fate+'. To Simon, that is a cure.');
      }
    } else if(plague.phase==='touch'){
      // sometimes the outcome "goes wrong" — something resurrects, which to him is the exact opposite
      if(Math.random() < 0.34){
        plague.phase = 'wrong'; plague.phaseT = 2.0; plague.rage = 1;
        shake = Math.max(shake, 12); glitch = Math.max(glitch, 0.4); AUDIO.zap();
        showTaunt('"Why did you make him resurrect?! You did the exact opposite!" Simon raises a storm.');
        floaters.push({ x:player.x, y:player.y-34, t:0, txt:'A RESURRECTION — SIMON RAGES', col:'#ff3b5c' });
      } else {
        plague.phase = 'calm'; plague.phaseT = 1.8; plague.table.spray = 1;
      }
    } else if(plague.phase==='wrong'){
      // the storm peaks, then he calms — the cycle always returns to calm
      plague.phase = 'calm'; plague.phaseT = 1.8; plague.table.spray = 1;
      showTaunt('The storm stops. He calms, lays the body the other way up, sprays anti-virus.');
    } else { // 'calm' — the body is sprayed and vanishes so it "does not stink," then he calls again
      plague.phase = 'call'; plague.phaseT = rnd(1.8, 2.6); plague.callFlash = 1;
      plague.table = { t:0, fate:'', spray:0 };
    }
  }

  // the PLAGUE-KING PROTOCOL meter — climb with purpose to keep the protocol (no direct contact);
  // standing still lets him close the distance for a "cure"-touch and drains the meter
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  plagueM = Math.max(0, Math.min(1, plagueM + (moving ? dt*0.05 : -dt*0.03)));
  plague.eventT -= dt;
  if(plague.eventT <= 0){ plague.eventT = rnd(2.2, 3.6);
    const ev = ['THE PLAGUE CYCLE','SCF-404: THE SLEEPING PLAGUE KING','"GIVE ME A SACRIFICE!"',
                'ONE TOUCH: 404D · ZOMBIE · DEAD','HE THINKS THE DEAD ARE LIVING','PLAGUE LOOKS LIKE CURE',
                'PLAGUE-KING PROTOCOL — NO DIRECT CONTACT','NO MASK-REMOVAL EVENTS','HE IS A WHOLE BROKEN GAME',
                'ANTI-VIRUS THE BODIES SO THEY DO NOT STINK','A CONVERSION ENTITY, NOT A BREACH',
                'NO ANTI-VIRUS LEFT WITHIN HIS REACH','HE THINKS HE IS HELPING','RAGE · RITUAL · CORRECTION · CALM'];
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(ev), col:'#9affc8' });
  }
  if(plagueM >= 1 && !plague.held){
    plague.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('You kept the Plague-King Protocol. No direct contact, no mask removed, no cure forced.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ PROTOCOL HELD — NO DIRECT CONTACT ★', col:'#bfffd8' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#9affc8','#7bdc6a','#bfffd8'])));
    AUDIO.zap();
  }
}

function drawPlague(){
  const g = plague.glow||0, top = cameraY, an = plague.anim||0;
  ctx.save();
  // a sick plague haze — green miasma bleeding to black, darker when the storm is up
  const st = plague.storm||0;
  const bg = ctx.createLinearGradient(0, top, 0, top+H);
  bg.addColorStop(0, `rgba(10,${18-Math.round(8*st)},14,${(0.34+0.20*st)*g})`);
  bg.addColorStop(1, `rgba(6,10,8,${(0.32+0.18*st)*g})`);
  ctx.fillStyle = bg; ctx.fillRect(0, top, W, H);
  ctx.globalAlpha = g;

  // the storm — slanting rain + lightning while Simon rages, then it bleeds away as he calms
  if(st > 0.02){
    ctx.strokeStyle = `rgba(150,200,180,${0.30*st*g})`; ctx.lineWidth=1;
    for(let i=0;i<40;i++){
      const rx = (i*53 + (an*220)%W) % W, ry = top + ((i*97 + an*420) % H);
      ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx-6, ry+16); ctx.stroke();
    }
    if(st > 0.45 && Math.sin(an*9)>0.6){
      ctx.strokeStyle = `rgba(180,255,210,${0.8*st})`; ctx.lineWidth=2;
      let lx = W*0.5 + Math.sin(an*3)*60, ly = top;
      ctx.beginPath(); ctx.moveTo(lx, ly);
      for(let s=0;s<7;s++){ lx += Math.sin(s*2.1 + an*30)*26; ly += H/7; ctx.lineTo(lx, ly); }
      ctx.stroke();
    }
  }

  // drifting VICTIMS — to Simon the living look dead, so they trudge in slowly
  for(const v of plague.victims){
    const fade = Math.min(1, v.t/0.4) * Math.min(1, (v.life-v.t)/0.6);
    ctx.globalAlpha = g*0.8*fade;
    ctx.fillStyle = v.sel ? '#cfe0d0' : '#8b9a8e';
    ctx.beginPath(); ctx.ellipse(v.x, v.y, 7, 14, 0, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(v.x, v.y-16, 6, 0, 6.28); ctx.fill();
  }
  ctx.globalAlpha = g;

  // CONVERTED things rising with their fate stamped on — 404D yellow, ZOMBIE green, DEAD gray
  for(const c of plague.converts){
    const p = Math.min(1, c.t/1.8); const cy = c.y - p*34;
    ctx.globalAlpha = g*(1-p)*0.95; ctx.textAlign='center';
    const col = c.fate==='404D' ? '#ffe24a' : (c.fate==='ZOMBIE' ? '#9fd06a' : '#b9b9c4');
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(c.x, cy, 6, 12, 0, 0, 6.28); ctx.fill();
    ctx.font='800 9px ui-monospace,monospace'; ctx.fillText(c.fate, c.x, cy-18);
  }
  ctx.globalAlpha = g;

  // the anti-virus TABLE off to the side — the body laid the other way up, sprayed so it "does not stink"
  const tx = W*0.84, tFloor = top + H - 92;
  ctx.strokeStyle = `rgba(150,160,170,${0.5*g})`; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(tx-26, tFloor); ctx.lineTo(tx+26, tFloor); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx-20, tFloor); ctx.lineTo(tx-22, tFloor+22);
  ctx.moveTo(tx+20, tFloor); ctx.lineTo(tx+22, tFloor+22); ctx.stroke();
  if((plague.table.t||0) > 0.02){
    // a body lying on the table (upside-down), fading as it is sprayed away
    const tt = plague.table.t;
    ctx.fillStyle = `rgba(150,150,160,${0.55*tt*g})`;
    ctx.beginPath(); ctx.ellipse(tx, tFloor-8, 18, 6, 0, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(tx-14, tFloor-8, 5, 0, 6.28); ctx.fill();   // head, the other way up
  }
  if((plague.table.spray||0) > 0.02){
    const sp = plague.table.spray;
    ctx.fillStyle = `rgba(120,230,170,${0.5*sp*g})`;
    for(let i=0;i<10;i++){ const a2=i*0.7+an*2, rr=6+12*sp;
      ctx.beginPath(); ctx.arc(tx + Math.cos(a2)*rr, tFloor-10 + Math.sin(a2)*rr*0.6, 1.6, 0, 6.28); ctx.fill(); }
  }
  ctx.textAlign='center'; ctx.fillStyle = `rgba(120,200,160,${0.6*g})`; ctx.font='700 7px ui-monospace,monospace';
  ctx.fillText('ANTI-VIRUS TABLE', tx, tFloor+34);

  // ---- SIMON, the masked Plague King — larger now (he is a whole game inside) ----
  const scx = W*0.40, sFloor = top + H - 96, bob = Math.sin(an*0.7)*1.6, sy0 = sFloor - 64 + bob;
  ctx.save();
  ctx.shadowBlur = 12 + 10*st; ctx.shadowColor = st>0.3 ? '#7bdc6a' : '#ffe24a';
  // a taller, broken body — robe of a ritual king
  ctx.fillStyle = '#2a3328';
  ctx.beginPath(); ctx.moveTo(scx-22, sy0+58); ctx.lineTo(scx-15, sy0+8); ctx.lineTo(scx+15, sy0+8);
  ctx.lineTo(scx+22, sy0+58); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#cfc6b0';                                   // the dim, damaged head
  ctx.beginPath(); ctx.ellipse(scx, sy0, 16, 15, 0, 0, 6.28); ctx.fill();
  // a thin crown of broken code over the king
  ctx.strokeStyle = `rgba(255,226,74,${0.85*g})`; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(scx-14, sy0-13); ctx.lineTo(scx-14, sy0-22); ctx.lineTo(scx-7, sy0-15);
  ctx.lineTo(scx, sy0-24); ctx.lineTo(scx+7, sy0-15); ctx.lineTo(scx+14, sy0-22); ctx.lineTo(scx+14, sy0-13);
  ctx.stroke();
  // the cold yellow eyes (always glowing, even behind the mask)
  const ey = plague.eye||0;
  ctx.shadowBlur = 8 + 14*ey;
  ctx.fillStyle = '#ffe24a';
  ctx.beginPath(); ctx.arc(scx-5, sy0-1, 2.0+1.2*ey, 0, 6.28); ctx.arc(scx+5, sy0-1, 2.0+1.2*ey, 0, 6.28); ctx.fill();
  ctx.restore();

  // the BEAK MASK — on by default; it lifts (slides up) only in the one cold-touch instant
  const mk = plague.mask||0;
  if(mk > 0.04){
    const lift = (1-mk)*16;                                    // how far the mask has risen off the face
    ctx.save();
    ctx.fillStyle = `rgba(40,46,38,${0.95*g})`;
    ctx.strokeStyle = `rgba(150,160,140,${0.6*g})`; ctx.lineWidth=1;
    // the long plague-doctor beak
    ctx.beginPath();
    ctx.moveTo(scx-9, sy0-3-lift); ctx.lineTo(scx-22, sy0+6-lift);
    ctx.lineTo(scx-7, sy0+9-lift); ctx.lineTo(scx+8, sy0+4-lift);
    ctx.lineTo(scx+9, sy0-3-lift); ctx.closePath(); ctx.fill(); ctx.stroke();
    // the two round mask eye-lenses
    ctx.fillStyle = `rgba(20,24,18,${0.9*g})`;
    ctx.beginPath(); ctx.arc(scx-5, sy0-2-lift, 3, 0, 6.28); ctx.arc(scx+5, sy0-2-lift, 3, 0, 6.28); ctx.fill();
    ctx.restore();
  } else {
    // mask is OFF — the cold touch: a hand reaching toward the nearest victim, chills in the air
    let tgt = plague.converts.length ? plague.converts[plague.converts.length-1] : null;
    const hx = tgt ? tgt.x : scx+40, hy = tgt ? tgt.y : sy0+10;
    ctx.strokeStyle = `rgba(200,220,255,${0.8*g})`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(scx+12, sy0+14); ctx.lineTo(hx, hy); ctx.stroke();
    ctx.fillStyle = `rgba(220,235,255,${0.9*g})`;
    ctx.beginPath(); ctx.arc(hx, hy, 4, 0, 6.28); ctx.fill();
    // chill rings off the cold touch
    ctx.strokeStyle = `rgba(180,220,255,${0.5*g})`; ctx.lineWidth=1;
    for(let r=0;r<3;r++){ ctx.beginPath(); ctx.arc(hx, hy, 5+r*6+(an*20%6), 0, 6.28); ctx.stroke(); }
  }

  // the call — GIVE ME A SACRIFICE!!! flashes when he calls
  ctx.textAlign='center';
  if((plague.callFlash||0) > 0.02 || plague.phase==='call'){
    const cf = Math.max(plague.callFlash||0, 0.5);
    ctx.fillStyle = `rgba(154,255,200,${cf*g})`; ctx.font='800 13px ui-monospace,monospace';
    ctx.fillText('GIVE ME A SACRIFICE!!!', scx, sy0-34);
  }
  // the cycle indicator — RAGE · RITUAL · CORRECTION · CALM, lit on the current beat
  const beats = [['RAGE','wrong'],['RITUAL','touch'],['CALL','call'],['CALM','calm']];
  ctx.font='700 8px ui-monospace,monospace';
  let bxs = scx - 78;
  for(const [lbl,ph] of beats){
    ctx.fillStyle = (plague.phase===ph) ? `rgba(255,242,176,${g})` : `rgba(140,160,150,${0.5*g})`;
    ctx.fillText(lbl, bxs, sFloor+18); bxs += 52;
  }
  // title line
  ctx.font='800 9px ui-monospace,monospace';
  ctx.fillStyle = `rgba(154,255,200,${(0.7+0.3*Math.abs(Math.sin(an*4)))*g})`;
  ctx.fillText('SCF-404: THE SLEEPING PLAGUE KING', scx, sy0-48);

  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

   beings can hold a danger level. Toby's exact final order is kept even where a number sits a touch

];
function updateDanger(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  danger.anim = (danger.anim||0) + dt;
  danger.logged = Math.min(DANGER_ROSTER.length, (danger.logged||0) + dt*1.4);   // the index scans in row by row
  danger.scan = (danger.scan||0) + dt;
  if(danger.phase!=='lift') danger.mask = Math.min(1, (danger.mask||0) + dt*2.0);  // mask grows back between encounters
  danger.burn = Math.max(0, (danger.burn||0) - dt*0.7);
  if(danger.phase==='approach') danger.imApproach = Math.min(1, (danger.imApproach||0) + dt*0.6);
  for(const f of danger.flames){ f.t += dt; f.y -= (f.vy||20)*dt; f.x += (f.vx||0)*dt; }
  danger.flames = danger.flames.filter(f => f.t < f.life);

  // ---- the cycle: LIST → INVISIBLE MAN APPROACHES → MASK LIFTS (he BURNS) → back to LIST ----
  danger.phaseT -= dt;
  if(danger.phaseT <= 0){
    if(danger.phase==='list'){
      danger.phase='approach'; danger.phaseT=2.0; danger.imApproach=0;
      showTaunt('THE INVISIBLE MAN — a floating shirt, pants, and hat — walks up: "It\'s ok."');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'THE INVISIBLE MAN: "IT\'S OK."', col:'#dfe7ff' });
    } else if(danger.phase==='approach'){
      // he reaches Simon; the mask lifts for one instant and he BURNS
      danger.phase='lift'; danger.phaseT=0.6; danger.mask=0; danger.burn=1; danger.imApproach=1;
      shake=Math.max(shake,9); glitch=Math.max(glitch,0.35); AUDIO.zap();
      for(let i=0;i<22;i++) danger.flames.push({ x: W*0.80 + rnd(-12,12), y: cameraY+H*0.52 + rnd(-10,10),
        t:0, life: rnd(0.5,1.1), vy: rnd(16,38), vx: rnd(-10,10) });
      showTaunt('Simon takes the mask off for one second. The Invisible Man is burned.');
    } else { // 'lift' → back to the list
      danger.phase='list'; danger.phaseT=rnd(2.4,3.4); danger.imApproach=0;
    }
  }

  // ---- BORT's lure cycle: DANCE ("Borty Borty Bort Bort") → LUNGE (chases, eats the soul, body rots) →
  //      SIMON SPRAYS the body → back to the harmless dance. The dance is the bait; the lunge is the danger. ----
  const b = danger.bort;
  b.t += dt; b.bounce = (b.bounce||0) + dt*8; b.song = (b.song||0) + dt;
  if(b.phase==='dance'){
    b.lunge = Math.max(0, (b.lunge||0) - dt*2);
    // close enough? the player walking past the index is the "victim getting too close" — also a steady cadence
    const near = Math.abs(player.x - W*0.50) < 120;
    if(b.t > (near ? 2.2 : 3.6)){
      b.phase='lunge'; b.t=0; AUDIO.zap(); shake=Math.max(shake,4);
      showTaunt('Bort stands up dramatically and chases the victim like crazy.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'BORT: "BORTY BORTY BORT BORT" — THEN HE LUNGES', col:'#cdd6df' });
    }
  } else if(b.phase==='lunge'){
    b.lunge = Math.min(1, (b.lunge||0) + dt*2.4);
    if(b.t > 1.3){ b.phase='soul'; b.t=0; b.soul=1; glitch=Math.max(glitch,0.25);
      floaters.push({ x:player.x, y:player.y-40, t:0, txt:'BORT EATS THE SOUL · THE BODY ROTS', col:'#7fae6e' }); }
  } else if(b.phase==='soul'){
    b.soul = Math.max(0, (b.soul||0) - dt*0.9);
    if(b.t > 1.0){ b.phase='spray'; b.t=0; b.spray=1;
      showTaunt('Simon is way higher than Bort. He finds the body and sprays it.');
      for(let i=0;i<10;i++) particles.push(spark(W*0.50, cameraY+H*0.62, '#7be0ff')); }
  } else { // 'spray' → body restored, Bort drops back to the harmless dance
    b.spray = Math.max(0, (b.spray||0) - dt*1.2);
    if(b.t > 0.9){ b.phase='dance'; b.t=0; b.lunge=0; }
  }

  // THE DANGER INDEX meter — climb with purpose to log the whole ranking before the Invisible Man closes in
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  dangerM = Math.max(0, Math.min(1, dangerM + (moving ? dt*0.05 : -dt*0.03)));
  danger.eventT -= dt;
  if(danger.eventT <= 0){ danger.eventT = rnd(2.2,3.6);
    const ev = ['THE DANGER INDEX','SIMON 1004.04 — THE .04 HIDES 404','SIMON & SUMONA: CRAZY STATUS',
      'OREN 1004 — SOUND BENDS REALITY','BLACK 1000 · PINKI 997 — DEMONIZED','JEVIN 990.5 — STILL ALIVE',
      'SUMONA 950 — DAUGHTER OF OREN & PINKI','SUMONA HUNTS EVERYONE','WHATEVER SIMON SEES MELTS',
      'BORT 996 — 5TH, JUST UNDER PINKI','"BORTY BORTY BORT BORT" — THEN HE LUNGES','BORT EATS THE SOUL · THE BODY ROTS',
      'WENDA 949.2 · CLUNKR 949 — .EXE','GRAY 940 · LUIGI GREEN 940 — .EXE','PUPAHYA 930 — .EXE',
      'RADDY 910 · GEWLIS 850 — INFECTED','MR. FUN COMPUTER 900 — .EXE','ENDLESS STAIRCASE 800 — .EXE',
      '67 KID 790 — LAST OF THE .EXE','ONLY .EXE · CRAZY · INFECTED RANK','ALL SEVENTEEN FILED',
      'THE INVISIBLE MAN: FIVE SLAPS','"IT\'S OK." — THEN THE MASK LIFTS','LOG THE WHOLE RANKING'];
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(ev), col:'#ffe24a' });
  }
  if(dangerM >= 1 && !danger.held){
    danger.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('You logged the whole Danger Index. Every danger level catalogued, the Invisible Man kept off.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ INDEX LOGGED — RANKING CATALOGUED ★', col:'#fff2b0' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ffe24a','#ff5c8a','#b98cff'])));
    AUDIO.zap();
  }
}

  bg.addColorStop(1, `rgba(8,6,10,${0.40*g})`);

  const px = W*0.04, pw = W*0.62, py = top + H*0.15, rowH = 25;

    : s==='.EXE' ? '#5cff9a' : s==='INFECTED' ? '#b6e35a' : '#b98cff';

  for(let i=0;i<DANGER_ROSTER.length;i++){

    if(appear <= 0) break;

    ctx.fillText((i+1)+'. '+r.n, px+10, ry);

    const bx = px+162, bw = pw-242;
    ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fillRect(bx, ry-8, bw, 8);
    ctx.fillStyle = r.col; ctx.fillRect(bx, ry-8, bw*r.mx*appear, 8);
    // the danger number
    ctx.fillStyle = `rgba(240,235,255,${g})`; ctx.font='700 10px ui-monospace,monospace'; ctx.textAlign='right';
    ctx.fillText(r.d, px+pw-8, ry);
    // status tag, under the name
    ctx.textAlign='left';
    ctx.fillStyle = statCol(r.s);
    ctx.font='700 7px ui-monospace,monospace';
    ctx.fillText(r.s, px+10, ry+8);
  }
  ctx.globalAlpha = g;
  // footer: the .04 = 404 note + the rule that closes the list

  ctx.fillStyle = `rgba(255,226,74,${0.88*g})`; ctx.font='700 8px ui-monospace,monospace';
  ctx.fillText('SIMON 1004.04 → the .04 hides 404 · only SIMON & SUMONA are CRAZY', px+10, py + DANGER_ROSTER.length*rowH + 6);
  ctx.fillStyle = `rgba(160,200,150,${0.84*g})`;
  ctx.fillText('only .EXE · CRAZY · INFECTED can hold a danger level · GEWLIS = 67 DOG', px+10, py + DANGER_ROSTER.length*rowH + 17);

  // ---- SIMON + THE INVISIBLE MAN, on the right ----
  const scx = W*0.80, sFloor = top + H - 120, sy0 = sFloor - 60 + Math.sin(an*0.7)*1.5;
  const burn = danger.burn||0;
  // the Invisible Man: a floating shirt + pants + hat, no body — drifts toward Simon during 'approach'
  const imBase = W*0.95, imX = imBase - (imBase - (scx+34))*(danger.imApproach||0);
  if(burn < 0.85){
    ctx.save();
    ctx.globalAlpha = g*(1 - burn);
    ctx.fillStyle = '#2a2630';                                  // hat
    ctx.fillRect(imX-12, sy0-30, 24, 5); ctx.fillRect(imX-7, sy0-42, 14, 12);
    ctx.fillStyle = '#cfd6e6';                                  // floating shirt
    ctx.beginPath(); ctx.moveTo(imX-14, sy0-20); ctx.lineTo(imX+14, sy0-20);
    ctx.lineTo(imX+11, sy0+6); ctx.lineTo(imX-11, sy0+6); ctx.closePath(); ctx.fill();
    ctx.fillStyle = `rgba(8,6,10,${g})`; ctx.fillRect(imX-5, sy0-22, 10, 5);   // the no-head collar gap
    ctx.fillStyle = '#3a4256';                                  // pants
    ctx.fillRect(imX-10, sy0+6, 8, 22); ctx.fillRect(imX+2, sy0+6, 8, 22);
    ctx.restore();
    if(danger.phase==='approach'){
      ctx.textAlign='center'; ctx.fillStyle = `rgba(223,231,255,${g})`; ctx.font='700 10px ui-monospace,monospace';
      ctx.fillText('"It\'s ok."', imX, sy0-50);
    }
  }
  // the burn — flames where the Invisible Man was
  for(const f of danger.flames){
    const fa = Math.min(1,(f.life-f.t)/f.life);
    ctx.globalAlpha = g*fa;
    ctx.fillStyle = (f.t<f.life*0.5)?'#ffd84f':'#ff5a2b';
    ctx.beginPath(); ctx.arc(f.x, f.y, 2.5+3*fa, 0, 6.28); ctx.fill();
  }
  ctx.globalAlpha = g;

  // ---- SIMON, the top of the index ----
  ctx.save();
  ctx.shadowBlur = 12; ctx.shadowColor = '#ffe24a';
  ctx.fillStyle = '#1a1410';
  ctx.beginPath(); ctx.moveTo(scx-20, sy0+54); ctx.lineTo(scx-13, sy0+6); ctx.lineTo(scx+13, sy0+6);
  ctx.lineTo(scx+20, sy0+54); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#cfc6b0';
  ctx.beginPath(); ctx.ellipse(scx, sy0, 15, 14, 0, 0, 6.28); ctx.fill();
  ctx.shadowBlur = 10; ctx.fillStyle = '#ffe24a';               // the cold yellow eyes
  ctx.beginPath(); ctx.arc(scx-5, sy0-1, 2.4, 0, 6.28); ctx.arc(scx+5, sy0-1, 2.4, 0, 6.28); ctx.fill();
  const mk = danger.mask||0;                                    // the mask (lifts in the burn beat)
  if(mk>0.04){

    ctx.beginPath();
    ctx.moveTo(scx-8, sy0-3-lift); ctx.lineTo(scx-20, sy0+6-lift);
    ctx.lineTo(scx-6, sy0+9-lift); ctx.lineTo(scx+8, sy0+4-lift);
    ctx.lineTo(scx+8, sy0-3-lift); ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  ctx.restore();
  ctx.textAlign='center';
  ctx.fillStyle = `rgba(255,226,74,${(0.7+0.3*Math.abs(Math.sin(an*4)))*g})`; ctx.font='800 11px ui-monospace,monospace';
  ctx.fillText('SIMON — 1004.04 — CRAZY', scx, sy0-30);
  ctx.fillStyle=`rgba(240,235,255,${0.7*g})`; ctx.font='700 8px ui-monospace,monospace';
  ctx.fillText('most dangerous · whatever he sees melts', scx, sy0-18);

  // ---- BORT — a smooth rubbery bouncy gray horror bear, danger 996, on the index floor between Simon and the list ----
  drawBort(top, g, an);

  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

function drawBort(top, g, an){
  const b = danger.bort; if(!b) return;
  const bx = W*0.50, floor = top + H - 64;
  const lunge = b.lunge||0, soul = b.soul||0, spray = b.spray||0;
  const dancing = b.phase==='dance';
  // in the dance he is a squat bouncing rubber blob; in the lunge he rears up tall and leans at the player
  const bounce = dancing ? Math.abs(Math.sin(b.bounce))*7 : 0;
  const rear = lunge;                                   // 0 = squat & playful, 1 = stood up & attacking
  const by = floor - bounce - rear*18;
  const bw = 26 - rear*6, bh = 22 + rear*26;            // stretches tall when he stands
  const lean = Math.sign((player.x||W*0.5) - bx) * rear * 10;
  ctx.save();
  ctx.globalAlpha = g;
  // rubbery gray body — flushes an angry red as he lunges
  const bodyCol = `rgb(${Math.round(154+70*rear)},${Math.round(166-60*rear)},${Math.round(176-90*rear)})`;
  ctx.fillStyle = bodyCol;
  ctx.strokeStyle = `rgba(40,46,54,${0.6*g})`; ctx.lineWidth = 1.5;
  // body (rounded rubber lump)
  ctx.beginPath(); ctx.ellipse(bx+lean, by, bw, bh, 0, 0, 6.28); ctx.fill(); ctx.stroke();
  // two round ears
  ctx.beginPath(); ctx.arc(bx+lean-bw*0.7, by-bh*0.85, 6, 0, 6.28);
  ctx.arc(bx+lean+bw*0.7, by-bh*0.85, 6, 0, 6.28); ctx.fill(); ctx.stroke();
  // belly sheen (the smooth rubber highlight)
  ctx.fillStyle = `rgba(255,255,255,${0.10*g})`;
  ctx.beginPath(); ctx.ellipse(bx+lean-bw*0.3, by-bh*0.2, bw*0.35, bh*0.4, 0, 0, 6.28); ctx.fill();
  // eyes — friendly dots when dancing, wide hungry rings when lunging
  ctx.fillStyle = lunge>0.4 ? '#ff3b3b' : '#1a1f26';
  const er = 2.4 + rear*1.6;
  ctx.beginPath(); ctx.arc(bx+lean-7, by-bh*0.45, er, 0, 6.28); ctx.arc(bx+lean+7, by-bh*0.45, er, 0, 6.28); ctx.fill();
  // mouth — little smile when playful, gaping maw when he eats the soul
  ctx.strokeStyle = '#1a1f26'; ctx.lineWidth = 2;
  if(lunge>0.4 || soul>0.05){
    ctx.fillStyle = `rgba(20,8,12,${g})`;
    ctx.beginPath(); ctx.ellipse(bx+lean, by-bh*0.05, 6, 7+soul*4, 0, 0, 6.28); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(bx+lean, by-bh*0.18, 5, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  }
  ctx.restore();

  // the soul being pulled in — a pale wisp drawn up into Bort's maw
  if(soul>0.05){
    ctx.save(); ctx.globalAlpha = g*soul;
    ctx.fillStyle = '#bfe9ff';
    for(let i=0;i<5;i++){ const t=(b.song*2+i*0.5)%1; const sy=by+18-t*22;
      ctx.beginPath(); ctx.arc(bx+lean+Math.sin(t*6+i)*5, sy, 2.2*(1-t)+0.6, 0, 6.28); ctx.fill(); }
    ctx.restore();
  }
  // Simon's spray — a blue mist that restores the rotting body
  if(spray>0.05){
    ctx.save(); ctx.globalAlpha = g*spray;
    ctx.fillStyle = '#7be0ff';
    for(let i=0;i<8;i++){ ctx.beginPath();
      ctx.arc(bx+lean + Math.cos(an*3+i)*14, by + Math.sin(an*3+i)*12, 2+1.5*spray, 0, 6.28); ctx.fill(); }
    ctx.restore();
  }

  // the song — "Borty Borty Bort Bort" bobs above him while he dances; the tag flips to a warning on the lunge
  ctx.textAlign='center';
  if(dancing){
    const wob = Math.sin(b.song*5)*3;
    ctx.fillStyle = `rgba(205,214,223,${(0.7+0.3*Math.abs(Math.sin(b.song*4)))*g})`;
    ctx.font='800 9px ui-monospace,monospace';
    ctx.fillText('♪ Borty Borty Bort Bort ♪', bx, by-bh-16+wob);
    // little bouncing music notes
    ctx.fillStyle = `rgba(180,200,160,${0.7*g})`; ctx.font='10px ui-monospace,monospace';
    ctx.fillText('♫', bx-26+Math.sin(b.song*6)*4, by-bh-6);
    ctx.fillText('♪', bx+26+Math.cos(b.song*6)*4, by-bh-10);
  } else {
    ctx.fillStyle = `rgba(255,90,90,${g})`; ctx.font='800 9px ui-monospace,monospace';
    ctx.fillText(soul>0.05 ? 'SOUL EATEN — THE BODY ROTS' : 'BORT LUNGES — CHASES LIKE CRAZY', bx, by-bh-14);
  }
  ctx.fillStyle = `rgba(154,166,176,${0.92*g})`; ctx.font='800 10px ui-monospace,monospace';

function drawCodex(){

  ctx.fillStyle = `rgba(143,179,255,${0.88*g})`; ctx.font='700 9px ui-monospace,monospace';
