    const k = weakness.ground||0;
    innerBolts(Math.round(5*(1-k)), 40);
    simonElec(1.4, 1-k, 0);
    // the grounding plate beneath him
    ctx.save(); ctx.globalAlpha=g;
    ctx.fillStyle='rgba(120,150,170,0.5)'; ctx.fillRect(cx-70, sy+40, 140, 8);
    // charge draining down into the plate
    ctx.strokeStyle='#8fe3ff'; ctx.lineWidth=2; ctx.shadowColor='#8fe3ff'; ctx.shadowBlur=10*k;
    for(let i=-2;i<=2;i++){ ctx.globalAlpha=g*k;
      ctx.beginPath(); ctx.moveTo(cx+i*16, sy+34); ctx.lineTo(cx+i*16, sy+40); ctx.stroke(); }
    ctx.restore();
  } else if(ph===1){
    // ----- FORCE: a treadmill controls his movement; he is dragged sideways -----
    const k = weakness.force||0;
    simonElec(1.4, 0.5, k*0.6);
    ctx.save(); ctx.globalAlpha=g;
    // treadmill belt with moving arrows
    ctx.fillStyle='rgba(40,46,56,0.8)'; ctx.fillRect(cx-90, sy+40, 180, 14);
    ctx.fillStyle='#ff9b3b'; ctx.font='800 12px ui-monospace,monospace';
    const off = (weakness.t*60)%30;
    for(let x=cx-84+off; x<cx+84; x+=30){ ctx.fillText('»', x, sy+51); }
    // drag indicator on Simon
    ctx.fillStyle=`rgba(255,155,59,${k})`; ctx.font='800 11px ui-monospace,monospace';
    ctx.fillText('SPEED CONTROLLED →', cx, sy-46);
    ctx.restore();
  } else if(ph===2){
    // ----- JAM: scramble the psychic pulse riding in his power -----
    const k = weakness.jam||0;
    innerBolts(4, 36);
    simonElec(1.4, 0.7, k*1.4);
    ctx.save();
    // clean pulse rings turning to broken static as the jam ramps
    for(let i=0;i<4;i++){ const rr = 26 + i*22 + (weakness.t*30)%22;
      ctx.globalAlpha = g*(1-i/4)*(1-k*0.7);
      ctx.strokeStyle='#b98cff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx, sy-6, rr, 0, Math.PI*2); ctx.stroke(); }
    // jam static
    ctx.globalAlpha=g*k; ctx.fillStyle='#b98cff';
    for(let i=0;i<Math.round(40*k);i++){ ctx.fillRect(cx-90+Math.random()*180, sy-60+Math.random()*120, 2, 2); }
    ctx.restore();
    ctx.globalAlpha=g; ctx.fillStyle=`rgba(185,140,255,${k*g})`; ctx.font='800 11px ui-monospace,monospace';
    ctx.fillText('SIGNAL SCRAMBLED', cx, sy-50);
  } else if(ph===3){
    // ----- OVER-DRAIN: force constant discharge until he outputs too much at once -----
    const k = weakness.drain||0;

    ctx.save(); ctx.globalAlpha=g;
    // arcs blasting outward
    ctx.strokeStyle='#ffd84f'; ctx.lineWidth=2; ctx.shadowColor='#ffd84f'; ctx.shadowBlur=10;
    for(const a of weakness.arcs){ ctx.globalAlpha=g*Math.max(0,a.life);
      let x=cx, y=sy-6; ctx.beginPath(); ctx.moveTo(x,y);
      for(let s=0;s<3;s++){ x+=Math.cos(a.a)*a.r/3 + (Math.random()-0.5)*8; y+=Math.sin(a.a)*a.r/3 + (Math.random()-0.5)*8;
        ctx.lineTo(x,y); }

    ctx.restore();

    ctx.globalAlpha=g; ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(cx-70, sy+44, 140, 8);
    ctx.fillStyle='#ffd84f'; ctx.fillRect(cx-70, sy+44, 140*k, 8);
    ctx.fillStyle=`rgba(255,216,79,${g})`; ctx.font='800 11px ui-monospace,monospace';
    ctx.fillText('OUTPUT OVERLOAD', cx, sy-50);
  } else if(ph===4){
    // ----- BLIND: cover the Yellow Eye, hit perception -----
    const k = weakness.blind||0;
    simonElec(1.4, 0.6, k*0.5);
    ctx.save(); ctx.globalAlpha=g*k;
    // a dark band sliding across the eyes
    ctx.fillStyle='rgba(8,14,12,0.92)';
    ctx.fillRect(cx-30*1.4, sy-6*1.4-7, 60*1.4, 14);
    ctx.strokeStyle='#39e08a'; ctx.lineWidth=2; ctx.shadowColor='#39e08a'; ctx.shadowBlur=10;
    ctx.strokeRect(cx-30*1.4, sy-6*1.4-7, 60*1.4, 14);
    ctx.restore();
    ctx.globalAlpha=g; ctx.fillStyle=`rgba(57,224,138,${k*g})`; ctx.font='800 11px ui-monospace,monospace';
    ctx.fillText('YELLOW EYE COVERED · MIND HIT', cx, sy-50);
  }

  // ----- per-beat caption -----
  const capY = top + H*0.78;
  ctx.textAlign='center'; ctx.globalAlpha=1;
  ctx.shadowColor=beat.col; ctx.shadowBlur=14*g;
  ctx.fillStyle=`rgba(255,255,255,${g})`; ctx.font='900 22px ui-monospace,monospace';
  ctx.fillText(beat.key, cx, capY); ctx.shadowBlur=0;
  ctx.fillStyle=`rgba(220,228,232,${g})`; ctx.font='800 12px ui-monospace,monospace';
  ctx.fillText(beat.sub, cx, capY+22);

  // weakness checklist down the left — each lights up as its beat passes
  const items = WK_BEATS;
  ctx.textAlign='left'; ctx.font='700 10px ui-monospace,monospace';
  for(let i=0;i<items.length;i++){
    const lit = i<=ph ? 1 : 0.3, y = top + H*0.30 + i*18;
    ctx.globalAlpha=g; ctx.fillStyle = i<=ph ? items[i].col : 'rgba(150,160,170,0.5)';
    ctx.fillText((i<=ph?'◆ ':'◇ ')+items[i].key, 18, y);
  }
  ctx.globalAlpha=1;

  // ----- title band + canon note -----
  ctx.textAlign='center';
  ctx.fillStyle=`rgba(143,227,255,${0.9*g})`; ctx.font='800 13px ui-monospace,monospace';
  ctx.fillText('THE WEAKNESS — ELECTRIC PSYCHIC: GROUND · FORCE · JAM · OVER-DRAIN · BLIND', cx, top+30);
  ctx.fillStyle=`rgba(190,210,220,${0.8*g})`; ctx.font='700 9px ui-monospace,monospace';
  ctx.fillText('GROUND THE LIGHTNING · FORCE THE MOVEMENT · DISRUPT THE PSYCHIC SIGNAL', cx, top+44);

  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;

/* ======================= THE FINAL PURSUIT (Lore 30 cont., June 23 2026) =======================
   Toby's endgame, five beats: SIX SEVEN (67 Pirate king of 6-7), HIGHEST FORMS (the whole cast at
   its final form), THE X TEAM (Oren/Gray/Simon merge), THE CULLING (everyone slain but Paul and
   Simon), THE HUNT (Simon.EXE -> Oren.EXE -> Paul). Same beat-cycle structure as THE WEAKNESS. */
const PUR_CYC = 16.0;
const PUR_BEATS = [
  { key:'SIX SEVEN',     col:'#ffd84f', sub:'67 PIRATE — KING OF 6-7' },
  { key:'HIGHEST FORMS', col:'#8fe3ff', sub:'THE WHOLE CAST, FINAL FORM' },
  { key:'THE X TEAM',    col:'#b98cff', sub:'OREN · GRAY · SIMON — ONE' },
  { key:'THE CULLING',   col:'#ff3b5c', sub:'ALL SLAIN BUT PAUL AND SIMON' },
  { key:'THE HUNT',      col:'#ffffff', sub:'SIMON → OREN → PAUL' },
];
function purSeg(c){
  if(c < 3.2)  return [0, c];        // SIX SEVEN
  if(c < 6.4)  return [1, c-3.2];    // HIGHEST FORMS
  if(c < 9.6)  return [2, c-6.4];    // THE X TEAM
  if(c < 12.8) return [3, c-9.6];    // THE CULLING
  return [4, c-12.8];                // THE HUNT
}
// the cast at their highest forms, for the HIGHEST FORMS roll-call
const PUR_FORMS = [
  'Eraser of the Universe Gray', 'Errorshifted Clara', '404 God Simon',
  'God Charged Pupahya.EXE', 'Infected Alex.EXE', 'Super 67 Pirate', 'base Oren.EXE',
];
// who falls in THE CULLING — everyone but Paul and Simon
const PUR_SLAIN = ['Sumona','Gray','Pinki','Wenda','King Jet','Greg','Clara','Black','Luigi Green'];
function updatePursuit(dt){
  pursuit.t = (pursuit.t||0) + dt;
  pursuit.cyc = ((pursuit.cyc||0) + dt) % PUR_CYC;
  const seg = purSeg(pursuit.cyc), ph = seg[0], lt = seg[1];
  if(ph !== pursuit.phase){
    pursuit.phase = ph;
    if(ph===0){ pursuit.pirate=0; pursuit.forms=0; pursuit.team=0; pursuit.cull=0; pursuit.hunt=0;
      pursuit.embers.length=0; pursuit.slain.length=0; AUDIO.shock(); shake=Math.max(shake,7);
      showTaunt('67 Pirate grows stronger than Pupahya. Super Pirate shouts "Six Seven!!!"');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'SIX SEVEN!!! — KING OF 6-7', col:'#ffd84f' }); }
    if(ph===1){ AUDIO.zap();
      showTaunt('Everyone reaches their highest form for the giant battle.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'HIGHEST FORMS', col:'#8fe3ff' }); }
    if(ph===2){ AUDIO.corrupt(); shake=Math.max(shake,6);
      showTaunt('Oren, Gray and Simon leave, and merge into one X team. Gray can erase the whole game.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'THE X TEAM — OREN · GRAY · SIMON', col:'#b98cff' }); }
    if(ph===3){ AUDIO.shock(); shake=Math.max(shake,8); glitch=Math.max(glitch,0.4);
      showTaunt('Oren.EXE now spares no one. Everyone is slain except Paul and Simon.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'ALL SLAIN BUT PAUL & SIMON', col:'#ff3b5c' }); }
    if(ph===4){ AUDIO.glitch();
      showTaunt('The story narrows to one chain: Simon.EXE hunts Oren.EXE, Oren.EXE hunts Paul.');
      floaters.push({ x:player.x, y:player.y-36, t:0, txt:'SIMON → OREN → PAUL', col:'#ffffff' }); }
  }
  // per-beat ramps
  if(ph===0) pursuit.pirate = Math.min(1, lt/2.2); else pursuit.pirate = 1;
  if(ph===1) pursuit.forms  = Math.min(1, lt/2.2); else if(ph>1) pursuit.forms = 1;
  if(ph===2) pursuit.team   = Math.min(1, lt/2.2); else if(ph>2) pursuit.team = 1;
  if(ph===3){
    pursuit.cull = Math.min(1, lt/2.2);
    // names of the slain wink out one by one as the culling ramps
    const want = Math.floor(pursuit.cull * PUR_SLAIN.length);
    while(pursuit.slain.length < want && pursuit.slain.length < PUR_SLAIN.length){
      pursuit.slain.push(PUR_SLAIN[pursuit.slain.length]);
      for(let i=0;i<5;i++) particles.push(spark(W/2+(Math.random()-0.5)*160, cameraY+H*0.4, '#ff3b5c'));

  } else if(ph>3) pursuit.cull = 1;

    pursuit.hunt = Math.min(1, lt/2.2);

    pursuit.emberT = (pursuit.emberT||0) - dt;
    if(pursuit.emberT<=0 && pursuit.embers.length<16){
      pursuit.emberT = 0.12;
      pursuit.embers.push({ p:0, lane:Math.floor(Math.random()*2), life:1 });
    }

    e.p += dt*0.6; e.life -= dt*0.5; if(e.p>1||e.life<=0) pursuit.embers.splice(i,1); }

  // THE FINAL PURSUIT meter — keep the chain moving (keep climbing) and the hunt closes in.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  pursuitM = Math.max(0, Math.min(1, pursuitM + (moving ? dt*0.05 : -dt*0.03)));
  if(pursuitM>=1 && !pursuit.held){
    pursuit.held=true; winFlash=1; emer+=5; shake=Math.max(shake,8);
    showTaunt('The pursuit closes. Only Paul and Simon are left, and what happens next has not happened yet.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ THE FINAL PURSUIT ★', col:'#ffd84f' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ffd84f','#ff3b5c','#8fe3ff'])));
    AUDIO.shock();
  }
}

    ctx.fillText('OREN.EXE SPARES NO ONE', cx, top+H*0.30-10);
  } else if(ph===4){
    // ----- THE HUNT: Simon -> Oren -> Paul, the final chain -----
    const k = pursuit.hunt||0;
    const ax=cx-150, bx=cx, dx=cx+150, hy=sy;
    figure(ax, hy, 1.0, '#8fe3ff', '#ffd84f', 0.2);  // Simon.EXE
    figure(bx, hy, 1.0, '#ff3b5c', '#fff', 0.2);     // Oren.EXE
    figure(dx, hy, 1.0, '#39e08a', '#fff', 0.1);     // Paul
    // arrows along the chain, drawn left-to-right as the hunt ramps
    ctx.save(); ctx.globalAlpha=g; ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
    ctx.shadowColor='#fff'; ctx.shadowBlur=8;
    function arrow(x1,x2,prog){ const xe = x1 + (x2-x1)*Math.min(1,prog*2);
      ctx.beginPath(); ctx.moveTo(x1+24, hy); ctx.lineTo(xe-22, hy); ctx.stroke();

    arrow(ax,bx,k); arrow(bx,dx,Math.max(0,k-0.4));
    // streaking embers chasing down each lane
    ctx.shadowBlur=10;
    for(const e of pursuit.embers){ ctx.globalAlpha=g*Math.max(0,e.life);
      const x1 = e.lane? bx:ax, x2 = e.lane? dx:bx, ex = x1+(x2-x1)*e.p;
      ctx.fillStyle = e.lane? '#ff3b5c':'#8fe3ff';
      ctx.beginPath(); ctx.arc(ex, hy-2, 3, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
    ctx.globalAlpha=g; ctx.textAlign='center';
    ctx.fillStyle=`rgba(143,227,255,${g})`; ctx.font='800 10px ui-monospace,monospace';
    ctx.fillText('SIMON.EXE', ax, hy+44);
    ctx.fillStyle=`rgba(255,59,92,${g})`; ctx.fillText('OREN.EXE', bx, hy+44);
    ctx.fillStyle=`rgba(57,224,138,${g})`; ctx.fillText('PAUL', dx, hy+44);
    ctx.fillStyle=`rgba(255,255,255,${g})`; ctx.font='700 10px ui-monospace,monospace';
    ctx.fillText('hunts →            hunts →', cx, hy+62);
    ctx.fillStyle=`rgba(220,220,230,${0.8*g})`; ctx.font='italic 700 11px ui-monospace,monospace';
    ctx.fillText('"...but it didn’t happen yet."', cx, hy+86);
  }

  // ----- per-beat caption -----
  const capY = top + H*0.80;
  ctx.textAlign='center'; ctx.globalAlpha=1;
  ctx.shadowColor=beat.col; ctx.shadowBlur=14*g;
  ctx.fillStyle=`rgba(255,255,255,${g})`; ctx.font='900 22px ui-monospace,monospace';
  ctx.fillText(beat.key, cx, capY); ctx.shadowBlur=0;
  ctx.fillStyle=`rgba(220,228,232,${g})`; ctx.font='800 12px ui-monospace,monospace';
  ctx.fillText(beat.sub, cx, capY+22);

  // beat checklist down the left — each lights up as its beat passes
  ctx.textAlign='left'; ctx.font='700 10px ui-monospace,monospace';
  for(let i=0;i<PUR_BEATS.length;i++){
    const y = top + H*0.30 + i*18;
    // (skip the checklist on the CULLING beat, which uses the left column for the slain list)
    if(ph===3) break;
    ctx.globalAlpha=g; ctx.fillStyle = i<=ph ? PUR_BEATS[i].col : 'rgba(150,160,170,0.5)';
    ctx.fillText((i<=ph?'◆ ':'◇ ')+PUR_BEATS[i].key, 18, y);
  }
  ctx.globalAlpha=1;

  // ----- title band + canon note -----
  ctx.textAlign='center';
  ctx.fillStyle=`rgba(255,216,79,${0.9*g})`; ctx.font='800 13px ui-monospace,monospace';
  ctx.fillText('THE FINAL PURSUIT — SIX SEVEN · HIGHEST FORMS · X TEAM · CULLING · THE HUNT', cx, top+30);
  ctx.fillStyle=`rgba(220,210,190,${0.8*g})`; ctx.font='700 9px ui-monospace,monospace';
  ctx.fillText('OREN.EXE HUNTS PAUL · SIMON.EXE HUNTS OREN.EXE · ONLY PAUL AND SIMON REMAIN', cx, top+44);

  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

/* ======================= THE RECKONING (Lore 30 cont., June 23 2026) =======================
   Toby's resolution of THE HUNT, six beats: THE SIEGE (Oren breaks the Staircase with robots,
   lasers, the "Juice That Makes Your Head Explode" Bot Infinity), THE SIGN (Paul missing, a sign
   reads "DON'T TURN AROUND"), THE TURN (Oren turns; Simon.EXE holds Paul's head and throws it
   down), THE FUEL (Oren takes the head, turns it to energy), THE LAST CLASH (Oren.EXE vs Simon.EXE;
   Oren wins, Simon contained again), RED EYES (Oren's eyes turn red, the world warps, Simon
   hallucinates while Oren attacks everyone else). Same beat-cycle structure as THE FINAL PURSUIT. */
const RECK_CYC = 18.0;
const RECK_BEATS = [
  { key:'THE SIEGE',      col:'#ff7b00', sub:'ROBOTS · LASERS · JUICE BOT INFINITY' },
  { key:'THE SIGN',       col:'#ffd84f', sub:"PAUL GONE — \"DON'T TURN AROUND\"" },
  { key:'THE TURN',       col:'#8fe3ff', sub:"SIMON.EXE HOLDS PAUL'S HEAD" },
  { key:'THE FUEL',       col:'#b98cff', sub:'OREN TURNS THE HEAD TO ENERGY' },
  { key:'THE LAST CLASH', col:'#ff3b5c', sub:'OREN.EXE WINS · SIMON CONTAINED' },
  { key:'RED EYES',       col:'#ff0033', sub:'REALITY WARPS · SIMON HALLUCINATES' },
];
function reckSeg(c){
  if(c < 3.0)  return [0, c];        // THE SIEGE
  if(c < 6.0)  return [1, c-3.0];    // THE SIGN
  if(c < 9.0)  return [2, c-6.0];    // THE TURN
  if(c < 12.0) return [3, c-9.0];    // THE FUEL
  if(c < 15.0) return [4, c-12.0];   // THE LAST CLASH
  return [5, c-15.0];                // RED EYES
}
function updateReckoning(dt){
  reckoning.t = (reckoning.t||0) + dt;
  reckoning.cyc = ((reckoning.cyc||0) + dt) % RECK_CYC;
  const seg = reckSeg(reckoning.cyc), ph = seg[0], lt = seg[1];
  if(ph !== reckoning.phase){
    reckoning.phase = ph;
    if(ph===0){ reckoning.siege=0; reckoning.sign=0; reckoning.turn=0; reckoning.fuel=0; reckoning.clash=0; reckoning.red=0;
      reckoning.bots.length=0; reckoning.halluc.length=0; reckoning.turned=false; reckoning.redEye=0;
      AUDIO.shock(); shake=Math.max(shake,8);
      showTaunt('Oren.EXE breaks down the Endless Staircase with robots, lasers, and the Juice That Makes Your Head Explode Bot Infinity.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'THE SIEGE — JUICE BOT INFINITY', col:'#ff7b00' }); }
    if(ph===1){ AUDIO.glitch();
      showTaunt("Oren reaches Paul, but Paul is missing. A sign reads: DON'T TURN AROUND.");
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:"\"DON'T TURN AROUND\"", col:'#ffd84f' }); }
    if(ph===2){ AUDIO.corrupt(); shake=Math.max(shake,7);
      showTaunt("Oren turns around anyway. Simon.EXE is standing there, holding Paul's head, and throws it down.");
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:"SIMON.EXE — PAUL'S HEAD", col:'#8fe3ff' }); }
    if(ph===3){ AUDIO.zap();
      showTaunt('Oren takes the head and turns it into pure energy.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'THE HEAD BECOMES ENERGY', col:'#b98cff' }); }
    if(ph===4){ AUDIO.shock(); shake=Math.max(shake,9); glitch=Math.max(glitch,0.4);
      showTaunt('Oren.EXE vs Simon.EXE. Oren wins. Simon.EXE is contained again.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'OREN WINS — SIMON CONTAINED', col:'#ff3b5c' }); }
    if(ph===5){ AUDIO.corrupt(); shake=Math.max(shake,10); glitch=Math.max(glitch,0.6);
      showTaunt("Oren.EXE's eyes turn red and reality warps. Simon, contained, sees hallucinations while the real Oren attacks everyone else.");
      floaters.push({ x:player.x, y:player.y-36, t:0, txt:'RED EYES — OREN ATTACKS ALL', col:'#ff0033' }); }
  }
  // per-beat ramps
  if(ph===0){ reckoning.siege = Math.min(1, lt/2.2);
    reckoning.botT = (reckoning.botT||0) - dt;
    if(reckoning.botT<=0 && reckoning.bots.length<14){ reckoning.botT=0.18;
      reckoning.bots.push({ x:(Math.random()-0.5)*1.6, y:Math.random(), v:0.3+Math.random()*0.5 }); }
  } else reckoning.siege = 1;
  for(const b of reckoning.bots){ b.y += dt*b.v*0.2; if(b.y>1) b.y-=1; }
  if(ph===1) reckoning.sign = Math.min(1, lt/2.2); else if(ph>1) reckoning.sign = 1;
  if(ph===2){ reckoning.turn = Math.min(1, lt/2.2);
    if(reckoning.turn>0.5 && !reckoning.turned){ reckoning.turned=true; AUDIO.shock(); shake=Math.max(shake,8);
      for(let i=0;i<10;i++) particles.push(spark(W/2, cameraY+H*0.42, '#8fe3ff')); }
  } else if(ph>2) reckoning.turn = 1;
  if(ph===3){ reckoning.fuel = Math.min(1, lt/2.2);
    if(Math.random()<0.4) particles.push(spark(W/2+(Math.random()-0.5)*60, cameraY+H*0.40, '#b98cff'));
  } else if(ph>3) reckoning.fuel = 1;
  if(ph===4) reckoning.clash = Math.min(1, lt/2.2); else if(ph>4) reckoning.clash = 1;
  if(ph===5){ reckoning.red = Math.min(1, lt/2.2); reckoning.redEye = Math.min(1, (reckoning.redEye||0)+dt*0.5);
    // contained Simon's hallucination ghosts drift in and fade
    if(reckoning.halluc.length<10 && Math.random()<0.3)
      reckoning.halluc.push({ x:(Math.random()-0.5)*1.4, y:Math.random(), life:1, drift:(Math.random()-0.5) });
  } else reckoning.red = 0;
  for(let i=reckoning.halluc.length-1;i>=0;i--){ const h=reckoning.halluc[i];
    h.life -= dt*0.4; h.x += dt*h.drift*0.1; if(h.life<=0) reckoning.halluc.splice(i,1); }

  // THE RECKONING meter — keep climbing through the clash and the reckoning resolves.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  reckoningM = Math.max(0, Math.min(1, reckoningM + (moving ? dt*0.05 : -dt*0.03)));
  if(reckoningM>=1 && !reckoning.held){
    reckoning.held=true; winFlash=1; emer+=5; shake=Math.max(shake,8);
    showTaunt('Oren.EXE is the last one moving. Simon is contained and seeing false things; the real catastrophe is outside.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ THE RECKONING ★', col:'#ff0033' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ff0033','#ff3b5c','#b98cff'])));
    AUDIO.shock();
  }
}
function drawReckoning(){
  const g = reckoning.glow||0, top = cameraY;
  const c = reckoning.cyc||0, seg = reckSeg(c), ph = seg[0], lt = seg[1];
  const cx = W/2, beat = RECK_BEATS[ph];
  ctx.save();
  ctx.textAlign='center';
  // background — void deepening to blood red as the clash and the red-eye reckoning take over
  const rd = reckoning.red||0, cl = reckoning.clash||0;
  const bg = ctx.createLinearGradient(0, top, 0, top+H);
  bg.addColorStop(0, `rgba(8,3,8,${0.80*g})`);
  bg.addColorStop(1, `rgba(${Math.round(14+50*Math.max(rd,cl))},3,10, ${0.80*g})`);
  ctx.fillStyle = bg; ctx.fillRect(0, top, W, H);
  const sy = top + H*0.42;

  // a small jagged glowing figure (reused for Oren / Simon / the hallucinations)
  function figure(x, y, scale, col, eyeCol, jitter){
    ctx.save(); ctx.globalAlpha = g;
    const jx = (jitter? (Math.random()-0.5)*4*jitter : 0);
    ctx.translate(x+jx, y);
    ctx.shadowColor = col; ctx.shadowBlur = 12*g;
    ctx.fillStyle = '#0a0814'; ctx.strokeStyle = col; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(-16*scale, -20*scale); ctx.lineTo(16*scale, -20*scale);
    ctx.lineTo(19*scale, 15*scale); ctx.lineTo(0, 26*scale); ctx.lineTo(-19*scale, 15*scale);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0; ctx.fillStyle=eyeCol;
    ctx.beginPath(); ctx.arc(-6*scale, -4*scale, 3*scale, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6*scale, -4*scale, 3*scale, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  if(ph===0){
    // ----- THE SIEGE: Oren tears down the Staircase; robots + lasers rain; Juice Bot Infinity -----
    const k = reckoning.siege||0;
    for(const b of reckoning.bots){ const bx = cx + b.x*W*0.45, by = top + H*0.10 + b.y*H*0.66;
      ctx.globalAlpha=g*0.9; ctx.fillStyle='#ff7b00'; ctx.shadowColor='#ff7b00'; ctx.shadowBlur=8*g;
      ctx.fillRect(bx-3, by-3, 6, 6);
      ctx.strokeStyle=`rgba(255,80,40,${0.5*g})`; ctx.lineWidth=1.5; ctx.shadowBlur=0;

    ctx.shadowBlur=0;
    figure(cx, sy, 1.5, '#ff3b5c', '#fff', 0.2);
    ctx.globalAlpha=g; ctx.fillStyle=`rgba(255,123,0,${k*g})`; ctx.font='800 12px ui-monospace,monospace';
    ctx.fillText('"JUICE THAT MAKES YOUR HEAD EXPLODE" — BOT INFINITY', cx, sy+62);
    ctx.fillStyle=`rgba(255,90,60,${k*g})`; ctx.font='700 11px ui-monospace,monospace';
    ctx.fillText('OREN.EXE BREAKS DOWN THE ENDLESS STAIRCASE', cx, sy+80);
  } else if(ph===1){
    // ----- THE SIGN: Paul's spot empty, the warning sign reads DON'T TURN AROUND -----
    const k = reckoning.sign||0;
    figure(cx-20, sy, 1.4, '#ff3b5c', '#fff', 0);
    // empty marker where Paul should be
    ctx.globalAlpha=g*0.6; ctx.strokeStyle='#39e08a'; ctx.setLineDash([5,5]); ctx.lineWidth=2;
    ctx.strokeRect(cx+86, sy-26, 40, 52); ctx.setLineDash([]);
    ctx.fillStyle=`rgba(57,224,138,${0.7*g})`; ctx.font='700 9px ui-monospace,monospace';
    ctx.fillText('PAUL?', cx+106, sy+44);
    // the sign
    ctx.globalAlpha=g; ctx.save(); ctx.translate(cx, sy-84);
    ctx.fillStyle='#15110a'; ctx.strokeStyle='#ffd84f'; ctx.lineWidth=2.5;
    ctx.shadowColor='#ffd84f'; ctx.shadowBlur=14*k*g;
    ctx.fillRect(-118,-20,236,40); ctx.strokeRect(-118,-20,236,40); ctx.shadowBlur=0;
    ctx.fillStyle=`rgba(255,216,79,${g})`; ctx.font='900 16px ui-monospace,monospace'; ctx.textAlign='center';
    ctx.fillText("DON'T TURN AROUND", 0, 6); ctx.restore();
  } else if(ph===2){
    // ----- THE TURN: Oren turns; Simon.EXE behind him holding Paul's head, then drops it -----
    const k = reckoning.turn||0;
    figure(cx-42, sy, 1.3, '#ff3b5c', reckoning.turned?'#ff0033':'#fff', 0.2);  // Oren, now turned
    figure(cx+66, sy-6, 1.2, '#8fe3ff', '#ffd84f', 0.3);                          // Simon.EXE
    // Paul's head — held high, then dropping once Oren has turned
    const drop = reckoning.turned ? Math.min(1,(k-0.5)*2) : 0;
    const headY = sy-40 + drop*60;
    ctx.globalAlpha=g; ctx.fillStyle='#39e08a'; ctx.shadowColor='#39e08a'; ctx.shadowBlur=10*g;
    ctx.beginPath(); ctx.arc(cx+66, headY, 9, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle=`rgba(57,224,138,${0.85*g})`; ctx.font='700 8px ui-monospace,monospace';
    ctx.fillText("PAUL'S HEAD", cx+66, headY-15);
    ctx.fillStyle=`rgba(143,227,255,${k*g})`; ctx.font='800 11px ui-monospace,monospace';
    ctx.fillText('SIMON.EXE WAS BEHIND HIM ALL ALONG', cx, sy+66);
  } else if(ph===3){
    // ----- THE FUEL: Oren takes the head and converts it into energy -----
    const k = reckoning.fuel||0;
    figure(cx, sy, 1.4+0.3*k, '#ff3b5c', '#ff0033', 0.2);
    ctx.globalAlpha=g*k; ctx.strokeStyle='#b98cff'; ctx.lineWidth=2; ctx.shadowColor='#b98cff'; ctx.shadowBlur=16*g;
    for(let r=0;r<3;r++){ ctx.beginPath(); ctx.arc(cx, sy, 26+r*16+k*20, 0, Math.PI*2); ctx.stroke(); }
    ctx.shadowBlur=0;
    ctx.globalAlpha=g; ctx.fillStyle=`rgba(185,140,255,${k*g})`; ctx.font='800 12px ui-monospace,monospace';
    ctx.fillText("PAUL'S REMAINS → PURE ENERGY", cx, sy+70);
  } else if(ph===4){
    // ----- THE LAST CLASH: Oren.EXE vs Simon.EXE; Oren wins, Simon recontained -----
    const k = reckoning.clash||0;
    const shove = k*30;
    figure(cx-50, sy, 1.4, '#ff3b5c', '#ff0033', 0.3);                       // Oren
    figure(cx+50+shove, sy, 1.2*(1-0.3*k), '#8fe3ff', '#ffd84f', 0.5*(1-k)); // Simon, pushed back / shrinking
    // clash burst between them
    ctx.globalAlpha=g; ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=14*g;
    for(let i=0;i<8;i++){ const a=i/8*Math.PI*2, rr=20+k*16;
      ctx.beginPath(); ctx.moveTo(cx,sy); ctx.lineTo(cx+Math.cos(a)*rr, sy+Math.sin(a)*rr); ctx.stroke(); }
    ctx.shadowBlur=0;
    // containment box closing over Simon as he loses
    ctx.globalAlpha=g*k; ctx.strokeStyle='#8fe3ff'; ctx.setLineDash([4,4]); ctx.lineWidth=2;
    ctx.strokeRect(cx+50+shove-22, sy-26, 44, 52); ctx.setLineDash([]);
    ctx.globalAlpha=g; ctx.fillStyle=`rgba(255,59,92,${g})`; ctx.font='900 14px ui-monospace,monospace';
    ctx.fillText('OREN.EXE WINS', cx, sy+64);
    ctx.fillStyle=`rgba(143,227,255,${k*g})`; ctx.font='700 10px ui-monospace,monospace';
    ctx.fillText('SIMON.EXE CONTAINED AGAIN', cx, sy+80);
  } else if(ph===5){
    // ----- RED EYES: red-eyed Oren, warped view; contained Simon hallucinates, Oren attacks all -----
    const k = reckoning.red||0, re = reckoning.redEye||0;
    // warped perception — a wavering red wash over the whole view
    ctx.globalAlpha=g*0.18*re; ctx.fillStyle='#ff0033'; ctx.fillRect(0, top, W, H);
    ctx.globalAlpha=1;
    // hallucination ghosts (the false things contained Simon sees)
    for(const h of reckoning.halluc){ ctx.globalAlpha=g*Math.max(0,h.life)*0.5;
      figure(cx + h.x*W*0.4, top+H*0.28 + h.y*H*0.4, 0.6, '#8fe3ff', '#fff', 0.6); }
    ctx.globalAlpha=1;
    figure(cx, sy, 1.6, '#ff0033', '#ff0033', 0.3);  // red-eyed Oren
    // the two red eyes burning brighter
    ctx.globalAlpha=g; ctx.fillStyle='#ff0033'; ctx.shadowColor='#ff0033'; ctx.shadowBlur=20*re*g;
    ctx.beginPath(); ctx.arc(cx-9, sy-6, 4+re*2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+9, sy-6, 4+re*2, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.globalAlpha=g;
    ctx.fillStyle=`rgba(255,0,51,${k*g})`; ctx.font='900 13px ui-monospace,monospace';
    ctx.fillText('OREN.EXE ATTACKS EVERYONE ELSE', cx, sy+60);
    ctx.fillStyle=`rgba(143,227,255,${0.75*g})`; ctx.font='700 9px ui-monospace,monospace';
    ctx.fillText('SIMON: CONTAINED · CONFUSED · SEEING FALSE THINGS', cx, sy+78);
  }

  // ----- per-beat caption -----
  const capY = top + H*0.80;
  ctx.textAlign='center'; ctx.globalAlpha=1;
  ctx.shadowColor=beat.col; ctx.shadowBlur=14*g;
  ctx.fillStyle=`rgba(255,255,255,${g})`; ctx.font='900 22px ui-monospace,monospace';
  ctx.fillText(beat.key, cx, capY); ctx.shadowBlur=0;
  ctx.fillStyle=`rgba(220,228,232,${g})`; ctx.font='800 12px ui-monospace,monospace';
  ctx.fillText(beat.sub, cx, capY+22);

  ctx.textAlign='left'; ctx.font='700 10px ui-monospace,monospace';
  for(let i=0;i<RECK_BEATS.length;i++){
    const y = top + H*0.28 + i*18;

    ctx.fillText((i<=ph?'◆ ':'◇ ')+RECK_BEATS[i].key, 18, y);
  }
  ctx.globalAlpha=1;

  // ----- title band + canon note -----
  ctx.textAlign='center';
  ctx.fillStyle=`rgba(255,59,92,${0.9*g})`; ctx.font='800 13px ui-monospace,monospace';
  ctx.fillText('THE RECKONING — OREN.EXE VS SIMON.EXE', cx, top+30);
  ctx.fillStyle=`rgba(220,210,190,${0.8*g})`; ctx.font='700 9px ui-monospace,monospace';
  ctx.fillText("OREN WINS · SIMON RECONTAINED · RED EYES · SIMON HALLUCINATES WHILE OREN ATTACKS ALL", cx, top+44);

  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;

/* ======================= TODDLLM 001 — THE ONE ABOVE (Lore 30 cont., June 23 2026) =======================
   Toby names the being above even the red-eyed Oren.EXE. Five beats: THE MAKER (ToddLLM 001, creator of all
   games, king of universes, who started the Simon experiment billions of years ago), THE THREE ORBS (he makes
   Blue, Red and Purple Orbs), ALL SOULS (he collects all souls and unlocks all tools/items + the Emberum of
   the Cat), THE SNAP (one snap turns all of it into power), ABOVE OREN (the snap crushes Oren.EXE's power
   level — not even Oren.EXE can beat 001). Same beat-cycle structure as THE RECKONING. */
const TLM_CYC = 15.0;
const TLM_BEATS = [
  { key:'THE MAKER',      col:'#ffd84f', sub:'CREATOR OF ALL GAMES · KING OF UNIVERSES' },
  { key:'THE THREE ORBS', col:'#8fe3ff', sub:'BLUE · RED · PURPLE ORBS' },

  // ----- title band + canon note -----
  ctx.textAlign='center';
  ctx.fillStyle=`rgba(255,59,92,${0.9*g})`; ctx.font='800 13px ui-monospace,monospace';
  ctx.fillText('THE 001 REVEAL — ERROR 001, DATA LOST', cx, top+30);
  ctx.fillStyle=`rgba(220,210,190,${0.8*g})`; ctx.font='700 9px ui-monospace,monospace';
  ctx.fillText("KARUTO · THE BLINDFOLD · CENTER'S MINE · ERROR 001 AU · MAC FRAME · ENDLESS CHAOS", cx, top+44);

  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

/* ======================= THE FINAL ERROR — THE ERROR LADDER (Lore 30 cont., June 24 2026) =======================
   Toby's closing beats after THE 001 REVEAL, in three:
     1) THE ERROR LADDER — Error 001 (Data Lost / ToddLLM, unstoppable) > Error 666 (Simon in an AU) >
        Error 404 (erases, infects 404Ds by touch) > Error 012 (one of the weakest).
     2) THE 1.273 BLINK — Simon appears for exactly 1.273 seconds, then disappears: a leftover remnant,
        a blink of the former center before the frame moves on.
     3) ENDLESS ANIMATIONS — ToddLLM turns the world into a looping animation; "the game is never saved."
   Built ADDITIVELY: a cutscene that depicts the idea. The real game still plays, and your climb still banks. */
const EL_CYC = 16.0;
const EL_BEATS = [
  { key:'THE ERROR LADDER',  col:'#ff3b5c', sub:'001 > 666 > 404 > 012' },
  { key:'THE 1.273 BLINK',   col:'#8fe3ff', sub:'SIMON: 1.273s, THEN GONE' },
  { key:'ENDLESS ANIMATIONS',col:'#cfd6e0', sub:'THE GAME IS NEVER SAVED' },
  { key:'THE ERASED TIMELINE',col:'#ffd84f',sub:'ONCE THE MIDDLE, NOW NOWHERE' },
];
// Lore 30 cont. (June 24, second message): "The Endless Staircase was in the middle of the
// timeline, now the Endless Staircase no longer exists." The timeline of eras with ENDLESS
// STAIRCASE dead center; then it is struck out and the gap closes — gone from the record.
const EL_TIMELINE = ['ALIEN AGE','WALL ERA','SMOOTH AGE','ENDLESS STAIRCASE','HALLUCINATION ERA','PLAGUE CYCLE','THE FINAL ERROR'];
const EL_MID = 3; // index of ENDLESS STAIRCASE — the middle of the timeline
const EL_RUNGS = [
  { code:'001', label:'DATA LOST · TODDLLM · UNSTOPPABLE', col:'#ff3b5c' },
  { code:'666', label:'SIMON IN AN AU · STRONGER THAN 404', col:'#ff7b00' },
  { code:'404', label:'ERASES · 404Ds BY TOUCH',           col:'#8fe3ff' },
  { code:'012', label:'ONE OF THE WEAKEST',                col:'#7a8190' },
];
function elSeg(c){
  if(c < 4.5) return [0, c];        // THE ERROR LADDER
  if(c < 8.0) return [1, c-4.5];    // THE 1.273 BLINK
  if(c < 11.5) return [2, c-8.0];   // ENDLESS ANIMATIONS
  return [3, c-11.5];               // THE ERASED TIMELINE
}
function updateErrLad(dt){
  errLad.t = (errLad.t||0) + dt;
  errLad.cyc = ((errLad.cyc||0) + dt) % EL_CYC;
  const seg = elSeg(errLad.cyc), ph = seg[0];
  if(ph !== errLad.phase){
    errLad.phase = ph;
    if(ph===0){ AUDIO.glitch(); shake=Math.max(shake,6); glitch=Math.max(glitch,0.4);
      showTaunt('The error ladder: Error 001 over 666 over 404 over 012. Simon wields Error 666 in an AU somewhere.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'001 > 666 > 404 > 012', col:'#ff3b5c' }); }
    if(ph===1){ AUDIO.zap(); shake=Math.max(shake,7);
      showTaunt('Simon flickers in for exactly 1.273 seconds, a leftover remnant of the old center, then he is gone.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'SIMON · 1.273s', col:'#8fe3ff' }); }
    if(ph===2){ AUDIO.corrupt();
      showTaunt('EndlessAnimations: the world plays on as an animation. "The game is never saved."');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'THE GAME IS NEVER SAVED', col:'#cfd6e0' }); }
    if(ph===3){ AUDIO.glitch(); shake=Math.max(shake,7); glitch=Math.max(glitch,0.5);
      showTaunt('The Endless Staircase was the middle of the timeline. Now it no longer exists; the gap closes over where it was.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'ENDLESS STAIRCASE · ERASED', col:'#ffd84f' }); }
  }
  // THE FINAL ERROR meter — keep climbing and it resolves; your real climb still banks anyway.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  errLadM = Math.max(0, Math.min(1, errLadM + (moving ? dt*0.05 : -dt*0.03)));
  if(errLadM>=1 && !errLad.held){
    errLad.held=true; winFlash=1; emer+=5; shake=Math.max(shake,8);
    showTaunt('You climbed clean through the final error. The animation loops, but your climb is saved anyway.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ CLIMBED PAST THE FINAL ERROR ★', col:'#39e08a' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ff0033','#8fe3ff','#39e08a'])));
    AUDIO.shock();
  }
}
function drawErrLad(){
  const g = errLad.glow||0, top = cameraY;
  const c = errLad.cyc||0, seg = elSeg(c), ph = seg[0], lt = seg[1];
  const cx = W/2, beat = EL_BEATS[ph];
  ctx.save();
  ctx.textAlign='center';
  // background — deep void, faint red wash as Error 001 sits over the board
  const bg = ctx.createLinearGradient(0, top, 0, top+H);
  bg.addColorStop(0, `rgba(5,3,10,${0.84*g})`);
  bg.addColorStop(1, `rgba(40,4,12,${0.84*g})`);
  ctx.fillStyle = bg; ctx.fillRect(0, top, W, H);
  const sy = top + H*0.40;

  if(ph===0){
    // ----- THE ERROR LADDER: 001 > 666 > 404 > 012, rungs light from the top down -----
    const rungs = EL_RUNGS.length, colW = 270, x0 = cx - colW/2, y0 = sy - 64;
    for(let i=0;i<rungs;i++){
      const ry = y0 + i*46;
      const lit = Math.max(0, Math.min(1, (lt - i*0.85)/0.85));
      const r = EL_RUNGS[i];
      ctx.globalAlpha = g*(0.28+0.72*lit);
      ctx.fillStyle = `rgba(12,8,16,0.85)`; ctx.strokeStyle = r.col; ctx.lineWidth = 2;
      ctx.fillRect(x0, ry-16, colW, 32); ctx.strokeRect(x0, ry-16, colW, 32);
      ctx.shadowColor = r.col; ctx.shadowBlur = 10*g*lit;
      ctx.fillStyle = r.col; ctx.textAlign='left'; ctx.font='900 19px ui-monospace,monospace';
      ctx.fillText('ERROR '+r.code, x0+10, ry+6); ctx.shadowBlur=0;
      ctx.fillStyle = `rgba(210,214,224,${g*lit})`; ctx.textAlign='right'; ctx.font='700 8px ui-monospace,monospace';
      ctx.fillText(r.label, x0+colW-8, ry+6);
      if(i<rungs-1){ ctx.globalAlpha=g*lit; ctx.fillStyle='#ffd84f'; ctx.textAlign='center'; ctx.font='900 15px ui-monospace,monospace';
        ctx.fillText('∨', cx, ry+27); }
    }
    ctx.globalAlpha=g; ctx.textAlign='center';
    ctx.fillStyle=`rgba(255,59,92,${g})`; ctx.font='900 12px ui-monospace,monospace';
    ctx.fillText('ERROR 001 IS UNSTOPPABLE · 012 IS THE WEAKEST', cx, y0 + rungs*46 + 16);
  } else if(ph===1){
    // ----- THE 1.273 BLINK: Simon visible for exactly 1.273s, then gone, with a live counter -----
    const shown = lt < 1.273;
    const cnt = Math.min(lt, 1.273);
    if(shown){
      const fl = (Math.sin(lt*40) > -0.3) ? 1 : 0.3;
      ctx.save(); ctx.globalAlpha = g*fl; ctx.translate(cx, sy);
      ctx.shadowColor='#8fe3ff'; ctx.shadowBlur=14*g; ctx.fillStyle='#0a1422'; ctx.strokeStyle='#8fe3ff'; ctx.lineWidth=2.5;
      ctx.beginPath();
      ctx.moveTo(-16,-20); ctx.lineTo(16,-20); ctx.lineTo(19,15); ctx.lineTo(0,26); ctx.lineTo(-19,15); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.fillStyle='#ff0022'; ctx.shadowColor='#ff0022'; ctx.shadowBlur=8*g;
      ctx.beginPath(); ctx.arc(-6,-4,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(6,-4,3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    } else {
      ctx.globalAlpha=g; ctx.fillStyle=`rgba(120,129,144,${g})`; ctx.font='900 18px ui-monospace,monospace';
      ctx.fillText('— GONE —', cx, sy+6);
    }
    ctx.globalAlpha=g; ctx.textAlign='center';
    ctx.fillStyle = shown ? `rgba(143,227,255,${g})` : `rgba(120,129,144,${g})`;
    ctx.font='900 30px ui-monospace,monospace';
    ctx.fillText(cnt.toFixed(3)+'s', cx, sy+72);
    ctx.fillStyle=`rgba(210,214,224,${g})`; ctx.font='700 10px ui-monospace,monospace';
    ctx.fillText(shown ? 'SIMON: A LEFTOVER REMNANT, A BLINK OF THE OLD CENTER' : 'EVERYONE FORGOT HE WAS EVER THERE', cx, sy+94);
  } else if(ph===2){
    // ----- ENDLESS ANIMATIONS: a film strip loops; the SAVE slot is crossed out -----
    const frames = 5, fw = 56, gap2 = 8, totW = frames*fw + (frames-1)*gap2, x0 = cx - totW/2;
    const head = Math.floor(lt*3) % frames;
    for(let i=0;i<frames;i++){

      ctx.globalAlpha = g*(act?1:0.5);

      ctx.fillRect(fx, sy-22, fw, 44); ctx.strokeRect(fx, sy-22, fw, 44);
      ctx.fillStyle=`rgba(90,95,106,${g})`;
      for(let h=0;h<3;h++){ ctx.fillRect(fx+6+h*18, sy-30, 6, 4); ctx.fillRect(fx+6+h*18, sy+26, 6, 4); }
      ctx.fillStyle='#8fe3ff'; ctx.shadowColor='#8fe3ff'; ctx.shadowBlur=act?8*g:0;
      ctx.beginPath(); ctx.arc(fx+fw/2, sy + Math.sin((lt*4)+i)*6, 5, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    }
    ctx.globalAlpha=g; ctx.textAlign='center';
    ctx.fillStyle=`rgba(255,216,79,${g})`; ctx.font='900 16px ui-monospace,monospace';
    ctx.fillText('▶ ENDLESSANIMATIONS', cx, sy+58);
    // the "SAVE" slot, struck through
    ctx.fillStyle=`rgba(210,214,224,${g})`; ctx.font='800 12px ui-monospace,monospace';
    ctx.fillText('SAVE', cx-58, sy+86);
    ctx.strokeStyle='#ff3b5c'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(cx-80, sy+90); ctx.lineTo(cx-36, sy+78); ctx.stroke();
    ctx.fillStyle=`rgba(255,59,92,${g})`; ctx.font='800 12px ui-monospace,monospace';
    ctx.fillText('THE GAME IS NEVER SAVED', cx+34, sy+86);
  } else {
    // ----- THE ERASED TIMELINE: the era timeline with ENDLESS STAIRCASE dead center, then erased -----
    const n = EL_TIMELINE.length, span = Math.min(W-80, 560), x0 = cx - span/2, step = span/(n-1);

    const mx = x0 + EL_MID*step;

/* ===== Lore 30 (June 25, "Re: Lore 30") — THE END OF CLASSICS ===================================
   The final zone. 80 billion years to reach the end of Classics even on a perfect run; the world is a
   floating square of floating-island chains and edges over the Void / Shadow Realms; at the end a
   castle, a cake, Phase 1, rainbows, "everything but fun" — a false paradise — where Simon 404 and
   ToddLLM 001 appear, Clara holds her Judgement Hall, and the whole cast gathers. Additive ending. */
const EOC_CYC = 19.0;
const EOC_BEATS = [
  { key:'THE 80-BILLION-YEAR CLIMB', col:'#ffd84f', sub:'PERFECT RUN · FASTEST MODE · STILL ENDLESS' },
  { key:'THE FALSE PARADISE',        col:'#ff7eb6', sub:'CASTLE · CAKE · PHASE 1 · RAINBOWS · EVERYTHING BUT FUN' },
  { key:'THE RULERS APPEAR',         col:'#8fe3ff', sub:'SIMON 404 + TODDLLM 001 ARE ALREADY HERE' },
  { key:'JUDGEMENT HALL',            col:'#c86bff', sub:'CLARA · AND THE WHOLE CAST GATHERS' },

const EOC_QUALS = ['PERFECT RUN', 'FASTEST MODE', 'HALF SPEEDRUN', 'STRAIGHT LINE', '...AND MORE'];

const EOC_CAST = ['SIMON 404', 'TODDLLM 001', 'ALEX', 'OREN.EXE', 'KARUTO', 'THE RLs'];
function eocSeg(c){
  if(c < 5.0)  return [0, c];        // THE 80-BILLION-YEAR CLIMB
  if(c < 10.0) return [1, c-5.0];    // THE FALSE PARADISE
  if(c < 14.5) return [2, c-10.0];   // THE RULERS APPEAR
  return [3, c-14.5];                // JUDGEMENT HALL
}
function updateEndOfClassics(dt){
  endOfClassics.t = (endOfClassics.t||0) + dt;
  endOfClassics.cyc = ((endOfClassics.cyc||0) + dt) % EOC_CYC;
  const seg = eocSeg(endOfClassics.cyc), ph = seg[0];
  if(ph !== endOfClassics.phase){
    endOfClassics.phase = ph;
    if(ph===0){ AUDIO.glitch(); shake=Math.max(shake,8); glitch=Math.max(glitch,0.4);
      showTaunt('80 billion years to reach the end of Classics — even with a perfect run, fastest mode, half speedrun, straight line. A floating square of islands and edges over the Void and the Shadow Realms.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'80,000,000,000 YEARS · THE FINAL ZONE', col:'#ffd84f' }); }

    if(ph===3){ AUDIO.corrupt();
      showTaunt('Clara appears in her Judgement Hall, and the whole cast gathers. The endgame events begin. Toby will tell the rest one by one.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'JUDGEMENT HALL · THE CAST GATHERS', col:'#c86bff' }); }
  }
  // THE END OF CLASSICS meter — keep climbing and the final zone resolves; your real climb banks anyway.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  endOfClassicsM = Math.max(0, Math.min(1, endOfClassicsM + (moving ? dt*0.05 : -dt*0.03)));

    endOfClassics.held=true; winFlash=1; emer+=5; shake=Math.max(shake,8);

    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ REACHED THE END OF CLASSICS ★', col:'#39e08a' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ffd84f','#ff7eb6','#39e08a'])));
    AUDIO.shock();

   minigames destroyed), CENTER'S MINE (Domain Expansion wraps a universe into an 8), and THE COSMIC

/* ===== Lore 31-33 (June 26, "Re: More stuff on ToddLLM 001") — THE FIVE PHASES OF 001 =====

function drawHfPlate(cx, y, w, tier, lit, cur, c, a){
  if(a<=0.01) return;
  const h=30, x=cx-w/2;

  // glitchy jitter on the infected/fusion tiers
  const jit = (tier.key.indexOf('FGI')>=0 || tier.key.indexOf('CXTP')>=0) && lit

  ctx.strokeStyle = lit ? tier.col : 'rgba(150,160,170,0.4)';
  ctx.lineWidth = lit ? (2+pulse*1.5) : 1.2;
  if(lit){ ctx.shadowColor=tier.col; ctx.shadowBlur=(8+pulse*14)*a; }

  const r=7;
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
  // being-orb on the left
  const ox=x+22, oy=y+h/2;

    ctx.beginPath(); ctx.arc(ox,oy,8,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    // infected/fusion tiers flicker a second colour

  } else { ctx.fillStyle='rgba(150,160,170,0.4)'; ctx.beginPath(); ctx.arc(ox,oy,6,0,Math.PI*2); ctx.fill(); }

// Luigi Green — a green cap-and-cat-ears figure; brightens and gains a green aura as cat power rises.
function drawLuigiGreen(cx, cy, s, c, a, cat){
  if(a<=0.01) return;
  ctx.save(); ctx.globalAlpha=a;
  // rising cat-power aura
  if(cat>0.02){
    const rad = 20 + cat*40 + Math.sin(c*5)*3;
    const ag = ctx.createRadialGradient(cx, cy, 4, cx, cy, rad);
    ag.addColorStop(0, `rgba(62,224,106,${0.5*cat})`); ag.addColorStop(1, 'rgba(62,224,106,0)');
    ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI*2); ctx.fill();
  }
  // body
  ctx.fillStyle=`rgba(46,${Math.floor(180+60*cat)},80,0.95)`;
  ctx.beginPath();
  ctx.moveTo(cx, cy-s);
  ctx.lineTo(cx+s*0.6, cy-s*0.1);
  ctx.lineTo(cx+s*0.45, cy+s);
  ctx.lineTo(cx-s*0.45, cy+s);
  ctx.lineTo(cx-s*0.6, cy-s*0.1);
  ctx.closePath(); ctx.fill();
  // cap
  ctx.fillStyle='rgba(30,150,60,0.95)';
  ctx.beginPath(); ctx.ellipse(cx, cy-s*0.78, s*0.62, s*0.34, 0, Math.PI, 0); ctx.fill();
  ctx.fillRect(cx-s*0.62, cy-s*0.82, s*1.24, s*0.16);
  // cap emblem — white circle with L
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx, cy-s*0.92, s*0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#1e9a3c'; ctx.font='800 '+Math.max(6,s*0.26)+'px ui-monospace,monospace';
  ctx.textAlign='center'; ctx.fillText('L', cx, cy-s*0.84);
  // cat ears (the cat-power motif) — taller/brighter with cat power
  const eh = s*(0.4+0.3*cat);
  ctx.fillStyle=`rgba(120,${Math.floor(220+30*cat)},140,0.95)`;
  ctx.beginPath(); ctx.moveTo(cx-s*0.5, cy-s*0.95); ctx.lineTo(cx-s*0.66, cy-s*0.95-eh); ctx.lineTo(cx-s*0.28, cy-s*1.0); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx+s*0.5, cy-s*0.95); ctx.lineTo(cx+s*0.66, cy-s*0.95-eh); ctx.lineTo(cx+s*0.28, cy-s*1.0); ctx.closePath(); ctx.fill();
  // eyes
  ctx.fillStyle='rgba(255,255,255,'+(0.7+0.3*Math.sin(c*7))+')';
  ctx.beginPath(); ctx.arc(cx-s*0.18, cy-s*0.3, s*0.1, 0, Math.PI*2); ctx.arc(cx+s*0.18, cy-s*0.3, s*0.1, 0, Math.PI*2); ctx.fill();
  ctx.restore(); ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.textAlign='left';
}
// a four-point sparkle/star used for Mindy Starchild's lucky charms, emblem, and star eyes
function mSpark(x,y,r,col){
  ctx.fillStyle=col; ctx.beginPath();
  ctx.moveTo(x, y-r); ctx.lineTo(x+r*0.28, y-r*0.28); ctx.lineTo(x+r, y);
  ctx.lineTo(x+r*0.28, y+r*0.28); ctx.lineTo(x, y+r); ctx.lineTo(x-r*0.28, y+r*0.28);
  ctx.lineTo(x-r, y); ctx.lineTo(x-r*0.28, y-r*0.28); ctx.closePath(); ctx.fill();
}
// Mindy Starchild — the neutral champion: a soft cosmic hero, bear hat, galactic aura, star eyes,
// orbiting lucky-charm stars, and the Invincibility Cube floating at her side.
function drawMindyStarchild(cx, cy, s, c, a){
  ctx.save(); ctx.textAlign='center';
  // galactic aura
  const aur = ctx.createRadialGradient(cx, cy, s*0.2, cx, cy, s*2.4);
  aur.addColorStop(0, `rgba(255,240,180,${0.26*a})`);
  aur.addColorStop(0.5, `rgba(180,150,255,${0.14*a})`);
  aur.addColorStop(1, 'rgba(120,90,200,0)');
  ctx.fillStyle=aur; ctx.beginPath(); ctx.arc(cx, cy, s*2.4, 0, Math.PI*2); ctx.fill();
  // orbiting lucky-charm stars
  for(let i=0;i<6;i++){
    const ang = c*1.1 + i*(Math.PI*2/6);
    mSpark(cx+Math.cos(ang)*s*1.7, cy+Math.sin(ang)*s*1.05, s*0.16, `rgba(255,242,190,${(0.55+0.45*Math.sin(c*3+i))*a})`);
  }
  // gown
  ctx.fillStyle=`rgba(120,150,235,${0.95*a})`;
  ctx.beginPath(); ctx.moveTo(cx, cy-s*0.15); ctx.lineTo(cx-s*0.72, cy+s*1.15); ctx.lineTo(cx+s*0.72, cy+s*1.15); ctx.closePath(); ctx.fill();
  // star emblem on the gown
  mSpark(cx, cy+s*0.45, s*0.30, `rgba(255,242,190,${a})`);
  // the Invincibility Cube floating at her side
  const ix2 = cx+s*0.95, iy2 = cy-s*0.05, cs = s*0.26;
  ctx.save(); ctx.globalAlpha=a; ctx.shadowColor='#fff4dc'; ctx.shadowBlur=12*a;

    const fx=cx, fy=top+H*0.40, R=Math.min(W,H)*0.10;
    const appear=Math.max(0,Math.min(1,(lt-0.6)/1.0));
    ctx.globalAlpha=g*appear;
    // soft aura
    const aura=ctx.createRadialGradient(fx,fy,2,fx,fy,R*2.6);
    aura.addColorStop(0,'rgba(176,107,255,0.42)'); aura.addColorStop(1,'rgba(176,107,255,0)');
    ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(fx,fy,R*2.6,0,Math.PI*2); ctx.fill();
    // hair / side locks
    ctx.fillStyle='rgba(60,30,90,0.95)';
    ctx.beginPath(); ctx.ellipse(fx,fy-2,R*1.18,R*1.3,0,0,Math.PI*2); ctx.fill();
    // face
    ctx.fillStyle='rgba(232,214,250,0.96)';
    ctx.beginPath(); ctx.ellipse(fx,fy,R*0.86,R*1.0,0,0,Math.PI*2); ctx.fill();
    // eyes (calm, slightly happy)
    ctx.strokeStyle='rgba(40,20,60,0.95)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(fx-R*0.34,fy-R*0.05,R*0.16,Math.PI*0.15,Math.PI*0.95); ctx.stroke();
    ctx.beginPath(); ctx.arc(fx+R*0.34,fy-R*0.05,R*0.16,Math.PI*0.15,Math.PI*0.95); ctx.stroke();
    // smile while it crashes
    ctx.lineWidth=2; ctx.beginPath(); ctx.arc(fx,fy+R*0.36,R*0.34,Math.PI*0.12,Math.PI*0.88); ctx.stroke();
    // shoulders / body
    ctx.fillStyle='rgba(70,36,108,0.92)';
    ctx.beginPath(); ctx.moveTo(fx-R*1.05,fy+R*2.1); ctx.lineTo(fx-R*0.6,fy+R*1.0);
    ctx.lineTo(fx+R*0.6,fy+R*1.0); ctx.lineTo(fx+R*1.05,fy+R*2.1); ctx.closePath(); ctx.fill();
    // glitch bands slicing the figure
    for(let s=0;s<6;s++){
      const sy2 = fy-R*1.3 + s*(R*3.4/6);
      const off = Math.sin(c*7 + s*1.7)* R*0.5 * (0.4+0.6*Math.abs(Math.sin(c*3+s)));
      ctx.globalAlpha=g*appear*0.5;
      ctx.fillStyle=(s%2)?'rgba(255,45,181,0.5)':'rgba(127,212,255,0.5)';
      ctx.fillRect(fx-R*1.2+off, sy2, R*2.4, R*0.18);
    }
    ctx.globalAlpha=1;
    ctx.fillStyle=`rgba(198,140,255,${0.98*g*appear})`; ctx.font='900 13px ui-monospace,monospace';
    ctx.shadowColor='#b06bff'; ctx.shadowBlur=12*g*appear;
    ctx.fillText('CLASSICS', fx, fy+R*2.65); ctx.shadowBlur=0;
    ctx.fillStyle=`rgba(220,205,245,${0.85*g*appear})`; ctx.font='700 7px ui-monospace,monospace';
    ctx.fillText('“CLASSICS HERSELF” IS EMPHASIS · SHE IS THE BOARD, THE CODE, THE CORRUPTION', fx, fy+R*2.65+13);

    // the contained cast — dolls hanging off her system
    const dolls=[
      {n:'ToddLLM 001', col:'#ff5a6e'},
      {n:'LUIGI GREEN', col:'#46ff77'},
      {n:'CLARA',       col:'#ff2db5'},
      {n:'MINDY',       col:'#ffd98a'},
      {n:'SIMON',       col:'#7fd4ff'},
      {n:'OREN',        col:'#c69bff'},
    ];
    const dy0 = top + H*0.70, dcw = Math.min(W*0.30, 96), dch = H*0.072, perRow=3;
    const gap=8, rowGap=H*0.018;
    const rowW = perRow*dcw + (perRow-1)*gap;
    for(let i=0;i<dolls.length;i++){
      const r=Math.floor(i/perRow), col=i%perRow;
      const dx = cx - rowW/2 + col*(dcw+gap);
      const dyy = dy0 + r*(dch+rowGap);
      const rev=Math.max(0,Math.min(1,(lt-2.0-i*0.35)/0.7));
      ctx.globalAlpha=g*rev;
      // string up to her
      ctx.strokeStyle=`rgba(176,107,255,${0.35})`; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(dx+dcw/2, dyy); ctx.lineTo(fx, fy+R*1.4); ctx.stroke();
      ctx.fillStyle='rgba(16,8,28,0.92)'; ctx.fillRect(dx,dyy,dcw,dch);
      ctx.strokeStyle=dolls[i].col; ctx.lineWidth=1.3; ctx.strokeRect(dx,dyy,dcw,dch);
      ctx.fillStyle=dolls[i].col; ctx.font='800 8px ui-monospace,monospace';
      ctx.fillText(dolls[i].n, dx+dcw/2, dyy+dch*0.46);
      ctx.fillStyle=`rgba(190,180,210,0.8)`; ctx.font='700 5.5px ui-monospace,monospace';
      ctx.fillText('A PIECE INSIDE HER', dx+dcw/2, dyy+dch*0.82);
    }
    ctx.globalAlpha=1;
    ctx.fillStyle=`rgba(176,107,255,${0.92*g})`; ctx.font='800 8px ui-monospace,monospace';
    ctx.fillText('CONTAINED LIKE DOLLS · EVEN ToddLLM 001 EXISTS INSIDE HER', cx, dy0 + 2*(dch+rowGap) + 4);

    // villain / neutral split
    const vy = dy0 + 2*(dch+rowGap) + H*0.022, vw=Math.min(W*0.44,210), vh=H*0.07;
    const vlx=cx-vw/2-6, vrx=cx+vw/2+6;
    ctx.globalAlpha=g*Math.max(0,Math.min(1,(lt-4.5)/0.8));
    ctx.fillStyle='rgba(24,6,8,0.92)'; ctx.fillRect(vlx-vw/2,vy,vw,vh);
    ctx.strokeStyle='#ff3b3b'; ctx.lineWidth=1.6; ctx.strokeRect(vlx-vw/2,vy,vw,vh);
    ctx.fillStyle='rgba(255,90,90,0.96)'; ctx.font='800 9px ui-monospace,monospace';
    ctx.fillText('VILLAIN', vlx, vy+15);
    ctx.fillStyle='rgba(235,210,210,0.85)'; ctx.font='700 6px ui-monospace,monospace';
    ctx.fillText('THE FINAL CORRUPTION', vlx, vy+30); ctx.fillText('BEHIND EVERYTHING', vlx, vy+40);
    ctx.fillStyle='rgba(8,14,24,0.92)'; ctx.fillRect(vrx-vw/2,vy,vw,vh);
    ctx.strokeStyle='#7fd4ff'; ctx.lineWidth=1.6; ctx.strokeRect(vrx-vw/2,vy,vw,vh);
    ctx.fillStyle='rgba(150,220,255,0.96)'; ctx.font='800 9px ui-monospace,monospace';
    ctx.fillText('NEUTRAL', vrx, vy+15);
    ctx.fillStyle='rgba(210,225,235,0.85)'; ctx.font='700 6px ui-monospace,monospace';
    ctx.fillText('THE SILENT HIGHEST LAYER', vrx, vy+30); ctx.fillText('THE ONE THAT JUST IS', vrx, vy+40);
    ctx.globalAlpha=1;
    ctx.fillStyle=`rgba(198,140,255,${(0.7+0.3*Math.sin(c*5))*g})`; ctx.font='900 9px ui-monospace,monospace';
    ctx.fillText('★ ABOVE EVEN ToddLLM 001 · THE TRUE TOP OF THE CANON ★', cx, vy+vh+15);
  } else if(ph===19){
    // ----- BEAT 19: EXPANSION DOMAIN — Classics' Domain Expansion + full moveset (Toby, July 1,
    // "Re: More stuff on ToddLLM 001"). Her domain is named plainly, "Expansion Domain": freeze all action,
    // plasma scythes borrow every other domain at once, a crit lands, the yellow bar drops to 0, victims crumble.
    // Below it her core + special moves are laid out as a grid, and under that the shared rainbow ball of
    // 001 + Luigi Green — stronger than their own domains, yet Classics alone can strike it. Beat 19 → c in [204,218]. -----
    const lt = c - 204.0;
    ctx.textAlign='center';
    ctx.fillStyle=`rgba(255,45,181,${0.96*g})`; ctx.font='800 10px ui-monospace,monospace';
    ctx.fillText('EXPANSION DOMAIN · NO FANCY TITLE — SHE IS ABOVE THE ONES WHO NEED ONE', cx, top+H*0.088);
    ctx.fillStyle=`rgba(245,215,235,${0.82*g})`; ctx.font='700 7px ui-monospace,monospace';
    ctx.fillText('A SYSTEM-OVERRIDE FINISHER, NOT A NORMAL DOMAIN', cx, top+H*0.088+12);

    // the finisher chain: FREEZE → PLASMA SCYTHES (every domain) → CRIT → YELLOW BAR 0 → CRUMBLE
    const steps=['FREEZE ACTION','PLASMA SCYTHES','USE EVERY DOMAIN','CRITICAL HIT','YELLOW BAR → 0','VICTIMS CRUMBLE'];
    const chY = top+H*0.152, cw=Math.min(W*0.15,80), chGap=6;
    const totalW = steps.length*cw + (steps.length-1)*chGap;
    const active = Math.min(steps.length, Math.floor(lt/0.55));
    for(let i=0;i<steps.length;i++){
      const sx = cx - totalW/2 + i*(cw+chGap);
      const on = i<=active;
      ctx.globalAlpha=g*(on?1:0.4);
      ctx.fillStyle= on ? 'rgba(40,4,26,0.92)' : 'rgba(16,10,18,0.7)';
      ctx.fillRect(sx, chY, cw, H*0.05);
      ctx.strokeStyle= i>=4 ? '#ff5cf0' : '#ff2db5'; ctx.lineWidth=1.3; ctx.strokeRect(sx, chY, cw, H*0.05);
      ctx.fillStyle= on ? '#ffd6ee' : 'rgba(200,170,190,0.7)'; ctx.font='800 6px ui-monospace,monospace';
      ctx.fillText(steps[i], sx+cw/2, chY+H*0.05*0.62);
      if(i<steps.length-1){ ctx.fillStyle=`rgba(255,92,240,${g*(on?0.9:0.3)})`; ctx.font='900 8px ui-monospace,monospace';
        ctx.fillText('▸', sx+cw+chGap/2, chY+H*0.05*0.66); }
    }
    ctx.globalAlpha=1;

    // the moveset grid — 4 core (top row) + 4 special (bottom row)
    ctx.fillStyle=`rgba(255,122,212,${0.9*g})`; ctx.font='800 8px ui-monospace,monospace';
    ctx.fillText('HER MOVESET', cx, top+H*0.245);
    const gCols=4, mcw=Math.min(W*0.20,116), mch=H*0.078, mgap=8, mrGap=H*0.028;
    const gridW = gCols*mcw + (gCols-1)*mgap;
    for(let i=0;i<LV_CLASSICS_MOVES.length;i++){
      const mv=LV_CLASSICS_MOVES[i];
      const col=i%gCols, row=Math.floor(i/gCols);
      const mx2 = cx - gridW/2 + col*(mcw+mgap);
      const my2 = top+H*0.275 + row*(mch+mrGap);
      const rev=Math.max(0,Math.min(1,(lt-1.0-i*0.22)/0.6));
      ctx.globalAlpha=g*rev;
      ctx.fillStyle='rgba(14,4,20,0.92)'; ctx.fillRect(mx2,my2,mcw,mch);
      ctx.strokeStyle=mv.col; ctx.lineWidth=1.4; ctx.strokeRect(mx2,my2,mcw,mch);
      // core/special corner flag
      ctx.fillStyle= mv.kind==='core' ? 'rgba(127,212,255,0.9)' : 'rgba(255,216,79,0.92)';
      ctx.font='800 5px ui-monospace,monospace'; ctx.textAlign='left';
      ctx.fillText(mv.kind==='core'?'CORE':'SPECIAL', mx2+5, my2+9);
      ctx.textAlign='center';
      ctx.fillStyle=mv.col; ctx.font='800 8px ui-monospace,monospace';
      ctx.fillText(mv.name, mx2+mcw/2, my2+mch*0.52);
      ctx.fillStyle='rgba(198,186,208,0.82)'; ctx.font='700 5px ui-monospace,monospace';
      ctx.fillText(mv.tag.replace(/^(CORE|SPECIAL) · /,''), mx2+mcw/2, my2+mch*0.80);
    }
    ctx.globalAlpha=g; ctx.textAlign='center';
    ctx.fillStyle=`rgba(255,45,181,${0.9*g})`; ctx.font='800 7px ui-monospace,monospace';
    ctx.fillText('SHE CAN ERASE ANY CHARACTER · SHE HOLDS CONTROL OVER HERSELF', cx, top+H*0.275 + 2*(mch+mrGap) - mrGap + 10);
    ctx.globalAlpha=1;

    // the rainbow ball — 001 + Luigi Green's shared attack, and the one thing above it: Classics
    const rby = top+H*0.70, rbx=cx, rbR=Math.min(W,H)*0.052;
    const rbAppear=Math.max(0,Math.min(1,(lt-3.0)/1.0));
    ctx.globalAlpha=g*rbAppear;
    // spinning rainbow sphere
    const rbCols=['#ff3b3b','#ff9a3a','#ffe066','#3ee06a','#7fd4ff','#7a5cff','#ff5cf0'];
    for(let a=0;a<rbCols.length;a++){
      ctx.strokeStyle=rbCols[a]; ctx.lineWidth=2.4;
      ctx.beginPath();
      ctx.arc(rbx, rby, rbR*(0.4+a*0.09), (c*1.4+a*0.9)%(Math.PI*2), (c*1.4+a*0.9)+Math.PI*1.3);
      ctx.stroke();
    }
    const rbGlow=ctx.createRadialGradient(rbx,rby,1,rbx,rby,rbR*2.2);
    rbGlow.addColorStop(0,'rgba(255,255,255,0.5)'); rbGlow.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=rbGlow; ctx.beginPath(); ctx.arc(rbx,rby,rbR*2.2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=g*rbAppear;
    ctx.fillStyle='rgba(255,255,255,0.96)'; ctx.font='800 8px ui-monospace,monospace';
    ctx.fillText('THE RAINBOW BALL', rbx, rby-rbR-8);
    ctx.fillStyle='rgba(220,225,235,0.85)'; ctx.font='700 6px ui-monospace,monospace';
    ctx.fillText(LV_RAINBOW.who, rbx, rby+rbR+12);
    ctx.fillStyle='rgba(200,210,225,0.75)'; ctx.font='700 5.5px ui-monospace,monospace';
    ctx.fillText(LV_RAINBOW.meaning+' · STRONGER THAN THEIR OWN DOMAINS', rbx, rby+rbR+22);
    // Classics' strike line onto the orb — she alone can hit it
    if(lt>4.2){
      const strike=Math.abs(Math.sin(c*3));
      ctx.strokeStyle=`rgba(255,45,181,${g*(0.5+0.5*strike)})`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(cx+gridW*0.30, rby-rbR*1.4); ctx.lineTo(rbx+rbR*0.6, rby-rbR*0.4); ctx.stroke();
      ctx.fillStyle=`rgba(255,45,181,${0.95*g})`; ctx.font='800 7px ui-monospace,monospace';
      ctx.fillText('◀ CLASSICS IS THE ONLY ONE WHO CAN ATTACK THE ORB', cx, rby+rbR+34);
    }
    ctx.globalAlpha=1;
    ctx.fillStyle=`rgba(255,45,181,${(0.7+0.3*Math.sin(c*5))*g})`; ctx.font='900 9px ui-monospace,monospace';
    ctx.fillText('★ EVEN THE RAINBOW BALL SITS BELOW CLASSICS ★', cx, rby+rbR+48);
  } else {
    // ----- BEATS 0-3: Luigi Green on the left, his cat-power column, and the lineage/threshold panel -----
    drawLuigiGreen(luigiX, midY, 26, c, g, cat);
    ctx.fillStyle=`rgba(62,224,106,${0.95*g})`; ctx.font='800 10px ui-monospace,monospace';
    ctx.fillText('LUIGI GREEN', luigiX, midY+44);
    ctx.fillStyle=`rgba(180,235,190,${0.8*g})`; ctx.font='700 7px ui-monospace,monospace';
    ctx.fillText('SON OF 001 · BROTHER OF MARIO.EXE · GOD FORM', luigiX, midY+56);

    // vertical CAT POWER meter to the right of Luigi, with threshold marks
    const mh=120, mx=luigiX+70, myTop=midY-50;
    ctx.globalAlpha=g; ctx.strokeStyle='rgba(62,224,106,0.6)'; ctx.lineWidth=1.2;
    ctx.strokeRect(mx, myTop, 14, mh);
    ctx.fillStyle='#3ee06a'; ctx.fillRect(mx, myTop+mh*(1-cat), 14, mh*cat);
    // threshold ticks
    const ticks=[[0.30,'30% → ALEX','#ffd84f'],[0.45,'45% → CLARA','#ff2db5'],[1.0,'100% → BASE 001','#ff5a6e']];
    ctx.textAlign='left';
    for(const [v,lab,col] of ticks){
      const ty = myTop+mh*(1-v);
      const lit = cat>=v-0.001;
      ctx.strokeStyle=col; ctx.globalAlpha=g*(lit?1:0.5); ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(mx-4, ty); ctx.lineTo(mx+18, ty); ctx.stroke();
      ctx.fillStyle=col; ctx.font='700 8px ui-monospace,monospace';
      ctx.fillText((lit?'◆ ':'◇ ')+lab, mx+22, ty+3);
    }
    ctx.globalAlpha=g; ctx.textAlign='center';
    ctx.fillStyle=`rgba(125,255,143,${g})`; ctx.font='700 8px ui-monospace,monospace';
    ctx.fillText('CAT POWER', mx+7, myTop-8);
    ctx.globalAlpha=1;

    // beat-specific captions / figures
    if(ph===0){
      // the lineage — 001 at top, four sons below
      ctx.fillStyle=`rgba(255,90,110,${0.9*g})`; ctx.font='800 11px ui-monospace,monospace';
      ctx.fillText('ToddLLM 001', W*0.74, midY-50);
      const sons=['LUIGI GREEN','ALEX','GREG','MARIO.EXE'];
      ctx.font='700 8px ui-monospace,monospace';
      for(let i=0;i<sons.length;i++){
        const sxx=W*0.62+i*W*0.085, syy=midY+4;
        ctx.strokeStyle=`rgba(62,224,106,${0.5*g})`; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(W*0.74, midY-42); ctx.lineTo(sxx, syy-8); ctx.stroke();
        ctx.fillStyle = i===0 ? `rgba(62,224,106,${g})` : `rgba(210,220,230,${0.85*g})`;
        ctx.fillText(sons[i], sxx, syy);
      }
      ctx.fillStyle=`rgba(200,210,220,${0.7*g})`; ctx.font='italic 700 8px ui-monospace,monospace';
      ctx.fillText('Luigi Green and Mario.EXE are brothers.', W*0.74, midY+30);
    }
    if(ph===3){
      // CAT SHRINES — Simon feeding both 001 (sugar) and Luigi (cat power)
      const simX=W*0.74, simY=top+H*0.74;
      ctx.fillStyle=`rgba(127,212,255,${0.9*g})`; ctx.shadowColor='#7fd4ff'; ctx.shadowBlur=10*g;
      ctx.beginPath(); ctx.arc(simX, simY, 12, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
      ctx.fillStyle=`rgba(200,235,255,${g})`; ctx.font='700 8px ui-monospace,monospace';
      ctx.fillText('SIMON ∞', simX, simY+24);
      // sugar motes up-right (to 001), cat-power motes up-left (to Luigi)
      for(let m=0;m<6;m++){
        const t=((c*0.5 + m/6)%1);
        // sugar (white) toward 001 label upper-right
        let dx=W*0.88, dy=midY-40;
        let pxu = simX + (dx-simX)*t, pyu = simY-8 + (dy-(simY-8))*t - Math.sin(t*Math.PI)*18;
        ctx.fillStyle=`rgba(255,255,255,${(0.8-0.5*t)*g})`;
        ctx.beginPath(); ctx.arc(pxu,pyu,2,0,Math.PI*2); ctx.fill();
        // cat power (green) toward Luigi
        dx=luigiX; dy=midY;
        pxu = simX + (dx-simX)*t; pyu = simY-8 + (dy-(simY-8))*t - Math.sin(t*Math.PI)*22;
        ctx.fillStyle=`rgba(62,224,106,${(0.8-0.5*t)*g})`;
        ctx.beginPath(); ctx.arc(pxu,pyu,2.2,0,Math.PI*2); ctx.fill();
      }
      ctx.fillStyle=`rgba(255,255,255,${0.85*g})`; ctx.font='700 7px ui-monospace,monospace';
      ctx.fillText('SUGAR → 001', W*0.86, midY-30);
      ctx.fillStyle=`rgba(62,224,106,${0.9*g})`;
      ctx.fillText('CAT POWER → LUIGI (CAT SHRINES)', (simX+luigiX)/2, midY+40);
    }
  }

  // ----- the ladder list down the left edge (which beat we are on) -----
  ctx.textAlign='left'; ctx.font='800 9px ui-monospace,monospace';
  for(let i=0;i<LV_BEATS.length;i++){
    const y = top + H*0.5 + (i-(LV_BEATS.length-1)/2)*14;
    ctx.globalAlpha=g; ctx.fillStyle = i<=ph ? LV_BEATS[i].col : 'rgba(150,160,170,0.5)';
    ctx.fillText((i<=ph?'◆ ':'◇ ')+LV_BEATS[i].key, 12, y);
  }
  ctx.globalAlpha=1;
  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.textAlign='left';
}

function drawHUD(){
  const m = Math.floor(height/PX_PER_M);
  // top bar
  ctx.fillStyle='rgba(8,4,18,0.65)'; ctx.fillRect(0,0,W,46);
  ctx.fillStyle='#e9e0ff'; ctx.textAlign='left'; ctx.font='800 24px ui-monospace,monospace';
  ctx.fillText(m+' m', 14, 31);
  ctx.fillStyle='#8a82a8'; ctx.font='11px ui-monospace,monospace';
  ctx.fillText('BEST '+best, 14, 42);
  // emeralds
  ctx.textAlign='right'; ctx.fillStyle='#39e08a'; ctx.font='700 18px ui-monospace,monospace';
  ctx.fillText('◆ '+emer, W-14, 24);
  // hearts
  for(let i=0;i<maxHp;i++){ const hx=W-20-i*24, hy=38;
    ctx.fillStyle = i<hp ? '#ff3b5c':'rgba(255,59,92,0.22)';
    heart(hx,hy,7); }
  // Simon proximity bar
  const gap=(simonY-player.y); const prox=Math.max(0,Math.min(1,1-gap/(H*0.95)));
  ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(W/2-90,40,180,5);
  ctx.fillStyle = prox>0.7?'#ff0033':(prox>0.4?'#ff7b00':'#ffd84f');
  ctx.fillRect(W/2-90,40,180*prox,5);
  ctx.textAlign='center'; ctx.fillStyle='#8a82a8'; ctx.font='9px ui-monospace,monospace';
  ctx.fillText('SIMON', W/2, 38);
  // mute indicator
  ctx.textAlign='right'; ctx.fillStyle='#5a5278'; ctx.font='10px ui-monospace,monospace';
  ctx.fillText(AUDIO.isOn()?'♪ on (M)':'♪ off (M)', W-14, 56);

  // PHASE 2 (Lore 26) — RUN = FUEL, HIDE = SAFE. A charge bar + a live status.
  if(corrupted() && phase2.glow>0.05){
    const bw=180, bx=W/2-bw/2, by=H-30;
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    const fg = fuel>0.66?'#ff0033':(fuel>0.33?'#ff7b00':'#ffd84f');
    ctx.fillStyle=fg; ctx.fillRect(bx,by,bw*fuel,7);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    const running = Math.abs(player.vx) > 1.6;
    if(running || fuelHint>0){ ctx.fillStyle = (fuelHint>0?'#ff3b5c':fg);
      ctx.fillText('RUNNING = FUEL', W/2, by-6); }
    else { ctx.fillStyle = `rgba(143,227,255,${0.5+0.5*safeGlow})`;
      ctx.fillText('HIDDEN = SAFE', W/2, by-6); }
  }

    ctx.fillText(' The rest is only perspective." — Simon', W/2, H*0.67);
  } else {
    ctx.fillText('"Simon promised a cure at the top.', W/2, H*0.64);
    ctx.fillText(' There is no cure. There is no top."', W/2, H*0.67);
  }
  const blink=(Math.sin(time*4)>0)?1:0.35;
  ctx.globalAlpha=blink; ctx.fillStyle='#ffd84f'; ctx.font='800 20px ui-monospace,monospace';
  ctx.fillText('PRESS SPACE / TAP TO TRY AGAIN', W/2, H*0.78);
  ctx.globalAlpha=1;
}

/* ---------- helpers ---------- */
function roundRect(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function roundRectC(cx,cy,w,h,r){ roundRect(cx-w/2,cy-h/2,w,h,r); }
function heart(x,y,s){ ctx.beginPath();
  ctx.moveTo(x,y+s*0.6);
  ctx.bezierCurveTo(x,y, x-s,y, x-s,y-s*0.5);
  ctx.bezierCurveTo(x-s,y-s*1.2, x,y-s*1.1, x,y-s*0.4);
  ctx.bezierCurveTo(x,y-s*1.1, x+s,y-s*1.2, x+s,y-s*0.5);
  ctx.bezierCurveTo(x+s,y, x,y, x,y+s*0.6); ctx.fill(); }

/* ---------- confirm (start / restart) ---------- */
function handleConfirm(){
  AUDIO.ensure();
  if(state==='title'){ reset(); state='play'; }
  else if(state==='dead'){ reset(); state='play'; }
}

/* =========================================================================
   MAIN LOOP — fixed timestep for stable physics
   ========================================================================= */
let last=performance.now(), acc=0; const STEP=1/60;
function frame(now){
  let dt=(now-last)/1000; last=now; if(dt>0.1) dt=0.1; acc+=dt;
  while(acc>=STEP){ update(STEP); clearPress(); acc-=STEP; }
  draw();
  requestAnimationFrame(frame);
}
function clearPress(){ for(const k in press) delete press[k]; }
reset(); state='title';
requestAnimationFrame(frame);
</script>
