/* =========================================================================
   Lore 29 — THE PLAGUE CYCLE / SCF-404: THE SLEEPING PLAGUE KING
   Simon becomes a ritual figure: call for a sacrifice, lift the mask for one
   cold touch (404D / zombie / dead), rage with a storm when an outcome "goes
   wrong" (a resurrection), then calm and tidy the body with anti-virus. The
   PLAGUE-KING PROTOCOL meter rewards keeping clear: no direct contact.
   ========================================================================= */
const PLAGUE_FATES = ['404D','ZOMBIE','DEAD'];
function updatePlague(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  plague.anim = (plague.anim||0) + dt;
  plague.eye = 0.5 + 0.5*Math.abs(Math.sin(plague.anim*0.9));     // the cold yellow eyes pulse
  plague.callFlash = Math.max(0, (plague.callFlash||0) - dt*1.6);
  // the mask grows back between touches; it only ever lifts in the 'touch' beat
  if(plague.phase!=='touch') plague.mask = Math.min(1, (plague.mask||0) + dt*2.2);

  // drifting victims he can select from — to him the living look dead, so they shuffle in slowly
  plague.victimT = (plague.victimT||0) - dt;
  if(plague.victimT <= 0){ plague.victimT = rnd(1.0, 2.0);
    if(plague.victims.length < 5){
      plague.victims.push({ x: rnd(W*0.14, W*0.86), y: cameraY + rnd(H*0.32, H*0.70),
        t:0, life: rnd(4.0, 6.0), vx: rnd(-10, 10), sel:false });
    }
  }
  for(const v of plague.victims){ v.t += dt; v.x += (v.vx||0)*dt; }
  plague.victims = plague.victims.filter(v => v.t < v.life && !v.taken);

  // converted things rise and fade with their fate label stamped on
  for(const c of plague.converts) c.t += dt;
  plague.converts = plague.converts.filter(c => c.t < 1.8);

  // the storm only burns while he is raging; otherwise it bleeds away and he calms
  plague.storm = Math.max(0, Math.min(1, (plague.storm||0) + ((plague.phase==='wrong') ? dt*1.6 : -dt*0.9)));
  plague.rage = Math.max(0, (plague.rage||0) - dt*1.1);
  // the anti-virus table cleanup runs during 'calm'
  plague.table.spray = Math.max(0, (plague.table.spray||0) - dt*0.8);
  if(plague.table.t>0) plague.table.t = Math.max(0, plague.table.t - dt*0.5);

  // ---- the cycle: CALL → RITUAL TOUCH → (CORRECTION on a wrong outcome) → CALM ----
  plague.phaseT -= dt;
  if(plague.phaseT <= 0){
    if(plague.phase==='call'){
      // GIVE ME A SACRIFICE — select the nearest drifting victim, lift the mask, deliver the cold touch
      plague.phase = 'touch'; plague.phaseT = 0.55; plague.mask = 0;
      let best=null, bd=1e9;
      for(const v of plague.victims){ const d=Math.abs(v.x-W*0.5); if(!v.taken && d<bd){ bd=d; best=v; } }
      if(best){ best.taken = true;
        const fate = pick(PLAGUE_FATES);
        plague.converts.push({ x:best.x, y:best.y, t:0, fate });
        plague.table = { t:1.0, fate, spray:0 };     // the body goes to the anti-virus table next
        AUDIO.zap(); shake = Math.max(shake, 7);
        showTaunt('The mask lifts for one cold touch. '+fate+'. To Simon, that is a cure.');
      }
    } else if(plague.phase==='touch'){
      // sometimes the outcome "goes wrong" — something resurrects, which to him is the exact opposite
      if(Math.random() < 0.34){
        plague.phase = 'wrong'; plague.phaseT = 2.0; plague.rage = 1;
        shake = Math.max(shake, 12); glitch = Math.max(glitch, 0.4); AUDIO.zap();
        showTaunt('"Why did you make him resurrect?! You did the exact opposite!" Simon raises a storm.');
        floaters.push({ x:player.x, y:player.y-34, t:0, txt:'A RESURRECTION — SIMON RAGES', col:'#ff3b5c' });
      } else {
        plague.phase = 'calm'; plague.phaseT = 1.8; plague.table.spray = 1;
      }
    } else if(plague.phase==='wrong'){
      // the storm peaks, then he calms — the cycle always returns to calm
      plague.phase = 'calm'; plague.phaseT = 1.8; plague.table.spray = 1;
      showTaunt('The storm stops. He calms, lays the body the other way up, sprays anti-virus.');
    } else { // 'calm' — the body is sprayed and vanishes so it "does not stink," then he calls again
      plague.phase = 'call'; plague.phaseT = rnd(1.8, 2.6); plague.callFlash = 1;
      plague.table = { t:0, fate:'', spray:0 };
    }
  }

  // the PLAGUE-KING PROTOCOL meter — climb with purpose to keep the protocol (no direct contact);
  // standing still lets him close the distance for a "cure"-touch and drains the meter
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  plagueM = Math.max(0, Math.min(1, plagueM + (moving ? dt*0.05 : -dt*0.03)));
  plague.eventT -= dt;
  if(plague.eventT <= 0){ plague.eventT = rnd(2.2, 3.6);
    const ev = ['THE PLAGUE CYCLE','SCF-404: THE SLEEPING PLAGUE KING','"GIVE ME A SACRIFICE!"',
                'ONE TOUCH: 404D · ZOMBIE · DEAD','HE THINKS THE DEAD ARE LIVING','PLAGUE LOOKS LIKE CURE',
                'PLAGUE-KING PROTOCOL — NO DIRECT CONTACT','NO MASK-REMOVAL EVENTS','HE IS A WHOLE BROKEN GAME',
                'ANTI-VIRUS THE BODIES SO THEY DO NOT STINK','A CONVERSION ENTITY, NOT A BREACH',
                'NO ANTI-VIRUS LEFT WITHIN HIS REACH','HE THINKS HE IS HELPING','RAGE · RITUAL · CORRECTION · CALM'];
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(ev), col:'#9affc8' });
  }
  if(plagueM >= 1 && !plague.held){
    plague.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('You kept the Plague-King Protocol. No direct contact, no mask removed, no cure forced.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ PROTOCOL HELD — NO DIRECT CONTACT ★', col:'#bfffd8' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#9affc8','#7bdc6a','#bfffd8'])));
    AUDIO.zap();
  }
}

function drawPlague(){
  const g = plague.glow||0, top = cameraY, an = plague.anim||0;
  ctx.save();
  // a sick plague haze — green miasma bleeding to black, darker when the storm is up
  const st = plague.storm||0;
  const bg = ctx.createLinearGradient(0, top, 0, top+H);
  bg.addColorStop(0, `rgba(10,${18-Math.round(8*st)},14,${(0.34+0.20*st)*g})`);
  bg.addColorStop(1, `rgba(6,10,8,${(0.32+0.18*st)*g})`);
  ctx.fillStyle = bg; ctx.fillRect(0, top, W, H);
  ctx.globalAlpha = g;

  // the storm — slanting rain + lightning while Simon rages, then it bleeds away as he calms
  if(st > 0.02){
    ctx.strokeStyle = `rgba(150,200,180,${0.30*st*g})`; ctx.lineWidth=1;
    for(let i=0;i<40;i++){
      const rx = (i*53 + (an*220)%W) % W, ry = top + ((i*97 + an*420) % H);
      ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx-6, ry+16); ctx.stroke();
    }
    if(st > 0.45 && Math.sin(an*9)>0.6){
      ctx.strokeStyle = `rgba(180,255,210,${0.8*st})`; ctx.lineWidth=2;
      let lx = W*0.5 + Math.sin(an*3)*60, ly = top;
      ctx.beginPath(); ctx.moveTo(lx, ly);
      for(let s=0;s<7;s++){ lx += Math.sin(s*2.1 + an*30)*26; ly += H/7; ctx.lineTo(lx, ly); }
      ctx.stroke();
    }
  }

  // drifting VICTIMS — to Simon the living look dead, so they trudge in slowly
  for(const v of plague.victims){
    const fade = Math.min(1, v.t/0.4) * Math.min(1, (v.life-v.t)/0.6);
    ctx.globalAlpha = g*0.8*fade;
    ctx.fillStyle = v.sel ? '#cfe0d0' : '#8b9a8e';
    ctx.beginPath(); ctx.ellipse(v.x, v.y, 7, 14, 0, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(v.x, v.y-16, 6, 0, 6.28); ctx.fill();
  }
  ctx.globalAlpha = g;

  // CONVERTED things rising with their fate stamped on — 404D yellow, ZOMBIE green, DEAD gray
  for(const c of plague.converts){
    const p = Math.min(1, c.t/1.8); const cy = c.y - p*34;
    ctx.globalAlpha = g*(1-p)*0.95; ctx.textAlign='center';
    const col = c.fate==='404D' ? '#ffe24a' : (c.fate==='ZOMBIE' ? '#9fd06a' : '#b9b9c4');
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(c.x, cy, 6, 12, 0, 0, 6.28); ctx.fill();
    ctx.font='800 9px ui-monospace,monospace'; ctx.fillText(c.fate, c.x, cy-18);
  }
  ctx.globalAlpha = g;

  // the anti-virus TABLE off to the side — the body laid the other way up, sprayed so it "does not stink"
  const tx = W*0.84, tFloor = top + H - 92;
  ctx.strokeStyle = `rgba(150,160,170,${0.5*g})`; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(tx-26, tFloor); ctx.lineTo(tx+26, tFloor); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx-20, tFloor); ctx.lineTo(tx-22, tFloor+22);
  ctx.moveTo(tx+20, tFloor); ctx.lineTo(tx+22, tFloor+22); ctx.stroke();
  if((plague.table.t||0) > 0.02){
    // a body lying on the table (upside-down), fading as it is sprayed away
    const tt = plague.table.t;
    ctx.fillStyle = `rgba(150,150,160,${0.55*tt*g})`;
    ctx.beginPath(); ctx.ellipse(tx, tFloor-8, 18, 6, 0, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(tx-14, tFloor-8, 5, 0, 6.28); ctx.fill();   // head, the other way up
  }
  if((plague.table.spray||0) > 0.02){
    const sp = plague.table.spray;
    ctx.fillStyle = `rgba(120,230,170,${0.5*sp*g})`;
    for(let i=0;i<10;i++){ const a2=i*0.7+an*2, rr=6+12*sp;
      ctx.beginPath(); ctx.arc(tx + Math.cos(a2)*rr, tFloor-10 + Math.sin(a2)*rr*0.6, 1.6, 0, 6.28); ctx.fill(); }
  }
  ctx.textAlign='center'; ctx.fillStyle = `rgba(120,200,160,${0.6*g})`; ctx.font='700 7px ui-monospace,monospace';
  ctx.fillText('ANTI-VIRUS TABLE', tx, tFloor+34);

  // ---- SIMON, the masked Plague King — larger now (he is a whole game inside) ----
  const scx = W*0.40, sFloor = top + H - 96, bob = Math.sin(an*0.7)*1.6, sy0 = sFloor - 64 + bob;
  ctx.save();
  ctx.shadowBlur = 12 + 10*st; ctx.shadowColor = st>0.3 ? '#7bdc6a' : '#ffe24a';
  // a taller, broken body — robe of a ritual king
  ctx.fillStyle = '#2a3328';
  ctx.beginPath(); ctx.moveTo(scx-22, sy0+58); ctx.lineTo(scx-15, sy0+8); ctx.lineTo(scx+15, sy0+8);
  ctx.lineTo(scx+22, sy0+58); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#cfc6b0';                                   // the dim, damaged head
  ctx.beginPath(); ctx.ellipse(scx, sy0, 16, 15, 0, 0, 6.28); ctx.fill();
  // a thin crown of broken code over the king
  ctx.strokeStyle = `rgba(255,226,74,${0.85*g})`; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(scx-14, sy0-13); ctx.lineTo(scx-14, sy0-22); ctx.lineTo(scx-7, sy0-15);
  ctx.lineTo(scx, sy0-24); ctx.lineTo(scx+7, sy0-15); ctx.lineTo(scx+14, sy0-22); ctx.lineTo(scx+14, sy0-13);
  ctx.stroke();
  // the cold yellow eyes (always glowing, even behind the mask)
  const ey = plague.eye||0;
  ctx.shadowBlur = 8 + 14*ey;
  ctx.fillStyle = '#ffe24a';
  ctx.beginPath(); ctx.arc(scx-5, sy0-1, 2.0+1.2*ey, 0, 6.28); ctx.arc(scx+5, sy0-1, 2.0+1.2*ey, 0, 6.28); ctx.fill();
  ctx.restore();

  // the BEAK MASK — on by default; it lifts (slides up) only in the one cold-touch instant
  const mk = plague.mask||0;
  if(mk > 0.04){
    const lift = (1-mk)*16;                                    // how far the mask has risen off the face
    ctx.save();
    ctx.fillStyle = `rgba(40,46,38,${0.95*g})`;
    ctx.strokeStyle = `rgba(150,160,140,${0.6*g})`; ctx.lineWidth=1;
    // the long plague-doctor beak
    ctx.beginPath();
    ctx.moveTo(scx-9, sy0-3-lift); ctx.lineTo(scx-22, sy0+6-lift);
    ctx.lineTo(scx-7, sy0+9-lift); ctx.lineTo(scx+8, sy0+4-lift);
    ctx.lineTo(scx+9, sy0-3-lift); ctx.closePath(); ctx.fill(); ctx.stroke();
    // the two round mask eye-lenses
    ctx.fillStyle = `rgba(20,24,18,${0.9*g})`;
    ctx.beginPath(); ctx.arc(scx-5, sy0-2-lift, 3, 0, 6.28); ctx.arc(scx+5, sy0-2-lift, 3, 0, 6.28); ctx.fill();
    ctx.restore();
  } else {
    // mask is OFF — the cold touch: a hand reaching toward the nearest victim, chills in the air
    let tgt = plague.converts.length ? plague.converts[plague.converts.length-1] : null;
    const hx = tgt ? tgt.x : scx+40, hy = tgt ? tgt.y : sy0+10;
    ctx.strokeStyle = `rgba(200,220,255,${0.8*g})`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(scx+12, sy0+14); ctx.lineTo(hx, hy); ctx.stroke();
    ctx.fillStyle = `rgba(220,235,255,${0.9*g})`;
    ctx.beginPath(); ctx.arc(hx, hy, 4, 0, 6.28); ctx.fill();
    // chill rings off the cold touch
    ctx.strokeStyle = `rgba(180,220,255,${0.5*g})`; ctx.lineWidth=1;
    for(let r=0;r<3;r++){ ctx.beginPath(); ctx.arc(hx, hy, 5+r*6+(an*20%6), 0, 6.28); ctx.stroke(); }
  }

  // the call — GIVE ME A SACRIFICE!!! flashes when he calls
  ctx.textAlign='center';
  if((plague.callFlash||0) > 0.02 || plague.phase==='call'){
    const cf = Math.max(plague.callFlash||0, 0.5);
    ctx.fillStyle = `rgba(154,255,200,${cf*g})`; ctx.font='800 13px ui-monospace,monospace';
    ctx.fillText('GIVE ME A SACRIFICE!!!', scx, sy0-34);
  }
  // the cycle indicator — RAGE · RITUAL · CORRECTION · CALM, lit on the current beat
  const beats = [['RAGE','wrong'],['RITUAL','touch'],['CALL','call'],['CALM','calm']];
  ctx.font='700 8px ui-monospace,monospace';
  let bxs = scx - 78;
  for(const [lbl,ph] of beats){
    ctx.fillStyle = (plague.phase===ph) ? `rgba(255,242,176,${g})` : `rgba(140,160,150,${0.5*g})`;
    ctx.fillText(lbl, bxs, sFloor+18); bxs += 52;
  }
  // title line
  ctx.font='800 9px ui-monospace,monospace';
  ctx.fillStyle = `rgba(154,255,200,${(0.7+0.3*Math.abs(Math.sin(an*4)))*g})`;
  ctx.fillText('SCF-404: THE SLEEPING PLAGUE KING', scx, sy0-48);

  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

function updateDanger(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  danger.anim = (danger.anim||0) + dt;
  danger.logged = Math.min(DANGER_ROSTER.length, (danger.logged||0) + dt*1.4);   // the index scans in row by row
  danger.scan = (danger.scan||0) + dt;
  if(danger.phase!=='lift') danger.mask = Math.min(1, (danger.mask||0) + dt*2.0);  // mask grows back between encounters
  danger.burn = Math.max(0, (danger.burn||0) - dt*0.7);
  if(danger.phase==='approach') danger.imApproach = Math.min(1, (danger.imApproach||0) + dt*0.6);
  for(const f of danger.flames){ f.t += dt; f.y -= (f.vy||20)*dt; f.x += (f.vx||0)*dt; }
  danger.flames = danger.flames.filter(f => f.t < f.life);

  // ---- the cycle: LIST → INVISIBLE MAN APPROACHES → MASK LIFTS (he BURNS) → back to LIST ----
  danger.phaseT -= dt;
  if(danger.phaseT <= 0){
    if(danger.phase==='list'){
      danger.phase='approach'; danger.phaseT=2.0; danger.imApproach=0;
      showTaunt('THE INVISIBLE MAN — a floating shirt, pants, and hat — walks up: "It\'s ok."');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'THE INVISIBLE MAN: "IT\'S OK."', col:'#dfe7ff' });
    } else if(danger.phase==='approach'){
      // he reaches Simon; the mask lifts for one instant and he BURNS
      danger.phase='lift'; danger.phaseT=0.6; danger.mask=0; danger.burn=1; danger.imApproach=1;
      shake=Math.max(shake,9); glitch=Math.max(glitch,0.35); AUDIO.zap();
      for(let i=0;i<22;i++) danger.flames.push({ x: W*0.80 + rnd(-12,12), y: cameraY+H*0.52 + rnd(-10,10),
        t:0, life: rnd(0.5,1.1), vy: rnd(16,38), vx: rnd(-10,10) });
      showTaunt('Simon takes the mask off for one second. The Invisible Man is burned.');
    } else { // 'lift' → back to the list
      danger.phase='list'; danger.phaseT=rnd(2.4,3.4); danger.imApproach=0;
    }
  }

  // ---- BORT's lure cycle: DANCE ("Borty Borty Bort Bort") → LUNGE (chases, eats the soul, body rots) →
  //      SIMON SPRAYS the body → back to the harmless dance. The dance is the bait; the lunge is the danger. ----
  const b = danger.bort;
  b.t += dt; b.bounce = (b.bounce||0) + dt*8; b.song = (b.song||0) + dt;
  if(b.phase==='dance'){
    b.lunge = Math.max(0, (b.lunge||0) - dt*2);
    // close enough? the player walking past the index is the "victim getting too close" — also a steady cadence
    const near = Math.abs(player.x - W*0.50) < 120;
    if(b.t > (near ? 2.2 : 3.6)){
      b.phase='lunge'; b.t=0; AUDIO.zap(); shake=Math.max(shake,4);
      showTaunt('Bort stands up dramatically and chases the victim like crazy.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'BORT: "BORTY BORTY BORT BORT" — THEN HE LUNGES', col:'#cdd6df' });
    }
  } else if(b.phase==='lunge'){
    b.lunge = Math.min(1, (b.lunge||0) + dt*2.4);
    if(b.t > 1.3){ b.phase='soul'; b.t=0; b.soul=1; glitch=Math.max(glitch,0.25);
      floaters.push({ x:player.x, y:player.y-40, t:0, txt:'BORT EATS THE SOUL · THE BODY ROTS', col:'#7fae6e' }); }
  } else if(b.phase==='soul'){
    b.soul = Math.max(0, (b.soul||0) - dt*0.9);
    if(b.t > 1.0){ b.phase='spray'; b.t=0; b.spray=1;
      showTaunt('Simon is way higher than Bort. He finds the body and sprays it.');
      for(let i=0;i<10;i++) particles.push(spark(W*0.50, cameraY+H*0.62, '#7be0ff')); }
  } else { // 'spray' → body restored, Bort drops back to the harmless dance
    b.spray = Math.max(0, (b.spray||0) - dt*1.2);

  // THE DANGER INDEX meter — climb with purpose to log the whole ranking before the Invisible Man closes in

function drawDanger(){

    ctx.fillStyle = '#3a4256';                                  // pants

    ctx.beginPath();
    ctx.moveTo(scx-8, sy0-3-lift); ctx.lineTo(scx-20, sy0+6-lift);

  ctx.fillText('SIMON — 1004.04 — CRAZY', scx, sy0-30);

  // ---- BORT — a smooth rubbery bouncy gray horror bear, danger 996, on the index floor between Simon and the list ----

function drawBort(top, g, an){
  const b = danger.bort; if(!b) return;
  const bx = W*0.50, floor = top + H - 64;
  const lunge = b.lunge||0, soul = b.soul||0, spray = b.spray||0;
  const dancing = b.phase==='dance';
  // in the dance he is a squat bouncing rubber blob; in the lunge he rears up tall and leans at the player
  const bounce = dancing ? Math.abs(Math.sin(b.bounce))*7 : 0;
  const rear = lunge;                                   // 0 = squat & playful, 1 = stood up & attacking
  const by = floor - bounce - rear*18;
  const bw = 26 - rear*6, bh = 22 + rear*26;            // stretches tall when he stands
  const lean = Math.sign((player.x||W*0.5) - bx) * rear * 10;
  ctx.save();
  ctx.globalAlpha = g;
  // rubbery gray body — flushes an angry red as he lunges
  const bodyCol = `rgb(${Math.round(154+70*rear)},${Math.round(166-60*rear)},${Math.round(176-90*rear)})`;
  ctx.fillStyle = bodyCol;
  ctx.strokeStyle = `rgba(40,46,54,${0.6*g})`; ctx.lineWidth = 1.5;
  // body (rounded rubber lump)
  ctx.beginPath(); ctx.ellipse(bx+lean, by, bw, bh, 0, 0, 6.28); ctx.fill(); ctx.stroke();
  // two round ears
  ctx.beginPath(); ctx.arc(bx+lean-bw*0.7, by-bh*0.85, 6, 0, 6.28);
  ctx.arc(bx+lean+bw*0.7, by-bh*0.85, 6, 0, 6.28); ctx.fill(); ctx.stroke();
  // belly sheen (the smooth rubber highlight)
  ctx.fillStyle = `rgba(255,255,255,${0.10*g})`;
  ctx.beginPath(); ctx.ellipse(bx+lean-bw*0.3, by-bh*0.2, bw*0.35, bh*0.4, 0, 0, 6.28); ctx.fill();
  // eyes — friendly dots when dancing, wide hungry rings when lunging
  ctx.fillStyle = lunge>0.4 ? '#ff3b3b' : '#1a1f26';
  const er = 2.4 + rear*1.6;
  ctx.beginPath(); ctx.arc(bx+lean-7, by-bh*0.45, er, 0, 6.28); ctx.arc(bx+lean+7, by-bh*0.45, er, 0, 6.28); ctx.fill();
  // mouth — little smile when playful, gaping maw when he eats the soul
  ctx.strokeStyle = '#1a1f26'; ctx.lineWidth = 2;
  if(lunge>0.4 || soul>0.05){
    ctx.fillStyle = `rgba(20,8,12,${g})`;
    ctx.beginPath(); ctx.ellipse(bx+lean, by-bh*0.05, 6, 7+soul*4, 0, 0, 6.28); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(bx+lean, by-bh*0.18, 5, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  }
  ctx.restore();

  // the soul being pulled in — a pale wisp drawn up into Bort's maw
  if(soul>0.05){
    ctx.save(); ctx.globalAlpha = g*soul;
    ctx.fillStyle = '#bfe9ff';
    for(let i=0;i<5;i++){ const t=(b.song*2+i*0.5)%1; const sy=by+18-t*22;
      ctx.beginPath(); ctx.arc(bx+lean+Math.sin(t*6+i)*5, sy, 2.2*(1-t)+0.6, 0, 6.28); ctx.fill(); }
    ctx.restore();
  }
  // Simon's spray — a blue mist that restores the rotting body
  if(spray>0.05){
    ctx.save(); ctx.globalAlpha = g*spray;
    ctx.fillStyle = '#7be0ff';
    for(let i=0;i<8;i++){ ctx.beginPath();
      ctx.arc(bx+lean + Math.cos(an*3+i)*14, by + Math.sin(an*3+i)*12, 2+1.5*spray, 0, 6.28); ctx.fill(); }
    ctx.restore();
  }

  // the song — "Borty Borty Bort Bort" bobs above him while he dances; the tag flips to a warning on the lunge
  ctx.textAlign='center';
  if(dancing){
    const wob = Math.sin(b.song*5)*3;
    ctx.fillStyle = `rgba(205,214,223,${(0.7+0.3*Math.abs(Math.sin(b.song*4)))*g})`;
    ctx.font='800 9px ui-monospace,monospace';
    ctx.fillText('♪ Borty Borty Bort Bort ♪', bx, by-bh-16+wob);
    // little bouncing music notes
    ctx.fillStyle = `rgba(180,200,160,${0.7*g})`; ctx.font='10px ui-monospace,monospace';
    ctx.fillText('♫', bx-26+Math.sin(b.song*6)*4, by-bh-6);
    ctx.fillText('♪', bx+26+Math.cos(b.song*6)*4, by-bh-10);
  } else {
    ctx.fillStyle = `rgba(255,90,90,${g})`; ctx.font='800 9px ui-monospace,monospace';
    ctx.fillText(soul>0.05 ? 'SOUL EATEN — THE BODY ROTS' : 'BORT LUNGES — CHASES LIKE CRAZY', bx, by-bh-14);
  }
  ctx.fillStyle = `rgba(154,166,176,${0.92*g})`; ctx.font='800 10px ui-monospace,monospace';
  ctx.fillText('BORT — 996 — 5TH', bx, floor+16);
  ctx.fillStyle = `rgba(160,200,150,${0.7*g})`; ctx.font='700 7px ui-monospace,monospace';
  ctx.fillText('looks safe until it isn\'t · just under Pinki', bx, floor+26);
  ctx.globalAlpha = g;
}

/* =========================================================================
   Lore 29 cont. — THE STATUS CODEX
   Toby filed the fate of the whole cast, so SCF expands the Danger Index into a
   full status codex: every named being under CRAZY, DEMONED, .EXE, CORRUPT,
   INFECTED, ALIVE, or DEAD, plus the objects/forces (Star Steed runs, the Throne
   is destroyed, the SCF soldiers/scientists are 76.9% alive). The codex scans in
   group by group; a cycling SCF note records the special fates (Mr. Sun became a
   BLACKHOLE, Mervin gave his life to Simon for Mindy Starchild, Paul is one step
   from breaking, Gray is .EXE and one of the most dangerous). The CODEX meter
   rewards sealing every fate before the roster scrolls past.
   ========================================================================= */
const CODEX_GROUPS = [
  { s:'CRAZY',    col:'#ff5c8a', m:['Simon','Sumona'] },
  { s:'DEMONED',  col:'#b98cff', m:['Oren','Black','Pinki','Durple'] },
  { s:'.EXE',     col:'#7ed0ff', m:['Gray','Wenda','Clukr','Mr. Fun Computer','Pupahya','Luigi Green','67 Kid','Endless Staircase'] },
  { s:'CORRUPT',  col:'#ff9a3c', m:['Mr. Sun → Blackhole'] },
  { s:'INFECTED', col:'#9ae66e', m:['Raddy (first)','67 Dog','Gewlis (= 67 Dog)'] },
  { s:'ALIVE',    col:'#9affc8', m:['Jevin','Vineria (barely)','Sky','Alex','Greg','Neo','Paul (near breaking)','Clara','67 Pirate','Mindy Starchild','Rumble','Zen','ToddLLM'] },
  { s:'DEAD',     col:'#9aa0ad', m:['Tunner','Fun Bot','Garnold','Brud','Mr. Tree','Karuto','Mervin','Zara Goldheart','Lexicon','El Quwera','Victoria','Vaspra','Cloudy','King Jet','Lica','TIM (Invisible Man)'] },
];
const CODEX_OBJECTS = [
  { n:'Star Steed', s:'RUNNING',     col:'#9affc8' },
  { n:'The Throne', s:'DESTROYED',   col:'#ff5c8a' },
  { n:'SCF Soldiers / Scientists', s:'76.9% ALIVE', col:'#ffd84f' },
];
const CODEX_NOTES = [
  'Mr. Sun became a BLACKHOLE when he was corrupted.',
  'Mervin gave his own life to Simon so Mindy Starchild would live.',
  'Mindy trusts Rumble to spare her kingdom, Star Steed, and the throne.',
  "Paul is one step from the straw that breaks the camel's back.",
  'Gray is .EXE — one of the most dangerous of all.',
  'Mr. Black and Black are the same. TIM = The Invisible Man.',
];
function updateCodex(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  codex.anim = (codex.anim||0) + dt;
  codex.logged = Math.min(CODEX_GROUPS.length + 1, (codex.logged||0) + dt*1.1);  // groups scan in one by one (+1 = the objects row)
  codex.noteT -= dt;
  if(codex.noteT <= 0){ codex.noteT = 2.6; codex.note = ((codex.note||0)+1) % CODEX_NOTES.length; }
  // floating event labels
  codex.eventT -= dt;
  if(codex.eventT <= 0){ codex.eventT = rnd(2.2,3.6);
    const ev = ['THE STATUS CODEX','SIMON & SUMONA — CRAZY','OREN · BLACK · PINKI · DURPLE — DEMONED',
      'GRAY · WENDA · CLUKR — .EXE','MR. SUN → BLACKHOLE — CORRUPT','RADDY · 67 DOG · GEWLIS — INFECTED',
      'JEVIN · ALEX · NEO · TODDLLM — ALIVE','MERVIN GAVE HIS LIFE FOR MINDY','STAR STEED RUNS · THE THRONE IS DESTROYED',
      'SCF: 76.9% STILL ALIVE','PAUL IS NEAR THE BREAKING POINT','SEAL EVERY FATE'];
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(ev), col:'#cfe0ff' });
  }
  // THE STATUS CODEX meter — climb with purpose to seal every fate before the roster scrolls past
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  codexM = Math.max(0, Math.min(1, codexM + (moving ? dt*0.05 : -dt*0.03)));
  if(codexM >= 1 && !codex.held){
    codex.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('You sealed the full Status Codex. Every named fate filed and saved.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ CODEX SEALED — EVERY FATE FILED ★', col:'#dff0ff' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#7ed0ff','#9affc8','#ff5c8a'])));
    AUDIO.zap();
  }
}
function drawCodex(){
  const g = codex.glow||0, top = cameraY;
  ctx.save();
  // a cold SCF dossier wash — deep ink with a pale-blue codex glow
  const bg = ctx.createLinearGradient(0, top, 0, top+H);
  bg.addColorStop(0, `rgba(8,10,16,${0.50*g})`);
  bg.addColorStop(1, `rgba(6,6,12,${0.48*g})`);
  ctx.fillStyle = bg; ctx.fillRect(0, top, W, H);
  ctx.globalAlpha = g;

  const px = W*0.04, pw = W*0.92, py = top + H*0.085, panelH = H*0.83;
  ctx.fillStyle = `rgba(14,16,24,${0.80*g})`;
  ctx.strokeStyle = `rgba(143,179,255,${0.5*g})`; ctx.lineWidth=1.5;
  ctx.fillRect(px, py, pw, panelH);
  ctx.strokeRect(px, py, pw, panelH);
  // title bar
  ctx.textAlign='left'; ctx.fillStyle = `rgba(207,224,255,${0.95*g})`;
  ctx.font='800 12px ui-monospace,monospace';
  ctx.fillText('SCF FULL STATUS CODEX — EVERY FATE FILED', px+12, py+18);
  ctx.textAlign='right'; ctx.fillStyle = `rgba(143,179,255,${0.6*g})`; ctx.font='700 8px ui-monospace,monospace';
  ctx.fillText('Lore 29 cont. · Toby, June 18', px+pw-12, py+18);
  ctx.textAlign='left';
  ctx.strokeStyle = `rgba(143,179,255,${0.25*g})`; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(px+8, py+26); ctx.lineTo(px+pw-8, py+26); ctx.stroke();

  const leftX = px+12, rightX = px + pw/2 + 6, startY = py+44;

  // one status group; alpha fades in as codex.logged passes its reveal index; layout stays stable
  function drawGroup(grp, revealIdx, cx, cy){
    const appear = Math.max(0, Math.min(1, (codex.logged||0) - revealIdx)), a = g*appear;
    ctx.globalAlpha = a;
    ctx.fillStyle = grp.col; ctx.fillRect(cx, cy-7, 7, 7);
    ctx.font='800 10px ui-monospace,monospace'; ctx.textAlign='left';
    ctx.fillText(grp.s+'  ('+grp.m.length+')', cx+12, cy);
    cy += 13; ctx.font='9px ui-monospace,monospace';
    for(const name of grp.m){
      ctx.fillStyle = `rgba(220,228,245,${0.9*a})`;
      ctx.fillText('· '+name, cx+10, cy); cy += 10.5;
    }
    return cy + 6;
  }

  // left column: CRAZY, DEMONED, .EXE, CORRUPT, INFECTED, then OBJECTS & FORCES
  let ly = startY;
  ly = drawGroup(CODEX_GROUPS[0], 0, leftX, ly);  // CRAZY
  ly = drawGroup(CODEX_GROUPS[1], 2, leftX, ly);  // DEMONED
  ly = drawGroup(CODEX_GROUPS[2], 4, leftX, ly);  // .EXE
  ly = drawGroup(CODEX_GROUPS[3], 5, leftX, ly);  // CORRUPT
  ly = drawGroup(CODEX_GROUPS[4], 6, leftX, ly);  // INFECTED
  { const a = g*Math.max(0, Math.min(1, (codex.logged||0) - 7));
    ctx.globalAlpha = a;
    ctx.fillStyle = '#ffd84f'; ctx.fillRect(leftX, ly-7, 7, 7);
    ctx.font='800 10px ui-monospace,monospace'; ctx.fillText('OBJECTS & FORCES', leftX+12, ly); ly += 13;
    ctx.font='9px ui-monospace,monospace';
    for(const o of CODEX_OBJECTS){ ctx.fillStyle = `rgba(220,228,245,${0.9*a})`;
      ctx.fillText('· '+o.n+' — ', leftX+10, ly);
      ctx.fillStyle = o.col; ctx.fillText(o.s, leftX+10+ctx.measureText('· '+o.n+' — ').width, ly); ly += 10.5; }
  }
  ctx.globalAlpha = g;

  // right column: ALIVE, DEAD
  let ry = startY;
  ry = drawGroup(CODEX_GROUPS[5], 1, rightX, ry);  // ALIVE
  ry = drawGroup(CODEX_GROUPS[6], 3, rightX, ry);  // DEAD

  // footer: a cycling SCF note
  ctx.globalAlpha = g; ctx.textAlign='left';

function updateWeb(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  web.anim = (web.anim||0) + dt;
  web.pulse = (web.pulse||0) + dt;
  web.scan = Math.min(WEB_EDGES.length + 2, (web.scan||0) + dt*1.4);  // edges trace in one by one
  web.noteT -= dt;
  if(web.noteT <= 0){ web.noteT = 2.6; web.note = ((web.note||0)+1) % WEB_NOTES.length; }
  web.eventT -= dt;
  if(web.eventT <= 0){ web.eventT = rnd(2.2,3.6);
    const ev = ['THE RELATION WEB','PINKI + OREN HUNT BLACK','SUMONA — THEIR DAUGHTER',
      'SIMON — OREN\'S BROTHER','JEVIN + BLACK — FRIENDS','WENDA + GRAY — TOGETHER',
      'GARNOLD + FUN BOT','MR. SUN + MR. TREE','BORT — HOSTILE',
      'SIMON REDIRECTS THE BATTLES','WHO STILL MATTERS TO SOMEBODY?','TRACE EVERY BOND',
      'THE 3 XS','SIMON — THE ONE','OREN — SECOND TO ONE','PINKI — ONE OF THE STRONGEST',
      'THEY SPARED SUMONA','SIMON SPARES NO ONE','PROTECT THE TARGET? HE SWITCHES',
      'ONE COMPLETE HUNT SYSTEM','THE WORLD ITSELF LIES','COMMS FAIL FIRST',
      'OREN BREAKS WHAT YOU LOVE','PINKI STOPS TIME','SIMON CUTS THE WARNINGS'];
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(ev), col:'#ff8ab0' });
  }
  // THE 3 XS faction — the triad fades in once the web is mostly traced; Simon's redirect arrow cycles
  // targets, because protecting one just makes him switch to the next living name.
  web.xsGlow = Math.max(0, Math.min(1, (web.xsGlow||0) + ((web.scan||0) > 6 ? dt*0.6 : -dt*0.6)));
  web.xsT = (web.xsT||0) + dt;
  if(web.xsT >= 1.5){ web.xsT = 0; web.xsTarget = ((web.xsTarget||0)+1) % XS_SWITCH.length; }
  // the hunt sequence steps light up one at a time, in order, so the trap reads as a pattern not a brawl
  web.huntT = (web.huntT||0) + dt;
  if(web.huntT >= 1.0){ web.huntT = 0; web.huntStep = ((web.huntStep||0)+1) % XS_HUNT.length; }
  // THE RELATION WEB meter — climb with purpose to trace every bond before a hunt-line snaps
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  webM = Math.max(0, Math.min(1, webM + (moving ? dt*0.05 : -dt*0.03)));
  if(webM >= 1 && !web.held){
    web.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('You traced the whole Relation Web. Every bond mapped, every hunt-line held.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ WEB TRACED — EVERY BOND MAPPED ★', col:'#ffd0e2' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ff5c8a','#7ed0ff','#ffd84f'])));
    AUDIO.zap();
  }
}
function edgeColor(t){
  return t==='love' ? '#ff5c8a' : t==='family' ? '#ffd84f'
       : t==='friend' ? '#7ed0ff' : t==='hostile' ? '#ff3b3b' : '#ff2b4c';
}
function drawWeb(){
  const g = web.glow||0, top = cameraY;
  ctx.save();
  // a warm-ink relationship wash — deep with a rose-web glow
  const bg = ctx.createLinearGradient(0, top, 0, top+H);
  bg.addColorStop(0, `rgba(14,8,14,${0.52*g})`);
  bg.addColorStop(1, `rgba(8,6,12,${0.50*g})`);
  ctx.fillStyle = bg; ctx.fillRect(0, top, W, H);
  ctx.globalAlpha = g;

  const px = W*0.04, pw = W*0.92, py = top + H*0.085, panelH = H*0.83;
  ctx.fillStyle = `rgba(16,12,20,${0.80*g})`;
  ctx.strokeStyle = `rgba(255,138,176,${0.5*g})`; ctx.lineWidth=1.5;
  ctx.fillRect(px, py, pw, panelH);
  ctx.strokeRect(px, py, pw, panelH);
  // title bar
  ctx.textAlign='left'; ctx.fillStyle = `rgba(255,208,226,${0.95*g})`;
  ctx.font='800 12px ui-monospace,monospace';
  ctx.fillText('SCF RELATION WEB — BONDS, HUNT-LINES & THE 3 XS', px+12, py+18);
  ctx.textAlign='right'; ctx.fillStyle = `rgba(255,138,176,${0.6*g})`; ctx.font='700 8px ui-monospace,monospace';
  ctx.fillText('Lore 29 cont. · Toby, June 20', px+pw-12, py+18);
  ctx.textAlign='left';
  ctx.strokeStyle = `rgba(255,138,176,${0.25*g})`; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(px+8, py+26); ctx.lineTo(px+pw-8, py+26); ctx.stroke();

  // node graph body
  const bx = px+10, by = py+34, bw = pw-20, bh = panelH-86;
  const NP = function(n){ const o = WEB_NODES[n]; return { x: bx + o.x*bw, y: by + o.y*bh, c:o.c }; };

  // ---- edges (drawn first, under the nodes); each traces in as web.scan passes its index ----
  WEB_EDGES.forEach(function(e, i){
    const appear = Math.max(0, Math.min(1, (web.scan||0) - i));
    if(appear<=0) return;
    const A = NP(e.a), B = NP(e.b), col = edgeColor(e.t);
    const a = g*appear;
    if(e.t==='hunt'){
      // active hunt-line: a pulsing, directed arrow from hunter to Black
      const pulse = 0.55 + 0.45*Math.sin((web.pulse||0)*4 - i);
      ctx.globalAlpha = a*pulse; ctx.strokeStyle = col; ctx.lineWidth = 2.4;
      ctx.setLineDash([7,5]); ctx.lineDashOffset = -(web.pulse||0)*22;
      ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();
      ctx.setLineDash([]);
      // arrowhead near Black
      const ang = Math.atan2(B.y-A.y, B.x-A.x), hx = B.x - Math.cos(ang)*16, hy = B.y - Math.sin(ang)*16;
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(hx + Math.cos(ang)*9, hy + Math.sin(ang)*9);
      ctx.lineTo(hx + Math.cos(ang+2.5)*7, hy + Math.sin(ang+2.5)*7);
      ctx.lineTo(hx + Math.cos(ang-2.5)*7, hy + Math.sin(ang-2.5)*7);
      ctx.closePath(); ctx.fill();
    } else if(e.t==='hostile'){
      ctx.globalAlpha = a*0.9; ctx.strokeStyle = col; ctx.lineWidth = 1.6;
      ctx.setLineDash([3,4]);
      ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();
      ctx.setLineDash([]);
    } else {
      ctx.globalAlpha = a*(e.t==='love'?0.95:0.8); ctx.strokeStyle = col;
      ctx.lineWidth = e.t==='love' ? 2.2 : 1.6;
      if(e.t==='family'){ ctx.setLineDash([2,3]); }
      ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();
      ctx.setLineDash([]);
    }
  });
  ctx.globalAlpha = g;

  // ---- THE 3 XS faction triad (Lore 29 cont., June 20): a crimson triangle binding Simon + Oren + Pinki,
  //      drawn under the nodes so the members still sit on top ----
  const xg = g*(web.xsGlow||0);
  if(xg > 0.02){
    const S = NP('Simon'), O = NP('Oren'), Pk = NP('Pinki');
    const pulse = 0.6 + 0.4*Math.sin((web.pulse||0)*3);
    // translucent fill
    ctx.globalAlpha = xg*0.14;
    ctx.fillStyle = '#ff2b4c';
    ctx.beginPath(); ctx.moveTo(S.x,S.y); ctx.lineTo(O.x,O.y); ctx.lineTo(Pk.x,Pk.y); ctx.closePath(); ctx.fill();
    // pulsing crimson outline
    ctx.globalAlpha = xg*pulse;
    ctx.strokeStyle = '#ff2b4c'; ctx.lineWidth = 2;
    ctx.setLineDash([6,4]); ctx.lineDashOffset = -(web.pulse||0)*18;
    ctx.beginPath(); ctx.moveTo(S.x,S.y); ctx.lineTo(O.x,O.y); ctx.lineTo(Pk.x,Pk.y); ctx.closePath(); ctx.stroke();
    ctx.setLineDash([]);
    // faction label at the centroid
    const cxx=(S.x+O.x+Pk.x)/3, cyy=(S.y+O.y+Pk.y)/3;
    ctx.globalAlpha = xg; ctx.textAlign='center';
    ctx.fillStyle = '#ff7a93'; ctx.font='800 10px ui-monospace,monospace';
    ctx.fillText('THE 3 XS', cxx, cyy+3);
    ctx.textAlign='left';
  }
  ctx.globalAlpha = g;

  // ---- nodes (drawn on top), each appears as the web scans past its first edge ----
  const shown = {};
  WEB_EDGES.forEach(function(e,i){ if((web.scan||0) > i){ shown[e.a]=true; shown[e.b]=true; } });
  for(const name in WEB_NODES){
    if(!shown[name]) continue;
    const P = NP(name);
    const isHunter = (name==='Pinki' || name==='Oren');
    const isPrey = (name==='Black');
    const r = (name==='Simon') ? 8 : 6;
    ctx.fillStyle = P.c;
    ctx.beginPath(); ctx.arc(P.x, P.y, r, 0, Math.PI*2); ctx.fill();
    // ring: hunters get a live rose ring, Black (prey) a flickering gray ring, Simon a red crown ring
    if(isHunter || isPrey || name==='Simon'){
      const ring = name==='Simon' ? '#ff5c8a' : isPrey ? '#ff2b4c' : '#ff8ab0';
      ctx.strokeStyle = ring; ctx.lineWidth = 1.6;
      ctx.globalAlpha = g*(0.5 + 0.5*Math.abs(Math.sin((web.pulse||0)*3)));
      ctx.beginPath(); ctx.arc(P.x, P.y, r+3.5, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = g;
    }
    // label, nudged to avoid the edges
    ctx.fillStyle = `rgba(232,224,245,${0.95*g})`;
    ctx.font = (name==='Simon') ? '800 9px ui-monospace,monospace' : '8px ui-monospace,monospace';
    ctx.textAlign = (P.x > bx+bw*0.6) ? 'right' : 'left';
    const lx = (P.x > bx+bw*0.6) ? P.x - r - 4 : P.x + r + 4;
    ctx.fillText(name, lx, P.y+3);
  }
  ctx.textAlign='left';

  // ---- THE 3 XS overlay on the nodes: rank badges, the spare/no-mercy split, and Simon's switching arrow ----
  if(xg > 0.02){
    // rank badges beneath each member
    ctx.textAlign='center'; ctx.font='800 7px ui-monospace,monospace';
    XS_MEMBERS.forEach(function(m){
      if(!shown[m]) return; const P = NP(m);
      ctx.fillStyle = `rgba(255,43,76,${0.95*xg})`;
      ctx.fillText(XS_RANK[m], P.x, P.y - 11);
    });
    // each member's job in the hunt — the "complete hunt system" Toby described (Oren breaks what you
    // love, Pinki stops time and finishes, Simon cuts the warnings so the world lies). Tucked low-left of
    // each node so it does not fight the rank badge above.
    ctx.font='700 6px ui-monospace,monospace';
    XS_MEMBERS.forEach(function(m){
      if(!shown[m]) return; const P = NP(m);
      const yo = (m==='Simon') ? P.y + 27 : P.y + 14;  // Simon already carries NO MERCY at +17
      ctx.fillStyle = `rgba(255,170,90,${0.92*xg})`;
      ctx.fillText(XS_ROLE[m], P.x, yo);
    });
    ctx.font='800 7px ui-monospace,monospace';
    // the moral split: Pinki + Oren SPARED Sumona; Simon spares NO ONE
    if(shown['Sumona']){ const Su = NP('Sumona');
      ctx.fillStyle = `rgba(122,230,110,${0.95*xg})`; ctx.fillText('SPARED', Su.x, Su.y+15); }
    if(shown['Simon']){ const Si = NP('Simon');
      ctx.fillStyle = `rgba(255,123,0,${0.95*xg})`; ctx.fillText('NO MERCY', Si.x, Si.y+17); }
    // Simon's redirect arrow — it switches targets, because protecting one makes him move to the next
    if(shown['Simon']){
      const Si = NP('Simon');
      const tgtName = XS_SWITCH[web.xsTarget||0];
      const T = WEB_NODES[tgtName] ? NP(tgtName) : null;
      if(T){
        const fade = Math.min(1, web.xsT/0.25) * Math.min(1, (1.5-web.xsT)/0.25);  // ease in/out per switch
        ctx.globalAlpha = xg * Math.max(0.25, fade);
        ctx.strokeStyle = '#ff7b00'; ctx.lineWidth = 1.8;
        ctx.setLineDash([4,4]); ctx.lineDashOffset = -(web.pulse||0)*26;
        ctx.beginPath(); ctx.moveTo(Si.x, Si.y); ctx.lineTo(T.x, T.y); ctx.stroke();
        ctx.setLineDash([]);
        const ang = Math.atan2(T.y-Si.y, T.x-Si.x), hx=T.x-Math.cos(ang)*14, hy=T.y-Math.sin(ang)*14;
        ctx.fillStyle = '#ff7b00'; ctx.beginPath();
        ctx.moveTo(hx+Math.cos(ang)*8, hy+Math.sin(ang)*8);
        ctx.lineTo(hx+Math.cos(ang+2.5)*6, hy+Math.sin(ang+2.5)*6);
        ctx.lineTo(hx+Math.cos(ang-2.5)*6, hy+Math.sin(ang-2.5)*6);
        ctx.closePath(); ctx.fill();
        ctx.globalAlpha = xg;
      }
    }
    ctx.textAlign='left';
  }
  ctx.globalAlpha = g;

  // ---- THE 3 XS hunt sequence (Lore 29 cont., June 20): the order is the real lore — comms fail, then what
  //      the target loves is broken, then the world warps, then they are isolated, then they fall. The active
  //      step travels left to right so the hunt reads as a repeatable pattern, not a single brawl. ----
  if(xg > 0.02){
    const hbY = py + panelH - 44, hbX = px + 14, hbW = pw - 28;
    ctx.textAlign='left'; ctx.font='800 7px ui-monospace,monospace';
    ctx.fillStyle = `rgba(255,123,0,${0.92*xg})`;
    ctx.fillText('THE 3 XS — ONE HUNT:', hbX, hbY - 9);
    const step = web.huntStep||0, stepW = hbW / XS_HUNT.length;
    XS_HUNT.forEach(function(s, i){
      const sx = hbX + i*stepW;
      const on = step===i, past = i < step;
      ctx.fillStyle = on   ? `rgba(255,214,84,${xg})`
                    : past ? `rgba(255,123,0,${0.7*xg})`
                    :        `rgba(198,150,120,${0.42*xg})`;
      ctx.font = on ? '800 7px ui-monospace,monospace' : '700 7px ui-monospace,monospace';
      ctx.fillText((i+1)+' '+s, sx, hbY);
      if(i < XS_HUNT.length-1){
        ctx.fillStyle = `rgba(255,123,0,${0.5*xg})`; ctx.font='700 7px ui-monospace,monospace';
        ctx.fillText('›', sx + stepW - 8, hbY);
      }
    });
    ctx.textAlign='left';
  }
  ctx.globalAlpha = g;

  // ---- legend strip ----
  let lx = px+14, lyy = py+panelH-30;
  ctx.font='700 8px ui-monospace,monospace';
  WEB_LEGEND.forEach(function(L){
    ctx.strokeStyle = L.c; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(lx, lyy-3); ctx.lineTo(lx+14, lyy-3); ctx.stroke();
    ctx.fillStyle = `rgba(220,212,232,${0.9*g})`; ctx.fillText(L.s, lx+18, lyy);
    lx += 18 + ctx.measureText(L.s).width + 14;
  });

  // ---- footer: a cycling SCF relationship note ----
  ctx.fillStyle = `rgba(255,138,176,${0.9*g})`; ctx.font='700 9px ui-monospace,monospace';
  ctx.fillText('▸ '+WEB_NOTES[web.note||0], px+12, py+panelH-12);

  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

function updateClara(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  clara.anim = (clara.anim||0) + dt;
  clara.glitchT = (clara.glitchT||0) + dt;
  // Simon (the king) endlessly dodges — a smooth side-to-side weave that never lands anywhere
  clara.dodge = (clara.dodge||0) + dt;
  // the Mercy button is broken: it stays shattered, flickering as if it can't redraw
  clara.mercy = Math.min(1, (clara.mercy||0) + dt*0.6);

  clara.attackT = (clara.attackT||0) + dt;
  if(clara.attackT >= 0.9){
    clara.attackT = 0;
    clara.attacks.push({ t:0, lane: (clara.attacks.length%2)? -1 : 1, hue: clara.attacks.length % CLARA_AURA.length });
    AUDIO.zap && AUDIO.zap();
  }
  clara.attacks.forEach(function(a){ a.t += dt; });
  clara.attacks = clara.attacks.filter(function(a){ return a.t < 1.4; });
  // each full cycle, Clara rebirths stronger — the aura intensifies and the counter climbs (eternal escalation)
  clara.rebirthT = (clara.rebirthT||0) + dt;
  if(clara.rebirthT >= 3.0){ clara.rebirthT = 0; clara.rebirth = (clara.rebirth||0) + 1; shake = Math.max(shake,5); }

  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  claraM = Math.max(0, Math.min(1, claraM + (moving ? dt*0.05 : -dt*0.03)));

    AUDIO.zap();
  }
}
// a single chess piece silhouette (used for the plain KING). cx,cy = base center; s = scale
function chessPiece(cx, cy, s, kind, fill){
  ctx.fillStyle = fill;
  ctx.beginPath();
  // base
  ctx.ellipse(cx, cy, s*0.9, s*0.28, 0, 0, Math.PI*2); ctx.fill();
  // body
  ctx.beginPath();
  ctx.moveTo(cx - s*0.55, cy);
  ctx.quadraticCurveTo(cx - s*0.30, cy - s*1.5, cx - s*0.32, cy - s*2.0);
  ctx.lineTo(cx + s*0.32, cy - s*2.0);
  ctx.quadraticCurveTo(cx + s*0.30, cy - s*1.5, cx + s*0.55, cy);
  ctx.closePath(); ctx.fill();
  // head
  ctx.beginPath(); ctx.arc(cx, cy - s*2.2, s*0.42, 0, Math.PI*2); ctx.fill();
  if(kind==='king'){
    // a cross crown on top
    ctx.fillRect(cx - s*0.08, cy - s*3.1, s*0.16, s*0.6);
    ctx.fillRect(cx - s*0.28, cy - s*2.9, s*0.56, s*0.16);
  }
}

    ctx.beginPath(); ctx.ellipse(cx, midY, rr, rr*1.15, 0, 0, Math.PI*2); ctx.stroke();
  }
  const headR = 10*scale;
  const drawBody = function(ox, oy, col, alpha){
    ctx.globalAlpha = g*alpha; ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(cx-16*scale+ox, fY+oy);
    ctx.quadraticCurveTo(cx-12*scale+ox, midY+oy, cx-9*scale+ox, topY+12*scale+oy);
    ctx.lineTo(cx+9*scale+ox, topY+12*scale+oy);
    ctx.quadraticCurveTo(cx+12*scale+ox, midY+oy, cx+16*scale+ox, fY+oy);
    ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+ox, topY+oy, headR, 0, Math.PI*2); ctx.fill();
  };
  const sp = (2.5 + jit*1.8);
  drawBody(-sp,0,'#ff3bd0',0.5); drawBody(sp,0,'#3bf0ff',0.5); drawBody(0,0,'#caa97a',0.9);
  ctx.globalAlpha = g*0.85; ctx.fillStyle = '#39e0a8';
  ctx.beginPath();
  ctx.moveTo(cx-17*scale, topY+30*scale);
  ctx.quadraticCurveTo(cx, topY+8*scale, cx+17*scale, topY+30*scale);
  ctx.quadraticCurveTo(cx, topY+20*scale, cx-17*scale, topY+30*scale);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = g*0.4;
  for(let s2=0;s2<5;s2++){ const sy = topY + ((glitchT*40 + s2*18) % bodyH);
    ctx.fillStyle = CLARA_AURA[(s2+rebirth)%CLARA_AURA.length];
    ctx.fillRect(cx-17*scale + jit*3, sy, 34*scale, 2); }
  ctx.globalAlpha = g;
}

/* ===========================================================================
   Lore 29 (June 20) — THE POWER ORDER (Oren rises, the whole ranking reshuffles)
   Toby: "Pinki rose in power and is now 3rd in power. Oren rose in power, Oren is
   most powerful now, Simon only has a few forms stronger than Oren. Oren can still
   beat those forms... Clara and Oren are tied. Oren and Simon are usually tied
   (unless if Oren wins, Simon wins if the battle is for revenge). Oren can easily
   beat Pinki. Simon can easily beat Pinki. Pinki with the Shifted AU can beat Base
   Clara. Oren can beat Cross Clara, Errorshifted Clara, Antishifted Clara, Reversed
   Clara... Oren proves as the most powerful. Oren also beats Black."
   The board: a ranked ladder (Oren #1, Clara/Simon tie by condition, Pinki #3, Black
   below Oren), a Simon REVENGE flip panel (normal = Oren wins, revenge = Simon wins),
   a grid of matchup rules, and an AU-win band (Shifted Pinki > Base Clara, etc.).
   The order is matchup-based now, not one straight ranking.
   =========================================================================== */
const POWER_ROWS = [
  { rank:'1', who:'OREN.EXE',     tag:'KING & GOD OF THE GAME · ABSOLUTE TOP', pow:1.00, col:'#ffcf4f' },
  { rank:'2', who:'SIMON',        tag:'ONLY STRONGEST FORMS CAN EVEN TIE OREN', pow:0.86, col:'#39e0a8' },
  { rank:'3', who:'PINKI',        tag:'ROSE TO 3RD · AU WIN CONDITIONS',        pow:0.60, col:'#ff7bd0' },
  { rank:'4', who:'CLARA',        tag:'QUEEN & GODDESS — CONQUERED EASILY',     pow:0.54, col:'#c8a3ff' },
  { rank:'5', who:'BLACK',        tag:'BELOW OREN',                            pow:0.46, col:'#9aa3ad' }
];
const POWER_MATCHUPS = [
  'OREN.EXE = KING & GOD','OREN conquers CLARA easily','only SIMON top forms TIE OREN',
  'OREN beats BLACK','OREN easily beats PINKI','SIMON easily beats PINKI',
  'OREN beats every CLARA AU','OREN wins normal fights','SIMON wins on REVENGE'
];
const POWER_AUWINS = ['OREN > Base CLARA','OREN > Cross CLARA','OREN > Errorshifted CLARA',
  'OREN > Antishifted CLARA','OREN > Reversed CLARA','Shifted PINKI > Base CLARA',
  'Only Simon’s strongest forms reach Oren'];
const POWER_NOTES = [
  'Oren had another rise: he is the absolute top now.',
  'Demon status, but the game is Classics.EXE — so he is Oren.EXE.',
  'Oren is king AND god of the game.',
  'Clara is queen and goddess, but Oren conquers her easily.',
  'Only Simon’s most powerful forms can even tie Oren.',

  'Simon still matters: he is the only real upper-limit challenger.',
  'Oren wins a normal fight; Simon wins if it is for revenge.',
  'The game itself renames Oren to match his dominance.',
  'Oren is the new hard stop of the whole setting.'
];
const POWER_EVENTS = ['OREN.EXE','KING & GOD','OREN > CLARA','ABSOLUTE TOP','REVENGE SPIKE',
  'ONLY TOP FORMS TIE','THE NEW HARD STOP','OREN ASCENDS'];

function updatePower(dt){
  power.t = (power.t||0) + dt;
  power.anim = (power.anim||0) + dt;
  // Simon's revenge condition flips on a cycle: NORMAL (Oren wins) <-> REVENGE (Simon wins)
  power.revT = (power.revT||0) + dt;
  if(power.revT >= 2.2){ power.revT = 0; power.revenge = power.revenge ? 0 : 1; shake = Math.max(shake,4); AUDIO.zap(); }
  // ladder row highlight cycles down the ranking
  power.rowT = (power.rowT||0) + dt;
  if(power.rowT >= 1.1){ power.rowT = 0; power.row = ((power.row||0)+1) % POWER_ROWS.length; }
  // AU-win band scroll
  power.au = (power.au||0) + dt*20;
  // notes + floating events
  power.noteT -= dt;
  if(power.noteT <= 0){ power.noteT = 2.6; power.note = ((power.note||0)+1) % POWER_NOTES.length; }
  power.eventT -= dt;
  if(power.eventT <= 0){ power.eventT = rnd(2.2,3.6);
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(POWER_EVENTS), col:pick(['#ffcf4f','#39e0a8','#ff7bd0']) });
  }
  // THE POWER ORDER meter — climb with purpose to read every matchup and rise through the order
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  powerM = Math.max(0, Math.min(1, powerM + (moving ? dt*0.05 : -dt*0.03)));
  if(powerM >= 1 && !power.held){
    power.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('You read the whole new order: Oren on top, the ties by condition, Pinki risen to 3rd.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ READ THE POWER ORDER ★', col:'#ffe8a8' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ffcf4f','#39e0a8','#ff7bd0'])));
    AUDIO.zap();
  }
}

    ctx.fillText(r.tag, px+62, rowY+9);
    // relative power bar (Simon's row pulses with the revenge flip)
    const barX = px+pw*0.56, barW = pw*0.36, by = rowY-3;
    ctx.fillStyle = `rgba(255,255,255,${0.08*g})`; ctx.fillRect(barX, by, barW, 8);
    let p = r.pow;
    if(i===1 && power.revenge){ p = 1.0; }  // revenge spikes the Clara·Simon tier to match Oren
    ctx.fillStyle = r.col; ctx.globalAlpha = g*(on?1:0.7);
    ctx.fillRect(barX, by, barW*p, 8);
    ctx.globalAlpha = g;
  }

  // ===== Simon REVENGE flip panel =====
  const rvY = ladderY0 + POWER_ROWS.length*rowH + panelH*0.02;
  const rev = !!power.revenge;
  ctx.textAlign='center';
  ctx.fillStyle = `rgba(255,236,184,${0.9*g})`; ctx.font='800 9px ui-monospace,monospace';
  ctx.fillText('OREN  vs  SIMON — USUALLY TIED', cx0, rvY);
  // two outcome chips, the live one lit
  const chipW = pw*0.4, gap = pw*0.04;
  const normX = cx0 - gap/2 - chipW, revX = cx0 + gap/2;
  // NORMAL → OREN WINS
  ctx.globalAlpha = g*(rev?0.4:1);
  ctx.fillStyle = rev ? 'rgba(255,207,79,0.06)' : 'rgba(255,207,79,0.2)';
  ctx.fillRect(normX, rvY+8, chipW, 22);
  ctx.strokeStyle = rev ? `rgba(255,207,79,${0.3*g})` : `rgba(255,207,79,${0.95*g})`; ctx.lineWidth=1.5;
  ctx.strokeRect(normX, rvY+8, chipW, 22);
  ctx.fillStyle = rev ? 'rgba(255,236,184,0.55)' : '#ffe8a8'; ctx.font='800 9px ui-monospace,monospace';
  ctx.fillText('NORMAL FIGHT → OREN WINS', normX+chipW/2, rvY+22);
  // REVENGE → SIMON WINS
  ctx.globalAlpha = g*(rev?1:0.4);
  ctx.fillStyle = rev ? 'rgba(255,59,92,0.22)' : 'rgba(255,59,92,0.06)';
  ctx.fillRect(revX, rvY+8, chipW, 22);
  ctx.strokeStyle = rev ? `rgba(255,59,92,${0.95*g})` : `rgba(255,59,92,${0.3*g})`; ctx.lineWidth=1.5;
  ctx.strokeRect(revX, rvY+8, chipW, 22);
  ctx.fillStyle = rev ? '#ffb3c0' : 'rgba(255,179,192,0.55)'; ctx.font='800 9px ui-monospace,monospace';
  ctx.fillText('FOR REVENGE → SIMON WINS', revX+chipW/2, rvY+22);
  ctx.globalAlpha = g;
  ctx.fillStyle = `rgba(255,207,79,${0.7*g})`; ctx.font='700 6px ui-monospace,monospace';
  ctx.fillText('Simon is no longer top by default — but the revenge rule still flips the result.', cx0, rvY+40);

  // ===== matchup-rule grid (3 columns) =====
  const mY = rvY + panelH*0.085; ctx.textAlign='left';
  ctx.fillStyle = `rgba(255,236,184,${0.9*g})`; ctx.font='800 8px ui-monospace,monospace';
  ctx.fillText('MATCHUP RULES', px+14, mY);
  const cols = 3, colW = (pw-28)/cols;
  for(let i=0;i<POWER_MATCHUPS.length;i++){
    const c = i%cols, rr = Math.floor(i/cols);
    const mx = px+16 + c*colW, myy = mY + 13 + rr*13;
    const hot = /REVENGE/.test(POWER_MATCHUPS[i]);
    ctx.fillStyle = hot ? `rgba(255,179,192,${0.95*g})` : `rgba(202,224,255,${0.8*g})`;
    ctx.font='700 7px ui-monospace,monospace';
    ctx.fillText('· '+POWER_MATCHUPS[i], mx, myy);
  }

  // ===== AU-win band — version decides the matchup =====
  const auY = py + panelH*0.80; ctx.textAlign='left';
  ctx.fillStyle = `rgba(255,123,208,${0.9*g})`; ctx.font='800 9px ui-monospace,monospace';
  ctx.fillText('OREN OVER EVERY CLARA — THE KING CONQUERS EVERY VERSION', px+14, auY);
  ctx.save();
  ctx.beginPath(); ctx.rect(px+10, auY+6, pw-20, 20); ctx.clip();
  const span = POWER_AUWINS.length*230, scroll = (power.au||0)*4 % span;
  for(let i=0;i<POWER_AUWINS.length*2;i++){
    const tx = px+14 + i*230 - scroll;
    const fl = 0.5 + 0.5*Math.abs(Math.sin((power.anim||0)*2 + i));
    ctx.globalAlpha = g*fl; ctx.fillStyle = i%2 ? '#ff7bd0' : '#ffcf4f'; ctx.font='700 8px ui-monospace,monospace';
    ctx.fillText(POWER_AUWINS[i%POWER_AUWINS.length], tx, auY+20);
  }
  ctx.restore(); ctx.globalAlpha=g;

  // ===== verdict =====
  const vY = py + panelH*0.91; ctx.textAlign='center'; ctx.font='800 9px ui-monospace,monospace';
  ctx.fillStyle = `rgba(255,236,184,${0.95*g})`;
  ctx.fillText('OREN.EXE — KING & GOD OF THE GAME · THE NEW HARD STOP', cx0, vY);
  ctx.font='700 7px ui-monospace,monospace'; ctx.fillStyle = `rgba(255,207,79,${0.8*g})`;
  ctx.fillText('CLARA = CONQUERED QUEEN · SIMON = ONLY UPPER-LIMIT CHALLENGER · PINKI = AU-BASED 3RD', cx0, vY+11);

  // footer note (straight from Toby)
  ctx.textAlign='left'; ctx.fillStyle = `rgba(255,207,79,${0.9*g})`; ctx.font='700 9px ui-monospace,monospace';
  ctx.fillText('▸ '+POWER_NOTES[power.note||0], px+12, py+panelH-10);

  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

/* ===========================================================================
   Lore 29 (June 21) — THE OREN.EXE CUTSCENE (Oren.EXE's creepypasta intro/outro)
   Toby: "Oren.EXE has an intro and an outro. His intro is Oren says 'lets play a
   game.', the game goes in static and Oren laughs, his left eye turns red. The
   outro is when the screen fades out and says 'Oren.EXE wins'. Oren.EXE never lost.
   Simon.EXE can tie Oren, but Oren most of the time will win that. Oren.EXE's sound
   makes shockwaves out of the game around him. Clara would be the most powerful in
   Undertale, but Oren is the most powerful in Classics."
   A looping five-beat cinematic plays over the climb: INTRO (the typed line) ->
   STATIC -> LAUGH (face + shockwave rings) -> RED EYE (his left eye ignites) ->
   OUTRO ("OREN.EXE WINS" / "OREN.EXE NEVER LOST"), then it loops. The only thing
   that isn't a win for him: climbing past without ever playing his game.
   =========================================================================== */
const OREN_CYC = 13.0;
const OREN_INTRO = "lets play a game.";
// returns [phaseIndex 0..4, localTime] for a point in the cutscene cycle
function orenSeg(c){
  if(c < 2.6) return [0, c];
  if(c < 4.4) return [1, c-2.6];
  if(c < 7.2) return [2, c-4.4];
  if(c < 9.6) return [3, c-7.2];
  return [4, c-9.6];
}
function updateOren(dt){
  oren.t = (oren.t||0) + dt;
  oren.cyc = ((oren.cyc||0) + dt) % OREN_CYC;
  const seg = orenSeg(oren.cyc), ph = seg[0], lt = seg[1];
  // phase-change audio cues
  if(ph !== oren.phase){
    oren.phase = ph;
    if(ph===0){ showTaunt('Oren.EXE: "lets play a game."'); }
    if(ph===1){ AUDIO.orenStatic(1.6); shake=Math.max(shake,8); glitch=Math.max(glitch,0.5); }
    if(ph===2){ AUDIO.orenLaugh(); }
    if(ph===3){ AUDIO.zap(); shake=Math.max(shake,6); }                 // his left eye ignites red
    if(ph===4){ AUDIO.shock(); winFlash=Math.max(winFlash||0,0.4);      // outro: the screen says he won
      floaters.push({ x:player.x, y:player.y-36, t:0, txt:'OREN.EXE WINS', col:'#ff2b2b' }); }
  }
  // typed intro line, one char at a time
  if(ph===0) oren.type = Math.min(OREN_INTRO.length, Math.floor(lt/0.13));
  // re-trigger the cackle a couple times across the laugh beat
  if(ph===2){ oren.laughT=(oren.laughT||0)-dt; if(oren.laughT<=0){ oren.laughT=0.95; AUDIO.orenLaugh(); } }
  // left eye glow rises through the RED-EYE beat, stays lit afterward
  const eyeTarget = (ph>=3)?1:(ph===2? Math.min(0.25, lt*0.1):0);
  oren.eye += (eyeTarget - oren.eye) * Math.min(1, dt*4);
  // sound shockwaves rolling out of the game around him
  oren.ringT=(oren.ringT||0)-dt;
  if((ph===2||ph===3||ph===4) && oren.ringT<=0){
    oren.ringT = (ph===4?0.5:0.7);
    oren.rings.push({ r:30, life:1 });
    if(ph>=3){ AUDIO.shock(); shake=Math.max(shake,5); }
  }
  for(let i=oren.rings.length-1;i>=0;i--){ const rg=oren.rings[i];
    rg.r += dt*260; rg.life -= dt*0.7; if(rg.life<=0) oren.rings.splice(i,1); }
  // screen jitter peaks during static, eases out after
  oren.jitter += ((ph===1?1:0) - oren.jitter) * Math.min(1,dt*6);

  // THE OREN.EXE meter — climb past without ever pressing play on his game.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  orenM = Math.max(0, Math.min(1, orenM + (moving ? dt*0.05 : -dt*0.03)));
  if(orenM>=1 && !oren.held){
    oren.held=true; winFlash=1; emer+=5; shake=Math.max(shake,8);
    showTaunt('You climbed past without playing. Oren.EXE never lost — but he never beat you either.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ DIDN’T PLAY HIS GAME ★', col:'#ffd0d0' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ff3b3b','#ffffff','#9aa3ad'])));
    AUDIO.shock();
  }
}

function drawOren(){
  const g = oren.glow||0, top = cameraY;
  const c = oren.cyc||0, seg = orenSeg(c), ph = seg[0], lt = seg[1];
  ctx.save();
  // background wash — near black, deepening to red at the bottom; darkest during the outro fade
  const dark = 0.62 + 0.3*(ph===4? Math.min(1,lt/2):0);
  const bg = ctx.createLinearGradient(0, top, 0, top+H);
  bg.addColorStop(0, `rgba(6,2,3,${dark*g})`);
  bg.addColorStop(1, `rgba(20,2,4,${dark*g})`);
  ctx.fillStyle = bg; ctx.fillRect(0, top, W, H);

  const cx = W/2, cy = top + H*0.42;

  // ===== sound shockwaves rolling out of the game around him =====
  for(const rg of oren.rings){
    const a = Math.max(0, rg.life) * 0.5 * g;
    ctx.strokeStyle = `rgba(255,60,60,${a})`; ctx.lineWidth = 2.5*Math.max(0.2,rg.life);
    ctx.beginPath(); ctx.arc(cx, cy, rg.r, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = `rgba(255,255,255,${a*0.4})`; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy, rg.r*0.86, 0, Math.PI*2); ctx.stroke();
  }

  // ===== the face (fades in from the laugh beat on) =====
  const faceA = (ph>=2 ? (ph===2? Math.min(1, lt/0.8) : 1) : 0) * g;
  if(faceA>0.02){
    ctx.save(); ctx.globalAlpha = faceA;
    // jitter the whole face slightly during/after the static
    ctx.translate((Math.random()-0.5)*6*oren.jitter, (Math.random()-0.5)*6*oren.jitter);
    // head — a dark, irregular skull-ish shape
    ctx.fillStyle = '#0b0608'; ctx.strokeStyle = 'rgba(120,20,24,0.85)'; ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(cx-120, cy-110);
    ctx.quadraticCurveTo(cx, cy-180, cx+120, cy-110);
    ctx.quadraticCurveTo(cx+150, cy+10, cx+90, cy+120);
    ctx.quadraticCurveTo(cx, cy+170, cx-90, cy+120);
    ctx.quadraticCurveTo(cx-150, cy+10, cx-120, cy-110);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // eyes
    const eyeY = cy-18, eyeDX=46, eyeR=20;
    // his RIGHT eye (screen left) — pale and cold
    ctx.fillStyle = '#d8d2cc';
    ctx.beginPath(); ctx.ellipse(cx-eyeDX, eyeY, eyeR, eyeR*1.1, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(cx-eyeDX, eyeY, 7,0,Math.PI*2); ctx.fill();
    // his LEFT eye (screen right) — turns RED
    const er = oren.eye||0;
    ctx.fillStyle = `rgb(${Math.round(216 + (255-216)*er)},${Math.round(210*(1-er)+30*er)},${Math.round(204*(1-er)+30*er)})`;
    ctx.beginPath(); ctx.ellipse(cx+eyeDX, eyeY, eyeR, eyeR*1.1, 0, 0, Math.PI*2); ctx.fill();
    if(er>0.02){
      ctx.shadowColor='#ff1b1b'; ctx.shadowBlur=24*er;
      ctx.fillStyle=`rgba(255,40,40,${er})`;
      ctx.beginPath(); ctx.ellipse(cx+eyeDX, eyeY, eyeR*0.92, eyeR, 0, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
    ctx.fillStyle='#1a0000'; ctx.beginPath(); ctx.arc(cx+eyeDX, eyeY, 7,0,Math.PI*2); ctx.fill();
    // grin (opens wider during the laugh)
    const grin = (ph===2?0.6+0.4*Math.abs(Math.sin(lt*10)):0.5);
    ctx.strokeStyle='#b41a1e'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(cx-52, cy+58);
    ctx.quadraticCurveTo(cx, cy+58+44*grin, cx+52, cy+58); ctx.stroke();
    // teeth
    ctx.strokeStyle='rgba(220,210,200,0.7)'; ctx.lineWidth=1.5;
    for(let i=-2;i<=2;i++){ const tx=cx+i*20;
      ctx.beginPath(); ctx.moveTo(tx,cy+58); ctx.lineTo(tx,cy+58+20*grin); ctx.stroke(); }
    ctx.restore();
  }

  // ===== TV static over the whole screen (the static beat) =====
  if(ph===1 || oren.jitter>0.05){
    ctx.globalAlpha = (ph===1?0.5:0.12*oren.jitter)*g;
    for(let i=0;i<120;i++){
      ctx.fillStyle = Math.random()<0.5?'#ffffff':'#000000';
      ctx.fillRect(Math.random()*W, top+Math.random()*H, Math.random()*40+6, Math.random()*3+1);
    }
    ctx.globalAlpha=1;
  }

  // ===== text per beat =====
  ctx.textAlign='center';
  if(ph===0){
    const shown = OREN_INTRO.slice(0, oren.type||0);
    const caret = (Math.sin((oren.t||0)*8)>0)?'_':'';
    ctx.fillStyle=`rgba(232,232,232,${g})`; ctx.font='700 26px ui-monospace,monospace';
    ctx.fillText(shown+caret, cx, cy+10);
  } else if(ph===2){
    const ha = 'HA '.repeat(2 + (Math.floor(lt*4)%4)).trim();
    ctx.save(); ctx.translate((Math.random()-0.5)*4,(Math.random()-0.5)*4);
    ctx.fillStyle=`rgba(255,60,60,${g})`; ctx.font='800 30px ui-monospace,monospace';
    ctx.fillText(ha, cx, top+H*0.85); ctx.restore();
  } else if(ph===3){
    ctx.fillStyle=`rgba(255,40,40,${g})`; ctx.font='800 19px ui-monospace,monospace';
    ctx.fillText('the left eye turns red', cx, top+H*0.85);
  } else if(ph===4){
    const fa = Math.min(1, lt/1.2)*g;
    ctx.shadowColor='#ff0000'; ctx.shadowBlur=20*fa;
    ctx.fillStyle=`rgba(255,40,40,${fa})`; ctx.font='900 40px ui-monospace,monospace';
    ctx.fillText('OREN.EXE WINS', cx, cy+8); ctx.shadowBlur=0;
    ctx.fillStyle=`rgba(222,210,210,${fa})`; ctx.font='800 15px ui-monospace,monospace';
    ctx.fillText('OREN.EXE NEVER LOST', cx, cy+40);
  }

  // ===== title band + canon note (framing the cinematic) =====
  ctx.fillStyle=`rgba(255,60,60,${0.9*g})`; ctx.font='800 13px ui-monospace,monospace';
  ctx.fillText('THE OREN.EXE CUTSCENE — INTRO · STATIC · LAUGH · RED EYE · OUTRO', cx, top+30);
  ctx.fillStyle=`rgba(210,200,200,${0.8*g})`; ctx.font='700 9px ui-monospace,monospace';
  ctx.fillText('CLARA RULES UNDERTALE POWER · OREN RULES CLASSICS POWER · OREN.EXE NEVER LOST', cx, top+44);

  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

/* ===== THE ALLIANCE BETRAYAL (Lore 29, June 21) =====
   Simon.EXE seeks allies from Oren, Clara, and Luigi Green. Oren says NO; Clara and Luigi Green
   say YES — and Simon slays the two who accepted. Then Simon.EXE battles Oren.EXE, loses, and
   never wants to face Oren again. A looping cinematic over the climb. Five beats:
   SEEK · ANSWERS · BETRAYAL · BATTLE · OREN WINS. */
const BETRAY_CYC = 14.0;
function betraySeg(c){
  if(c < 2.8) return [0, c];        // SEEK — Simon rises toward the three
  if(c < 5.4) return [1, c-2.8];    // ANSWERS — Oren NO, Clara/Luigi YES
  if(c < 8.4) return [2, c-5.4];    // BETRAYAL — the two who said yes are slain
  if(c < 11.0) return [3, c-8.4];   // BATTLE — Simon.EXE vs Oren.EXE
  return [4, c-11.0];               // OREN WINS — Simon flees, never again
}
function updateBetray(dt){
  betray.t = (betray.t||0) + dt;
  betray.cyc = ((betray.cyc||0) + dt) % BETRAY_CYC;
  const seg = betraySeg(betray.cyc), ph = seg[0], lt = seg[1];
  if(ph !== betray.phase){
    betray.phase = ph;
    if(ph===0){ betray.ask=0; betray.flee=0; betray.slainC=0; betray.slainL=0; betray.slashed=false;
      showTaunt('Simon.EXE seeks allies: Oren, Clara, Luigi Green.'); }
    if(ph===1){ AUDIO.zap(); showTaunt('Oren: NO. Clara: YES. Luigi Green: YES.'); }
    if(ph===2){ AUDIO.strike(); shake=Math.max(shake,9); glitch=Math.max(glitch,0.4); betray.slashed=false;
      showTaunt('They said yes. Simon.EXE slays the allies who trusted him.'); }
    if(ph===3){ AUDIO.shock(); shake=Math.max(shake,7); betray.clash=0;
      showTaunt('Simon.EXE turns on Oren.EXE. The two strongest collide.'); }
    if(ph===4){ AUDIO.shock(); winFlash=Math.max(winFlash||0,0.4);
      showTaunt('Oren.EXE wins. Simon never wants to face Oren again.');
      floaters.push({ x:player.x, y:player.y-36, t:0, txt:'OREN.EXE WINS', col:'#ff2b2b' }); }
  }
  if(ph===0) betray.ask = Math.min(1, lt/2.2);
  if(ph===2){
    if(!betray.slashed && lt>0.9){ betray.slashed=true; AUDIO.strike(); shake=Math.max(shake,10);
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'CLARA & LUIGI GREEN — SLAIN', col:'#9aa3ad' }); }
    betray.slainC = Math.min(1, Math.max(0, (lt-0.9)/1.0));
    betray.slainL = Math.min(1, Math.max(0, (lt-1.1)/1.0));
  } else if(ph>=3){ betray.slainC=1; betray.slainL=1; }
  if(ph===3){
    betray.clash = Math.min(1, lt/1.5);
    betray.ringT = (betray.ringT||0)-dt;
    if(betray.ringT<=0){ betray.ringT=0.45; betray.rings.push({ r:24, life:1 }); AUDIO.shock(); shake=Math.max(shake,5); }
  }
  for(let i=betray.rings.length-1;i>=0;i--){ const rg=betray.rings[i];
    rg.r += dt*240; rg.life -= dt*0.8; if(rg.life<=0) betray.rings.splice(i,1); }
  if(ph===4) betray.flee = Math.min(1, lt/1.6);

  // THE ALLIANCE BETRAYAL meter — climb past without ever taking the deal.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  betrayM = Math.max(0, Math.min(1, betrayM + (moving ? dt*0.05 : -dt*0.03)));
  if(betrayM>=1 && !betray.held){
    betray.held=true; winFlash=1; emer+=5; shake=Math.max(shake,8);
    showTaunt('You never took the deal. Simon cannot betray an ally he never made.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ REFUSED THE ALLIANCE ★', col:'#ffd0d0' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ff3b3b','#c187ff','#39e08a'])));
    AUDIO.shock();
  }
}
function drawBetray(){
  const g = betray.glow||0, top = cameraY;
  const c = betray.cyc||0, seg = betraySeg(c), ph = seg[0], lt = seg[1];
  ctx.save();
  // background — cold dark, deepening to red through the battle and outro
  const dark = 0.6 + 0.28*((ph>=3)? (ph===4?1:Math.min(1,lt/1.5)) : 0);
  const bg = ctx.createLinearGradient(0, top, 0, top+H);
  bg.addColorStop(0, `rgba(4,3,8,${dark*g})`);
  bg.addColorStop(1, `rgba(18,3,6,${dark*g})`);
  ctx.fillStyle = bg; ctx.fillRect(0, top, W, H);

  const cx = W/2, rowY = top + H*0.32;
  const ax = [cx-180, cx, cx+180];                 // Oren, Clara, Luigi Green
  const cols = ['#ff3b3b', '#c187ff', '#39e08a'];
  const names = ['OREN', 'CLARA', 'LUIGI GREEN'];
  const answers = ['NO', 'YES', 'YES'];
  const slain = [0, (ph>=3?1:(ph===2?betray.slainC:0)), (ph>=3?1:(ph===2?betray.slainL:0))];

  // ----- one ally head -----
  function ally(x, y, col, dead){
    ctx.save();
    ctx.globalAlpha = (1 - 0.65*dead) * g;
    const cc = dead>0.5 ? '#3a3d42' : col;
    if(dead<0.5){ ctx.shadowColor=col; ctx.shadowBlur=14*g; }
    ctx.fillStyle = '#0c0a12'; ctx.strokeStyle = cc; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(x, y, 30, 34, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle = cc;
    ctx.beginPath(); ctx.arc(x-11, y-4, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+11, y-4, 5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = cc; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x-12, y+14); ctx.lineTo(x+12, y+14); ctx.stroke();
    ctx.restore();
    if(dead>0.3){            // X-out the eyes of the slain
      ctx.save(); ctx.globalAlpha = Math.min(1, dead)*g;
      ctx.strokeStyle='#9aa3ad'; ctx.lineWidth=2.5;

  ctx.fillStyle=`rgba(255,59,59,${Math.max(0,sA)*g})`; ctx.font='800 10px ui-monospace,monospace'; ctx.textAlign='center';

/* ===== THE THIRD DIMENSION (Lore 29, June 22) =====
   Toby answered "what does Simon do after deciding never to face Oren again?": Clara and Luigi Green
   RESPAWN, Simon REBUILDS his battle system into one hybrid of FNF + Sound Battle, but Oren gains 100x
   more power and his battle pattern rises into 3D while everyone else stays 2D — so Oren still beats
   Simon's rebuilt system, Pinki is crushed at that level, and Simon turns to hunt easier targets:
   the roaming hunter. A looping cinematic over the climb. Five beats:
   RESPAWN · REBUILD · 3D RISE · STILL LOSES · HUNTER. */
const DIM_CYC = 15.0;
function dimSeg(c){
  if(c < 2.8) return [0, c];        // RESPAWN — Clara and Luigi Green return
  if(c < 6.0) return [1, c-2.8];    // REBUILD — Simon fuses FNF + Sound Battle into one
  if(c < 9.5) return [2, c-6.0];    // 3D RISE — Oren rises 100x into 3D; Pinki crushed
  if(c < 12.2) return [3, c-9.5];   // STILL LOSES — Simon's 2D hybrid can't reach 3D Oren
  return [4, c-12.2];               // HUNTER — Simon turns to easier targets
}
function updateDimension(dt){
  dimension.t = (dimension.t||0) + dt;
  dimension.cyc = ((dimension.cyc||0) + dt) % DIM_CYC;
  const seg = dimSeg(dimension.cyc), ph = seg[0], lt = seg[1];
  if(ph !== dimension.phase){
    dimension.phase = ph;
    if(ph===0){ dimension.fuse=0; dimension.rise=0; dimension.crush=0; dimension.hunt=0;
      AUDIO.coin(); showTaunt('Clara and Luigi Green respawn into the world.'); }
    if(ph===1){ AUDIO.battleLead();
      showTaunt('Simon rebuilds his battle system: FNF + Sound Battle into one.'); }
    if(ph===2){ AUDIO.shock(); shake=Math.max(shake,9); glitch=Math.max(glitch,0.4);
      showTaunt('Oren gains 100x power. His pattern rises into 3D. Pinki is crushed.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'OREN.EXE — 3D · 100X POWER', col:'#ff3b3b' }); }
    if(ph===3){ AUDIO.strike(); shake=Math.max(shake,7);
      showTaunt('Simon’s rebuilt system is still 2D. Oren beats him from above.'); }
    if(ph===4){ AUDIO.zap();
      showTaunt('Simon gives up on Oren and turns to hunt easier targets.');
      floaters.push({ x:player.x, y:player.y-36, t:0, txt:'THE ROAMING HUNTER', col:'#ff8b3b' }); }
  }
  if(ph===1) dimension.fuse = Math.min(1, lt/2.4);
  else if(ph>=2) dimension.fuse = 1;
  if(ph===2){
    dimension.rise = Math.min(1, lt/2.0);
    dimension.crush = Math.min(1, Math.max(0,(lt-1.2)/1.2));
    dimension.ringT = (dimension.ringT||0)-dt;
    if(dimension.ringT<=0){ dimension.ringT=0.5; dimension.rings.push({ r:30, life:1 }); AUDIO.shock(); shake=Math.max(shake,4); }
  } else if(ph>=3){ dimension.rise=1; dimension.crush=1; }
  for(let i=dimension.rings.length-1;i>=0;i--){ const rg=dimension.rings[i];
    rg.r += dt*240; rg.life -= dt*0.8; if(rg.life<=0) dimension.rings.splice(i,1); }
  if(ph===4) dimension.hunt = Math.min(1, lt/1.8);

  // THE THIRD DIMENSION meter — keep moving and you're never weak enough for the roaming hunter.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  dimensionM = Math.max(0, Math.min(1, dimensionM + (moving ? dt*0.05 : -dt*0.03)));
  if(dimensionM>=1 && !dimension.held){
    dimension.held=true; winFlash=1; emer+=5; shake=Math.max(shake,8);
    showTaunt('You never slowed down. The roaming hunter only takes easy targets.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ NOT AN EASY TARGET ★', col:'#ffd0a0' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ff3b3b','#ff8b3b','#39e08a'])));
    AUDIO.shock();
  }
}
// a rotating wireframe cube — Oren.EXE's 3D battle pattern, projected with simple perspective
function drawDimCube(ox, oy, s, a, b, col, alpha){
  const ca=Math.cos(a), sa=Math.sin(a), cb=Math.cos(b), sb=Math.sin(b);
  const V=[];
  for(let i=0;i<2;i++) for(let j=0;j<2;j++) for(let k=0;k<2;k++){
    const x=(i?1:-1)*s, y=(j?1:-1)*s, z=(k?1:-1)*s;
    const x1=x*ca - z*sa, z1=x*sa + z*ca;            // yaw around Y
    const y2=y*cb - z1*sb, z2=y*sb + z1*cb;          // pitch around X
    const f=340, sc=f/(f+z2);
    V[i*4+j*2+k] = { X:ox + x1*sc, Y:oy + y2*sc };
  }
  ctx.save();
  ctx.globalAlpha = alpha; ctx.strokeStyle = col; ctx.lineWidth = 2;
  ctx.shadowColor = col; ctx.shadowBlur = 12*alpha;
  for(let n=0;n<8;n++) for(const bit of [1,2,4]){ const m=n^bit;
    if(m>n){ ctx.beginPath(); ctx.moveTo(V[n].X,V[n].Y); ctx.lineTo(V[m].X,V[m].Y); ctx.stroke(); } }
  // a small glowing core so the cube reads as a power source
  ctx.fillStyle = col; ctx.shadowBlur = 18*alpha;
  ctx.beginPath(); ctx.arc(ox, oy, 4+2*alpha, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

   whole building, laughing as he deletes: "404: I deleted something." Two layers — Oren rules the power

const DEL_CYC = 16.0;
const SYMB_CAST = ['CLARA','PAUL','KARUTO','ALEX','NIHIL','PINKI','SUMONA','SULFUR','ACID'];
function delSeg(c){
  if(c < 3.4)  return [0, c];        // REORDER — Oren #1, Gray rises to god (3rd), Pinki 4th, Simon sinks
  if(c < 6.6)  return [1, c-3.4];    // SCF 000 — Simon's designation flips 404 -> 000, Plague King uniform
  if(c < 9.8)  return [2, c-6.6];    // YELLOW EYE — onlookers turn into 404Ds / 000Ds / melt
  if(c < 12.8) return [3, c-9.8];    // SYMBIOS — Simon's mark spreads through the whole cast
  return [4, c-12.8];                // CONTAINED — chained behind the titanium door, laughing, deleting
}
function updateDeletion(dt){

  deletion.cyc = ((deletion.cyc||0) + dt) % DEL_CYC;
  const seg = delSeg(deletion.cyc), ph = seg[0], lt = seg[1];
  if(ph !== deletion.phase){
    deletion.phase = ph;
    if(ph===0){ deletion.reorder=0; deletion.eye=0; deletion.symb=0; deletion.contain=0; deletion.melt=0;
      deletion.errs.length=0; AUDIO.shock(); shake=Math.max(shake,8);
      showTaunt('Oren is king of power. Gray rises into a god. Pinki fourth. Simon, second, is now the weakest.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'OREN #1 · SIMON #2 · GRAY #3 · PINKI #4', col:'#ffd84f' }); }
    if(ph===1){ AUDIO.glitch(); glitch=Math.max(glitch,0.5);
      showTaunt('Simon is SCF 000 now, not 404. He puts on the Plague King uniform.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'404 → 000', col:'#ffe14f' }); }
    if(ph===2){ AUDIO.zap();
      showTaunt('The Yellow Eye opens. Look at it and you turn into 404Ds, 000Ds, or melt.'); }
    if(ph===3){ AUDIO.corrupt();
      showTaunt('A symbios of Simon spreads through everyone: Clara, Paul, Karuto, Alex, Nihil, all of them.'); }
    if(ph===4){ AUDIO.orenLaugh(); shake=Math.max(shake,6);
      showTaunt('Chained behind the titanium door, contained, laughing while he deletes.');
      floaters.push({ x:player.x, y:player.y-36, t:0, txt:'😹⚡ 404: I deleted something', col:'#ffe14f' }); }
  }
  // per-beat ramps
  if(ph===0) deletion.reorder = Math.min(1, lt/2.4); else deletion.reorder = 1;
  if(ph===2){ deletion.eye = Math.min(1, lt/1.4); deletion.melt = Math.min(1, Math.max(0,(lt-1.0)/1.6)); }
  else if(ph>2) deletion.eye = 1;
  if(ph===3) deletion.symb = Math.min(1, lt/2.2); else if(ph>3) deletion.symb = 1;
  if(ph===4){

    e.y += dt*30; e.life -= dt*0.5; if(e.life<=0) deletion.errs.splice(i,1); }

  // THE DELETION LAYER meter — look AWAY from the Yellow Eye: keep moving (climbing) and you stay uncorrupted.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  deletionM = Math.max(0, Math.min(1, deletionM + (moving ? dt*0.05 : -dt*0.03)));
  if(deletionM>=1 && !deletion.held){

function wkSeg(c){

function updateWeakness(dt){

      showTaunt('Force constant discharge. He gets stronger from charge, but too much out at once burns him.');
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'WEAK TO: OVER-DRAIN', col:'#ffd84f' }); }
    if(ph===4){ AUDIO.glitch();
      showTaunt('Cover the Yellow Eye and hit the mind. Perception is his containment-weakness.');
      floaters.push({ x:player.x, y:player.y-36, t:0, txt:'WEAK TO: BLINDNESS · PSYCHIC', col:'#39e08a' }); }
  }
  // per-beat ramps
  if(ph===0) weakness.ground = Math.min(1, lt/2.2); else weakness.ground = 1;

  if(ph===4) weakness.blind = Math.min(1, lt/2.2); else if(ph>4) weakness.blind = 1;
  for(let i=weakness.arcs.length-1;i>=0;i--){ const a=weakness.arcs[i];
    a.r += dt*120; a.life -= dt*0.9; if(a.life<=0) weakness.arcs.splice(i,1); }

  // THE WEAKNESS meter — keep exploiting it: keep moving (climbing) and you wear Simon down.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  weaknessM = Math.max(0, Math.min(1, weaknessM + (moving ? dt*0.05 : -dt*0.03)));

function drawWeakness(){
  const g = weakness.glow||0, top = cameraY;
  const c = weakness.cyc||0, seg = wkSeg(c), ph = seg[0], lt = seg[1];
  const cx = W/2, beat = WK_BEATS[ph];

  const sy = top + H*0.40;
  // Simon-as-Electric-Psychic figure (jagged body, two glowing eyes), drained/jittered per beat
  function simonElec(scale, charge, jitter){
    ctx.save(); ctx.globalAlpha = g;
    const jx = (jitter? (Math.random()-0.5)*4*jitter : 0);
    ctx.translate(jx, 0);
    ctx.shadowColor = '#8fe3ff'; ctx.shadowBlur = (10+14*charge)*g;
    ctx.fillStyle = '#06121c'; ctx.strokeStyle = '#8fe3ff'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx-22*scale, sy-26*scale); ctx.lineTo(cx+22*scale, sy-26*scale);
    ctx.lineTo(cx+26*scale, sy+20*scale); ctx.lineTo(cx, sy+34*scale); ctx.lineTo(cx-26*scale, sy+20*scale);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // eyes — left can be the Yellow Eye; blinded in the last beat
    ctx.shadowBlur=0;
    ctx.fillStyle='#8fe3ff';
    ctx.beginPath(); ctx.arc(cx-8*scale, sy-6*scale, 4*scale, 0, Math.PI*2); ctx.fill();
    const eyeY = ph>=4 ? (1-bl) : 1;
    ctx.fillStyle=`rgba(255,225,79,${eyeY})`; ctx.shadowColor='#ffe14f'; ctx.shadowBlur=12*eyeY*g;
    ctx.beginPath(); ctx.arc(cx+8*scale, sy-6*scale, 4*scale, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // internal lightning bolts within him (his charge); fewer when grounded/drained
  function innerBolts(n, len){
    ctx.save(); ctx.globalAlpha = g; ctx.strokeStyle='#bff0ff'; ctx.lineWidth=2;
    ctx.shadowColor='#8fe3ff'; ctx.shadowBlur=8;
    for(let i=0;i<n;i++){ const a = (i/Math.max(1,n))*Math.PI*2 + weakness.t*1.2;

        ctx.lineTo(x,y); }
      ctx.stroke(); }
    ctx.restore();
  }

  if(ph===0){
