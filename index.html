  if(isScf() && !isScf404()) updateScf(dt);
  if(isScf404() && !isTreads()) updateScf404(dt);
  if(isTreads() && !isFirey()) updateTreads(dt);
  if(isFirey() && !isAlien()) updateFirey(dt);
  if(isAlien() && !isWall()) updateAlien(dt);
  if(isWall() && !isSmooth()) updateWall(dt);
  if(isSmooth() && !isHallu()) updateSmooth(dt);
  if(isHallu() && !isPlague()) updateHallu(dt);
  if(isPlague() && !isDanger()) updatePlague(dt);
  if(isDanger() && !isCodex()) updateDanger(dt);
  if(isCodex() && !isWeb()) updateCodex(dt);
  if(isWeb() && !isClara()) updateWeb(dt);
  if(isClara()) updateClara(dt);

  /* ---- false-cure bottles (the liquid-drop lever) ---- */
  updateBottles(dt);

  /* ---- generate / cull platforms ---- */
  while(nextPlatY > cameraY - 120) genPlatform(false);
  platforms = platforms.filter(p => p.y < cameraY + H + 260 || p===platforms[0]);
  emeralds = emeralds.filter(e => e.y < cameraY + H + 200 && !e.got);

  /* ---- death checks ---- */
  if(player.y > simonY - 10) die('SIMON CAUGHT YOU');   // the tide reaches you
  if(hp<=0) die('THE STAIRCASE ATE YOU');

  /* ---- fx ---- */
  for(const pt of particles){ pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.25; pt.life-=dt; }
  particles = particles.filter(p=>p.life>0);
  for(const f of floaters){ f.y-=0.6; f.t+=dt; }
  floaters = floaters.filter(f=>f.t<1);
  if(shake>0) shake=Math.max(0, shake-dt*30);
  if(hitFlash>0) hitFlash=Math.max(0, hitFlash-dt*2);
  player.anim += dt;

  /* ---- audio tension from Simon proximity ---- */
  const gap = (simonY - (player.y)) ;             // smaller = closer
  const prox = Math.max(0, Math.min(1, 1 - gap/(H*0.95)));
  AUDIO.setTension(prox, hf);
}
let standOn=null, simonLunge=0, corruptTimer=0;

function damage(){
  if(peaceful() && !corrupted()) return;   // calm surface is safe — until Phase 2's virus breaks it
  if(hitFlash>0.5) return;   // brief i-frames
  hp--; hitFlash=1; shake=Math.max(shake,10); AUDIO.hurt();
}
function die(reason){
  if(state!=='play') return;
  state='dead'; player.dead=true; deathReason=reason; AUDIO.death();
  shake=18;
  const m = Math.floor(height/PX_PER_M);
  if(m>best){ best=m; try{localStorage.setItem(bestKey,String(best));}catch(e){} newBest=true; } else newBest=false;
  for(let i=0;i<40;i++) particles.push(spark(player.x, player.y, chance(0.5)?'#ff3b5c':'#3ec6ff'));
}
let deathReason='', newBest=false;

function spark(x,y,col){ return { x,y, vx:rnd(-3,3), vy:rnd(-5,1), life:rnd(0.5,1.1), col }; }
function pick(a){ return a[(Math.random()*a.length)|0]; }

/* =========================================================================
   SIMON'S LEVERS — "Endless Staircase is ALL POWERFUL." Simon flips a lever
   and the whole staircase changes its rules: Fall, Rearrange, Bridge, Spin,
   Endless Slide. (Lore 24, June 13 2026.)  Each fires as a named attack:
   a short warning, then the effect plays out across the steps in view.
   ========================================================================= */
function visiblePlats(){
  return platforms.filter(p=>!p.gone && p.y>cameraY-60 && p.y<cameraY+H+60);
}
function updateLevers(dt, hf){
  if(peaceful()) return;     // Simon set the levers down; the staircase is calm
  if(lever.state==='idle'){
    leverTimer -= dt;
    if(leverTimer<=0 && height>140) startLever(hf);
    return;
  }
  lever.t += dt;
  if(lever.state==='warn'){
    if(lever.t >= lever.warnDur) activateLever();
  } else { // 'act'
    runLeverEffect(dt);
    if(lever.t >= lever.actDur) endLever(hf);
  }
}
function startLever(hf){
  const L = pick(LEVERS);
  lever = { state:'warn', type:L.type, name:L.name, t:0, warnDur:L.warn, actDur:L.act };
  leverFlash = 1.0; shake = Math.max(shake, 6);
  warnText = 'SIMON PULLS A LEVER!'; warnT = L.warn + 0.2;
  AUDIO.roar();
}
function activateLever(){
  lever.state='act'; lever.t=0;
  warnText = lever.name; warnT = 1.5;
  const vis = visiblePlats();
  if(lever.type==='fall'){
    for(const p of vis){ if(p===platforms[0]) continue;
      if(p.crumble<0){ p.type='crumble'; p.crumble = rnd(0.25,1.4); } }
    shake = Math.max(shake, 12);
  } else if(lever.type==='rearrange'){
    for(const p of vis){ if(p===platforms[0]) continue;
      // don't yank the step out from under the player
      const onIt = (player.x+player.w*0.35>p.x && player.x-player.w*0.35<p.x+p.w
                    && Math.abs((player.y+player.h/2)-p.y)<22);
      if(onIt) continue;
      p.targetX = Math.max(MARGIN, Math.min(W-MARGIN-p.w, rnd(MARGIN, W-MARGIN-p.w)));
    }
  } else if(lever.type==='bridge'){
    for(const p of vis){ p.bridge = { ox:p.x, ow:p.w }; }
  } else if(lever.type==='spin'){
    ctrlInvert = true; shake = Math.max(shake, 8);
  } else if(lever.type==='slide'){
    slideMode = 1;
  } else if(lever.type==='cure'){
    // two identical bottles fall. one is Anti-Virus (heals), one is JTMYHE
    // "juice" (hurts). same color. you cannot tell which until you drink.
    dropBottles();
    showTaunt('A CURE HAS BEEN PREPARED.');
  } else if(lever.type==='dud'){
    // the lever that does nothing — the cruelest trick of all
    showTaunt(pick(["...","WAS THAT THE CURE?","KEEP GUESSING."]));
  }
}
function runLeverEffect(dt){
  if(lever.type==='rearrange'){
    for(const p of platforms){ if(p.targetX===undefined) continue;
      p.x += (p.targetX - p.x) * 0.18;
      if(Math.abs(p.targetX-p.x)<0.6){ p.x=p.targetX; p.targetX=undefined; } }
  } else if(lever.type==='bridge'){
    const tx = MARGIN, tw = W-MARGIN*2;
    for(const p of platforms){ if(!p.bridge) continue;
      p.x += (tx - p.x)*0.16; p.w += (tw - p.w)*0.16; }
  }
}
function endLever(hf){
  if(lever.type==='bridge'){
    for(const p of platforms){ if(p.bridge){ p.x=p.bridge.ox; p.w=p.bridge.ow; p.bridge=null; } }
  }
  for(const p of platforms){ if(p.targetX!==undefined) p.targetX=undefined; }
  ctrlInvert = false; slideMode = 0;
  leverTimer = rnd(12,18) - hf*6;
  lever = { state:'idle', type:null, name:'', t:0, warnDur:0, actDur:0 };
}

/* ---- Simon's taunts (the lie of a cure at a top that does not exist) ---- */
function showTaunt(txt){ taunt = txt; tauntT = 2.6; }

/* ---- The False Cure: two identical bottles, one heals, one hurts. ---- */
function dropBottles(){
  // drop a pair a little above the player, side by side, looking the same
  const baseY = player.y - rnd(140, 200);
  const cure = chance(0.5) ? -1 : 1;           // which side is the real Anti-Virus
  const lx = W*0.32, rx = W*0.68;
  bottles.push({ x:lx, y:baseY, vy:-2, t:0, life:5.2, good:(cure<0), got:false, settled:false, plat:null });
  bottles.push({ x:rx, y:baseY, vy:-2, t:0, life:5.2, good:(cure>0), got:false, settled:false, plat:null });
}
function updateBottles(dt){
  for(const b of bottles){
    if(b.got){ b.life-=dt; continue; }
    b.t += dt; b.life -= dt;
    // gentle drift downward until it rests near a platform, then bob
    if(!b.settled){
      b.vy += 0.18; if(b.vy>4) b.vy=4; b.y += b.vy;
      for(const p of platforms){ if(p.gone) continue;
        if(b.x>p.x && b.x<p.x+p.w && b.y>p.y-22 && b.y<p.y){ b.y=p.y-16; b.settled=true; b.vy=0; break; } }
    } else { b.y += Math.sin(b.t*3)*0.3; }
    // grab on touch — you only learn which it was by drinking
    if(Math.abs(b.x-player.x)<24 && Math.abs(b.y-player.y)<28){
      b.got = true; b.life = 0.6;
      if(b.good){
        if(hp<maxHp){ hp++; floaters.push({x:b.x,y:b.y,t:0,txt:'CURE +♥',col:'#39e08a'}); AUDIO.coin(); }
        else { floaters.push({x:b.x,y:b.y,t:0,txt:'no effect',col:'#8a82a8'}); }   // useless if not infected
      } else {
        damage(); shake=Math.max(shake,12);
        floaters.push({x:b.x,y:b.y,t:0,txt:'JTMYHE!',col:'#ff3b5c'});
        for(let i=0;i<12;i++) particles.push(spark(b.x,b.y,'#ff3b5c'));
      }
    }
  }
  bottles = bottles.filter(b => b.life>0 && b.y < cameraY + H + 200);
}

/* ---- The Peaceful Ending: turn the live staircase into a calm Incredibox.
       Steps grow little beatbox characters that bob to a shared beat and puff
       out music notes; the notes drift up like the world is humming to itself. */
const BOXER_COLS = ['#62c6ff','#8fe3ff','#ffd84f','#39e08a','#c79bff','#ff9bd0'];
function updatePeace(dt){
  // give nearby on-screen steps a calm Incredibox singer (additive, once each)
  for(const p of platforms){
    if(p.boxer===undefined && !p.gone && p.y < cameraY + H + 120 && p.y > cameraY - 120){
      p.boxer = chance(0.55) ? { col: pick(BOXER_COLS), phase: rnd(0,6.28), nt: rnd(0.3,1.4), answer:0 } : null;
    }
    if(p.boxer){
      p.boxer.nt -= dt;
      if(p.boxer.nt<=0){
        p.boxer.nt = rnd(1.1, 2.2);
        notes.push({ x:p.x+p.w/2 + rnd(-10,10), y:p.y-26, vy:rnd(-0.5,-0.8),
                     t:0, life:rnd(2.4,3.4), col:p.boxer.col, sw:rnd(0.6,1.3) });
      }
      if(p.boxer.answer>0) p.boxer.answer = Math.max(0, p.boxer.answer - dt*2.0);
    }
  }

  /* ---- SOUND BATTLE: Simon leads the beat and is the fastest; the world answers.
         Every beat Simon pulses FIRST (a bright lead note from the bottom-center),
         then his call ripples outward and each singer answers as the wave reaches
         it. "Everything became small and simple again, but Simon is still the
         fastest sound-and-animation force in the whole game." ---- */
  const beatLen = 0.62;
  battle.leadFlash = Math.max(0, battle.leadFlash - dt*2.2);
  battle.t += dt;
  if(battle.t >= beatLen){
    battle.t -= beatLen; battle.beat++;
    battle.leadFlash = 1.0;                 // Simon moves first
    battle.answerActive = true; battle.answerWave = 0;
    notes.push({ x:battle.simonX + rnd(-6,6), y: cameraY + H - 96, vy:rnd(-0.8,-1.1),
                 t:0, life:rnd(2.6,3.6), col:'#ffd84f', sw:1.4 });
    AUDIO.battleLead();
  }
  // the answer sweeps outward from Simon; each singer answers as it passes its x
  if(battle.answerActive){
    const prev = battle.answerWave;
    battle.answerWave = Math.min(1, battle.answerWave + dt*1.8);
    for(const p of platforms){
      if(!p.boxer || p.gone) continue;
      const nx = Math.abs((p.x + p.w/2) - battle.simonX) / (W*0.6);  // 0 near Simon .. ~1 far
      if(nx<=1 && prev < nx && battle.answerWave >= nx){
        p.boxer.answer = 1.0;
        notes.push({ x:p.x+p.w/2 + rnd(-8,8), y:p.y-26, vy:rnd(-0.5,-0.8),
                     t:0, life:rnd(2.2,3.2), col:p.boxer.col, sw:rnd(0.6,1.3) });
      }
    }
    if(battle.answerWave>=1){ battle.answerActive=false; AUDIO.battleAnswer(); }
  }

  for(const n of notes){ n.t+=dt; n.y+=n.vy; n.x += Math.sin(n.t*2+n.sw)*0.4; }
  notes = notes.filter(n => n.t < n.life && n.y > cameraY - 40);
}

/* ---- PHASE 2 — THE .EXE VIRUS: the calm Incredibox is overrun. Every second
       the game gets more corrupt (the errors multiply), the singers are infected
       one by one, and Phase 2 Simon, unable to clean it, throws .EXE glitch
       pulses and corrupted tentacles at everything in sight. ---- */
function updateCorruption(dt){
  // "every second the game gets more corrupt" — the error count climbs and climbs
  phase2.errs = Math.min(90, (phase2.errs||0) + dt*4);
  // .EXE glitch pulses + a corrupted-chaos tendril swipe (Simon attacks all)
  corruptTimer -= dt;
  if(corruptTimer<=0){
    corruptTimer = rnd(1.1, 2.1);
    glitch = Math.max(glitch, 0.85); shake = Math.max(shake, 6);
    AUDIO.glitch();
    // Lore 27 — once found out, Simon "doesn't even think about attacking now":
    // his direct tendril swipes mostly stop. He turns to the blurry mind instead.
    if(tendrils.length<4 && (!isExposed() || chance(0.22))){
      const fromLeft = chance(0.5);
      tendrils.push({ side:fromLeft?-1:1, y: cameraY + rnd(80, H-160), t:0, len:0, life:2.2, hit:false });
    }
  }
  // the infection spreads through the calm singers, one at a time
  for(const p of platforms){
    if(p.boxer && !p.boxer.infected && chance(0.05)) p.boxer.infected = true;
  }

  /* ---- Lore 26: Simon forces the game to grow corruption-cells ---- */
  // Pyrakontacke (red, Power Nucleus) and Plorotacke (cyan, huge Mitochondria)
  // drift up through the room. Cap the count so the screen never floods.
  if(cells.length < 14 && chance(0.06 + 0.04*(phase2.glow||0))){
    const pyra = chance(0.5);
    cells.push({
      kind: pyra ? 'pyra' : 'ploro',
      x: rnd(MARGIN, W-MARGIN), y: cameraY + H + rnd(10, 90),
      vx: rnd(-0.25,0.25), vy: rnd(-0.45,-0.18),
      r: pyra ? rnd(9,14) : rnd(11,16), t: Math.random()*6.28, wob: rnd(0.6,1.4)
    });
  }
  for(const c of cells){
    c.x += c.vx + Math.sin(c.t*c.wob)*0.3; c.y += c.vy; c.t += dt;
    c.x = Math.max(MARGIN, Math.min(W-MARGIN, c.x));
  }
  cells = cells.filter(c => c.y > cameraY - 80);
  // when a Pyrakontacke meets a Plorotacke they mix inside Simon -> lightning.
  for(let i=0;i<cells.length;i++){
    for(let j=i+1;j<cells.length;j++){
      const a=cells[i], b=cells[j];
      if(a.kind===b.kind) continue;
      const dx=a.x-b.x, dy=a.y-b.y;
      if(dx*dx+dy*dy < 52*52 && bolts.length<4 && chance(0.5)){
        bolts.push({ ax:a.x, ay:a.y, bx:b.x, by:b.y, t:0, life:0.5, seed:(i*7+j*13)%97 });
        glitch = Math.max(glitch, 0.6); AUDIO.zap();
        // the mixed cells are spent in the reaction
        a.y = cameraY - 999; b.y = cameraY - 999;
        // a lightning arc that crosses the player charges the corruption
        const my=(a.y+b.y)/2;
        if(Math.abs(((a.x+b.x)/2) - player.x) < 70 && Math.abs(my - player.y) < 90) damage();
      }
    }
  }
  cells = cells.filter(c => c.y > cameraY - 80);
  for(const z of bolts){ z.t += dt; }
  bolts = bolts.filter(z => z.t < z.life);

  /* ---- Phase 2 rule: RUN becomes fuel, HIDE (stillness) stays safe ---- */
  // Panic is punished. Running charges the corruption; standing still lets it
  // settle. (Simon's tide still rises, so you can never hide for long.)
  const running = Math.abs(player.vx) > 1.6;
  if(running){
    fuel = Math.min(1, fuel + dt*0.42); safeGlow = Math.max(0, safeGlow - dt*2);
    if(fuel >= 1){
      fuel = 0.55; fuelHint = 1.2;
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'FUEL', col:'#ff3b5c' });
      damage();
    }
  } else {
    fuel = Math.max(0, fuel - dt*0.7);
    safeGlow = Math.min(1, safeGlow + dt*1.4);
  }
  if(fuelHint>0) fuelHint = Math.max(0, fuelHint - dt);

  /* ---- Lore 27 — the BLURRY MIND. Once Simon is found out he stops chasing and
         plants blurry thoughts that fog your memory. They drift in and slowly home
         on you; while one overlaps you the MIND meter climbs ("too much in the
         brain"). Overload and Simon SEALS it with lightning and you explode. The
         counter is to look closely (stand still): stillness clears the mind. ---- */
  if(mindSeal>0) mindSeal = Math.max(0, mindSeal - dt*1.4);
  if(isExposed()){
    const eg = exposed.glow||0;
    // plant blurry thoughts (capped so the screen never floods). Once Simon turns
    // SILENT EXECUTIONER he stops wasting power, so the thoughts thin right out.
    const tCap = isExecutioner()? 3 : 6, tRate = isExecutioner()? 0.4 : 1;
    if(thoughts.length < tCap && chance((0.03 + 0.05*eg)*tRate)){
      thoughts.push({
        x: rnd(MARGIN, W-MARGIN), y: cameraY + (chance(0.5)? -40 : H+40),
        vx: rnd(-0.2,0.2), vy: rnd(-0.2,0.2),
        r: rnd(26,40), t: Math.random()*6.28, wob: rnd(0.5,1.1),
        word: pick(['who?','...','blurry','meow','forget','Gray?','Wenda?','404'])
      });
    }
    let overlap = 0;
    for(const th of thoughts){
      // gentle homing toward the player so memory keeps creeping in
      const dx = player.x - th.x, dy = player.y - th.y;
      const d = Math.hypot(dx,dy) || 1;
      th.vx += (dx/d)*0.012; th.vy += (dy/d)*0.012;
      th.vx *= 0.985; th.vy *= 0.985;
      th.x += th.vx + Math.sin(th.t*th.wob)*0.25; th.y += th.vy; th.t += dt;
      th.x = Math.max(MARGIN, Math.min(W-MARGIN, th.x));
      if(Math.abs(th.x-player.x) < th.r+18 && Math.abs(th.y-player.y) < th.r+22) overlap++;
    }
    thoughts = thoughts.filter(th => th.y > cameraY-120 && th.y < cameraY+H+120);
    const running = Math.abs(player.vx) > 1.6;
    if(overlap>0){
      mind = Math.min(1, mind + dt*(0.22 + 0.20*overlap) + (running?dt*0.12:0));
    } else if(!running){
      mind = Math.max(0, mind - dt*0.55);   // looking closely / standing still clears it
    } else {
      mind = Math.max(0, mind - dt*0.12);
    }
    // OVERLOAD — too much in the mind; Simon seals it with lightning and you explode
    if(mind >= 1){
      mind = 0.45; mindSeal = 1.0;
      glitch = Math.max(glitch, 0.7); shake = Math.max(shake, 9);
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:'OVERLOAD', col:'#b98cff' });
      // an explosion of the over-full mind
      for(let i=0;i<14;i++) particles.push(spark(player.x, player.y, pick(['#b98cff','#eafcff','#3ec6ff'])));
      AUDIO.zap();
      damage();
    }
  }
}

/* ---- Lore 28 — THE SILENT EXECUTIONER. Found out, weaker, but more efficient,
       Simon stops the wild attacks. He goes quiet and only moves when the result
       is certain: he MARKS your spot, holds the strike while it locks (a red eye
       flicker), then drops one clean lightning bolt. If you stayed on the mark
       (hesitated, thought too much), the clean move lands. Read it and MOVE. ---- */
function updateExecutioner(dt){
  const xg = executioner.glow||0;
  if(!mark){
    markTimer -= dt;
    if(markTimer <= 0){
      // mark the player's current spot — the precise target he commits to
      mark = { x: player.x, y: player.y, t:0, charge: 1.35 - xg*0.15, fired:false };
      markTimer = rnd(3.0, 4.4) - xg*0.6;
      AUDIO.aim();
      showTaunt(pick(['I only move when it is certain.','Hold still. Think too much.','One clean move.']));
    }
  } else {
    mark.t += dt;
    if(!mark.fired && mark.t >= mark.charge){
      mark.fired = true;
      // a single clean precision strike straight down onto the marked point
      bolts.push({ ax: mark.x, ay: mark.y - H, bx: mark.x, by: mark.y, t:0, life:0.42,
                   seed:((mark.x*0.7)|0)%97, strike:true });
      glitch = Math.max(glitch, 0.5); shake = Math.max(shake, 9); AUDIO.strike();
      for(let i=0;i<12;i++) particles.push(spark(mark.x, mark.y, pick(['#ff2b4c','#eafcff','#3ee6ff'])));
      // if you stayed on the mark, the clean move lands; move off it and he misses
      if(Math.abs(player.x-mark.x) < 40 && Math.abs(player.y-mark.y) < 46){
        floaters.push({ x:player.x, y:player.y-30, t:0, txt:'CLEAN HIT', col:'#ff2b4c' });
        damage();
      } else {
        floaters.push({ x:mark.x, y:mark.y-30, t:0, txt:'MISSED', col:'#3ee6ff' });
      }
    }
    if(mark.t > mark.charge + 0.35) mark = null;
  }
}

/* ---- Lore 27 (scale-of-reality) — THE ATOMIX WAR. Simon conquers like a system:
       he seeds Copies of Intention (one-word slivers of his will) that drift and
       home on you. Each one that touches you flips the board toward Simon (the game
       "chooses him by itself") and curses your movement with its word. Dodge them
       and the rebellion below (Alex + Luigi Green) cleans atomix upward, freeing the
       board back. Let the board fully agree with Simon and the floating zones lock
       into his symbol and lightning seals it. ---- */
function updateAtomix(dt){
  const ag = atomix.glow||0;
  // the rebellion cleans atomix upward — a slow, steady pull back toward a free board
  board = Math.min(1, board + dt*(0.045 + 0.02*ag));
  // Simon seeds Copies of Intention (capped so the screen never floods)
  if(copies.length < 5 && chance((0.022 + 0.04*ag))){
    copies.push({
      x: rnd(MARGIN, W-MARGIN), y: cameraY + (chance(0.5)? -36 : H+36),
      vx: rnd(-0.3,0.3), vy: rnd(-0.3,0.3),
      r: 17, t: Math.random()*6.28, wob: rnd(0.5,1.1),
      word: pick(INTENTIONS)
    });
  }
  for(const c of copies){
    // gentle homing — Simon's will creeps toward you
    const dx = player.x - c.x, dy = player.y - c.y, d = Math.hypot(dx,dy)||1;
    c.vx += (dx/d)*0.018; c.vy += (dy/d)*0.018;
    c.vx *= 0.985; c.vy *= 0.985;
    c.x += c.vx + Math.sin(c.t*c.wob)*0.25; c.y += c.vy; c.t += dt;
    c.x = Math.max(MARGIN, Math.min(W-MARGIN, c.x));
    // a touch: the board flips toward Simon and your movement is cursed by its word
    if(!c.hit && Math.abs(c.x-player.x) < c.r+16 && Math.abs(c.y-player.y) < c.r+20){
      c.hit = true;
      board = Math.max(0, board - 0.11);
      curse.type = c.word; curse.t = 1.3;
      glitch = Math.max(glitch, 0.5); shake = Math.max(shake, 6);
      floaters.push({ x:player.x, y:player.y-30, t:0, txt:c.word.toUpperCase(), col:'#ff2b4c' });
      AUDIO.glitch();
    }
  }
  copies = copies.filter(c => !c.hit && c.y > cameraY-120 && c.y < cameraY+H+120);
  // the board fully agreeing with Simon: the floating zones lock into his symbol and
  // lightning seals it (then the rebellion claws a little of the board back).
  if(board <= 0.001){
    board = 0.30;
    glitch = Math.max(glitch, 0.8); shake = Math.max(shake, 10);
    floaters.push({ x:player.x, y:player.y-30, t:0, txt:'CENTER’S MINE', col:'#ff2b4c' });
    for(let i=0;i<14;i++) particles.push(spark(player.x, player.y, pick(['#ff2b4c','#eafcff','#3ee6ff'])));
    AUDIO.zap();
    damage();
  }
}

/* ---- Lore 27 (the Residual War) — THE RESIDUAL WAR. Residual is made of everything
       left unfinished, so it climbs the game as half-formed REMNANTS: a false staircase
       that flickers in, a reversed laugh, half a polo icon, a false door, a dead sound
       prompt. Each is UNFINISHED — an open ring with a gap. You cannot beat Residual by
       fighting; every blow makes more unfinished matter. You FINISH it: reach a remnant
       to close its gap, and the SPINE meter climbs. Fill the meter and the SOUND SPINE
       rises, all remnants converge into it, and Residual is ended all at once. Let a
       remnant sit unfinished and it folds back into the world; let the meter empty and
       the floor opens into a remembered hole (a nudge, never a wall). ---- */
function updateResidual(dt){
  const rg = residual.glow||0;
  if(spineFlash>0) spineFlash = Math.max(0, spineFlash - dt*1.6);
  // Residual likes sprawl: convergence slowly slips back toward the unfinished
  spine = Math.max(0, spine - dt*(0.05 + 0.03*rg));
  // it climbs the gap as half-formed remnants (capped so the screen never floods)
  if(remnants.length < 6 && chance(0.03 + 0.04*rg)){
    remnants.push({
      x: rnd(MARGIN, W-MARGIN), y: cameraY + (chance(0.5)? -36 : H+36),
      vx: rnd(-0.3,0.3), vy: rnd(-0.25,0.25),
      r: rnd(15,22), t: Math.random()*6.28, wob: rnd(0.5,1.1),
      kind: pick(REMKINDS), life: rnd(5,8), fin:0
    });
  }
  for(const r of remnants){
    if(r.fin>0){ r.fin += dt; continue; }   // a finished remnant is sealing — leave it
    r.life -= dt;
    // it drifts and flickers, half-real
    r.x += r.vx + Math.sin(r.t*r.wob)*0.3; r.y += r.vy; r.t += dt;
    r.x = Math.max(MARGIN, Math.min(W-MARGIN, r.x));
    // FINISH it — close the gap by reaching it; the Sound Spine gains
    if(Math.abs(r.x-player.x) < r.r+16 && Math.abs(r.y-player.y) < r.r+20){
      r.fin = 0.001;
      spine = Math.min(1, spine + 0.085);
      floaters.push({ x:r.x, y:r.y-22, t:0, txt:'FINISHED', col:'#9affc8' });
      for(let i=0;i<6;i++) particles.push(spark(r.x, r.y, pick(['#9affc8','#eafff4','#ffd84f'])));
      AUDIO.battleLead();
      // the trap: finishing it makes a little more unfinished matter somewhere else
      if(remnants.length < 7 && chance(0.6)){
        remnants.push({ x: rnd(MARGIN, W-MARGIN), y: cameraY + (chance(0.5)? -36 : H+36),
          vx: rnd(-0.3,0.3), vy: rnd(-0.25,0.25), r: rnd(15,22), t:Math.random()*6.28,
          wob: rnd(0.5,1.1), kind: pick(REMKINDS), life: rnd(5,8), fin:0 });
      }
    }
  }
  // remnants left unfinished fold back into the world (Residual sprawls)
  for(const r of remnants){
    if(r.fin===0 && r.life<=0){
      spine = Math.max(0, spine - 0.04); glitch = Math.max(glitch, 0.35);
      floaters.push({ x:r.x, y:r.y-22, t:0, txt:'unfinished...', col:'#7a8a9a' });
    }
  }
  remnants = remnants.filter(r => (r.fin>0 ? r.fin<0.5 : r.life>0) && r.y>cameraY-160 && r.y<cameraY+H+160);
  // CONVERGE — the Sound Spine rises and Residual is ended all at once (a reward beat)
  if(spine >= 1){
    spine = 0.4; spineFlash = 1;
    shake = Math.max(shake, 10); glitch = Math.max(glitch, 0.5); emer += 5;
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:'CONVERGE — SOUND SPINE', col:'#ffd84f' });
    for(let i=0;i<18;i++) particles.push(spark(player.x, player.y, pick(['#9affc8','#ffd84f','#eafff4'])));
    showTaunt('Converge. The Sound Spine ends it all at once.');
    AUDIO.zap();
  }
  // let Residual sprawl completely and the floor opens into a remembered hole — the
  // shaft Simon caught himself from. A small nudge, then the rebellion claws it back.
  if(spine <= 0.001){
    spine = 0.25;
    glitch = Math.max(glitch, 0.7); shake = Math.max(shake, 9);
    floaters.push({ x:player.x, y:player.y-30, t:0, txt:'A REMEMBERED HOLE', col:'#9affc8' });
    AUDIO.glitch();
    damage();
  }
}

/* ---- Lore 27 (the "talk to ChatGPT each time" thread) — THE 17 SOUND BATTLES. Simon
       destroyed the board with the Domain Expansion, so only Sound Battle law is left:
       everything is decided through sound. Simon LEADS beats — glowing NOTES rise through
       the room; ANSWER on beat by reaching one and the BATTLE meter climbs. Fill it and
       the current foe loses its claim and the next of the 17 steps up (Black, Gray, Alex,
       Luigi Green... Battle 14 is ToddLLM, the duel of created will). The foe answers with
       a PRESSURE sweep — a band of sound across the room; let it cross you and you take a
       hit and the meter slips (a nudge, never a wall). Win all 17 and Sound Battle law
       holds across every dome — the one law that crosses them all. ---- */
function updateSounds(dt){
  const sg = sounds.glow||0;
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  const beaten = sounds.idx >= SOUND_FOES.length;   // all 17 claims decided
  // Simon leads beats — notes rise for you to answer (capped so the room never floods)
  if(!beaten && leadNotes.length < 5 && chance(0.03 + 0.05*sg)){
    leadNotes.push({ x: rnd(MARGIN, W-MARGIN), y: cameraY + H + 30,
      vy: -rnd(0.7,1.2), t: Math.random()*6.28, wob: rnd(0.6,1.1),
      r: 13, life: rnd(4,6), ans:0 });
  }
  for(const n of leadNotes){
    if(n.ans>0){ n.ans += dt; continue; }   // an answered note is flaring — leave it
    n.life -= dt; n.y += n.vy; n.x += Math.sin(n.t*n.wob)*0.4; n.t += dt;
    // ANSWER ON BEAT — reach the rising note; the battle meter climbs
    if(Math.abs(n.x-player.x) < n.r+16 && Math.abs(n.y-player.y) < n.r+20){
      n.ans = 0.001;
      battleMeter = Math.min(1, battleMeter + 0.085);
      floaters.push({ x:n.x, y:n.y-22, t:0, txt:'ON BEAT', col:'#ffd84f' });
      for(let i=0;i<6;i++) particles.push(spark(n.x, n.y, pick(['#ffd84f','#eafff4','#3ee6ff'])));
      AUDIO.battleLead();
    }
  }
  // notes missed (drift off the top) cost a little ground
  for(const n of leadNotes){
    if(n.ans===0 && (n.life<=0 || n.y < cameraY-50)) battleMeter = Math.max(0, battleMeter - 0.03);
  }
  leadNotes = leadNotes.filter(n => (n.ans>0 ? n.ans<0.5 : (n.life>0 && n.y>cameraY-60)));
  // the foe answers with a PRESSURE sweep — a band of sound crossing the room
  if(!beaten){
    if(!foePress.active && chance(0.012 + 0.01*sg)){
      foePress.active = true; foePress.t = 0; foePress.hit = false;
      foePress.x = chance(0.5) ? -40 : W+40; foePress.dir = foePress.x<0 ? 1 : -1;
    }
    if(foePress.active){
      foePress.t += dt; foePress.x += foePress.dir * dt * 220;
      // crossing the player: a hit and the meter slips (a nudge, never a wall)
      if(Math.abs(foePress.x - player.x) < 22 && !foePress.hit){
        foePress.hit = true; damage(); battleMeter = Math.max(0, battleMeter - 0.12);
        glitch = Math.max(glitch, 0.3);
      }
      if(foePress.x < -60 || foePress.x > W+60){ foePress.active = false; foePress.hit = false; }
    }
  } else { foePress.active = false; }
  // WIN the current battle — the foe loses its claim; the next of the 17 steps up
  if(!beaten && battleMeter >= 1){
    const foe = SOUND_FOES[sounds.idx];
    sounds.idx++; battleMeter = 0.2; winFlash = 1;
    shake = Math.max(shake, 7); emer += (sounds.idx % 3 === 0 ? 2 : 1);
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:foe+' LOSES THE CLAIM', col:'#ffd84f' });
    for(let i=0;i<14;i++) particles.push(spark(player.x, player.y, pick(['#ffd84f','#3ee6ff','#eafff4'])));
    AUDIO.zap();
    if(sounds.idx < SOUND_FOES.length){
      const nxt = SOUND_FOES[sounds.idx];
      showTaunt(sounds.idx===13 ? 'Sound Battle 14 — Simon vs ToddLLM. I move by my will now.'
              : 'Sound Battle '+(sounds.idx+1)+' — Simon vs '+nxt+'.');
    } else {
      emer += 5;
      showTaunt('All 17 decided. Sound Battle law holds across every dome.');
      floaters.push({ x:player.x, y:player.y-54, t:0, txt:'SOUND BATTLE LAW HOLDS', col:'#ffd84f' });
    }
  }
}

/* ---- Lore 27 (the "talk to ChatGPT each time" thread) — THE LORE OF THE VOID. Simon
       fused the Void (a totally dense space) with his Domain Expansion and said "Torqe":
       the speed-law sped the war up, and the BLACKHOLE TOWER rose at the room's center. Its
       gravity well PULLS you toward the core, and the pull keeps shifting (the core drifts —
       "gravity keeps shifting"). The remade Endless Staircase feeds into it. The War of
       Shapes: hold your OWN shape away from the dense core and keep climbing to fill the
       SHAPE meter. Caught in the core band, your shape slips and the Void nudges you. Fill
       the meter and you outlast the Torqe — you keep your shape in the Void. ---- */
function updateVoid(dt){
  const vg = voidwar.glow||0;
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  // THE BLACKHOLE TOWER — a gravity well at the room's center that pulls you in; the core
  // drifts, so the safe side keeps shifting ("gravity keeps shifting").
  const core = W/2 + Math.sin(time*0.6)*70;
  voidwar.core = core;
  const pull = (0.010 + 0.016*vg) * (0.55 + 0.5*Math.sin(time*1.7));   // pulses inward
  player.x += (core - player.x) * Math.max(0, pull);
  // caught in the dense center band: the Void presses, your shape slips
  const inCore = Math.abs(player.x - core) < 26;
  if(inCore){
    voidPress = Math.min(1, voidPress + dt*0.85);
    shapeMeter = Math.max(0, shapeMeter - dt*0.10);
    if(voidPress>=1){ voidPress=0; damage(); glitch=Math.max(glitch,0.3); }
  } else {
    voidPress = Math.max(0, voidPress - dt*0.6);
    // hold your own shape away from the core, and while you keep climbing, the meter fills
    shapeMeter = Math.min(1, shapeMeter + dt*0.05);
  }
  // WIN — you outlasted the Torqe and the Void closing; you kept your own shape
  if(shapeMeter >= 1 && !voidwar.held){
    voidwar.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('Torqe outlasted. You kept your own shape in the Void.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ YOU KEPT YOUR SHAPE ★', col:'#b98cff' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#b98cff','#eafff4','#7a4fff'])));
    AUDIO.zap();
  }
}

/* ---- Lore 27 (the "talk to ChatGPT each time" thread) — THE JUDGMENT FIELD. Winter
       Simon froze every side war: the board turns white with frozen signal-lines and only
       the main clash is left. He measures every move, so you pass judgment by CLIMBING
       WITH PURPOSE (the VERDICT meter fills while you keep moving upward; it stalls if you
       just sit still). He also runs the Gold Card game — "1 chance out of 12 thousand
       cards to find the one gold piece." Presents fall: almost all are COAL, exactly one
       is the GOLD CARD. Catch the gold for the rare reward (Alex and Gray got 5 emeralds,
       everyone else got coal). ---- */
function updateJudge(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  // the VERDICT meter: keep climbing with purpose and Winter Simon clears you. It fills
  // while you are airborne or moving (a real climb) and stalls if you just stand still.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  verdict = Math.max(0, Math.min(1, verdict + (moving ? dt*0.05 : -dt*0.012)));
  // THE GOLD CARD GAME — presents fall from above: almost all coal, exactly one gold.
  judge.dropT -= dt;
  if(judge.dropT <= 0){
    judge.dropT = rnd(0.9, 1.7);
    // the one gold piece — rare, and only until you have already caught it
    const gold = !judge.gold && chance(0.09);
    judge.presents.push({ x: rnd(MARGIN+34, W-MARGIN-34), y: cameraY - 24,
                          vy: rnd(46, 84), gold, got:false, spin: Math.random()*6.28 });
  }
  for(const p of judge.presents){
    if(p.got) continue;
    p.y += p.vy * dt; p.spin += dt*2;
    if(Math.abs(p.x - player.x) < 26 && Math.abs(p.y - player.y) < 26){
      p.got = true;
      if(p.gold){
        judge.gold = true; winFlash = 1; emer += 5; shake = Math.max(shake,6);
        showTaunt('The one gold piece, out of twelve thousand cards. You won the gold.');
        floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ THE ONE GOLD CARD — 5 EMERALDS ★', col:'#ffd84f' });
        for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ffd84f','#fff6c8','#ffae00'])));
        AUDIO.zap();
      } else {
        floaters.push({ x:player.x, y:player.y-40, t:0, txt:'COAL', col:'#9aa0b0' });
      }
    }
  }
  judge.presents = judge.presents.filter(p => !p.got && p.y < cameraY + H + 90);
  // WIN — you climbed with purpose through the judgment; Winter Simon clears you. Alex and
  // Gray were the only two who got 5 emeralds; keep your purpose and so do you.
  if(verdict >= 1 && !judge.held){
    judge.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('Winter Simon stops walking. You did not ruin the board. Judgment passed.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ JUDGMENT PASSED ★', col:'#bfe0ff' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#bfe0ff','#eafaff','#8fd0ff'])));
    AUDIO.zap();
  }
}

/* ---- Lore 27 cont. (June 15) — THE THREE-WAY FIELD. Alex became a god of CONTROL, Lica
       rose as ORIGIN ("everything flows from me"), Pupahya keeps every dimension open, and
       Winter Simon answers with CONTAINMENT: ice forms under him and spreads with every
       step. The shattered field holds all three at once. HOLD THE FIELD BALANCED — climb
       with purpose while the three claimants take turns pressing — and you keep your footing
       in the field. ---- */
function updateTriad(dt){
  if(winFlash>0) winFlash = Math.max(0, winFlash - dt*1.4);
  // the ice creep — Simon's freeze rises up the field and spreads with every step
  triad.ice = Math.min(1, (triad.ice||0) + dt*0.04);
  // the three claimants take turns pressing the field: Alex (control), Lica (origin),
  // Simon (containment). The claim cycles; whoever holds it sweeps a colored pressure.
  triad.claimT -= dt;
  if(triad.claimT <= 0){ triad.claim = (triad.claim+1)%3; triad.claimT = rnd(2.0, 3.2);
    floaters.push({ x:player.x, y:player.y-34, t:0,
      txt:['ALEX CLAIMS THE FIELD','LICA CLAIMS THE FIELD','SIMON FREEZES THE FIELD'][triad.claim],
      col:['#c9b8ff','#ffc8e6','#bfe0ff'][triad.claim] }); }
  // HOLD THE FIELD: keep climbing with purpose to keep your footing among all three. The
  // balance fills while you move and drains if you stand still on the freezing field.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  triadM = Math.max(0, Math.min(1, triadM + (moving ? dt*0.05 : -dt*0.02)));
  if(triadM >= 1 && !triad.held){
    triad.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('You held the field: control, origin, and containment all at once. Footing kept.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ THE FIELD HELD ★', col:'#dff0ff' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#c9b8ff','#ffc8e6','#bfe0ff'])));
    AUDIO.zap();
  }
}

/* ---- Lore 27 cont. (June 15) — THE CONTAINMENT FACILITY. Simon is thrown into the SCF,
       slashes every monster the instant he is frightened, then becomes CODE. The huge facility
       built to contain him starts becoming Simon-shaped: doors unlock at the wrong times, logs
       rewrite themselves, warning lights turn yellow, and his symbol shows where labels should
       be. HOLD CONTAINMENT — climb with purpose while the code spreads across the panels — to
       keep the facility yours a little longer. "They contained his body, but by then Simon had
       already become the code of the containment itself." ---- */
function updateScf(dt){

  // the code spreads through the facility: more panels flip to Simon-yellow the longer it runs
  scf.spread = Math.min(1, (scf.spread||0) + dt*0.035);
  // intermittent facility events — doors unlock, logs rewrite, lights turn yellow, banners show
  scf.eventT -= dt;
  if(scf.eventT <= 0){ scf.eventT = rnd(2.2, 3.6);
    const ev = ['A DOOR UNLOCKS AT THE WRONG TIME','A LOG REWRITES ITSELF','WARNING LIGHTS TURN YELLOW','HIS SYMBOL REPLACES A LABEL'];
    floaters.push({ x:player.x, y:player.y-34, t:0, txt:pick(ev), col:'#ffe98a' });
    AUDIO.zap();
  }
  // HOLD CONTAINMENT: keep climbing with purpose to hold the facility while the code spreads.
  // The meter fills while you move and drains while you stand still on the infected floor.
  const moving = !player.onGround || Math.abs(player.vx) > 0.6;
  scfM = Math.max(0, Math.min(1, scfM + (moving ? dt*0.05 : -dt*0.02)));
  if(scfM >= 1 && !scf.held){
    scf.held = true; winFlash = 1; emer += 5; shake = Math.max(shake,8);
    showTaunt('They contained his body. But Simon had already become the code of the containment.');
    floaters.push({ x:player.x, y:player.y-54, t:0, txt:'★ CONTAINMENT HELD ★', col:'#ffe98a' });
    for(let i=0;i<16;i++) particles.push(spark(player.x, player.y, pick(['#ffd84f','#ffe98a','#ff3b5c'])));

}

/* ---- Lore 28 (June 16) — SCF 404. The containment stopped being a room and became a cosmic
       system: SCF grew beyond Classics into an ENDLESS containment-universe (Classics absorbed,
       Separate Classics + Net X loaded inside, larger than SCP), and Simon is now SCF 404, the

function updateScf404(dt){
