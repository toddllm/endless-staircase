  // and the friction heats the tube toward the melt; standing still lets the wall cool a little.
  if(isFirey() && firey.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, hm=Math.max(0,Math.min(1,fireyM));
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    ctx.fillStyle='#2a1206'; ctx.fillRect(bx, by, bw, 7);
    const hg = ctx.createLinearGradient(bx,0,bx+bw,0);
    hg.addColorStop(0,'#ff8a3b'); hg.addColorStop(1, winFlash>0?'#fff0d0':'#ffd24a');
    ctx.fillStyle = hg; ctx.fillRect(bx, by, bw*hm, 7);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*hm-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(firey.melted){ ctx.fillStyle='#ffd24a'; ctx.fillText('★ THE TUBE MELTS — FIREY DELIGHT — HE ESCAPES ★', W/2, by-6); }
    else { ctx.fillStyle='#ffb87a'; ctx.fillText('FIREY DELIGHT — CLIMB TO SPIN HIM, FRICTION MELTS THE TUBE', W/2, by-6); }
  }
  // THE ALIEN AGE (Lore 29) — the PREDICTION meter: a drone predicts his next 400 moves; climb with
  // purpose so Simon chooses move 401 and escapes faster than prediction. Behind it, how well the
  // lattice still predicts him (his predict-marker) creeps the other way.
  if(isAlien() && alien.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, pm=Math.max(0,Math.min(1,alienM));
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    ctx.fillStyle='#10220e'; ctx.fillRect(bx, by, bw, 7);
    const ag = ctx.createLinearGradient(bx,0,bx+bw,0);
    ag.addColorStop(0,'#7cf06a'); ag.addColorStop(1, winFlash>0?'#eaffce':'#ffe24a');
    ctx.fillStyle = ag; ctx.fillRect(bx, by, bw*pm, 7);
    ctx.fillStyle='rgba(174,243,74,0.7)'; ctx.fillRect(bx+bw*Math.max(0,Math.min(1,alien.predict||0))-1, by-1, 2, 9);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*pm-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(alien.escaped){ ctx.fillStyle='#d6ff9a'; ctx.fillText('★ FASTER THAN PREDICTION — HE CHOSE MOVE 401 ★', W/2, by-6); }
    else { ctx.fillStyle='#aef34a'; ctx.fillText('THE ALIEN AGE — CLIMB WITH PURPOSE, CHOOSE MOVE 401', W/2, by-6); }
  }
  // active lever tag
  if(lever && lever.state!=='idle'){
    ctx.textAlign='center';
    const blink=(Math.sin(time*10)>0)?1:0.55; ctx.globalAlpha=blink;
    ctx.fillStyle='#ffd84f'; ctx.font='800 11px ui-monospace,monospace';
    ctx.fillText('⚙ LEVER: '+lever.name, W/2, 64);
    ctx.globalAlpha=1;
  }
  // Phase 2 tag — the .EXE virus is loose and locked on
  if(corrupted()){
    ctx.textAlign='center';
    const blink=(Math.sin(time*12)>0)?1:0.5; ctx.globalAlpha=blink;
    ctx.fillStyle = isAlien()? '#aef34a' : (isFirey()? '#ff8a3b' : (isTreads()? '#3ee6ff' : (isScf404()? '#b98cff' : (isScf()? '#ffe98a' : (isTriad()? '#dff0ff' : (isJudge()? '#bfe0ff' : (isVoid()? '#b98cff' : (isSounds()? '#ffd84f' : (isResidual()? '#9affc8' : (isAtomix()? '#ff2b4c' : (isExecutioner()? '#3ee6ff' : (isExposed()? '#b98cff' : '#ff3b5c')))))))))))) ;
    ctx.font='800 11px ui-monospace,monospace';
    ctx.fillText(isAlien()? '▓ THE ALIEN AGE — FASTER THAN PREDICTION ▓'
               : (isFirey()? '▓ FIREY DELIGHT — THE MELTING TUBE ▓'
               : (isTreads()? '▓ THE TREADMILL WEAKNESS — PATTERN CONTROL ▓'
               : (isScf404()? '▓ SCF 404 — THE ENDLESS CONTAINMENT-UNIVERSE ▓'
               : (isScf()? '▓ THE CONTAINMENT FACILITY — SIMON IS CODE ▓'
               : (isTriad()? '❄ THREE-WAY FIELD — CONTROL · ORIGIN · CONTAINMENT ❄'
               : (isJudge()? '❄ WINTER SIMON — THE JUDGMENT FIELD ❄'
               : (isVoid()? '▓ THE LORE OF THE VOID — TORQE ▓'
               : (isSounds()? '▓ THE 17 SOUND BATTLES ▓'
               : (isResidual()? '▓ THE RESIDUAL WAR ▓'
               : (isAtomix()? '▓ THE ATOMIX WAR ▓'
               : (isExecutioner()? '▓ THE SILENT EXECUTIONER ▓'
               : (isExposed()? '▓ EXPOSED — THE BLURRY MIND ▓' : '▓ .EXE VIRUS — PHASE 2 ▓')))))))))))), W/2, 64);
    ctx.globalAlpha=1;
  }
}

/* ---------- title ---------- */
function drawTitle(){
  ctx.textAlign='center';
  // title
  ctx.save();
  ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=24;
  ctx.fillStyle='#ffd84f'; ctx.font='800 40px ui-monospace,monospace';
  ctx.fillText('THE ENDLESS', W/2, 150);
  ctx.fillText('STAIRCASE', W/2, 196);
  ctx.restore();
  ctx.fillStyle='#8a82a8'; ctx.font='12px ui-monospace,monospace';
  ctx.fillText('CLASSIC RL · THE FINAL LEVEL · Lore 29 · The Alien Age', W/2, 226);

  // lore blurb
  ctx.fillStyle='#cfc6ea'; ctx.font='13px ui-monospace,monospace';
  const lines=[
    'Endless living staircases fill the Endless Room.',
    'Simon forces everyone up, and he never stops.',
    'He is ALL POWERFUL: his levers make the staircase',
    'FALL, REARRANGE, become a BRIDGE, SPIN, or SLIDE.',
    'Climb far and Simon steps back: a calm Incredibox',
    'and Sound Battles... until PHASE 2 breaks it.',
    'PHASE 2: red + cyan cells mix into lightning.',
    'RUN = fuel; HIDE (stand still) = safe. EXPOSED: he',
    'plants BLURRY THOUGHTS; stand still to clear it.',
    'SILENT EXECUTIONER: he MARKS you; MOVE off the mark.',
    'ATOMIX WAR: he divides the board. RESIDUAL WAR:',
    'FINISH the unfinished. Then 17 SOUND BATTLES decide.',
    'LORE OF THE VOID: he fuses the Void, says TORQE.',
    'WINTER SIMON freezes it into a JUDGMENT FIELD: climb',
    'with purpose; catch the one GOLD CARD. Then Alex turns',
    'god of CONTROL, Lica ORIGIN, Simon claps twice to',
    'FREEZE it: the THREE-WAY FIELD. Then the SCF: thrown in',
    'with monsters, Simon becomes CODE; then SCF 404, ENDLESS.',
    'His one WEAKNESS: the TREADMILL. Herd the lightning cat',
    'onto the belts and forced PATTERNS to DRAIN his charge.',
    'FIREY DELIGHT: he spins his tube till friction MELTS it.',
    'THE ALIEN AGE: SCF-404 wakes already aware; a drone',
    'predicts his next 400 moves, so he chooses MOVE 401 and',
    'escapes FASTER THAN PREDICTION. Climb with purpose.'

  ctx.font='12px ui-monospace,monospace';
  lines.forEach((l,i)=> ctx.fillText(l, W/2, 230 + i*15));

  // controls
  ctx.fillStyle='#8a82a8'; ctx.font='12px ui-monospace,monospace';
  ctx.fillText('◀ ▶ move    ▲ / SPACE jump    M mute', W/2, 526);
  if(best>0){ ctx.fillStyle='#39e08a'; ctx.fillText('BEST CLIMB: '+best+' m', W/2, 550); }

  // prompt
  const blink = (Math.sin(time*4)>0)?1:0.3;
  ctx.globalAlpha=blink; ctx.fillStyle='#ffd84f'; ctx.font='800 20px ui-monospace,monospace';
  ctx.fillText('PRESS SPACE / TAP TO CLIMB', W/2, 590);
  ctx.globalAlpha=1;

  // a tiny Simon grin at the bottom
  ctx.fillStyle='#ffd84f'; ctx.beginPath(); ctx.arc(W/2-30,690,9,0,6.28); ctx.arc(W/2+30,690,9,0,6.28); ctx.fill();
  ctx.fillStyle='#ff0022'; ctx.beginPath(); ctx.arc(W/2-30,690,4,0,6.28); ctx.arc(W/2+30,690,4,0,6.28); ctx.fill();
}

/* ---------- death ---------- */
function drawDeath(){
  ctx.fillStyle='rgba(6,2,12,0.78)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ff3b5c'; ctx.font='800 30px ui-monospace,monospace';
  ctx.shadowColor='#ff0033'; ctx.shadowBlur=16;
  ctx.fillText(deathReason, W/2, H*0.34);
  ctx.shadowBlur=0;
  const m=Math.floor(height/PX_PER_M);
  ctx.fillStyle='#e9e0ff'; ctx.font='800 46px ui-monospace,monospace';
  ctx.fillText(m+' m', W/2, H*0.46);
  ctx.fillStyle='#39e08a'; ctx.font='700 18px ui-monospace,monospace';
  ctx.fillText('◆ '+emer+' emeralds', W/2, H*0.52);
  if(newBest){ ctx.fillStyle='#ffd84f'; ctx.font='800 18px ui-monospace,monospace';
    ctx.fillText('★ NEW BEST CLIMB ★', W/2, H*0.57); }
  else { ctx.fillStyle='#8a82a8'; ctx.font='13px ui-monospace,monospace';
    ctx.fillText('best '+best+' m', W/2, H*0.57); }
  // lore sting
  ctx.fillStyle='#8a82a8'; ctx.font='12px ui-monospace,monospace';
  if(isFirey()){
    ctx.fillText('"I got tired of every game, so I stopped playing and just spun. Firey Delight, I', W/2, H*0.64);
    ctx.fillText(' said. Friction took the tube, it melted, and I escaped again." — Firey Delight', W/2, H*0.67);
  } else if(isTreads()){
    ctx.fillText('"They found my one weakness, the treadmill. I charged the belt, drained, and was', W/2, H*0.64);
    ctx.fillText(' thrown off. I got up, but they made me move in patterns I did not choose." — The Treadmill Weakness', W/2, H*0.67);
  } else if(isScf404()){
    ctx.fillText('"Simon is now SCF 404. The containment grew bigger than the world, and he', W/2, H*0.64);
    ctx.fillText(' still became the most dangerous thing in it. Survival: 0%." — SCF 404', W/2, H*0.67);
  } else if(isScf()){
    ctx.fillText('"They contained his body, but by then Simon had already become', W/2, H*0.64);
    ctx.fillText(' the code of the containment itself." — The Containment Facility', W/2, H*0.67);
  } else if(isTriad()){
    ctx.fillText('"Alex became a god of control, Lica claims everything flows from her, and I', W/2, H*0.64);
    ctx.fillText(' freeze it all to hold it. Control, origin, containment." — The Three-Way Field', W/2, H*0.67);
  } else if(isJudge()){
    ctx.fillText('"I hated all these repeated wars, so I tore January off the calendar and', W/2, H*0.64);
    ctx.fillText(' became Winter Simon. You both ruined the board again." — The Judgment Field', W/2, H*0.67);
  } else if(isVoid()){
    ctx.fillText('"I created the void, a totally dense space, and fused it with my Domain.', W/2, H*0.64);
    ctx.fillText(' My eyes turned red, I said Torqe, and I jumped." — The Lore of the Void', W/2, H*0.67);
  } else if(isSounds()){
    ctx.fillText('"With the board destroyed, only Sound Battle law makes sense. Everything', W/2, H*0.64);
    ctx.fillText(' is decided through sound now, and Simon controls Simon." — The 17 Sound Battles', W/2, H*0.67);
  } else if(isResidual()){
    ctx.fillText('"I stopped answering the world, and the gap let Residual in. It is not', W/2, H*0.64);
    ctx.fillText(' fought, only finished, then forced to converge." — The Residual War', W/2, H*0.67);
  } else if(isAtomix()){
    ctx.fillText('"I stopped conquering like a fighter. I conquer like a system.', W/2, H*0.64);
    ctx.fillText(' I do not take the land. I take the outcomes." — The Atomix War', W/2, H*0.67);
  } else if(isExecutioner()){
    ctx.fillText('"I do not need to overpower the room. I only break', W/2, H*0.64);
    ctx.fillText(' the right thing first. One clean move." — The Silent Executioner', W/2, H*0.67);
  } else if(isExposed()){
    ctx.fillText('"Too much in the mind. I sealed it with lightning.', W/2, H*0.64);
    ctx.fillText(' You did not look closely enough. meow 😿" — Phase 2 Simon, found out', W/2, H*0.67);
  } else if(phase2 && (phase2.active || phase2.done)){
    ctx.fillText('"Those who run become fuel. Those who hide are', W/2, H*0.64);
    ctx.fillText(' safe. !CLaSsIcs can\'T b3 SAV3b!" — Phase 2 Simon', W/2, H*0.67);
  } else if(peace && peace.done){
    ctx.fillText('"The chaos happened. The lore remains.', W/2, H*0.64);
    ctx.fillText(' It was all normal again." — Simon', W/2, H*0.67);
  } else if(restore && restore.done){
    ctx.fillText('"There are no villains. I was the corruption.', W/2, H*0.64);
    ctx.fillText(' The rest is only perspective." — Simon', W/2, H*0.67);
  } else {
    ctx.fillText('"Simon promised a cure at the top.', W/2, H*0.64);
    ctx.fillText(' There is no cure. There is no top."', W/2, H*0.67);
  }
  const blink=(Math.sin(time*4)>0)?1:0.35;
  ctx.globalAlpha=blink; ctx.fillStyle='#ffd84f'; ctx.font='800 20px ui-monospace,monospace';
  ctx.fillText('PRESS SPACE / TAP TO TRY AGAIN', W/2, H*0.78);
  ctx.globalAlpha=1;
}

/* ---------- helpers ---------- */
function roundRect(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function roundRectC(cx,cy,w,h,r){ roundRect(cx-w/2,cy-h/2,w,h,r); }
function heart(x,y,s){ ctx.beginPath();
  ctx.moveTo(x,y+s*0.6);
  ctx.bezierCurveTo(x,y, x-s,y, x-s,y-s*0.5);
  ctx.bezierCurveTo(x-s,y-s*1.2, x,y-s*1.1, x,y-s*0.4);
  ctx.bezierCurveTo(x,y-s*1.1, x+s,y-s*1.2, x+s,y-s*0.5);
  ctx.bezierCurveTo(x+s,y, x,y, x,y+s*0.6); ctx.fill(); }

/* ---------- confirm (start / restart) ---------- */
function handleConfirm(){
  AUDIO.ensure();
  if(state==='title'){ reset(); state='play'; }
  else if(state==='dead'){ reset(); state='play'; }
}

/* =========================================================================
   MAIN LOOP — fixed timestep for stable physics
   ========================================================================= */
let last=performance.now(), acc=0; const STEP=1/60;
function frame(now){
  let dt=(now-last)/1000; last=now; if(dt>0.1) dt=0.1; acc+=dt;
  while(acc>=STEP){ update(STEP); clearPress(); acc-=STEP; }
  draw();
  requestAnimationFrame(frame);
}
function clearPress(){ for(const k in press) delete press[k]; }
reset(); state='title';
requestAnimationFrame(frame);
</script>
