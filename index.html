  if(isResidual() && !isSounds() && residual.glow>0.02){ drawSpine(); drawRemnants(); }
  if(isSounds() && sounds.glow>0.02 && !isVoid()) drawSounds();
  if(isVoid() && voidwar.glow>0.02 && !isJudge()) drawVoid();
  if(isJudge() && judge.glow>0.02 && !isTriad()) drawJudge();
  if(isTriad() && triad.glow>0.02 && !isScf()) drawTriad();
  if(isScf() && scf.glow>0.02 && !isScf404()) drawScf();
  if(isScf404() && scf404.glow>0.02 && !isTreads()) drawScf404();
  if(isTreads() && !isFirey() && treads.glow>0.02) drawTreads();
  if(isFirey() && !isAlien() && firey.glow>0.02) drawFirey();
  if(isAlien() && alien.glow>0.02) drawAlien();
  drawPlayer();
  drawParticles();
  drawFloaters();
  ctx.restore();

  drawHUD();

  // proximity red vignette
  const gap = (simonY - player.y);
  const prox = Math.max(0, Math.min(1, 1 - gap/(H*0.95)));
  if(prox>0.02){
    const g = ctx.createRadialGradient(W/2,H/2, H*0.25, W/2,H/2, H*0.75);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(1,`rgba(${120+100*prox|0},0,30,${0.25+0.5*prox})`);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }
  if(roarFlash>0){ ctx.fillStyle=`rgba(255,40,70,${roarFlash*0.22})`; ctx.fillRect(0,0,W,H); }
  if(leverFlash>0){ ctx.fillStyle=`rgba(255,216,79,${leverFlash*0.16})`; ctx.fillRect(0,0,W,H); }
  if(hitFlash>0){ ctx.fillStyle=`rgba(255,40,70,${hitFlash*0.30})`; ctx.fillRect(0,0,W,H); }
  // PHASE 2 — the .EXE glitch: torn datamosh slices + scanlines over everything
  {
    const cg=(phase2?phase2.glow:0)||0;
    if(cg>0.02 || glitch>0.02){
      const amt = Math.max(glitch, cg*0.4);
      ctx.save();
      const slices = 3 + (amt*6|0);
      for(let i=0;i<slices;i++){
        const syy = ((i*131 + (bgT*180|0)) % H + H) % H;
        const hh = (3 + (i*7)%14) * amt;
        const cc = i%3===0?'rgba(255,59,92,':(i%3===1?'rgba(62,230,220,':'rgba(235,235,255,');
        ctx.fillStyle = cc + (0.05+0.12*amt) + ')';
        ctx.fillRect(0, syy, W, hh);
      }
      ctx.globalAlpha=0.05+0.12*amt; ctx.fillStyle='#000';
      for(let y=0;y<H;y+=3){ ctx.fillRect(0,y,W,1); }
      ctx.restore();
    }
  }
  // Lore 27 — the BLURRY MIND fog: as the mind fills, a soft violet haze creeps in
  // from the edges (memory going blurry). The lightning SEAL flashes the screen white.
  if(isExposed() && (mind>0.02 || mindSeal>0.02)){
    ctx.save();
    const fog = Math.min(1, mind);
    if(fog>0.02){
      const g = ctx.createRadialGradient(W/2,H/2, H*0.20, W/2,H/2, H*0.72);
      g.addColorStop(0,'rgba(150,120,255,0)');
      g.addColorStop(1,`rgba(150,120,255,${0.10+0.42*fog})`);
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      // drifting blur bands across the middle of vision
      ctx.globalAlpha = 0.05 + 0.12*fog;
      ctx.fillStyle = '#cdbcff';
      for(let i=0;i<4;i++){
        const yy = ((i*97 + (bgT*40|0)) % H + H) % H;
        ctx.fillRect(0, yy, W, 10 + 22*fog);
      }
      ctx.globalAlpha = 1;
    }
    if(mindSeal>0.02){ ctx.fillStyle=`rgba(234,252,255,${mindSeal*0.4})`; ctx.fillRect(0,0,W,H); }
    ctx.restore();
  }
  // Lore 27 — THE ATOMIX WAR lattice: the board divided down to the atomix. Each
  // cell flickers between RED (Simon-owned) and BLUE (freed by the rebellion). The
  // share that is red tracks the board meter, so you can SEE the board being fought
  // over. When the board nearly agrees with Simon, the cells line up into his symbol.
  if(isAtomix() && !isResidual() && atomix.glow>0.02){
    ctx.save();
    const ag = atomix.glow, S=30, cols=Math.ceil(W/S), rows=Math.ceil(H/S);
    const redShare = 1 - board;                    // how much the board agrees with Simon
    for(let r=0;r<rows;r++) for(let cc=0;cc<cols;cc++){
      const seed=((r*73+cc*131)%101)/101;          // a stable per-cell phase
      const flick=0.5+0.5*Math.sin(bgT*3 + seed*9);
      const owned = seed < redShare;               // this atomix currently belongs to Simon
      const cx=cc*S, cy=r*S;
      ctx.globalAlpha = (0.05 + 0.10*ag) * (0.5+0.5*flick);
      ctx.fillStyle = owned ? '#ff2b4c' : '#3ee6ff';
      ctx.fillRect(cx+2, cy+2, S-4, S-4);
    }
    // faint lattice grid lines
    ctx.globalAlpha = 0.06*ag; ctx.strokeStyle='#9fb8ff'; ctx.lineWidth=1;
    ctx.beginPath();
    for(let x=0;x<=W;x+=S){ ctx.moveTo(x,0); ctx.lineTo(x,H); }
    for(let y=0;y<=H;y+=S){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
    ctx.stroke();
    // when the board nearly agrees with Simon, the floating zones lock into his symbol
    const sym = Math.max(0, (0.30 - board) / 0.30);
    if(sym>0.02){
      ctx.globalAlpha = 0.10 + 0.30*sym; ctx.strokeStyle='#ff3b5c';
      ctx.shadowColor='#ff2b4c'; ctx.shadowBlur=18; ctx.lineWidth=4; ctx.lineCap='round';
      const cx=W/2, cy=H*0.5, R=Math.min(W,H)*0.30;
      ctx.beginPath();                              // a great cross stretching across domains
      ctx.moveTo(cx, cy-R); ctx.lineTo(cx, cy+R);
      ctx.moveTo(cx-R, cy); ctx.lineTo(cx+R, cy);
      ctx.stroke();
      ctx.beginPath();                              // an omega-like curve, Simon's mark
      ctx.arc(cx, cy, R*0.66, Math.PI*0.78, Math.PI*0.22, false);
      ctx.stroke();
      ctx.shadowBlur=0;
    }
    ctx.restore();
  }
  if(warnT>0 && warnText){
    ctx.save(); ctx.globalAlpha=Math.min(1,warnT*1.5);
    ctx.font='800 30px ui-monospace,monospace'; ctx.textAlign='center';
    ctx.fillStyle='#ff3b5c'; ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=18;
    ctx.fillText(warnText, W/2, H*0.30); ctx.restore();
  }
  // Simon's taunt — his promised "cure at the top" that does not exist.
  // In the Peaceful Ending it softens into calm narration, no longer a threat.
  if(tauntT>0 && taunt && state==='play'){
    ctx.save(); ctx.globalAlpha=Math.min(1, tauntT*0.9);
    ctx.textAlign='center'; ctx.font='italic 700 17px ui-monospace,monospace';
    if(peaceful()){
      ctx.fillStyle='#8fe3ff'; ctx.shadowColor='#0a2230'; ctx.shadowBlur=8;
      ctx.fillText(taunt, W/2, H*0.42);
    } else {
      ctx.fillStyle='#ffd84f'; ctx.shadowColor='#000'; ctx.shadowBlur=8;
      ctx.fillText('Simon: "'+taunt+'"', W/2, H*0.42);
    }
    ctx.restore();
  }
  // SOUND BATTLES — the last trace of everything that happened, kept calm.
  // Simon leads the beat as the fastest singer; the world answers around him.
  if(peace && peace.glow>0.02 && state==='play'){
    drawBattleLead();
    ctx.save(); ctx.globalAlpha=Math.min(1, peace.glow)*0.9;
    ctx.textAlign='center';
    if(corrupted()){
      ctx.font='800 13px ui-monospace,monospace';
      ctx.fillStyle='#ff3b5c'; ctx.shadowColor='#3a0a14'; ctx.shadowBlur=10;
      ctx.fillText('▓ THE .EXE VIRUS ▓', W/2, H-18);
      ctx.fillStyle='#9fe6df'; ctx.font='11px ui-monospace,monospace'; ctx.shadowBlur=0;
      ctx.fillText('Phase 2 forever · every second more corrupt', W/2, H-4);
    } else {
      ctx.font='800 13px ui-monospace,monospace';
      ctx.fillStyle='#8fe3ff'; ctx.shadowColor='#1a3a4a'; ctx.shadowBlur=10;
      ctx.fillText('♪ SOUND BATTLE ♪', W/2, H-18);
      ctx.fillStyle='#cfeaff'; ctx.font='11px ui-monospace,monospace'; ctx.shadowBlur=0;
      ctx.fillText('Simon is the fastest · the lore remains underneath', W/2, H-4);
    }
    ctx.restore();
  }

  if(state==='dead') drawDeath();

  ctx.restore();
}

let bgT=0;
function drawBackdrop(){
  bgT += 0.016;
  const pgl = (peace ? peace.glow : 0) || 0;   // Peaceful Ending: calm overtakes the void
  // deep tower void
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0c0820'); g.addColorStop(0.5,'#0a0518'); g.addColorStop(1,'#06030f');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // central pillar glow (the spiral column)
  const px=W/2;
  const pg=ctx.createLinearGradient(px-90,0,px+90,0);
  pg.addColorStop(0,'rgba(20,10,40,0)'); pg.addColorStop(0.5,'rgba(60,30,110,0.30)'); pg.addColorStop(1,'rgba(20,10,40,0)');
  ctx.fillStyle=pg; ctx.fillRect(px-90,0,180,H);
  // THE ENDLESS ROOM — more endless staircases far off in the background.
  // "there are ENDLESS amount of Endless Staircases in the ENDLESS Room."
  const par = (state==='play'? cameraY*0.06 : bgT*10);
  ctx.save(); ctx.globalAlpha=0.16;
  const far=[ {x:W*0.10,w:54}, {x:W*0.80,w:54}, {x:W*0.02,w:40}, {x:W*0.90,w:40} ];
  for(const s of far){
    for(let i=0;i<11;i++){
      const yy = (((i*64 + par) % (H+128)) + (H+128)) % (H+128) - 64;
      ctx.fillStyle = (s.w>50)? 'rgba(70,40,120,0.9)' : 'rgba(50,28,90,0.9)';
      ctx.fillRect(s.x + (i%2?10:0), yy, s.w, 9);
      ctx.fillStyle='rgba(150,110,220,0.5)'; ctx.fillRect(s.x+(i%2?10:0), yy, s.w, 2);
    }
  }
  ctx.restore();
  // Parinusian banners — Simon hangs his symbol (golden cross in a gray
  // omega) all over the Endless Room to make the lie of a "cure" feel holy.
  ctx.save(); ctx.globalAlpha=0.5*(1-pgl*0.8);
  const ban = (state==='play'? cameraY*0.10 : bgT*12);
  const bx=[W*0.16, W*0.84];
  for(let s=0;s<bx.length;s++){
    for(let i=0;i<4;i++){
      const yy = (((i*230 + ban) % (H+260)) + (H+260)) % (H+260) - 130;
      const cx=bx[s];
      // hanging cloth
      ctx.fillStyle='rgba(60,40,90,0.85)'; ctx.fillRect(cx-16, yy, 32, 64);
      ctx.fillStyle='rgba(120,90,180,0.5)'; ctx.fillRect(cx-16, yy, 32, 3);
      ctx.beginPath(); ctx.moveTo(cx-16,yy+64); ctx.lineTo(cx,yy+74); ctx.lineTo(cx+16,yy+64); ctx.closePath(); ctx.fill();
      // gray omega
      ctx.strokeStyle='rgba(180,180,200,0.85)'; ctx.lineWidth=2.4;
      ctx.beginPath(); ctx.arc(cx, yy+30, 9, Math.PI*0.85, Math.PI*0.15, false); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-9,yy+38); ctx.lineTo(cx-13,yy+40); ctx.moveTo(cx+9,yy+38); ctx.lineTo(cx+13,yy+40); ctx.stroke();
      // golden cross
      ctx.fillStyle='rgba(255,216,79,0.95)';
      ctx.fillRect(cx-1.6, yy+22, 3.2, 16); ctx.fillRect(cx-6, yy+27, 12, 3.2);
    }
  }
  ctx.restore();
  // THE RESTORATION — Simon opens a golden crack, ends 404/666, brightens the
  // sky with Mr. Sun and Mr. Tree. Half the room turns normal, half stays corrupt.
  const rg = (restore? restore.glow : 0) || 0;
  const cg = (phase2? phase2.glow : 0) || 0;   // Phase 2: the .EXE virus floods the room
  // drifting error strings — fade as Simon ends them in the Restoration, fade
  // into faint memory in the Peaceful Ending, then ROAR back and multiply in
  // Phase 2 (404, 666, 303, and several more, more every second).
  const errA = (1 - rg*0.9) * (1 - pgl*0.85);
  const errCount = 26 + ((phase2 && corrupted()) ? Math.min(90, phase2.errs||0)|0 : 0);
  const ERRS = ['404','666','303','502','0xDEAD','NaN','SIMON.EXE'];
  ctx.font='12px ui-monospace,monospace'; ctx.textAlign='left';
  for(let i=0;i<errCount;i++){
    const seed=i*97.13;
    const x=((seed*1.7 + bgT*8*(i%3+1)) % (W+40))-20;
    const y=((seed*2.3 - (state==='play'?cameraY*0.15:bgT*14*(i%4+1))) % (H+40)+H+40)%(H+40)-20;
    if(cg>0.3){
      // Phase 2 errors flash the way Simon's eyes do: red / white / teal-blue
      const base = (i<26 ? Math.max(errA, cg*0.85) : cg*0.85);
      const k=(i + (bgT*6|0))%3;
      ctx.fillStyle = k===0?`rgba(255,59,92,${0.22*base})`:k===1?`rgba(235,235,255,${0.20*base})`:`rgba(62,230,220,${0.22*base})`;
      ctx.fillText(ERRS[(i + (i>>2)) % ERRS.length], x, y);
    } else if(errA>0.01){
      ctx.fillStyle = i%2? `rgba(62,198,255,${0.10*errA})`:`rgba(255,59,92,${0.09*errA})`;
      ctx.fillText(i%2?'404':'666', x, y);
    }
  }
  if(rg>0) drawRestoration(rg);
  if(pgl>0) drawPeaceSky(pgl*(1 - cg*0.85));   // the calm dawn tears as the virus rises
  if(cg>0) drawCorruptSky(cg);
}

// THE PEACEFUL ENDING sky — the golden corruption settles into a soft, calm
// dawn across the whole room. A gentle equalizer of light glows at the base,
// the way an Incredibox hums even when nothing is wrong.
function drawPeaceSky(pgl){
  ctx.save();
  // soft full-room dawn that overtakes the void
  const wg = ctx.createLinearGradient(0,0,0,H);
  wg.addColorStop(0,`rgba(60,120,160,${0.30*pgl})`);
  wg.addColorStop(0.45,`rgba(90,140,170,${0.16*pgl})`);
  wg.addColorStop(1,`rgba(40,90,120,${0.08*pgl})`);
  ctx.fillStyle=wg; ctx.fillRect(0,0,W,H);
  // a calm equalizer along the bottom — the Incredibox keeps humming
  ctx.globalAlpha = pgl*0.5;
  const bars=18, bw=W/bars;
  for(let i=0;i<bars;i++){
    const h = 8 + Math.abs(Math.sin(bgT*2 + i*0.6))*26;
    ctx.fillStyle = BOXER_COLS[i%BOXER_COLS.length];
    ctx.fillRect(i*bw+2, H-h, bw-4, h);
  }
  ctx.restore();
}

// PHASE 2 — THE .EXE VIRUS sky: the calm dawn is torn into a corrupted red/teal
// void, and the gentle Incredibox equalizer warps into jagged, glitching bars.
function drawCorruptSky(cg){
  ctx.save();
  const wg = ctx.createLinearGradient(0,0,0,H);
  wg.addColorStop(0,`rgba(80,10,30,${0.42*cg})`);
  wg.addColorStop(0.5,`rgba(16,42,48,${0.22*cg})`);
  wg.addColorStop(1,`rgba(10,0,8,${0.52*cg})`);
  ctx.fillStyle=wg; ctx.fillRect(0,0,W,H);
  // corrupted equalizer — jagged bars stabbing up, flashing the virus colors
  ctx.globalAlpha=cg*0.6;
  const bars=22, bw=W/bars;
  for(let i=0;i<bars;i++){
    const h = Math.abs(6 + Math.sin(bgT*7 + i*1.3)*44 * (0.5+0.5*Math.sin(i*5+bgT*3)));
    ctx.fillStyle = (i%3===0)?'#ff3b5c':(i%3===1?'#eaeaff':'#3ee6dc');
    ctx.fillRect(i*bw+1, H-h, bw-2, h);
  }
  ctx.restore();
}

// The right half of the room becomes "normal" — warm sky, Mr. Sun, Mr. Tree —
// while the left stays Simon's corrupt dark. A golden crack splits the sky.
function drawRestoration(rg){
  ctx.save();
  // warm dawn over the normal (right) half
  const wg = ctx.createLinearGradient(0,0,0,H);
  wg.addColorStop(0,`rgba(120,90,30,${0.34*rg})`);
  wg.addColorStop(0.5,`rgba(90,70,40,${0.18*rg})`);
  wg.addColorStop(1,`rgba(40,60,40,${0.10*rg})`);
  ctx.fillStyle=wg; ctx.fillRect(W/2,0,W/2,H);
  // Mr. Sun — top right, with a calm little face
  const sx=W*0.80, sy=H*0.16, sr=34;
  ctx.globalAlpha=rg;
  ctx.shadowColor='#ffd84f'; ctx.shadowBlur=30;
  ctx.fillStyle='#ffe27a'; ctx.beginPath(); ctx.arc(sx,sy,sr,0,6.28); ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle=`rgba(255,210,80,${0.7})`; ctx.lineWidth=3;
  for(let i=0;i<12;i++){ const a=i/12*6.28 + bgT*0.4;
    ctx.beginPath(); ctx.moveTo(sx+Math.cos(a)*(sr+6), sy+Math.sin(a)*(sr+6));
    ctx.lineTo(sx+Math.cos(a)*(sr+16), sy+Math.sin(a)*(sr+16)); ctx.stroke(); }
  ctx.fillStyle='#7a5a10';
  ctx.beginPath(); ctx.arc(sx-11,sy-4,3.2,0,6.28); ctx.arc(sx+11,sy-4,3.2,0,6.28); ctx.fill();
  ctx.strokeStyle='#7a5a10'; ctx.lineWidth=2.4;
  ctx.beginPath(); ctx.arc(sx,sy+4,11,0.15*Math.PI,0.85*Math.PI,false); ctx.stroke();
  // Mr. Tree — bottom right, rooted in the new ground
  const tx=W*0.88, ty=H*0.86;
  ctx.fillStyle=`rgba(90,60,30,${rg})`; ctx.fillRect(tx-7, ty, 14, H*0.16);
  ctx.fillStyle=`rgba(60,150,70,${rg})`;
  ctx.beginPath(); ctx.arc(tx,ty-6,30,0,6.28); ctx.arc(tx-22,ty+6,20,0,6.28); ctx.arc(tx+22,ty+6,20,0,6.28); ctx.fill();
  ctx.fillStyle='#3a2a10';
  ctx.beginPath(); ctx.arc(tx-7,ty+2,2.6,0,6.28); ctx.arc(tx+7,ty+2,2.6,0,6.28); ctx.fill();
  // the golden crack splitting the sky down the middle
  ctx.globalAlpha=1;
  ctx.strokeStyle=`rgba(255,216,79,${0.85*rg})`; ctx.shadowColor='#ffd84f'; ctx.shadowBlur=18*rg;
  ctx.lineWidth=3.5; ctx.beginPath(); ctx.moveTo(W/2,0);
  for(let y=0;y<=H;y+=48){ ctx.lineTo(W/2 + Math.sin(y*0.06 + bgT)*14, y); }
  ctx.stroke();
  ctx.restore();
}

function drawWorldStatic(){
  // a hint of staircase behind the title
  ctx.save(); ctx.globalAlpha=0.5;
  for(let i=0;i<8;i++){
    const w=120, x= (i%2? W*0.22 : W*0.55), y=H-60 - i*86;
    roundRect(x,y,w,16,6); ctx.fillStyle='#241a3c'; ctx.fill();
    ctx.fillStyle='#3a2a5e'; ctx.fillRect(x,y,w,4);
  }
  ctx.restore();
}

function drawPlatforms(){
  for(const p of platforms){
    if(p.gone) continue;
    const wob = Math.sin(time*1.6 + (p.eye||0))*1.5;   // the whole thing breathes
    const x=p.x, y=p.y+wob, w=p.w, h=p.h;
    // base slab
    roundRect(x,y,w,h,6);
    let base = p.type==='safe' ? '#2e2350' : '#241a3c';
    if(p.type==='crumble') base = p.crumble>=0 ? '#5a2230' : '#33233f';
    if(p.type==='bite') base = '#2a1130';
    ctx.fillStyle=base; ctx.fill();
    // top edge highlight
    ctx.fillStyle = p.type==='bite' ? 'rgba(255,80,110,0.5)' : 'rgba(150,110,220,0.55)';
    ctx.fillRect(x,y,w,3);
    // cracks for crumble
    if(p.type==='crumble'){
      ctx.strokeStyle='rgba(255,90,120,0.6)'; ctx.lineWidth=1.4; ctx.beginPath();
      ctx.moveTo(x+w*0.3,y); ctx.lineTo(x+w*0.4,y+h); ctx.moveTo(x+w*0.65,y); ctx.lineTo(x+w*0.55,y+h); ctx.stroke();
    }
    // living biting step: teeth on the underside + an eye
    if(p.type==='bite'){
      const open = Math.max(0,Math.sin(p.biteT*4))*8;
      ctx.fillStyle='#ff3b5c';
      ctx.beginPath();
      const teeth=Math.max(4,(w/16)|0);
      for(let i=0;i<teeth;i++){ const tx=x+ (i+0.5)*(w/teeth);
        ctx.moveTo(tx-5,y+h); ctx.lineTo(tx,y+h+6+open); ctx.lineTo(tx+5,y+h); }
      ctx.fill();
      // eye
      ctx.fillStyle='#ffd84f'; ctx.beginPath(); ctx.arc(x+w/2,y-7,5,0,6.28); ctx.fill();
      ctx.fillStyle='#1a0008'; ctx.beginPath(); ctx.arc(x+w/2+Math.sin(time*2)*1.5,y-7,2.4,0,6.28); ctx.fill();
    }
    // moss + cracks: "This place is old."
    if(p.moss){
      ctx.fillStyle='rgba(70,140,80,0.45)';
      for(let i=0;i<3;i++){ const mx = x + w*(0.18+0.32*i); ctx.fillRect(mx, y-2, 6+i*3, 3); }
    }
    // Combuntia — the blood-red orb Simon set into the step; it charges
    // (glows) while a lever is being pulled, then the staircase obeys.
    if(p.comb){
      const charge = (lever && lever.state==='warn') ? 0.6+0.4*Math.sin(time*18) : 0.25+0.15*Math.sin(time*2+(p.eye||0));
      ctx.save();
      ctx.shadowColor='#ff0022'; ctx.shadowBlur=10+10*charge;
      ctx.fillStyle=`rgba(255,${30+40*charge|0},60,${0.7+0.3*charge})`;
      ctx.beginPath(); ctx.arc(x+w/2, y+h/2, 3.4+1.6*charge, 0, 6.28); ctx.fill();
      ctx.restore();
    }
  }
}

function drawEmeralds(){
  for(const e of emeralds){ if(e.got) continue;
    const yy = e.y + Math.sin(e.t*2)*4;
    ctx.save(); ctx.translate(e.x,yy); ctx.rotate(Math.sin(e.t)*0.3);
    ctx.shadowColor='#39e08a'; ctx.shadowBlur=12;
    ctx.fillStyle='#39e08a'; ctx.beginPath();
    ctx.moveTo(0,-10); ctx.lineTo(8,-1); ctx.lineTo(0,11); ctx.lineTo(-8,-1); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.beginPath();
    ctx.moveTo(0,-10); ctx.lineTo(4,-3); ctx.lineTo(0,0); ctx.lineTo(-4,-3); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

function drawBottles(){
  for(const b of bottles){
    if(b.got) continue;
    ctx.save(); ctx.translate(b.x, b.y);
    // both bottles look IDENTICAL — same murky red liquid (one heals, one kills)
    ctx.shadowColor='#ff2b4c'; ctx.shadowBlur=10;
    ctx.fillStyle='#9a1326'; roundRect(-7,-12,14,20,4); ctx.fill();   // glass
    ctx.shadowBlur=0;
    ctx.fillStyle='#e0334f'; roundRect(-7,-4,14,12,3); ctx.fill();    // liquid
    ctx.fillStyle='#ffd84f'; ctx.fillRect(-3,-16,6,5);                // cork
    ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.fillRect(-5,-10,2,14); // shine
    // a question mark — you can't know which it is
    ctx.fillStyle='#fff'; ctx.font='800 9px ui-monospace,monospace'; ctx.textAlign='center';
    ctx.fillText('?', 0, 4);
    ctx.restore();
  }
}

// THE PEACEFUL ENDING — little Incredibox singers stand on the calm steps and
// bob to a shared beat, the corruption finally turned into music.
function drawBoxers(){
  const a = Math.min(1, peace.glow);
  for(const p of platforms){
    if(!p.boxer || p.gone) continue;
    const ans = p.boxer.answer||0;                       // 1 right after it answers Simon
    const infected = !!p.boxer.infected;                 // caught the .EXE virus in Phase 2
    const jit = infected ? (Math.sin(bgT*30 + p.boxer.phase)*1.6) : 0;
    const bob = Math.abs(Math.sin(bgT*3 + p.boxer.phase))*4 + ans*5;
    const x = p.x + p.w/2 + jit, y = p.y - 14 - bob;
    ctx.save(); ctx.globalAlpha=a; ctx.translate(x,y);
    // body — glows when it answers Simon's call; glitches red/teal when infected
    let bcol = p.boxer.col;
    if(infected){ const k=(Math.floor(bgT*7 + p.boxer.phase*3))%3; bcol = k===0?'#ff3b5c':(k===1?'#3ee6dc':'#2a0a14'); }
    if(ans>0 || infected){ ctx.shadowColor=bcol; ctx.shadowBlur=infected?12:14*ans; }
    ctx.fillStyle=bcol; roundRectC(0,0,16,22,5); ctx.fill();
    ctx.shadowBlur=0;
    // eyes — calm dark normally; bright red when the virus has them
    ctx.fillStyle = infected ? '#ff2b4c' : '#0b1a2a';
    ctx.beginPath(); ctx.arc(-3.5,-3,1.8,0,6.28); ctx.arc(3.5,-3,1.8,0,6.28); ctx.fill();
    // open singing mouth — bigger on the beat, biggest when answering
    const mo = 1.5 + Math.abs(Math.sin(bgT*3 + p.boxer.phase))*3 + ans*3;
    ctx.fillStyle='#0b1a2a'; ctx.beginPath(); ctx.ellipse(0,4,2.6,mo,0,0,6.28); ctx.fill();
    ctx.restore();
  }
}

// floating music notes drifting up — the world humming to itself
function drawNotes(){
  ctx.save();
  for(const n of notes){
    const a = Math.min(1, peace.glow) * Math.max(0, 1 - n.t/n.life);
    ctx.globalAlpha = a; ctx.fillStyle = n.col;
    ctx.font='800 16px ui-monospace,monospace'; ctx.textAlign='center';
    ctx.fillText((n.sw>1?'♫':'♪'), n.x, n.y);
  }
  ctx.restore();
}

// THE SOUND BATTLE LEAD — a small, calm gold Simon at the bottom-center who
// leads the beat. He pulses FIRST every beat (he is the fastest), and the
// singers above answer his call. Drawn in screen space, over the calm room.
function drawBattleLead(){
  if(!peace || peace.glow<0.02) return;
  const a = Math.min(1, peace.glow);
  const cg = (phase2? phase2.glow : 0) || 0;          // Phase 2: calm Simon becomes the locked .EXE
  const corr = cg>0.3;
  const jit = corr ? (Math.sin(bgT*40)*2.2*Math.max(glitch,0.4)) : 0;
  const x = battle.simonX + jit, y = H-92;
  const pulse = 1 + battle.leadFlash*0.32;
  ctx.save(); ctx.globalAlpha=a; ctx.translate(x,y); ctx.scale(pulse,pulse);
  // a ring of his beat rippling out when he leads
  if(battle.leadFlash>0){
    ctx.strokeStyle = corr ? `rgba(255,59,92,${battle.leadFlash*0.55})` : `rgba(255,216,79,${battle.leadFlash*0.5})`;
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,2,18+(1-battle.leadFlash)*16,0,6.28); ctx.stroke();
    ctx.shadowColor = corr ? '#ff3b5c' : '#ffd84f'; ctx.shadowBlur=18*battle.leadFlash;
  }
  if(corr){
    // a datamosh ghost copy offset behind him, then the dark, locked Phase 2 body
    ctx.globalAlpha=a*0.45; ctx.fillStyle='#3ee6dc'; roundRectC(-3-jit,0,22,26,7); ctx.fill();
    ctx.globalAlpha=a; ctx.fillStyle='#1a0a14'; roundRectC(0,0,22,26,7); ctx.fill();
    ctx.shadowBlur=0; ctx.strokeStyle='#ff3b5c'; ctx.lineWidth=1.4; roundRectC(0,0,22,26,7); ctx.stroke();
    // Lore 27 — bandages: a warning sign that he is Phase 2. They glow brighter
    // when you look closely (stand still), like the warning Gray missed.
    if(isExposed()){
      const still = Math.abs(player.vx) < 1.6;
      const bA = a * (still ? 0.95 : 0.5);
      ctx.save(); ctx.beginPath(); roundRectC(0,0,22,26,7); ctx.clip();
      ctx.globalAlpha = bA; ctx.strokeStyle = still ? '#fff7e6' : '#e8dccb'; ctx.lineWidth = 3.2;
      ctx.lineCap='round';
      for(let b=-1;b<=2;b++){ const yy = b*8 - 2;
        ctx.beginPath(); ctx.moveTo(-13, yy); ctx.lineTo(13, yy-7); ctx.stroke(); }
      // faint warning glyph the close looker can read
      if(still){ ctx.globalAlpha=a; ctx.fillStyle='#ff3b5c'; ctx.font='800 7px ui-monospace,monospace';
        ctx.textAlign='center'; ctx.fillText('P2', 0, 2); }
      ctx.restore();
    }
  } else {
    // calm gold Simon — small now, but still the fastest
    ctx.fillStyle='#ffd84f'; roundRectC(0,0,22,26,7); ctx.fill();
  }
  ctx.shadowBlur=0;
  // eyes — calm dark normally; in Phase 2 they flash bright red / white / teal-blue
  if(corr){
    const k=(Math.floor(bgT*8))%3;
    const ec = k===0?'#ff2b4c':(k===1?'#ffffff':'#3ee6ff');
    ctx.shadowColor=ec; ctx.shadowBlur=13;
    ctx.fillStyle=ec; ctx.beginPath(); ctx.arc(-5,-4,2.8,0,6.28); ctx.arc(5,-4,2.8,0,6.28); ctx.fill();
    ctx.shadowBlur=0;
  } else {
    ctx.fillStyle='#2a1d00'; ctx.beginPath(); ctx.arc(-5,-4,2.4,0,6.28); ctx.arc(5,-4,2.4,0,6.28); ctx.fill();
  }
  // singing mouth — widest right on his beat (he always goes first)
  const mo = 2 + battle.leadFlash*4 + Math.abs(Math.sin(bgT*4))*1.5;
  ctx.fillStyle = corr ? '#000' : '#2a1d00'; ctx.beginPath(); ctx.ellipse(0,5,3,mo,0,0,6.28); ctx.fill();
  ctx.restore();
  // little caption under his lead
  ctx.save(); ctx.globalAlpha=a*0.95; ctx.textAlign='center';
  if(corr){ ctx.fillStyle = isResidual()? '#9affc8' : ((isAtomix()||!isExecutioner())? '#ff3b5c' : '#3ee6ff'); ctx.font='800 10px ui-monospace,monospace';
    ctx.fillText(isVoid()? 'GODLY SIMON — the lore of the void'
               : (isSounds()? 'PHASE 2 SIMON — the 17 sound battles'
               : (isResidual()? 'PHASE 2 SIMON — the residual war'
               : (isAtomix()? 'PHASE 2 SIMON — the atomix war'
               : (isExecutioner()? 'PHASE 2 SIMON — silent'
               : (isExposed()? 'PHASE 2 SIMON — found out' : 'PHASE 2 SIMON — locked'))))), x, y-22); }
  else { ctx.fillStyle='#ffd84f'; ctx.font='800 10px ui-monospace,monospace';
    ctx.fillText('SIMON LEADS — fastest', x, y-22); }
  ctx.restore();
}

function drawTendrils(){
  for(const tn of tendrils){
    const y=tn.y;
    const segs=14;
    ctx.save();
    ctx.strokeStyle='rgba(255,59,92,0.85)'; ctx.lineCap='round';
    ctx.beginPath();
    for(let i=0;i<=segs;i++){
      const f=i/segs; const xx = tn.side<0 ? f*tn.len : W - f*tn.len;
      const yy = y + Math.sin(f*8 + tn.t*6)*8*(1-f);
      ctx.lineWidth = (1-f)*14 + 2;
      if(i===0) ctx.moveTo(xx,yy); else ctx.lineTo(xx,yy);
    }
    ctx.stroke();
    // glowing tip
    const tx = tn.side<0 ? tn.len : W-tn.len;
    ctx.fillStyle='#ffd84f'; ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.arc(tx,y,5,0,6.28); ctx.fill();
    ctx.restore();
  }
}

function drawSimonTide(){
  const top = simonY;
  if(top > cameraY + H + 200) return;
  const h = (cameraY + H + 260) - top;
  // body of the tide
  const g = ctx.createLinearGradient(0, top, 0, top+h);
  g.addColorStop(0,'rgba(255,59,92,0.0)');
  g.addColorStop(0.18,'rgba(120,10,30,0.85)');
  g.addColorStop(1,'rgba(20,0,6,1)');
  ctx.fillStyle=g;
  // wavy top edge
  ctx.beginPath(); ctx.moveTo(0, top+20);
  for(let x=0;x<=W;x+=20){ ctx.lineTo(x, top + Math.sin(x*0.05 + time*4)*8 + 8); }
  ctx.lineTo(W, top+h); ctx.lineTo(0, top+h); ctx.closePath(); ctx.fill();
  // reaching grasp-tendrils
  ctx.strokeStyle='rgba(255,59,92,0.5)'; ctx.lineWidth=3;
  for(let i=0;i<6;i++){ const x=(i+0.5)*W/6 + Math.sin(time*2+i)*16;
    ctx.beginPath(); ctx.moveTo(x, top+14);
    ctx.quadraticCurveTo(x+Math.sin(time*3+i)*20, top-26, x+Math.sin(time+i)*8, top-50-Math.abs(Math.sin(time*2+i))*20);
    ctx.stroke(); }
  // Simon's eyes + grin glaring up out of the tide
  const ex=W/2, ey=top+34;
  // Lore 28 — silent and watchful: his eyes flicker red, then teal, then white.
  const eyeCol = isExecutioner() ? ['#ff2b4c','#3ee6ff','#ffffff'][(Math.floor(time*7))%3] : '#ffd84f';
  ctx.fillStyle=eyeCol; ctx.shadowColor= isExecutioner()? eyeCol : '#ff0033'; ctx.shadowBlur=24;
  ctx.beginPath(); ctx.arc(ex-34,ey,11,0,6.28); ctx.arc(ex+34,ey,11,0,6.28); ctx.fill();
  ctx.shadowBlur=0; ctx.fillStyle='#ff0022';
  ctx.beginPath(); ctx.arc(ex-34,ey,5,0,6.28); ctx.arc(ex+34,ey,5,0,6.28); ctx.fill();
  // jagged grin
  ctx.fillStyle='#fff'; ctx.beginPath();
  const gy=ey+26; ctx.moveTo(ex-50,gy);
  for(let i=0;i<10;i++){ const gx=ex-50+i*11; ctx.lineTo(gx+5, gy+ (i%2?12:0)); ctx.lineTo(gx+11, gy); }
  ctx.lineTo(ex+50,gy+14); ctx.lineTo(ex-50,gy+14); ctx.closePath(); ctx.fill();
}

// Lore 26 — the corruption-cells Simon forces the game to grow.
function drawCells(){
  for(const c of cells){
    ctx.save(); ctx.translate(c.x, c.y);
    const pulse = 1 + Math.sin(c.t*3)*0.12;
    if(c.kind==='pyra'){
      // Pyrakontacke: red cell with a bright Power Nucleus (true)
      ctx.fillStyle='rgba(255,40,70,0.22)'; ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.arc(0,0,c.r*pulse,0,6.28); ctx.fill();
      ctx.strokeStyle='rgba(255,90,110,0.7)'; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.arc(0,0,c.r*pulse,0,6.28); ctx.stroke();
      // the nucleus — a hot core
      ctx.shadowBlur=10; ctx.fillStyle='#ffd84f';
      ctx.beginPath(); ctx.arc(0,0,c.r*0.38,0,6.28); ctx.fill();
      ctx.shadowBlur=0; ctx.fillStyle='#ff0022';
      ctx.beginPath(); ctx.arc(0,0,c.r*0.18,0,6.28); ctx.fill();
    } else {
      // Plorotacke: cyan cell, no nucleus, one huge Mitochondria (raw charge)
      ctx.fillStyle='rgba(62,198,255,0.18)'; ctx.shadowColor='#3ec6ff'; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.arc(0,0,c.r*pulse,0,6.28); ctx.fill();
      ctx.strokeStyle='rgba(120,220,255,0.7)'; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.arc(0,0,c.r*pulse,0,6.28); ctx.stroke();
      // the oversized mitochondria — a stadium-shaped charge blob
      ctx.shadowBlur=8; ctx.fillStyle='rgba(140,255,210,0.9)';
      ctx.beginPath(); ctx.ellipse(0,0,c.r*0.6,c.r*0.34,c.t*0.6,0,6.28); ctx.fill();
      ctx.strokeStyle='rgba(60,200,150,0.8)'; ctx.lineWidth=1;
      for(let k=-2;k<=2;k++){ ctx.beginPath();
        ctx.moveTo(-c.r*0.5, k*c.r*0.13); ctx.lineTo(c.r*0.5, k*c.r*0.13); ctx.stroke(); }
    }
    ctx.restore();
  }
  ctx.shadowBlur=0;
}
// Lore 27 — blurry thoughts Simon plants: soft smeared violet blobs with a faint
// fogged word, each ringed by little lightning ticks (he seals them with lightning).
function drawThoughts(){
  for(const th of thoughts){
    ctx.save(); ctx.translate(th.x, th.y);
    const pulse = 1 + Math.sin(th.t*2)*0.1;
    // layered smear — several offset translucent disks = a blurry, unfocused look
    for(let k=0;k<4;k++){
      const off = k*3;
      const ox = Math.cos(th.t*0.7+k)*off, oy = Math.sin(th.t*0.9+k)*off;
      ctx.fillStyle = `rgba(150,120,255,${0.10 - k*0.018})`;
      ctx.beginPath(); ctx.arc(ox, oy, th.r*pulse, 0, 6.28); ctx.fill();
    }
    // the faint, fogged word inside the thought
    ctx.globalAlpha = 0.5 + 0.2*Math.sin(th.t*1.5);
    ctx.fillStyle = '#d9ccff'; ctx.textAlign='center'; ctx.font='700 12px ui-monospace,monospace';
    ctx.shadowColor='#b98cff'; ctx.shadowBlur=6;
    ctx.fillText(th.word, Math.sin(th.t*3)*1.5, 4);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    // tiny lightning seal ticks around the rim
    ctx.strokeStyle='rgba(234,252,255,0.5)'; ctx.lineWidth=1;
    for(let s=0;s<3;s++){ const a = th.t*2 + s*2.09;
      const r1=th.r*0.8, r2=th.r*1.05;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*r1, Math.sin(a)*r1);
      ctx.lineTo(Math.cos(a+0.2)*r2, Math.sin(a+0.2)*r2);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1;
}
// Lightning-powered corruption: Pyrakontacke + Plorotacke mixing inside Simon.
function drawBolts(){
  for(const z of bolts){
    const a = Math.max(0, 1 - z.t/z.life);
    ctx.save(); ctx.globalAlpha = a;
    if(z.strike){
      // Lore 28 — the executioner's clean strike: a white-hot, red precision bolt
      ctx.strokeStyle = z.t<z.life*0.4 ? '#ffffff' : '#ff2b4c';
      ctx.shadowColor='#ff2b4c'; ctx.shadowBlur=18; ctx.lineWidth=3.4; ctx.lineCap='round';
    } else {
      ctx.strokeStyle = z.t<z.life*0.5 ? '#eafcff' : '#ffd84f';
      ctx.shadowColor='#3ec6ff'; ctx.shadowBlur=14; ctx.lineWidth=2.6; ctx.lineCap='round';
    }
    const segs=8; ctx.beginPath(); ctx.moveTo(z.ax, z.ay);
    for(let i=1;i<segs;i++){ const f=i/segs;
      const jx=(((z.seed*(i+3))%13)-6) * (1-Math.abs(f-0.5)*2) * 3.2;
      const jy=(((z.seed*(i+7))%11)-5) * 1.8;
      ctx.lineTo(z.ax+(z.bx-z.ax)*f + jx, z.ay+(z.by-z.ay)*f + jy);
    }
    ctx.lineTo(z.bx, z.by); ctx.stroke();
    ctx.restore();
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1;
}
// Lore 28 — the executioner's mark: a red reticle that CONTRACTS as the strike
// becomes certain, with a lock dot that flashes white the instant before he fires.
function drawMark(){
  if(!mark) return;
  const p = Math.min(1, mark.t / mark.charge);
  ctx.save(); ctx.translate(mark.x, mark.y);
  const flick = (Math.floor(time*16)%2) ? '#ff2b4c' : '#ffd2da';
  ctx.strokeStyle = flick; ctx.shadowColor='#ff2b4c'; ctx.shadowBlur=10; ctx.lineWidth=2;
  const r = 8 + (1-p)*44;               // ring closes in as the result becomes certain
  ctx.beginPath(); ctx.arc(0,0,r,0,6.28); ctx.stroke();
  // crosshair ticks
  ctx.beginPath();
  ctx.moveTo(-r-6,0); ctx.lineTo(-r+4,0); ctx.moveTo(r-4,0); ctx.lineTo(r+6,0);
  ctx.moveTo(0,-r-6); ctx.lineTo(0,-r+4); ctx.moveTo(0,r-4); ctx.lineTo(0,r+6);
  ctx.stroke();
  // the lock dot — commits to white right before the clean move
  ctx.shadowBlur=14; ctx.fillStyle = p>0.85 ? '#ffffff' : '#ff2b4c';
  ctx.beginPath(); ctx.arc(0,0,3,0,6.28); ctx.fill();
  ctx.restore(); ctx.shadowBlur=0;
}
function drawPlayer(){
  const p=player; const x=p.x, y=p.y;
  const sq = p.onGround ? 1 + Math.sin(p.anim*10)* (Math.abs(p.vx)>0.5?0.05:0.0) : 1;
  const bw=p.w*(2-sq), bh=p.h*sq;
  ctx.save(); ctx.translate(x,y);
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0,p.h/2+2,p.w*0.4,4,0,0,6.28); ctx.fill();
  // body (Jet — the player; blue, "the most powerful player")
  ctx.fillStyle = p.dead? '#5a6072' : '#46b4ff';
  roundRectC(0,0,bw,bh,9); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.18)'; roundRectC(-bw*0.18,-bh*0.18,bw*0.5,bh*0.4,6); ctx.fill();
  // eyes
  const look=p.face*2;
  ctx.fillStyle='#f0fdff'; ctx.beginPath(); ctx.arc(-6,-2,5,0,6.28); ctx.arc(7,-2,5,0,6.28); ctx.fill();
  ctx.fillStyle='#0b1a2a'; ctx.beginPath(); ctx.arc(-6+look,-2,2.4,0,6.28); ctx.arc(7+look,-2,2.4,0,6.28); ctx.fill();
  // little crown
  ctx.fillStyle='#1f75ff'; ctx.beginPath();
  ctx.moveTo(-10,-bh/2); ctx.lineTo(-6,-bh/2-7); ctx.lineTo(-2,-bh/2); ctx.lineTo(2,-bh/2-7); ctx.lineTo(6,-bh/2); ctx.lineTo(10,-bh/2-7); ctx.lineTo(10,-bh/2+2); ctx.lineTo(-10,-bh/2+2); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawParticles(){
  for(const pt of particles){ ctx.globalAlpha=Math.max(0,pt.life);
    ctx.fillStyle=pt.col; ctx.fillRect(pt.x-2,pt.y-2,4,4); }
  ctx.globalAlpha=1;
}
function drawFloaters(){
  ctx.textAlign='center'; ctx.font='700 16px ui-monospace,monospace';
  for(const f of floaters){ ctx.globalAlpha=Math.max(0,1-f.t); ctx.fillStyle=f.col; ctx.fillText(f.txt,f.x,f.y); }
  ctx.globalAlpha=1;
}

/* ---------- HUD ---------- */
// Lore 27 — Copies of Intention: tiny, logic-sized Simon traces, each carrying ONE
// instruction. Red diamond slivers with a flickering eye and the word they impose.
function drawCopies(){
  for(const c of copies){
    ctx.save(); ctx.translate(c.x, c.y);
    const pulse = 0.7+0.3*Math.sin(c.t*4);
    ctx.rotate(Math.sin(c.t*1.3)*0.3);
    // a small red diamond — a sliver of Simon's will
    ctx.shadowColor='#ff2b4c'; ctx.shadowBlur=10;
    ctx.fillStyle=`rgba(255,43,76,${0.6*pulse+0.3})`;
    ctx.beginPath();
    ctx.moveTo(0,-c.r); ctx.lineTo(c.r*0.8,0); ctx.lineTo(0,c.r); ctx.lineTo(-c.r*0.8,0);
    ctx.closePath(); ctx.fill();
    // a flickering eye (red/white/teal — Simon's gaze inside it)
    const k=(Math.floor(c.t*8))%3, ec = k===0?'#ffffff':(k===1?'#3ee6ff':'#ffd1d8');
    ctx.shadowBlur=6; ctx.fillStyle=ec;
    ctx.beginPath(); ctx.arc(0,-1,2.4,0,6.28); ctx.fill();
    ctx.shadowBlur=0; ctx.rotate(-Math.sin(c.t*1.3)*0.3);
    // its one instruction
    ctx.fillStyle='#ffe2e7'; ctx.font='700 9px ui-monospace,monospace'; ctx.textAlign='center';
    ctx.fillText(c.word, 0, c.r+11);
    ctx.restore();
  }
}

// Lore 27 (the Residual War) — half-formed REMNANTS: the unfinished things Residual
// leaves half-open. Each is an open ring with a GAP plus a glyph of what it once was
// (a broken staircase, a reversed laugh, half a polo, a false door, a dead sound).
// Reach one and it FINISHES: the ring closes and flares green.
function drawRemnants(){
  for(const r of remnants){
    ctx.save(); ctx.translate(r.x, r.y);
    const finishing = r.fin>0;
    const flick = finishing ? 1 : (0.55 + 0.45*Math.sin(r.t*5));
    const col = finishing ? '#9affc8' : `rgba(154,255,200,${0.35+0.35*flick})`;
    ctx.strokeStyle = col; ctx.fillStyle = col;
    ctx.shadowColor='#9affc8'; ctx.shadowBlur = finishing ? 16 : 8; ctx.lineWidth = 2;
    // the UNFINISHED ring: an arc with an open gap; finishing closes the whole circle
    const close = finishing ? 1 : 0.62;
    ctx.beginPath(); ctx.arc(0,0,r.r, -Math.PI/2, -Math.PI/2 + 6.28*close, false); ctx.stroke();
    // a half-formed glyph of the old thing it is a remnant of
    ctx.shadowBlur=0; const g=r.r*0.5;
    if(r.kind==='stair'){ for(let i=0;i<3;i++) ctx.strokeRect(-g+i*4, g-4-i*5, 7, 4); }
    else if(r.kind==='laugh'){ ctx.beginPath();
      for(let i=0;i<=12;i++){ const xx=-g+(2*g)*i/12, yy=Math.sin((i+r.t*6)*0.9)*4;
        if(i===0) ctx.moveTo(xx,yy); else ctx.lineTo(xx,yy); } ctx.stroke(); }
    else if(r.kind==='polo'){ ctx.beginPath(); ctx.arc(0,0,g, Math.PI*0.15, Math.PI*1.05, false); ctx.stroke(); }
    else if(r.kind==='door'){ ctx.strokeRect(-g*0.7, -g*0.2, g*1.4, g*1.5);
      ctx.beginPath(); ctx.arc(g*0.4, g*0.55, 1.4, 0, 6.28); ctx.stroke(); }
    else { ctx.beginPath(); ctx.moveTo(-g,-3); ctx.lineTo(-2,-3); ctx.lineTo(g*0.7,-g*0.7);
      ctx.lineTo(g*0.7,g*0.7); ctx.lineTo(-2,3); ctx.lineTo(-g,3); ctx.closePath(); ctx.stroke(); }
    ctx.restore();
  }
  ctx.shadowBlur=0;
}
// Lore 27 (the Residual War) — THE SOUND SPINE: the one structure in Classics that can
// force Residual into a final shape and end it at once. A bright vertebral column down
// the center that grows solid as convergence (spine) climbs, and flares gold on CONVERGE.
function drawSpine(){
  const x = W/2, top = cameraY-40, bot = cameraY+H+40;
  const lit = Math.max(spine, spineFlash);
  if(lit < 0.05) return;
  ctx.save();
  ctx.globalAlpha = 0.18 + 0.5*lit + 0.3*spineFlash;
  ctx.strokeStyle = spineFlash>0 ? '#ffd84f' : '#9affc8';
  ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 12 + 18*spineFlash;
  ctx.lineWidth = 2 + 4*lit;
  ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, bot); ctx.stroke();
  // vertebrae — the spine's segments, wider and more solid as it converges
  ctx.lineWidth = 2;
  for(let yy = top; yy < bot; yy += 26){
    const w = (10 + 26*lit) * (0.6+0.4*Math.sin((yy*0.05)+time*2));
    ctx.beginPath(); ctx.moveTo(x-w, yy); ctx.lineTo(x+w, yy); ctx.stroke();
  }
  ctx.restore(); ctx.shadowBlur=0;
}

// Lore 27 (the 17 Sound Battles) — Simon LEADS the beat: glowing notes rise through the
// room to be answered on beat, and the current foe answers with a PRESSURE sweep, a band
// of sound crossing the room. With the board destroyed, sound is the only surviving law.
function drawSounds(){
  // the foe's PRESSURE sweep — a translucent band of sound crossing the room
  if(foePress.active){
    ctx.save();
    ctx.fillStyle = 'rgba(62,230,255,0.12)';
    ctx.fillRect(foePress.x-12, cameraY, 24, H);
    ctx.strokeStyle = 'rgba(62,230,255,0.65)'; ctx.lineWidth = 2;
    ctx.shadowColor = '#3ee6ff'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.moveTo(foePress.x, cameraY); ctx.lineTo(foePress.x, cameraY+H); ctx.stroke();
    ctx.restore(); ctx.shadowBlur = 0;
  }
  // Simon's lead beats — glowing eighth-notes rising to be answered on beat
  for(const n of leadNotes){
    ctx.save(); ctx.translate(n.x, n.y);
    const answering = n.ans>0;
    const flick = answering ? 1 : (0.55 + 0.45*Math.sin(n.t*6));
    const col = answering ? '#eafff4' : `rgba(255,216,79,${0.4+0.4*flick})`;
    ctx.fillStyle = col; ctx.strokeStyle = col;
    ctx.shadowColor = '#ffd84f'; ctx.shadowBlur = answering ? 16 : 8; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(-3, 4, 6, 4.5, -0.4, 0, 6.28); ctx.fill();   // note head
    ctx.beginPath(); ctx.moveTo(3, 4); ctx.lineTo(3, -12); ctx.stroke();      // stem
    ctx.beginPath(); ctx.moveTo(3, -12); ctx.quadraticCurveTo(11, -9, 9, -2); ctx.stroke();  // flag
    ctx.restore();
  }
  ctx.shadowBlur = 0;
}

/* ---- Lore 27 — THE LORE OF THE VOID: the Blackhole Tower (a drifting gravity well) and
       the dense Void. Drawn in world space. ---- */
function drawVoid(){
  const vg = voidwar.glow||0;
  const core = voidwar.core!=null ? voidwar.core : W/2;
  const top = cameraY;
  ctx.save();
  // the dense Void — a heavy dark wash over the whole room
  ctx.fillStyle = `rgba(10,4,22,${0.30*vg})`;
  ctx.fillRect(0, top, W, H);
  // THE BLACKHOLE TOWER — a vertical column of bent light around the drifting core
  const grad = ctx.createLinearGradient(core-90, 0, core+90, 0);
  grad.addColorStop(0, 'rgba(122,79,255,0)');
  grad.addColorStop(0.5, `rgba(80,40,160,${0.32*vg})`);
  grad.addColorStop(1, 'rgba(122,79,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(core-90, top, 180, H);
  // swirling accretion rings drifting up the tower
  ctx.strokeStyle = `rgba(185,140,255,${0.5*vg})`;
  ctx.shadowColor = '#b98cff'; ctx.shadowBlur = 12;
  for(let i=0;i<7;i++){
    const yy = top + ((time*40 + i*H/7) % H);
    const rr = 30 + 26*Math.abs(Math.sin(time*1.1 + i));
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(core, yy, rr, rr*0.34, 0, 0, 6.28); ctx.stroke();
  }
  // the dense core — black void mouths with a bright red rim (Simon's eyes turned red)
  for(let yy = top + 30; yy < top + H; yy += 96){
    const cy = yy + ((time*40) % 96);
    const r = 20 + 6*Math.sin(time*3 + cy*0.05);
    const g2 = ctx.createRadialGradient(core, cy, 2, core, cy, r);
    g2.addColorStop(0, 'rgba(0,0,0,0.92)');
    g2.addColorStop(0.7, `rgba(20,4,30,${0.7*vg})`);
    g2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.arc(core, cy, r, 0, 6.28); ctx.fill();
    ctx.strokeStyle = `rgba(255,60,90,${0.55*vg})`; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(core, cy, r*0.7, 0, 6.28); ctx.stroke();
  }
  ctx.restore(); ctx.shadowBlur = 0;
}

// THE JUDGMENT FIELD — Winter Simon froze the board: a pale white wash, a locked lattice of
// frozen signal-lines with blinking measure-nodes, drifting snow, and the falling Gold Card
// game presents (dark coal boxes, one bright gold card).
function drawJudge(){
  const jg = judge.glow||0; const top = cameraY;
  ctx.save();
  // the field freezes white — a pale wash over the whole room
  ctx.fillStyle = `rgba(210,228,255,${0.20*jg})`;
  ctx.fillRect(0, top, W, H);
  // frozen signal-lines — a locked lattice (the side wars, paused mid-motion)
  ctx.strokeStyle = `rgba(180,212,255,${0.42*jg})`; ctx.lineWidth = 1;
  ctx.shadowColor = '#bfe0ff'; ctx.shadowBlur = 5;
  for(let i=0;i<7;i++){ const yy = top + (i+0.5)*H/7;
    ctx.beginPath(); ctx.moveTo(0, yy); ctx.lineTo(W, yy); ctx.stroke(); }
  for(let i=0;i<6;i++){ const xx = (i+0.5)*W/6;
    ctx.beginPath(); ctx.moveTo(xx, top); ctx.lineTo(xx, top+H); ctx.stroke(); }
  // blinking measure-nodes at the intersections (every move being measured)
  ctx.shadowBlur = 9;
  const tick = (time*2)|0;
  for(let i=0;i<7;i++) for(let j=0;j<6;j++){
    if(((i*6+j)+tick) % 5 === 0){
      const yy = top + (i+0.5)*H/7, xx = (j+0.5)*W/6;
      ctx.fillStyle = `rgba(232,246,255,${0.7*jg})`;
      ctx.beginPath(); ctx.arc(xx, yy, 2.2, 0, 6.28); ctx.fill();
    }
  }
  ctx.shadowBlur = 0;
  // drifting snow (Winter Simon)
  for(let i=0;i<46;i++){
    const sx = (i*101 + time*22) % W;
    const sy = top + ((i*57 + time*46) % H);
    ctx.fillStyle = `rgba(255,255,255,${0.5*jg})`;
    ctx.fillRect(sx, sy, 2, 2);
  }
  // the Gold Card game — falling presents: coal (common) and the one gold card
  for(const p of judge.presents){
    if(p.got) continue;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.sin(p.spin)*0.18);
    if(p.gold){
      ctx.shadowColor = '#ffd84f'; ctx.shadowBlur = 14;
      ctx.fillStyle = '#ffd84f'; roundRectC(0,0,22,30,4); ctx.fill();
      ctx.fillStyle = '#fff6c8'; ctx.fillRect(-7,-11,14,8);
      ctx.fillStyle = '#9a7500'; ctx.font = '800 9px ui-monospace,monospace'; ctx.textAlign = 'center';
      ctx.fillText('GOLD', 0, 8);
    } else {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#2a2a33'; roundRectC(0,0,18,18,3); ctx.fill();
      ctx.strokeStyle = 'rgba(90,90,104,0.9)'; ctx.lineWidth = 1.4; ctx.stroke();
    }
    ctx.restore();
  }
  ctx.restore(); ctx.shadowBlur = 0;
}

// THE THREE-WAY FIELD — the shattered dimension where CONTROL, ORIGIN, and CONTAINMENT all
// exist at once: three colored vertical zones (Lica's source-light, Simon's winter-lock,
// Alex's built structure) with shattered seams between them, plus the ice creep rising from
// below (Simon clapped twice and ice spreads). The active claimant's zone brightens.
function drawTriad(){
  const tg = triad.glow||0; const top = cameraY;
  ctx.save();
  // three vertical zones: left = LICA (origin, pink-gold), center = SIMON (containment, ice),
  // right = ALEX (control, violet-steel). Each pulses; the active claimant brightens.
  const cols = [ [255,200,230], [191,224,255], [201,184,255] ];   // Lica, Simon, Alex
  for(let z=0; z<3; z++){
    const zx = z*W/3, pulse = 0.16 + 0.10*Math.sin(time*1.6 + z*2.1);
    const lit = (triad.claim===z) ? 0.20 : 0;   // brighten the claimed zone
    const a = (pulse + lit) * tg, c = cols[z];
    const g = ctx.createLinearGradient(zx, 0, zx+W/3, 0);
    g.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},0)`);
    g.addColorStop(0.5, `rgba(${c[0]},${c[1]},${c[2]},${a})`);
    g.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
    ctx.fillStyle = g; ctx.fillRect(zx, top, W/3, H);
  }
  // the shattered seams where the three meet — jagged bright cracks
  ctx.strokeStyle = `rgba(232,246,255,${0.45*tg})`; ctx.lineWidth = 1.4;
  ctx.shadowColor = '#dff0ff'; ctx.shadowBlur = 7;
  for(const seam of [W/3, 2*W/3]){
    ctx.beginPath(); ctx.moveTo(seam, top);
    for(let y=top; y<top+H; y+=26){ ctx.lineTo(seam + Math.sin(y*0.13 + time*1.3)*9, y); }
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  // origin-light motes drifting up the left, control-grid ticks falling on the right
  for(let i=0;i<16;i++){
    const lx = (i*53) % (W/3);
    const ly = top + (((i*71 - time*30) % H) + H) % H;
    ctx.fillStyle = `rgba(255,200,230,${0.5*tg})`; ctx.fillRect(lx, ly, 2, 2);
    const rx = 2*W/3 + ((i*47) % (W/3));
    const ry = top + ((i*61 + time*24) % H);
    ctx.fillStyle = `rgba(201,184,255,${0.5*tg})`; ctx.fillRect(rx, ry, 2, 6);
  }
  // THE ICE CREEP — Simon clapped twice and ice spreads up from the bottom of the field
  const ice = triad.ice||0;
  if(ice > 0){
    const band = top + H*(1 - 0.55*ice);   // the frozen front rises as ice spreads
    const g2 = ctx.createLinearGradient(0, band, 0, top+H);
    g2.addColorStop(0, 'rgba(191,224,255,0)');
    g2.addColorStop(1, `rgba(210,236,255,${0.34*tg})`);
    ctx.fillStyle = g2; ctx.fillRect(0, band, W, top+H-band);
    // a crystalline frozen front line with little ice spikes
    ctx.strokeStyle = `rgba(234,250,255,${0.7*tg})`; ctx.lineWidth = 1.6;
    ctx.shadowColor = '#eafaff'; ctx.shadowBlur = 8;
    ctx.beginPath();
    for(let x=0; x<=W; x+=22){
      const yy = band + Math.sin(x*0.08 + time*0.8)*4;
      if(x===0) ctx.moveTo(x, yy); else ctx.lineTo(x, yy);
      ctx.lineTo(x+11, yy-7);
    }
    ctx.stroke(); ctx.shadowBlur = 0;
  }
  ctx.restore(); ctx.shadowBlur = 0;
}

// THE CONTAINMENT FACILITY — the SCF becoming Simon-shaped. Two columns of containment panels
// (a wall of security screens) line the margins; as Simon's code spreads, panels flip from a
// dim cyan label to YELLOW warning with his symbol stamped on them. Scrolling log lines rewrite
// themselves, a yellow warning haze creeps in, and his great symbol fades up over the room.
function drawScf(){
  const sg = scf.glow||0, sp = scf.spread||0, top = cameraY;
  ctx.save();
  // a creeping yellow warning haze that deepens as the code takes the facility
  const haze = ctx.createLinearGradient(0, top, 0, top+H);
  haze.addColorStop(0, `rgba(40,30,6,${0.10*sg})`);
  haze.addColorStop(1, `rgba(70,52,8,${(0.10+0.22*sp)*sg})`);
  ctx.fillStyle = haze; ctx.fillRect(0, top, W, H);
  // a tiny reusable stamp of Simon's symbol (cross + omega arc) for infected panels
  function simonMark(cx, cy, r, a){
    ctx.globalAlpha = a; ctx.strokeStyle = '#ff3b5c'; ctx.lineWidth = 1.6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(cx, cy-r); ctx.lineTo(cx, cy+r);
    ctx.moveTo(cx-r, cy); ctx.lineTo(cx+r, cy); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, r*0.66, Math.PI*0.78, Math.PI*0.22, false); ctx.stroke();
  }
  // two columns of containment panels along the margins
  const PW = 30, PH = 22, GAP = 8, rows = Math.ceil(H/(PH+GAP)) + 1;
  for(const side of [0, 1]){
    const px = side===0 ? 8 : W-8-PW;
    for(let r=0; r<rows; r++){
      const py = top + 56 + r*(PH+GAP);
      const seed = ((r*73 + side*131 + 17) % 101) / 101;        // stable per-panel phase
      const infected = seed < sp;                               // the code has reached this panel
      const flick = 0.5 + 0.5*Math.sin(time*3 + seed*9);
      // panel body
      ctx.globalAlpha = (0.5 + 0.4*sg);
      ctx.fillStyle = infected ? `rgba(60,48,8,1)` : `rgba(10,16,28,1)`;
      ctx.fillRect(px, py, PW, PH);
      ctx.globalAlpha = (0.6*sg) * (infected ? (0.6+0.4*flick) : 0.7);
      ctx.strokeStyle = infected ? '#ffd84f' : '#2a3a55'; ctx.lineWidth = 1;
      ctx.strokeRect(px+0.5, py+0.5, PW-1, PH-1);
      if(infected){
        // Simon's symbol stamped where the label should be
        simonMark(px+PW/2, py+PH/2, 6, (0.45+0.4*flick)*sg);
        // a yellow warning light, top-right of the panel
        ctx.globalAlpha = (0.7+0.3*flick)*sg; ctx.fillStyle = '#ffe98a';
        ctx.fillRect(px+PW-5, py+2, 3, 3);
      } else {
        // a dim cyan "label" tick: still a normal containment readout
        ctx.globalAlpha = 0.5*sg; ctx.fillStyle = '#3ee6ff';
        ctx.fillRect(px+4, py+PH/2-1, PW-8, 2);
        ctx.fillStyle = '#1f7d33'; ctx.fillRect(px+PW-5, py+2, 3, 3);   // green ok-light
      }
    }
  }
  // scrolling log lines down the center that rewrite themselves (yellow as the code wins)
  ctx.globalAlpha = (0.16+0.20*sp)*sg; ctx.fillStyle = '#ffe98a';
  for(let i=0;i<10;i++){
    const ly = top + (((i*73 + time*40) % H) + H) % H;
    const lw = 30 + ((i*53)%70);
    ctx.fillRect(W/2-90 + ((i*37)%150), ly, lw, 1.5);
  }
  // Simon's great symbol fading up over the whole room as he becomes the facility's code
  if(sp > 0.15){
    const a = (0.06 + 0.20*sp) * sg;
    ctx.globalAlpha = a; ctx.strokeStyle = '#ff3b5c';
    ctx.shadowColor = '#ff2b4c'; ctx.shadowBlur = 16; ctx.lineWidth = 4; ctx.lineCap='round';
    const cx=W/2, cy=top+H*0.5, R=Math.min(W,H)*0.28;
    ctx.beginPath(); ctx.moveTo(cx, cy-R); ctx.lineTo(cx, cy+R);
    ctx.moveTo(cx-R, cy); ctx.lineTo(cx+R, cy); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, R*0.66, Math.PI*0.78, Math.PI*0.22, false); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.restore(); ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

// SCF 404 — the containment grown into a cosmic system. A deep starfield, an ENDLESS field of
// floating platform-cards (CLASSICS, SEPARATE CLASSICS, NET X, SCF, and one HUGE platform, plus
// countless faint others that load as it expands), labels flickering to "404", Simon's great 404
// symbol fading up over everything, and the lightning cat streaking diagonally across the field.
function drawScf404(){
  const sg = scf404.glow||0, ex = scf404.expand||0, top = cameraY;
  ctx.save();
  // deep cosmic haze — the containment-universe, darker and wider than the facility
  const haze = ctx.createLinearGradient(0, top, 0, top+H);
  haze.addColorStop(0, `rgba(10,6,26,${0.14*sg})`);
  haze.addColorStop(1, `rgba(28,10,44,${(0.14+0.24*ex)*sg})`);
  ctx.fillStyle = haze; ctx.fillRect(0, top, W, H);
  // a faint drifting starfield — the universe SCF spread into
  for(let i=0;i<60;i++){
    const sx = ((i*97 + 13) % W), sy = top + ((((i*53) + time*8) % H) + H) % H;
    const tw = 0.4 + 0.6*Math.sin(time*2 + i);
    ctx.fillStyle = i%7===0 ? '#c9b8ff' : '#5a4a78';
    ctx.globalAlpha = (0.25 + 0.4*tw)*sg; ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  // the platform-list: named cards plus an endless field of faint ones, more loading as it expands
  const NAMED = ['CLASSICS','SEP. CLASSICS','NET X','SCF','THE HUGE PLATFORM'];
  ctx.font='9px ui-monospace,monospace'; ctx.textAlign='center';
  const cols = 3, cardW = 78, cardH = 26, rows = Math.ceil(H/56) + 1;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const seed = ((r*53 + c*131 + 7) % 101) / 101;
      if(seed > 0.2 + 0.8*ex) continue;                  // more of the universe loads as it expands
      const idx = r*cols + c;
      const cx = (W/(cols+1))*(c+1) + Math.sin(time*0.6 + r*1.3 + c)*6;
      const cy = top + 60 + r*56 + ((time*6) % 56);
      const huge = (idx % 11 === 3);                      // the HUGE platform — drawn bigger
      const w = huge ? cardW*1.5 : cardW, h = huge ? cardH*1.6 : cardH;
      const broke = (Math.sin(time*3 + seed*20) > 0.6);   // flickers to "404"
      ctx.globalAlpha = (0.30 + 0.45*sg) * (huge?1:0.8);
      ctx.fillStyle = huge ? 'rgba(40,18,60,0.9)' : 'rgba(18,12,34,0.85)';
      ctx.fillRect(cx-w/2, cy-h/2, w, h);
      ctx.globalAlpha = 0.7*sg; ctx.lineWidth = huge?1.6:1;
      ctx.strokeStyle = broke ? '#ff3b5c' : '#7a5cc0';
      ctx.strokeRect(cx-w/2+0.5, cy-h/2+0.5, w-1, h-1);
      ctx.globalAlpha = 0.85*sg;
      ctx.fillStyle = broke ? '#ff6b88' : '#c9b8ff';
      ctx.fillText(broke ? '404' : NAMED[idx % NAMED.length], cx, cy+3);
    }
  }
  // Simon's great 404 symbol (cross + omega) fading up over the whole universe
  if(ex > 0.1){
    ctx.globalAlpha = (0.06 + 0.18*ex) * sg; ctx.strokeStyle = '#b98cff';
    ctx.shadowColor = '#7a5cc0'; ctx.shadowBlur = 18; ctx.lineWidth = 4; ctx.lineCap='round';
    const cx=W/2, cy=top+H*0.5, R=Math.min(W,H)*0.30;
    ctx.beginPath(); ctx.moveTo(cx, cy-R); ctx.lineTo(cx, cy+R);
    ctx.moveTo(cx-R, cy); ctx.lineTo(cx+R, cy); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, R*0.66, Math.PI*0.78, Math.PI*0.22, false); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = (0.10+0.22*ex)*sg; ctx.fillStyle='#b98cff'; ctx.font='800 30px ui-monospace,monospace';
    ctx.fillText('404', cx, cy+R*0.66+34);
  }
  // the lightning cat — fast diagonal bolts streaking across the endless field (0% survival)
  for(const b of (scf404.bolts||[])){
    const prog = b.t/0.8;
    const x0 = b.dir>0 ? -40 + prog*(W+80) : W+40 - prog*(W+80);
    const a = (1 - Math.abs(prog-0.5)*2) * sg;            // brightest at the middle of its crossing
    ctx.globalAlpha = Math.max(0, a);
    ctx.strokeStyle = '#eafaff'; ctx.shadowColor='#9affe0'; ctx.shadowBlur=12; ctx.lineWidth=2.5;
    ctx.beginPath();
    let px = x0, py = b.y; ctx.moveTo(px, py);
    for(let s=0;s<6;s++){ px += b.dir*26; py += rnd(-14,14); ctx.lineTo(px, py); }
    ctx.stroke();
    ctx.globalAlpha = Math.max(0, a); ctx.fillStyle='#ffe98a';   // a tiny lightning-cat spark head
    ctx.beginPath(); ctx.arc(x0, b.y, 3, 0, 6.28); ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.restore(); ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

// THE TREADMILL WEAKNESS — Simon's one weakness made into a level. Treadmill belts ring the SCF
// room (rolling chevron stripes on rollers), a blindfolded lightning cat dodges along them with a
// charge bar that drains as you herd him, and faint forced-pattern arrows (route markers) flicker
// to red as Simon attacks the patterns he was forced into.
function drawTreads(){
  const g = treads.glow||0, ring = treads.ring||0, top = cameraY, bt = treads.beltT||0;
  ctx.save();
  // electric containment haze — the treadmill room
  const haze = ctx.createLinearGradient(0, top, 0, top+H);
  haze.addColorStop(0, `rgba(6,18,28,${0.16*g})`);
  haze.addColorStop(1, `rgba(8,26,40,${(0.16+0.18*ring)*g})`);
  ctx.fillStyle = haze; ctx.fillRect(0, top, W, H);
  // the treadmill belts — horizontal rolling belts placed across the room, more as the ring fills
  const belts = 3 + Math.round(ring*3);   // 3..6 belts
  for(let i=0;i<belts;i++){
    const by = top + 70 + i*(H-140)/Math.max(1,belts-1);
    const dir = (i%2===0)?1:-1;            // alternating belt directions
    const bw = W-40, bx = 20, bh = 16;
    ctx.globalAlpha = (0.5+0.4*g); ctx.fillStyle='#0c1a26';
    ctx.fillRect(bx, by-bh/2, bw, bh);
    ctx.strokeStyle='#2c6e86'; ctx.lineWidth=1; ctx.globalAlpha=0.7*g;
    ctx.strokeRect(bx+0.5, by-bh/2+0.5, bw-1, bh-1);
    // rolling chevron stripes — the running belt surface
    ctx.globalAlpha=0.8*g; ctx.strokeStyle='#3ee6ff'; ctx.lineWidth=2;
    const off = (((bt*90*dir) % 28) + 28) % 28;
    for(let x=bx-28; x<bx+bw+28; x+=28){
      const sx = x + off;
      ctx.beginPath();
      ctx.moveTo(sx, by-bh/2+2); ctx.lineTo(sx+10*dir, by); ctx.lineTo(sx, by+bh/2-2);
      ctx.stroke();
    }
    // drive rollers at each end
    ctx.globalAlpha=0.8*g; ctx.fillStyle='#1c3a48';
    ctx.beginPath(); ctx.arc(bx, by, bh/2, 0, 6.28); ctx.arc(bx+bw, by, bh/2, 0, 6.28); ctx.fill();
  }
  // faint forced-pattern arrows (route markers) — Simon's deeper weakness, flickering as he attacks them
  if(ring > 0.25){
    ctx.font='800 13px ui-monospace,monospace'; ctx.textAlign='center';
    const arrows = ['▲','▶','◀','↻'];
    for(let i=0;i<7;i++){
      const ax = (W/8)*(i+1) + Math.sin(bt*0.7+i)*5;
      const ay = top + 40 + (((i*97 + bt*14)%(H-60))+(H-60))%(H-60);
      const broke = (Math.sin(bt*3 + i*2) > 0.5);   // Simon attacking the pattern
      ctx.globalAlpha = (broke? 0.25 : 0.5) * g;
      ctx.fillStyle = broke ? '#ff3b5c' : '#3ee6ff';
      ctx.fillText(broke ? '×' : arrows[i%arrows.length], ax, ay);
    }
  }
  // the lightning cat dodging along the belts — fast, playful, blindfolded, with a draining charge bar
  const cx = treads.catX!=null? treads.catX : W*0.5, cy = top + H*0.5;
  const chg = Math.max(0, Math.min(1, treads.charge!=null? treads.charge : 1));
  ctx.globalAlpha = g;
  // body
  ctx.fillStyle = treads.throwFlash>0 ? '#eafaff' : '#1a2c38';
  ctx.strokeStyle='#3ee6ff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(cx, cy, 16, 11, 0, 0, 6.28); ctx.fill(); ctx.stroke();
  // ears
  ctx.fillStyle='#3ee6ff';
  ctx.beginPath(); ctx.moveTo(cx-10,cy-8); ctx.lineTo(cx-15,cy-20); ctx.lineTo(cx-3,cy-11); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx+10,cy-8); ctx.lineTo(cx+15,cy-20); ctx.lineTo(cx+3,cy-11); ctx.fill();
  // blindfold (he is the blindfolded cat) + a flicker spark
  ctx.fillStyle='#0c1a26'; ctx.fillRect(cx-12, cy-4, 24, 4);
  ctx.fillStyle='#ffe98a'; ctx.globalAlpha=g*(0.5+0.5*Math.sin(bt*8));
  ctx.beginPath(); ctx.arc(cx+18, cy-6, 2.5, 0, 6.28); ctx.fill();
  ctx.globalAlpha=g;
  // his charge bar — drains as the player herds him onto the belts
  const cbw=40, cbx=cx-cbw/2, cby=cy-26;
  ctx.fillStyle='rgba(8,4,18,0.7)'; ctx.fillRect(cbx-1, cby-1, cbw+2, 5);
  ctx.fillStyle = chg>0.4 ? '#ffe98a' : '#ff6b88';
  ctx.fillRect(cbx, cby, cbw*chg, 3);
  // sparks crackling off him while still charged
  if(chg > 0.3){
    ctx.strokeStyle='#eafaff'; ctx.lineWidth=1.5; ctx.globalAlpha=g*chg;
    for(let s=0;s<3;s++){ const a=bt*6+s*2.1; ctx.beginPath();
      ctx.moveTo(cx, cy); ctx.lineTo(cx+Math.cos(a)*22, cy+Math.sin(a)*16); ctx.stroke(); }
  }
  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

// Lore 28 cont. (June 17) — FIREY DELIGHT / THE MELTING TUBE. A tall containment tube stands in the
// room; Simon circles its inside wall as a fast blur of bandages and red eyes, and as the HEAT rises
// the wall glows cyan -> orange -> white, bows inward, drips molten metal, and melts into a glowing
// ring at the base. Heat shimmer rises off the whole chamber.
function drawFirey(){
  const g = firey.glow||0, heat = Math.max(0, Math.min(1, firey.heat||0)), top = cameraY;
  const sp = firey.spin||0, warp = firey.warp||0;
  ctx.save();
  // heating haze — dark teal warming to orange as the friction builds
  const haze = ctx.createLinearGradient(0, top, 0, top+H);
  haze.addColorStop(0, `rgba(${Math.round(10+40*heat)},${Math.round(16+8*heat)},22,${0.18*g})`);
  haze.addColorStop(1, `rgba(${Math.round(20+120*heat)},${Math.round(14+30*heat)},14,${(0.18+0.22*heat)*g})`);
  ctx.fillStyle = haze; ctx.fillRect(0, top, W, H);
  // wall colour: cyan -> orange -> white-hot as the heat climbs
  function wallCol(a){
    if(heat < 0.5){ const k=heat/0.5; return `rgba(${Math.round(62+193*k)},${Math.round(230-92*k)},${Math.round(255-196*k)},${a})`; }
    const k=(heat-0.5)/0.5; return `rgba(255,${Math.round(138+117*k)},${Math.round(59+196*k)},${a})`;
  }
  // the tube — a vertical cylinder, centered, bowing inward as it softens
  const tcx = W*0.5, tcw = 96 - 18*warp, tTop = top + 64, tBot = top + H - 64, tH = tBot - tTop, ry = 16;
  const midY = tTop + tH*0.5;
  ctx.globalAlpha = g;
  // back wall glow
  const wg = ctx.createLinearGradient(tcx-tcw/2,0,tcx+tcw/2,0);
  wg.addColorStop(0, wallCol(0.10+0.35*heat)); wg.addColorStop(0.5, wallCol(0.04+0.12*heat)); wg.addColorStop(1, wallCol(0.10+0.35*heat));
  ctx.fillStyle = wg; ctx.fillRect(tcx-tcw/2, tTop, tcw, tH);
  // tube side walls — bowed inward by warp
  ctx.lineWidth = 3; ctx.strokeStyle = wallCol(0.55+0.4*heat);
  ctx.shadowBlur = 14*heat; ctx.shadowColor = heat>0.5? '#ffae5a' : '#3ee6ff';
  for(const side of [-1,1]){
    const ex = tcx + side*tcw/2;
    ctx.beginPath(); ctx.moveTo(ex, tTop);
    ctx.quadraticCurveTo(ex - side*18*warp, midY, ex, tBot);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  // top + bottom rim ellipses
  ctx.strokeStyle = wallCol(0.5+0.4*heat); ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(tcx, tTop, tcw/2, ry, 0, 0, 6.28); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(tcx, tBot, tcw/2, ry, 0, 0, 6.28); ctx.stroke();
  // Simon circling the inside wall — a fast blur of bandages + red eyes, faster as heat rises.
  // Drawn back-to-front so the leading blur sits on top.
  const trail = 7;
  for(let i=trail-1;i>=0;i--){
    const a = sp - i*0.5;
    const depth = Math.sin(a);                       // -1 back wall, +1 front
    const px = tcx + Math.cos(a)*(tcw/2 - 8);
    const py = midY + depth*ry*0.7;
    const fade = (1 - i/trail) * g;
    const front = depth > -0.1;
    ctx.globalAlpha = fade * (front?1:0.45);
    ctx.fillStyle = front ? '#f3ece0' : '#7a6f64';   // bandages, dimmer on the far wall
    const rx = 9*(0.7+0.3*((depth+1)/2));
    ctx.beginPath(); ctx.ellipse(px, py, rx, 7, 0, 0, 6.28); ctx.fill();
    if(i===0 && front){                              // red eyes on the leading blur
      ctx.fillStyle = '#ff2b3a';
      ctx.beginPath(); ctx.arc(px-3, py-1, 1.6, 0, 6.28); ctx.arc(px+3, py-1, 1.6, 0, 6.28); ctx.fill();
    }
  }
  ctx.globalAlpha = g;
  // friction sparks ringing the wall where he scrapes
  if(heat > 0.2){
    ctx.strokeStyle = '#fff0d0'; ctx.lineWidth = 1.4; ctx.globalAlpha = g*heat;
    for(let s=0;s<4;s++){ const a = sp*1.3 + s*1.57;
      const px = tcx + Math.cos(a)*(tcw/2 - 4), py = midY + Math.sin(a)*ry*0.7;
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px+Math.cos(a)*9, py+Math.sin(a)*7); ctx.stroke();
    }
    ctx.globalAlpha = g;
  }
  // molten ring forming at the base once hot — the tube melting into a glowing puddle
  if(heat > 0.45){
    ctx.fillStyle = `rgba(255,${Math.round(150+80*heat)},${Math.round(40+40*heat)},${(0.5+0.4*heat)*g})`;
    ctx.shadowBlur = 18*heat; ctx.shadowColor = '#ffb347';
    ctx.beginPath(); ctx.ellipse(tcx, tBot+4, tcw/2 + 10*heat, ry*0.7, 0, 0, 6.28); ctx.fill();
    ctx.shadowBlur = 0;
  }
  // molten drips running down the wall
  for(const d of (firey.drips||[])){
    const a = Math.max(0, 1 - d.t/1.6) * g;
    ctx.fillStyle = `rgba(255,200,90,${a})`;
    ctx.beginPath(); ctx.ellipse(d.x, d.y, 2.4, 5, 0, 0, 6.28); ctx.fill();
  }
  // heat shimmer rising off the chamber
  if(heat > 0.15){
    ctx.strokeStyle = `rgba(255,180,110,${0.10*heat*g})`; ctx.lineWidth = 2;
    for(let i=0;i<5;i++){ const bx = W*(0.2+0.15*i); let firstPt=true;
      ctx.beginPath();
      for(let y=tBot; y>tTop; y-=10){ const xx = bx + Math.sin(y*0.08 + sp*0.5 + i)*6*heat;
        if(firstPt){ ctx.moveTo(xx,y); firstPt=false; } else ctx.lineTo(xx,y); }
      ctx.stroke();
    }
  }
  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

/* ---- Lore 29 — THE ALIEN AGE render. A planet-sized, alien-grown chamber: a yellow eye in the
       sky-shield, a green prediction lattice, folding light-shapes closing in, and the predicted
       path of his next moves with the yellow MOVE 401 node stepping off-track as he outruns it. ---- */
function drawAlien(){
  const g = alien.glow||0, top = cameraY, lt = alien.latticeT||0;
  const pred = Math.max(0,Math.min(1,alien.predict||0)), out = Math.max(0,Math.min(1,alienM));
  ctx.save();
  // alien-age haze — deep violet over alien green
  const haze = ctx.createLinearGradient(0, top, 0, top+H);
  haze.addColorStop(0, `rgba(18,10,30,${0.30*g})`);
  haze.addColorStop(1, `rgba(12,28,16,${0.26*g})`);
  ctx.fillStyle = haze; ctx.fillRect(0, top, W, H);
  // the prediction lattice — a faint green grid of future-position nodes; stronger while it predicts him
  ctx.globalAlpha = g;
  ctx.strokeStyle = `rgba(124,240,106,${0.08+0.20*pred})`; ctx.lineWidth = 1;
  const step = 46;
  for(let x=((lt*14)%step); x<W; x+=step){ ctx.beginPath(); ctx.moveTo(x, top+112); ctx.lineTo(x, top+H); ctx.stroke(); }
  for(let y=top+112+((lt*10)%step); y<top+H; y+=step){ ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  // the sky-shield band + the single yellow eye / symbol in the artificial clouds
  const eye = alien.eye||0, ecx = W*0.5, ecy = top + 80;
  ctx.fillStyle = `rgba(110,140,80,${0.10*g})`; ctx.fillRect(0, top+42, W, 70);
  ctx.save();
  ctx.globalAlpha = g*eye;
  ctx.shadowBlur = 22; ctx.shadowColor = '#ffe24a';
  ctx.strokeStyle = `rgba(255,226,74,${0.8*eye})`; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(ecx, ecy, 46, 22, 0, 0, 6.28); ctx.stroke();   // the eye outline
  ctx.fillStyle = `rgba(255,226,74,${0.9*eye})`;
  ctx.beginPath(); ctx.ellipse(ecx, ecy, 12, 12*(0.6+0.4*Math.abs(Math.sin(lt*1.5))), 0, 0, 6.28); ctx.fill(); // pupil
  ctx.restore();
  // folding light-shapes (containment geometry) drifting in to box his futures
  for(const s of (alien.shapes||[])){
    const a = Math.max(0, 1 - s.t/3.2) * g, R = 15 + 4*Math.sin(s.rot*1.3);
    ctx.save();
    ctx.shadowBlur = 8; ctx.shadowColor = '#aef34a';
    ctx.strokeStyle = `rgba(174,243,74,${0.8*a})`; ctx.lineWidth = 1.6;
    ctx.fillStyle = `rgba(124,240,106,${0.16*a})`;
    ctx.beginPath();
    for(let k=0;k<=s.sides;k++){ const ang = s.rot + k*6.2832/s.sides;
      const px = s.x + Math.cos(ang)*R, py = s.y + Math.sin(ang)*R;
      if(k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  // the predicted path — ghost nodes the lattice expects Simon to take, near him
  const baseX = Math.max(48, Math.min(W-48, player.x)), baseY = player.y - 22;
  for(let i=0;i<10;i++){
    const nx = baseX + (i-4.5)*16, ny = baseY - Math.sin(i*0.6 + lt)*7;
    ctx.fillStyle = `rgba(124,240,106,${(0.5*pred)*g})`;
    ctx.beginPath(); ctx.arc(nx, ny, 2.2, 0, 6.28); ctx.fill();
  }
  // MOVE 401 — the node Simon actually takes, off the predicted line, glowing yellow as he outruns it
  const f401x = baseX + 6*16, f401y = baseY - 24*out;
  ctx.save(); ctx.shadowBlur = 4 + 12*out; ctx.shadowColor = '#ffe24a';
  ctx.fillStyle = `rgba(255,226,74,${(0.4+0.6*out)*g})`;
  ctx.beginPath(); ctx.arc(f401x, f401y, 3.6, 0, 6.28); ctx.fill();
  if(out > 0.25){ ctx.strokeStyle = `rgba(255,226,74,${0.5*out*g})`; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(baseX + 4.5*16, baseY); ctx.lineTo(f401x, f401y); ctx.stroke(); }
  ctx.restore();
  ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1;
}

function drawHUD(){
  const m = Math.floor(height/PX_PER_M);
  // top bar
  ctx.fillStyle='rgba(8,4,18,0.65)'; ctx.fillRect(0,0,W,46);
  ctx.fillStyle='#e9e0ff'; ctx.textAlign='left'; ctx.font='800 24px ui-monospace,monospace';
  ctx.fillText(m+' m', 14, 31);
  ctx.fillStyle='#8a82a8'; ctx.font='11px ui-monospace,monospace';
  ctx.fillText('BEST '+best, 14, 42);
  // emeralds
  ctx.textAlign='right'; ctx.fillStyle='#39e08a'; ctx.font='700 18px ui-monospace,monospace';
  ctx.fillText('◆ '+emer, W-14, 24);
  // hearts
  for(let i=0;i<maxHp;i++){ const hx=W-20-i*24, hy=38;
    ctx.fillStyle = i<hp ? '#ff3b5c':'rgba(255,59,92,0.22)';
    heart(hx,hy,7); }
  // Simon proximity bar
  const gap=(simonY-player.y); const prox=Math.max(0,Math.min(1,1-gap/(H*0.95)));
  ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(W/2-90,40,180,5);
  ctx.fillStyle = prox>0.7?'#ff0033':(prox>0.4?'#ff7b00':'#ffd84f');
  ctx.fillRect(W/2-90,40,180*prox,5);
  ctx.textAlign='center'; ctx.fillStyle='#8a82a8'; ctx.font='9px ui-monospace,monospace';
  ctx.fillText('SIMON', W/2, 38);
  // mute indicator
  ctx.textAlign='right'; ctx.fillStyle='#5a5278'; ctx.font='10px ui-monospace,monospace';
  ctx.fillText(AUDIO.isOn()?'♪ on (M)':'♪ off (M)', W-14, 56);

  // PHASE 2 (Lore 26) — RUN = FUEL, HIDE = SAFE. A charge bar + a live status.
  if(corrupted() && phase2.glow>0.05){
    const bw=180, bx=W/2-bw/2, by=H-30;
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    const fg = fuel>0.66?'#ff0033':(fuel>0.33?'#ff7b00':'#ffd84f');
    ctx.fillStyle=fg; ctx.fillRect(bx,by,bw*fuel,7);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    const running = Math.abs(player.vx) > 1.6;
    if(running || fuelHint>0){ ctx.fillStyle = (fuelHint>0?'#ff3b5c':fg);
      ctx.fillText('RUNNING = FUEL', W/2, by-6); }
    else { ctx.fillStyle = `rgba(143,227,255,${0.5+0.5*safeGlow})`;
      ctx.fillText('HIDDEN = SAFE', W/2, by-6); }
  }
  // EXPOSED (Lore 27) — the MIND meter. Fills when blurry thoughts touch you;
  // overload and Simon seals it with lightning. Look closely (stand still) to clear.
  if(isExposed() && exposed.glow>0.05){
    const bw=180, bx=W/2-bw/2, by=H-46;
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    const mg = mind>0.66?'#eafcff':(mind>0.33?'#b98cff':'#7a5cff');
    ctx.fillStyle=mg; ctx.fillRect(bx,by,bw*mind,7);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(mind>0.66 || mindSeal>0){ ctx.fillStyle = mindSeal>0?'#eafcff':'#b98cff';
      ctx.fillText('MIND OVERLOAD', W/2, by-6); }
    else { ctx.fillStyle = '#b98cff'; ctx.fillText('MIND: BLURRY', W/2, by-6); }
  }
  // SILENT EXECUTIONER (Lore 28) — a precision mark is locking on. MOVE off it.
  if(isExecutioner() && mark && !mark.fired){
    const blink=(Math.sin(time*18)>0)?1:0.4;
    ctx.save(); ctx.globalAlpha=blink; ctx.textAlign='center';
    ctx.fillStyle='#ff2b4c'; ctx.font='800 13px ui-monospace,monospace';
    ctx.fillText('◎ MARKED — MOVE!', W/2, H-64);
    ctx.restore();
  }
  // ATOMIX WAR (Lore 27) — the BOARD tug-of-war: red = Simon owns it, blue = the
  // rebellion freed it. A Copy of Intention touching you drags the marker left.
  if(isAtomix() && !isResidual() && atomix.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46;
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    ctx.fillStyle='#ff2b4c'; ctx.fillRect(bx, by, bw*(1-board), 7);          // Simon's share
    ctx.fillStyle='#3ee6ff'; ctx.fillRect(bx+bw*(1-board), by, bw*board, 7); // freed share
    // the contested marker
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*(1-board)-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(curse.t>0){ ctx.fillStyle='#ff2b4c'; ctx.fillText('“'+curse.type.toUpperCase()+'”', W/2, by-6); }
    else if(board<0.34){ ctx.fillStyle='#ff2b4c'; ctx.fillText('BOARD: AGREEING WITH SIMON', W/2, by-6); }
    else { ctx.fillStyle='#3ee6ff'; ctx.fillText('REBELLION CLEANS UPWARD — DODGE', W/2, by-6); }
  }
  // RESIDUAL WAR (Lore 27) — the SOUND SPINE meter. Finish the half-formed remnants to
  // climb it; fill it and the Sound Spine converges Residual and ends it all at once.
  if(isResidual() && !isSounds() && residual.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, sp=Math.max(0,Math.min(1,spine));
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    ctx.fillStyle='#2c3a34'; ctx.fillRect(bx, by, bw, 7);                    // the unfinished sprawl
    ctx.fillStyle = spineFlash>0 ? '#ffd84f' : '#9affc8';
    ctx.fillRect(bx, by, bw*sp, 7);                                          // convergence toward the Sound Spine
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*sp-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(spineFlash>0){ ctx.fillStyle='#ffd84f'; ctx.fillText('CONVERGE — RESIDUAL SEALED', W/2, by-6); }
    else { ctx.fillStyle='#9affc8'; ctx.fillText('FINISH THE UNFINISHED — FILL THE SPINE', W/2, by-6); }
  }
  // 17 SOUND BATTLES (Lore 27) — the BATTLE meter + which of the 17 claims is being
  // decided. Answer Simon's lead beats to fill it; fill it and the foe loses its claim.
  // Battle 14 is ToddLLM, the duel of created will.
  if(isSounds() && sounds.glow>0.05 && !isVoid()){
    const bw=200, bx=W/2-bw/2, by=H-46, bm=Math.max(0,Math.min(1,battleMeter));
    const beaten = sounds.idx >= SOUND_FOES.length;
    const n = Math.min(sounds.idx+1, SOUND_FOES.length);
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    ctx.fillStyle='#2a2438'; ctx.fillRect(bx, by, bw, 7);
    ctx.fillStyle = winFlash>0 ? '#eafff4' : '#ffd84f';
    ctx.fillRect(bx, by, bw*bm, 7);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*bm-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(beaten){ ctx.fillStyle='#ffd84f'; ctx.fillText('★ ALL 17 DECIDED — SOUND LAW HOLDS ★', W/2, by-6); }
    else { ctx.fillStyle='#ffd84f';
      ctx.fillText('SOUND BATTLE '+n+'/17 — vs '+SOUND_FOES[sounds.idx].toUpperCase(), W/2, by-6); }
  }
  // LORE OF THE VOID (Lore 27) — the SHAPE meter: hold your own shape away from the
  // Blackhole Tower core and climb to fill it; outlast the Torqe and you keep your shape.
  if(isVoid() && voidwar.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, sm=Math.max(0,Math.min(1,shapeMeter));
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    ctx.fillStyle='#241a3a'; ctx.fillRect(bx, by, bw, 7);
    ctx.fillStyle = winFlash>0 ? '#eafff4' : '#b98cff';
    ctx.fillRect(bx, by, bw*sm, 7);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*sm-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(voidwar.held){ ctx.fillStyle='#b98cff'; ctx.fillText('★ TORQE OUTLASTED — YOU KEPT YOUR SHAPE ★', W/2, by-6); }
    else { ctx.fillStyle='#b98cff'; ctx.fillText('WAR OF SHAPES — HOLD YOUR SHAPE, KEEP CLIMBING', W/2, by-6); }
  }
  // THE JUDGMENT FIELD (Lore 27) — the VERDICT meter: Winter Simon froze every side war and
  // measures every move. Climb with purpose to fill it, and catch the one gold card.
  if(isJudge() && !isTriad() && judge.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, vm=Math.max(0,Math.min(1,verdict));
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    ctx.fillStyle='#1c2738'; ctx.fillRect(bx, by, bw, 7);
    ctx.fillStyle = winFlash>0 ? '#eafaff' : '#bfe0ff';
    ctx.fillRect(bx, by, bw*vm, 7);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*vm-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(judge.held){ ctx.fillStyle='#bfe0ff'; ctx.fillText('★ JUDGMENT PASSED — YOU KEPT YOUR PURPOSE ★', W/2, by-6); }
    else if(judge.gold){ ctx.fillStyle='#ffd84f'; ctx.fillText('YOU HOLD THE ONE GOLD CARD — KEEP CLIMBING', W/2, by-6); }
    else { ctx.fillStyle='#bfe0ff'; ctx.fillText('JUDGMENT FIELD — CLIMB WITH PURPOSE, FIND THE GOLD', W/2, by-6); }
  }
  // THE THREE-WAY FIELD (Lore 27 cont.) — the FIELD meter: hold control, origin, and
  // containment all at once by climbing with purpose while the three claimants press.
  if(isTriad() && !isScf() && triad.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, fm=Math.max(0,Math.min(1,triadM));
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    ctx.fillStyle='#20283a'; ctx.fillRect(bx, by, bw, 7);
    ctx.fillStyle = winFlash>0 ? '#eafaff' : ['#c9b8ff','#ffc8e6','#bfe0ff'][triad.claim];
    ctx.fillRect(bx, by, bw*fm, 7);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*fm-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(triad.held){ ctx.fillStyle='#dff0ff'; ctx.fillText('★ THE FIELD HELD — CONTROL · ORIGIN · CONTAINMENT ★', W/2, by-6); }
    else { ctx.fillStyle='#dff0ff'; ctx.fillText('THREE-WAY FIELD — HOLD YOUR FOOTING, CLIMB WITH PURPOSE', W/2, by-6); }
  }
  // THE CONTAINMENT FACILITY (Lore 27 cont.) — the CONTAINMENT meter: hold the facility by
  // climbing with purpose while Simon's code spreads across the panels and turns the lights yellow.
  if(isScf() && !isScf404() && scf.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, cm=Math.max(0,Math.min(1,scfM));
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    ctx.fillStyle='#2a2410'; ctx.fillRect(bx, by, bw, 7);
    // the bar fills yellow as you hold; behind it, a red spread-marker creeps with the code
    ctx.fillStyle = winFlash>0 ? '#fff6cf' : '#ffd84f';
    ctx.fillRect(bx, by, bw*cm, 7);
    ctx.fillStyle='rgba(255,59,92,0.7)'; ctx.fillRect(bx+bw*Math.min(1,scf.spread||0)-1, by-1, 2, 9);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*cm-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(scf.held){ ctx.fillStyle='#ffe98a'; ctx.fillText('★ CONTAINMENT HELD — BUT HE IS ALREADY THE CODE ★', W/2, by-6); }
    else { ctx.fillStyle='#ffe98a'; ctx.fillText('CONTAINMENT FACILITY — HOLD THE LINE, CLIMB WITH PURPOSE', W/2, by-6); }
  }
  // SCF 404 (Lore 28) — the SURVIVE meter: 0% odds, but climbing with purpose keeps you ahead of
  // the lightning cat across the endless containment-universe.
  if(isScf404() && !isTreads() && scf404.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, sm=Math.max(0,Math.min(1,scf404M));
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    ctx.fillStyle='#241038'; ctx.fillRect(bx, by, bw, 7);
    ctx.fillStyle = winFlash>0 ? '#eafaff' : '#b98cff';
    ctx.fillRect(bx, by, bw*sm, 7);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*sm-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(scf404.held){ ctx.fillStyle='#c9b8ff'; ctx.fillText('★ YOU OUTRAN THE 0% — KEEP CLIMBING ★', W/2, by-6); }
    else { ctx.fillStyle='#c9b8ff'; ctx.fillText('SCF 404 — SURVIVAL 0%, CLIMB WITH PURPOSE', W/2, by-6); }
  }
  // THE TREADMILL WEAKNESS (Lore 28 cont.) — the DRAIN meter: climb in rhythm to herd the lightning
  // cat onto the belts and forced patterns and drain his charge; standing still lets him recharge.
  if(isTreads() && treads.glow>0.05){
    const bw=200, bx=W/2-bw/2, by=H-46, dm=Math.max(0,Math.min(1,treadsM));
    ctx.fillStyle='rgba(8,4,18,0.6)'; ctx.fillRect(bx,by,bw,7);
    ctx.fillStyle='#0c2630'; ctx.fillRect(bx, by, bw, 7);
    ctx.fillStyle = winFlash>0 ? '#eafaff' : '#3ee6ff';
    ctx.fillRect(bx, by, bw*dm, 7);
    // behind it, Simon's charge marker — his power creeping back the other way
    ctx.fillStyle='rgba(255,233,138,0.7)'; ctx.fillRect(bx+bw*Math.max(0,Math.min(1,treads.charge||0))-1, by-1, 2, 9);
    ctx.fillStyle='#fff'; ctx.fillRect(bx+bw*dm-1, by-2, 2, 11);
    ctx.textAlign='center'; ctx.font='800 11px ui-monospace,monospace';
    if(treads.held){ ctx.fillStyle='#9affe0'; ctx.fillText('★ THROWN OFF THE BELT — KEEP THE RHYTHM ★', W/2, by-6); }
    else { ctx.fillStyle='#9affe0'; ctx.fillText('TREADMILL WEAKNESS — CLIMB IN RHYTHM, DRAIN HIM', W/2, by-6); }
  }
  // FIREY DELIGHT — the HEAT meter. You cannot stop the melt: climbing with purpose spins Simon faster
